// Solver 40 g con lucchetti: gli inchiostri bloccati restano fissi, gli altri
// si dividono il budget (40 − somma bloccati) mantenendo le proporzioni reali.
function solve40(inks){
  const parse=v=>{const n=parseFloat(String(v).replace(',','.'));return isNaN(n)?0:n;};
  const rows=inks.map(k=>({real:parse(k.g), locked:!!k.locked}));
  const lockedSum=rows.filter(r=>r.locked).reduce((s,r)=>s+r.real,0);
  const unlocked=rows.filter(r=>!r.locked);
  const unlockedRealSum=unlocked.reduce((s,r)=>s+r.real,0);
  const budget=40-lockedSum;
  const invalid=lockedSum>40.0001;
  const out=inks.map((k,i)=>{
    const r=rows[i]; let g40;
    if(r.locked) g40=r.real;
    else if(invalid||budget<=0) g40=0;
    else if(unlockedRealSum>0) g40=r.real/unlockedRealSum*budget;
    else g40=unlocked.length?budget/unlocked.length:0;
    return {...k, real:r.real, g40:Math.max(0,g40)};
  });
  const totReal=rows.reduce((s,r)=>s+r.real,0);
  return {rows:out, totReale:totReal, lockedSum, invalid};
}

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const rows = json.table.rows;
  const cols = json.table.cols.map(c => (c.label || '').trim());
  if (!rows || rows.length === 0) return [];
  return rows.map(r => {
    const obj = {};
    cols.forEach((c, i) => {
      const val = r.c && r.c[i] ? (r.c[i].v !== null && r.c[i].v !== undefined ? String(r.c[i].v).trim() : '') : '';
      obj[c] = val;
    });
    return obj;
  }).filter(r => Object.values(r).some(v => v !== ''));
}

function hexToHSL(hex) {
  let h=(hex||'').replace('#','');
  if(h.length===3)h=h.split('').map(c=>c+c).join('');
  h=h.padStart(6,'0');
  const r=parseInt(h.slice(0,2),16)/255,g=parseInt(h.slice(2,4),16)/255,b=parseInt(h.slice(4,6),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let hh=0,s=0,l=(mx+mn)/2;
  if(d>0){
    s=d/(l>0.5?2-mx-mn:mx+mn);
    hh=mx===r?((g-b)/d+(g<b?6:0))/6:mx===g?((b-r)/d+2)/6:((r-g)/d+4)/6;
  }
  return{h:Math.round(hh*360),s:Math.round(s*100),l:Math.round(l*100)};
}
function hueDist(a,b){const d=Math.abs(a-b)%360;return d>180?360-d:d;}
const MOOD_PROFILES={
  pastello:   {sMin:8, sMax:52,lMin:68,lMax:96,harmony:'analogous'},
  rilassato:  {sMin:10,sMax:58,lMin:42,lMax:80,harmony:'analogous'},

function harmonyTargetHues(anchorH,type,n){
  const w=h=>((h%360)+360)%360;
  const seqs={
    complementary:[anchorH,w(anchorH+180),w(anchorH+60),w(anchorH+240),w(anchorH+120),w(anchorH+300)],
    split:[anchorH,w(anchorH+150),w(anchorH+210),w(anchorH+30),w(anchorH+330),w(anchorH+90)],
    analogous:Array.from({length:6},(_,i)=>w(anchorH+(i-2)*28)),
  };
  return(seqs[type]||seqs.analogous).slice(0,n);
}
function moodFit(hsl,p){
  let s=1;
  if(hsl.s<p.sMin||hsl.s>p.sMax)s*=0.15;
  if(hsl.l<p.lMin||hsl.l>p.lMax)s*=0.15;
  if(p.darkBias)s*=(1-hsl.l/100)*1.5+0.1;
  return Math.min(s,1);
}
function generatePalette(pantones,mood,count,lockedCodes=new Set(),seed=0){
  const prof=MOOD_PROFILES[mood]||MOOD_PROFILES.pastello;
  const wh=pantones.filter(p=>p.hex&&p.hex.replace('#','').length>=6).map(p=>({...p,hsl:hexToHSL(p.hex)}));
  if(!wh.length)return[];
  const locked=wh.filter(p=>lockedCodes.has(p.code));
  const anchor=locked.length?locked[0]:wh.reduce((b,p)=>moodFit(p.hsl,prof)>moodFit(b.hsl,prof)?p:b,wh[0]);
  const targets=harmonyTargetHues(anchor.hsl.h,prof.harmony,count);
  const slots=new Array(count).fill(null);
  const used=new Set();
  for(const lp of locked){
    let bi=-1,bd=Infinity;
    slots.forEach((s,i)=>{if(s!==null)return;const d=hueDist(lp.hsl.h,targets[i]);if(d<bd){bd=d;bi=i;}});
    if(bi>=0){slots[bi]=lp;used.add(lp.code);}
  }
  for(let i=0;i<count;i++){
    if(slots[i])continue;
    const th=targets[i];
    const cands=wh.filter(p=>!used.has(p.code)).map(p=>{
      const hd=hueDist(p.hsl.h,th)/180;
      const ms=moodFit(p.hsl,prof);
      let bonus=0;
      if(prof.lDiff){const f=slots.filter(Boolean);if(f.length){const avg=f.reduce((s,r)=>s+r.hsl.l,0)/f.length;bonus=Math.min(Math.abs(p.hsl.l-avg)/100,0.3)*0.15;}}
      return{p,score:(1-hd)*0.62+ms*0.28+bonus};
    }).sort((a,b)=>b.score-a.score);
    if(!cands.length)continue;
    const pick=cands[(seed+i*137)%Math.min(3,cands.length)];
    slots[i]=pick.p;used.add(pick.p.code);
  }
  return slots.filter(Boolean);
}

function hexToHue(hex) {
  const h = (hex||'').replace('#','').padStart(6,'0');
  const r = parseInt(h.slice(0,2),16)/255, g = parseInt(h.slice(2,4),16)/255, b = parseInt(h.slice(4,6),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max-min;
  if (d === 0) return 0;
  let hue = max===r ? (g-b)/d%6 : max===g ? (b-r)/d+2 : (r-g)/d+4;
  return ((hue*60)+360)%360;
}

function applyFilterSort(list, {onlyFav=false, sort='default'}={}) {

  else if (sort==='copertura_asc') result.sort((a,b)=>coverLvl(a.copertura)-coverLvl(b.copertura));
  else if (sort==='hue')    result.sort((a,b)=>hexToHue(a.hex)-hexToHue(b.hex));
  else if (sort==='codice') result.sort((a,b)=>a.code.localeCompare(b.code,undefined,{numeric:true}));
  return result;
}

function makeRecipeFallback(p) {
  const note = NOTES[p.code] || null;
  if (p.code === '699 U') return { inks:[{name:'AS 90',label:'Base bianca',pct:75},{name:'AS 65',label:'Giallo',pct:6.25},{name:'AS 150',label:'Magenta',pct:18.75}], project:'Risanamento 23', note };
  const h = hashStr(p.code);
  const n = Math.max(1, Math.min(p.ink||2, 4));
  const light = textOnDesk(p.hex) === '#0B0B0B';
  const idxs = [];
  if (light) idxs.push(0);
  let cursor = 1 + (h % 6);
  while (idxs.length < n) { const i = cursor % INK_POOL.length; if (!idxs.includes(i)) idxs.push(i); cursor += 1 + ((h >> idxs.length) % 4); }
  let weights = idxs.map((_,k) => { const seed = (h >> (k*3)) % 100; return k===0 ? (light ? 55+(seed%30) : 40+(seed%30)) : 6+(seed%26); });
  const sum = weights.reduce((a,b)=>a+b,0);
  let pcts = weights.map(w => Math.round((w/sum)*10000)/100);
  const diff = Math.round((100-pcts.reduce((a,b)=>a+b,0))*100)/100;
  pcts[pcts.length-1] = Math.round((pcts[pcts.length-1]+diff)*100)/100;
  const inks = idxs.map((i,k)=>({name:INK_POOL[i].name,label:INK_POOL[i].label,pct:pcts[k]})).sort((a,b)=>b.pct-a.pct);
  return { inks, project:PROJECTS[h % PROJECTS.length], note };
}

function makeRecipe(p) {
  if (!p) return makeRecipeFallback({code:'?',hex:'#888',ink:2});
  const code = typeof p === 'string' ? p : p.code;
  const pantone = typeof p === 'string' ? (DESK_PANTONES.find(x=>x.code===p)||{code,hex:'#888',ink:2}) : p;
  const comps = allComponenti.filter(c => c.Pantone_ID === code);
  if (comps.length === 0) return makeRecipeFallback(pantone);
  const r = allRicette.find(x => x.Pantone_ID === code);
  const note = (r && r.Note) ? r.Note : (NOTES[code]||null);
  const vecchioNome = (r && r.Vecchio_Nome) ? r.Vecchio_Nome : null;
  const project = (r && r.Progetti) ? r.Progetti : PROJECTS[hashStr(code) % PROJECTS.length];
  const totalBase = comps.reduce((s,c) => s+(parseFloat(c['Dose_40g (g)'])||0), 0);
  const inks = comps.map(c => {
    const dose = parseFloat(c['Dose_40g (g)'])||0;
    const pct = totalBase > 0 ? Math.round((dose/totalBase)*10000)/100 : 0;
    return {name:c.Inchiostro, label:c.Inchiostro, pct};
  }).sort((a,b)=>b.pct-a.pct);
  return {inks, project, note, vecchioNome};
}

function sortInkFormula(inks, key='pct_desc') {
  const s=[...inks];
  if(key==='pct_asc') return s.sort((a,b)=>a.pct-b.pct);
  if(key==='name_asc') return s.sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
  if(key==='name_desc') return s.sort((a,b)=>b.name.localeCompare(a.name,undefined,{numeric:true}));
  return s.sort((a,b)=>b.pct-a.pct);
}
function aggregateInks(codes, qty=100) {
  const map={};
  codes.forEach(code=>{
    const p=DESK_PANTONES.find(x=>x.code===code); if(!p) return;
    const r=makeRecipe(p);
    r.inks.forEach(ink=>{
      if(!map[ink.name]) map[ink.name]={count:0,grams:0};
      map[ink.name].count++;
      map[ink.name].grams+=(ink.pct/100)*qty;
    });
  });
  return Object.entries(map).map(([name,d])=>({name,...d})).sort((a,b)=>b.grams-a.grams);
}

// ── PDF helpers ───────────────────────────────────────────────────────────────
function makeQRMatrix(text) {
  if (typeof qrcode === 'undefined') return null;
  const tries = [0, 5, 6, 7];
  for (const t of tries) {
    try {
      const qr = qrcode(t, 'L');
      qr.addData(text);
      qr.make();
      return { qr, n: qr.getModuleCount() };
    } catch(e) {}
  }
  return null;
}

function drawQRCode(doc, qrData, x, y, size) {
  if (!qrData) return;
  const { qr, n } = qrData;
  const cell = size / n;
  doc.setFillColor(255, 255, 255);
  doc.rect(x, y, size, size, 'F');
  doc.setFillColor(0, 0, 0);
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      if (qr.isDark(r, c)) doc.rect(x + c * cell, y + r * cell, cell + 0.02, cell + 0.02, 'F');
    }
  }
}

function pdfDots(doc, n, max, x, y, r, gap) {
  for (let i = 0; i < max; i++) {
    const cx = x + i * gap;
    if (i < n) { doc.setFillColor(0,0,0); doc.circle(cx, y, r, 'F'); }
    else { doc.setDrawColor(0,0,0); doc.setLineWidth(0.18); doc.circle(cx, y, r, 'S'); }
  }
}

function pdfCovN(copertura) {
  const c = String(copertura||'').toLowerCase();
  return c.startsWith('copr') ? 3 : c.startsWith('semi') ? 2 : c.startsWith('tras') ? 1 : 0;
}

// ── S1c QR · piccola 57×25mm ─────────────────────────────────────────────────
function stampaSmall(doc, pantone, recipe, qty) {
  const W = 57, H = 25;
  const pad = 2.0, qrSize = 20;
  const qrX = W - pad - qrSize, qrY = (H - qrSize) / 2;
  const url = `https://inuitb.github.io/ricettario-serigrafia/?pantone=${encodeURIComponent(pantone.code)}`;
  const qrData = makeQRMatrix(url);
  const codeNum = pantone.code.replace(/\s+[A-Z]$/, '');

  drawQRCode(doc, qrData, qrX, qrY, qrSize);

  // family label
  doc.setFont('helvetica','normal'); doc.setFontSize(5.5); doc.setTextColor(110,110,110);
  doc.text(((pantone.family||'pantone')).toUpperCase() + ' · PANTONE', pad, 4.0);

  // code number (no "U")
  doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.setTextColor(0,0,0);
  doc.text(codeNum, pad, 11.2);

  // coverage dots — row below code
  const cvg = pdfCovN(pantone.copertura);
  pdfDots(doc, cvg, 3, pad + 0.4, 14.0, 0.9, 2.3);

  // page — row below dots
  if (pantone.page) {
    doc.setFont('helvetica','normal'); doc.setFontSize(5.5); doc.setTextColor(110,110,110);
    doc.text(`PAG.${pantone.page}`, pad, 17.0);
  }

  // name
  doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(0,0,0);
  doc.text((pantone.name||'').replace('*',''), pad, 22.2);
}

// ── L2 QR · grande 57×102mm ──────────────────────────────────────────────────
function stampaLarge(doc, pantone, recipe, qty) {
  const W = 57, H = 102, pad = 2.0;
  const nInks = recipe.inks.length;
  const qrH = 22, headerH = 32, gapAfterBox = 5;
  const formulaBoxY = headerH;
  const formulaMaxBottom = H - pad - qrH - gapAfterBox;
  const rowH = Math.min(12, (formulaMaxBottom - formulaBoxY - 9) / nInks);
  const boxH = 9 + nInks * rowH;
  const boxW = W - 2 * pad;
  const qrSectionY = formulaBoxY + boxH + gapAfterBox;
  const qrSize = Math.min(19, H - pad - 1 - qrSectionY - 1);
  const url = `https://inuitb.github.io/ricettario-serigrafia/?pantone=${encodeURIComponent(pantone.code)}`;
  const qrData = makeQRMatrix(url);

  // Header
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(110,110,110);
  doc.text(((pantone.family||'pantone')).toUpperCase() + ' · PANTONE', pad, 5.5);

  // Dots: right-aligned with formula box edge, same row as family label
  const cvg = pdfCovN(pantone.copertura);
  pdfDots(doc, cvg, 3, W - pad - 2*3.0 - 1.2, 4.5, 1.2, 3.0);

  doc.setFont('helvetica','bold'); doc.setFontSize(36); doc.setTextColor(0,0,0);
  doc.text(pantone.code, pad, 17.5);

  // PAG. between code and name
  if (pantone.page) {
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(110,110,110);
    doc.text(`PAG.${pantone.page}`, pad, 21.5);
  }

  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(0,0,0);
  doc.text((pantone.name||'').replace('*',''), pad, 27.0);

  // Formula box
  doc.setDrawColor(0,0,0); doc.setLineWidth(0.35);
  doc.roundedRect(pad, formulaBoxY, boxW, boxH, 1.5, 1.5, 'S');

  doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(0,0,0);
  doc.text(`FORMULA · ${nInks} INK`, pad + 3, formulaBoxY + 6);
  doc.text(`${qty} g`, W - pad - 3, formulaBoxY + 6, { align:'right' });

  doc.setDrawColor(0,0,0); doc.setLineWidth(0.35);
  doc.line(pad, formulaBoxY + 9, pad + boxW, formulaBoxY + 9);

  const nameSz = Math.max(8, 11 - nInks * 0.3);
  const gramSz = Math.max(9, 12.5 - nInks * 0.3);
  recipe.inks.forEach((ink, i) => {
    const rowY = formulaBoxY + 9 + i * rowH;
    const textY = rowY + rowH * 0.66;
    const g = ink.pct / 100 * qty;
    const gs = g < 10 ? g.toFixed(2) : g.toFixed(1);
    if (i > 0) { doc.setDrawColor(190,190,190); doc.setLineWidth(0.15); doc.line(pad+2, rowY, pad+boxW-2, rowY); }
    doc.setFont('helvetica','bold'); doc.setFontSize(nameSz); doc.setTextColor(0,0,0);
    doc.text(ink.name, pad + 3, textY);
    doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(130,130,130);
    doc.text(ink.pct.toFixed(1) + '%', W - pad - 22, textY, { align:'right' });
    doc.setFont('helvetica','bold'); doc.setFontSize(gramSz); doc.setTextColor(0,0,0);
    doc.text(gs + ' g', W - pad - 3, textY, { align:'right' });
  });

  // QR section — solo codice, centrato
  const qrX = (W - qrSize) / 2;
  const qrYpos = qrSectionY + (H - pad - qrSectionY - qrSize) / 2;
  drawQRCode(doc, qrData, qrX, qrYpos, qrSize);
}

function stampaPDF(pantone, recipe, qty) {
  if (!window.jspdf) { alert('jsPDF non disponibile'); return; }
  const { jsPDF } = window.jspdf;
  const isLarge = qty >= 1000;
  const doc = new jsPDF({ unit:'mm', format:[57, isLarge ? 102 : 25], orientation: isLarge ? 'portrait' : 'landscape' });
  if (isLarge) stampaLarge(doc, pantone, recipe, qty);
  else stampaSmall(doc, pantone, recipe, qty);
  doc.save(`etichetta_${pantone.code.replace(/ /g,'_')}.pdf`);
}

// Disponibilità di un inchiostro per il fabbisogno 'need' (g), con margine di sicurezza 120%.
// Ritorna {status:'green'|'orange'|'red'|'unknown', stock, need, manca}. 'unknown' = magazzino a 0 (non inventariato).
function inkAvailability(name, need){
  const anyStock = allInventario.some(i=>(i.grammi||0)>0);
  if(!anyStock) return {status:'unknown', stock:0, need, manca:0};
  const inv = allInventario.find(i=>i.inchiostro===name);
  const stock = inv ? (inv.grammi||0) : 0;
  if(stock < need) return {status:'red', stock, need, manca:need-stock};
  if(stock < need*1.2) return {status:'orange', stock, need, manca:0};
  return {status:'green', stock, need, manca:0};
}

function InkFormula({pantone, recipe, qty, theme, big=false, anim='none', play=true, sortInk='pct_desc', onSortChange=null}) {
  const inks = sortInkFormula(recipe.inks, sortInk);
  const sortOpts=[['pct_desc','↓g'],['pct_asc','↑g'],['name_asc','A–Z'],['name_desc','Z–A']];
  const stockOn = theme.stockCheck;
  const fmtSt = g=> g>=1000 ? (g/1000).toFixed(2)+' kg' : Math.round(g)+' g';
  const avail = stockOn ? inks.map(ink=>inkAvailability(ink.name,(ink.pct/100)*qty)) : null;
  const anyUnknown = avail && avail.length>0 && avail.every(a=>a.status==='unknown');
  const reds = avail ? inks.map((ink,i)=>({ink,a:avail[i]})).filter(x=>x.a.status==='red') : [];
  const oranges = avail ? inks.map((ink,i)=>({ink,a:avail[i]})).filter(x=>x.a.status==='orange') : [];
  const DOT={green:'#1F8A5B',orange:'#FF8C00',red:'#E4002B',unknown:'rgba(11,11,11,0.28)'};
  let box=null;
  if(stockOn){
    if(anyUnknown) box={c:theme.sub,bg:rgba(theme.ink,0.05),bd:rgba(theme.ink,0.12),txt:'ⓘ Magazzino non ancora inventariato — disponibilità non calcolabile.'};
    else if(reds.length) box={c:'#E4002B',bg:rgba('#E4002B',0.08),bd:rgba('#E4002B',0.28),txt:`⚠️ Per ${qty.toFixed(0)} g non basta: `+reds.map(r=>`${r.ink.name} (−${fmtSt(r.a.manca)})`).join('  ·  ')};
    else if(oranges.length) box={c:'#B26A00',bg:rgba('#FF8C00',0.11),bd:rgba('#FF8C00',0.30),txt:`🟠 Scorte giuste per ${qty.toFixed(0)} g (meno del +20% di margine): `+oranges.map(o=>o.ink.name).join('  ·  ')};
    else box={c:'#1F8A5B',bg:rgba('#1F8A5B',0.09),bd:rgba('#1F8A5B',0.25),txt:`✅ Inchiostri sufficienti per ${qty.toFixed(0)} g`};
  }
  return (
    <div>
      {box&&<div style={{margin:'0 0 12px',padding:'10px 14px',borderRadius:14,background:box.bg,border:`1px solid ${box.bd}`,fontFamily:'Nebulica',fontWeight:700,fontSize:12.5,color:box.c,lineHeight:1.5}}>{box.txt}</div>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontFamily:'Nebulica',fontSize:11,letterSpacing:1.5,fontWeight:700,color:theme.sub,marginBottom:4}}>
        <span>FORMULA · {inks.length} INK</span>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          {onSortChange&&sortOpts.map(([k,l])=>(
            <button key={k} onClick={()=>onSortChange(k)} style={{padding:'2px 8px',borderRadius:99,fontFamily:'Nebulica',fontSize:10,fontWeight:700,cursor:'pointer',background:sortInk===k?theme.ink:'transparent',color:sortInk===k?'#fff':theme.faint,border:`1.3px solid ${sortInk===k?theme.ink:rgba(theme.ink,0.18)}`,transition:'background .15s,color .15s,border-color .15s'}}>{l}</button>
          ))}
          <span style={{fontFamily:'"JetBrains Mono",monospace',letterSpacing:0.3,marginLeft:onSortChange?6:0}}>Σ {qty.toFixed(0)} g</span>
        </div>
      </div>
      <div>
        {inks.map((ink,idx)=>{
          const grams = (ink.pct/100)*qty;
          const a = avail ? avail[idx] : null;
          const delay = anim==='stagger' ? idx*90 : 0;
          return (
            <div key={ink.name} style={{display:'flex',alignItems:'center',gap:16,padding:big?'10px 0':'12px 0',borderTop:`1px solid ${theme.line}`,animation:(play&&anim==='stagger')?`dkpop .5s ${SPRING_SOFT} ${delay}ms both`:'none'}}>
              <div style={{minWidth:big?132:116}}>
                <span style={{display:'inline-flex',alignItems:'center',gap:7}}>
                  {a&&<span title={a.status} style={{width:9,height:9,borderRadius:99,background:DOT[a.status],flexShrink:0}}/>}
                  <span style={{padding:'7px 14px',borderRadius:99,background:theme.ink,color:'#fff',fontFamily:'Nebulica',fontWeight:700,fontSize:big?14:12.5,whiteSpace:'nowrap',display:'inline-block'}}>{ink.name}</span>
                </span>
                <div style={{fontFamily:'Nebulica',fontSize:11,color:a&&a.status==='red'?'#E4002B':theme.faint,marginTop:5,paddingLeft:3}}>{a&&a.status!=='unknown' ? (a.status==='red' ? `in mag ${fmtSt(a.stock)} · mancano ${fmtSt(a.manca)}` : `in mag ${fmtSt(a.stock)}`) : ink.label}</div>
              </div>
              <div style={{flex:1,height:8,borderRadius:99,background:theme.line,overflow:'hidden'}}>
                <div style={{height:'100%',width:play?`${ink.pct}%`:'0%',background:pantone.hex,borderRadius:99,boxShadow:`inset 0 0 0 1px ${rgba('#000',0.05)}`,transition:`width .65s ${SPRING_SOFT} ${delay+60}ms`}}/>
              </div>
              <div style={{textAlign:'right',minWidth:big?116:96}}>
                <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:big?24:20,color:theme.ink,letterSpacing:-0.6}}>{grams.toFixed(grams>=100?1:2)}</span>
                <span style={{fontFamily:'Nebulica',fontSize:12,color:theme.faint,marginLeft:3}}>g</span>
                <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:10.5,color:theme.faint,marginTop:3,letterSpacing:0.3}}>{ink.pct.toFixed(2)}%</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════ LIQUID PILL DOCK (spec normativa — valori §2, regole §4 verbatim) ═══════════════════ */
const LPD_BLOB_H=54, LPD_DOCK_H=64, LPD_DRAG_THRESHOLD=5, LPD_RELAX_MS=70, LPD_LAND_MS=520;
const LPD_STRETCH_MAX=0.42, LPD_STRETCH_GAIN=0.14, LPD_SQUASH_RATIO=0.55, LPD_SKEW_GAIN=2.4, LPD_SKEW_MAX=9;
const LPD_SPRING='cubic-bezier(.34,1.4,.5,1)', LPD_ICON_SPRING='cubic-bezier(.34,1.5,.5,1)';
function LiquidPillDock({items, current, onNavigate, idleColor='#9A94AD'}) {
  const dockRef=React.useRef(null);
  const btns=React.useRef({});
  const [hl,setHl]=React.useState(null);
  const [drag,setDrag]=React.useState(null);
  const [landing,setLanding]=React.useState(false);
  // Stato del gesto: in ref (regola 5), cambia a ogni pointermove e non deve ri-renderizzare.
  const g=React.useRef({active:false,id:-1,startX:0,lastX:0,lastT:0,moved:false,w:0,baseCx:0});
  const relaxT=React.useRef(null), landT=React.useRef(null);

  // Misura la voce attiva → geometria blob, con snap concentrico ai bordi (regola 1+2).
  const measure=React.useCallback(()=>{
    const dock=dockRef.current, btn=btns.current[current];
    if(!dock||!btn) return;
    const dr=dock.getBoundingClientRect(), br=btn.getBoundingClientRect();
    const pad=(dr.height-LPD_BLOB_H)/2;
    let left=br.left-dr.left, width=br.width;
    if(left<=pad+7){ width+=(left-pad); left=pad; }
    const rightGap=dr.width-(left+width);
    if(rightGap<=pad+7) width=dr.width-pad-left;
    const next={left,top:pad,width,height:LPD_BLOB_H};
    setHl(c=>(!c||Math.abs(c.left-next.left)>0.5||Math.abs(c.width-next.width)>0.5||Math.abs(c.top-next.top)>0.5)?next:c);
  },[current]);
  React.useLayoutEffect(()=>{ measure(); });
  React.useEffect(()=>{ const on=()=>measure(); window.addEventListener('resize',on); return()=>window.removeEventListener('resize',on); },[measure]);
  React.useEffect(()=>()=>{ if(relaxT.current)clearTimeout(relaxT.current); if(landT.current)clearTimeout(landT.current); },[]);

  const keyAtX=(clientX)=>{
    let best=current, bd=Infinity;
    for(const it of items){ const b=btns.current[it.key]; if(!b)continue; const r=b.getBoundingClientRect();
      if(clientX>=r.left&&clientX<=r.right) return it.key;
      const d=Math.abs(clientX-(r.left+r.width/2)); if(d<bd){bd=d;best=it.key;} }
    return best;
  };
  // Gesto unificato: tap e drag finiscono entrambi in onUp (regola 3) — nessun onClick.
  const onDown=(e)=>{ const dock=dockRef.current; if(!dock||!hl)return;
    g.current={active:true,id:e.pointerId,startX:e.clientX,lastX:e.clientX,lastT:performance.now(),moved:false,w:hl.width,baseCx:hl.left+hl.width/2};
    try{dock.setPointerCapture(e.pointerId);}catch(_){}
  };
  const onMove=(e)=>{ const st=g.current, dock=dockRef.current;
    if(!st.active||e.pointerId!==st.id||!dock)return;
    const dx=e.clientX-st.startX; if(Math.abs(dx)>LPD_DRAG_THRESHOLD) st.moved=true;
    const now=performance.now(), dt=Math.max(1,now-st.lastT), vx=(e.clientX-st.lastX)/dt; // px/ms
    st.lastX=e.clientX; st.lastT=now; if(!st.moved)return;
    const dr=dock.getBoundingClientRect(), minCx=st.w/2+4, maxCx=dr.width-st.w/2-4;
    const cx=Math.min(maxCx,Math.max(minCx,st.baseCx+dx));
    setDrag({cx,w:st.w,vx,nk:keyAtX(e.clientX)});
    // Dito fermo → la deformazione si rilassa (regola/§3.7): è questo che sembra liquido.
    if(relaxT.current)clearTimeout(relaxT.current);
    relaxT.current=setTimeout(()=>setDrag(d=>d?{...d,vx:0}:d),LPD_RELAX_MS);
  };
  const onUp=(e)=>{ const st=g.current; if(!st.active||e.pointerId!==st.id)return;
    st.active=false; try{ if(dockRef.current)dockRef.current.releasePointerCapture(e.pointerId); }catch(_){}
    if(relaxT.current)clearTimeout(relaxT.current);
    const target=keyAtX(e.clientX); setDrag(null);
    if(st.moved){ setLanding(true); if(landT.current)clearTimeout(landT.current); landT.current=setTimeout(()=>setLanding(false),LPD_LAND_MS); }
    if(target!==current) onNavigate(target);
  };
  const onKeyDown=(e,key)=>{
    if(e.key==='Enter'||e.key===' '){ e.preventDefault(); onNavigate(key); return; }
    if(e.key==='ArrowRight'||e.key==='ArrowLeft'){ e.preventDefault();
      const i=items.findIndex(x=>x.key===current);
      const n=items[(i+(e.key==='ArrowRight'?1:items.length-1))%items.length];
      onNavigate(n.key); const nb=btns.current[n.key]; if(nb)nb.focus();
    }
  };
  // Deformazione liquida guidata dalla velocità.
  const stretch=drag?Math.min(LPD_STRETCH_MAX,Math.abs(drag.vx)*LPD_STRETCH_GAIN):0;
  const skew=drag?Math.max(-LPD_SKEW_MAX,Math.min(LPD_SKEW_MAX,-drag.vx*LPD_SKEW_GAIN)):0;
  const blobLeft=drag?drag.cx-drag.w/2:(hl?hl.left:0);
  const blobWidth=drag?drag.w:(hl?hl.width:0);
  const litKey=drag?drag.nk:current;
  const litItem=items.find(i=>i.key===litKey);
  const blobBg=litItem?litItem.tint:'transparent';
  const blobTransition=drag?'background .22s ease':`left .44s ${LPD_SPRING}, width .44s ${LPD_SPRING}, top .44s ${LPD_SPRING}, background .3s`;
  return (
    <React.Fragment>
      <style>{`@keyframes blobLand{0%{transform:scaleX(1.14) scaleY(.9)}42%{transform:scaleX(.95) scaleY(1.06)}72%{transform:scaleX(1.02) scaleY(.985)}100%{transform:scaleX(1) scaleY(1)}}`}</style>
      <div ref={dockRef} onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}
        style={{position:'relative',touchAction:'none',height:LPD_DOCK_H,padding:'0 8px',display:'flex',alignItems:'center',gap:4,background:'rgba(255,255,255,.9)',backdropFilter:'blur(16px) saturate(1.1)',WebkitBackdropFilter:'blur(16px) saturate(1.1)',border:'1px solid rgba(20,15,50,.05)',borderRadius:999,boxShadow:'0 18px 44px -14px rgba(20,15,50,.30)',cursor:g.current.active?'grabbing':'grab',userSelect:'none'}}>
        <div style={{position:'absolute',zIndex:0,left:blobLeft,top:hl?hl.top:0,width:blobWidth,height:hl?hl.height:0,background:blobBg,borderRadius:999,opacity:hl?1:0,transformOrigin:'center',transform:drag?`scaleX(${(1+stretch).toFixed(3)}) scaleY(${(1-stretch*LPD_SQUASH_RATIO).toFixed(3)}) skewX(${skew.toFixed(2)}deg)`:undefined,animation:landing?'blobLand .52s cubic-bezier(.3,1.2,.5,1) both':undefined,transition:blobTransition,willChange:'left, width, transform'}}/>
        {items.map(it=>{
          const isCurrent=it.key===current;
          const iconOn=it.key===litKey; // l'icona segue il blob; l'etichetta no (regola 9)
          return (

/* ═══════════════════ DESKTOP NUOVA / EDIT SHEETS ═══════════════════ */
// HSL(+croma) da hex. La saturazione HSL "esplode" vicino a bianco/nero →
// per le zone spente/neutre usiamo la CROMA (c = max-min), non la s HSL.
function hexHSLc(hexStr){
  let h=String(hexStr||'').replace('#','').trim();
  if(h.length===3) h=h.split('').map(c=>c+c).join('');
  if(h.length<6) return null;
  const r=parseInt(h.slice(0,2),16)/255, g=parseInt(h.slice(2,4),16)/255, b=parseInt(h.slice(4,6),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), l=(max+min)/2, ch=max-min;
  if(ch===0) return {h:0,s:0,l,c:0};
  const s=l>0.5?ch/(2-max-min):ch/(max+min);
  let hue=0;
  if(max===r) hue=((g-b)/ch+(g<b?6:0));
  else if(max===g) hue=(b-r)/ch+2;
  else hue=(r-g)/ch+4;
  return {h:hue/6*360, s, l, c:ch};
}
function guessFamily(hexStr) {
  const co=hexHSLc(hexStr); if(!co) return '';
  const {h,l,c}=co;
  if(c<0.06) return l<0.15?'nero':l>0.90?'bianco':'grigio';   // asse grigio puro
  if(l>0.85 && c<0.16) return 'neutro';                       // bianco sporco / tinta pallidissima
  if(l<0.12) return 'nero';
  if(h>=18 && h<70 && c<0.33) return l<0.5?'marrone':'beige'; // caldo spento
  if(c<0.14) return 'grigio';                                 // poca croma, non caldo
  if(h<15||h>=346) return 'rosso';
  if(h<45)  return l<0.42?'marrone':'arancio';                // arancio scuro/spento → marrone
  if(h<66)  return l<0.38?'marrone':'giallo';                 // giallo scuro → bruno
  if(h<150) return 'verde';
  if(h<195) return 'azzurro';
  if(h<255) return 'blu';
  if(h<300) return 'viola';
  return 'rosa';                                              // 300..346
}
// Attributi catalogo dedotti dall'HEX (solo suggerimenti — l'utente conferma)
function classifyTone(hexStr){ const c=hexHSLc(hexStr); if(!c) return ''; return c.l>=0.66?'chiaro':(c.l<=0.36?'scuro':'medio'); }
function classifyIntensity(hexStr){ const c=hexHSLc(hexStr); if(!c) return ''; return (c.s>=0.55 && c.c>=0.25)?'intenso':'tenue'; }
function isPastelHex(hexStr){ const c=hexHSLc(hexStr); if(!c) return false; return c.l>=0.72 && c.c>=0.05 && c.c<=0.30; }
function isFluoHex(hexStr){ const c=hexHSLc(hexStr); if(!c) return false; return c.s>=0.80 && c.c>=0.55 && c.l>=0.50 && c.l<=0.72; }
// Predicato filtro attributo dall'HEX (fluo/pastel/chiaro/scuro), combinabile con la famiglia
function matchColorAttr(hexStr, attr){
  if(!attr||attr==='tutti') return true;
  if(!hexStr) return false;
  if(attr==='fluo')   return isFluoHex(hexStr);
  if(attr==='pastel') return isPastelHex(hexStr);
  if(attr==='chiaro') return classifyTone(hexStr)==='chiaro';
  if(attr==='scuro')  return classifyTone(hexStr)==='scuro';
  return true;
}

function InkSearchField({value, onChange, options, style, onConfirm}) {
  const [q, setQ] = React.useState(value||'');
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(()=>{ setQ(value||''); },[value]);
  React.useEffect(()=>{
    if(!open) return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target)){setOpen(false);setQ(value||'');}};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[open,value]);
  const lq=q.toLowerCase();
  const filtered=options.filter(o=>!lq||o.code.toLowerCase().includes(lq)||(o.name&&o.name.toLowerCase().includes(lq)));
  const pick=o=>{onChange(o.code);setQ(o.code);setOpen(false);onConfirm?.();};
  const onKeyDown=e=>{
    if(e.key==='Enter'){
      e.preventDefault();
      if(open&&filtered.length>0){pick(filtered[0]);}
      else{setOpen(false);onConfirm?.();}
    } else if(e.key==='Escape'){setOpen(false);setQ(value||'');}
  };
  return (
    <div ref={ref} style={{position:'relative',flex:2,minWidth:0}}>
      <input value={q} onChange={e=>{setQ(e.target.value);setOpen(true);if(!e.target.value)onChange('');}}
        onFocus={()=>setOpen(true)} onKeyDown={onKeyDown} placeholder="Cerca inchiostro…" autoComplete="off" style={{...style,width:'100%'}}/>
      {open&&(
        <div style={{position:'absolute',top:'calc(100% + 3px)',left:0,right:0,zIndex:1200,background:'#fff',border:'1px solid rgba(0,0,0,0.10)',borderRadius:12,boxShadow:'0 8px 28px rgba(0,0,0,0.16)',maxHeight:190,overflowY:'auto'}}>
          {filtered.length===0&&<div style={{padding:'10px 14px',fontFamily:'Nebulica',fontSize:13,color:'rgba(0,0,0,0.38)'}}>Nessun risultato</div>}
          {filtered.map(o=>(
            <div key={o.code} onMouseDown={e=>{e.preventDefault();pick(o);}}
              style={{padding:'9px 14px',cursor:'pointer',fontFamily:'Nebulica',fontSize:13.5,display:'flex',alignItems:'center',justifyContent:'space-between',background:o.code===value?'rgba(0,51,255,0.06)':'transparent',borderBottom:'1px solid rgba(0,0,0,0.04)'}}>
              <span style={{fontWeight:700}}>{o.code}</span>
              {o.name&&<span style={{color:'rgba(0,0,0,0.40)',fontSize:12,marginLeft:8}}>{o.name}</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function IcoLink({size=20,color='currentColor'}){
  return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round" style={{display:'block',flexShrink:0}}>
    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
  </svg>;
}

/* ═══════════════════ HEX PICKER SHEET ═══════════════════ */
function ensureHexPickerKf() {
  if (document.getElementById('hexpicker-kf')) return;
  const s = document.createElement('style'); s.id = 'hexpicker-kf';
  s.textContent = `@keyframes fattoIn{from{opacity:0;transform:scale(.3);}to{opacity:1;transform:scale(1);}}`;
  document.head.appendChild(s);
}

function HexPickerSheet({open, onClose, pantoneId, onSelect, currentHex, theme}) {
  const [icoHex, setIcoHex] = React.useState('');
  const [chromaHex, setChromaHex] = React.useState('');
  const [lastSource, setLastSource] = React.useState('ico');
  const [popStates, setPopStates] = React.useState([false, false, false]);
  const [pickedIdx, setPickedIdx] = React.useState(null);
  ensureHexPickerKf();

  React.useEffect(() => {
    if (!open) { setPopStates([false, false, false]); setPickedIdx(null); setLastSource('ico'); return; }
    if (!pantoneId) return;
    setIcoHex(localStorage.getItem('icoHex_'+pantoneId)||'');
    setChromaHex(localStorage.getItem('chromaHex_'+pantoneId)||'');
  }, [open, pantoneId]);

  React.useEffect(() => {
    if (!open) return;
    const t0 = setTimeout(() => setPopStates(s => [true, s[1], s[2]]), 80);
    const t1 = setTimeout(() => setPopStates(s => [s[0], true, s[2]]), 200);
    const t2 = setTimeout(() => setPopStates(s => [s[0], s[1], true]), 320);
    return () => { clearTimeout(t0); clearTimeout(t1); clearTimeout(t2); };
  }, [open]);

  const dbHex = PANTONE_DB[pantoneId] ? '#' + PANTONE_DB[pantoneId] : null;
  const icoUrl = pantoneId ? 'https://icolorpalette.com/color/pantone-' + pantoneId.toLowerCase().replace(/\s+/g,'-') : null;
  const chromaUrl = pantoneId ? 'https://www.chromafinder.com/color/pantone-uncoated/' + pantoneId.trim().replace(/\s+/g,'-') : null;
  const icoV = icoHex.replace('#','');
  const icoValid = /^[0-9A-Fa-f]{6}$/.test(icoV);
  const chromaV = chromaHex.replace('#','');
  const chromaValid = /^[0-9A-Fa-f]{6}$/.test(chromaV);
  const activeHex = lastSource === 'chroma' ? chromaHex : icoHex;
  const activeV = activeHex.replace('#','');
  const activeValid = /^[0-9A-Fa-f]{6}$/.test(activeV);
  const curHexNorm = currentHex ? '#'+currentHex.replace('#','').toUpperCase() : null;
  const isCurrentDb    = !!(curHexNorm && dbHex      && curHexNorm.toUpperCase() === dbHex.toUpperCase());
  const isCurrentIco   = !!(curHexNorm && icoValid   && curHexNorm.toUpperCase() === ('#'+icoV).toUpperCase());
  const isCurrentChroma = !!(curHexNorm && chromaValid && curHexNorm.toUpperCase() === ('#'+chromaV).toUpperCase());

  function setActiveHex(v) {
    const mv = v.replace('#','');
    if (lastSource === 'chroma') {
      setChromaHex(v);
      if (/^[0-9A-Fa-f]{6}$/.test(mv) && pantoneId) localStorage.setItem('chromaHex_'+pantoneId, mv);
    } else {
      setIcoHex(v);
      if (/^[0-9A-Fa-f]{6}$/.test(mv) && pantoneId) localStorage.setItem('icoHex_'+pantoneId, mv);
    }
  }

  function doPick(idx, cb) {
    setPickedIdx(idx);
    setTimeout(() => { cb(); }, 650);
  }

  function Card({hex, label, rotate, dy, loading, isLink, url, onPick, popped, idx, isCurrentHex, size, onLinkClick}) {
    const valid = hex && /^#?[0-9A-Fa-f]{6}$/.test(hex.replace('#',''));
    const h = valid ? '#' + hex.replace('#','').toUpperCase() : null;
    const fg = h ? textOnDesk(h.replace('#','')) : '#888';
    const SIZE = size || 136;
    const showColor = h;
    const isPicked = pickedIdx === idx;
    const isFaded  = pickedIdx !== null && pickedIdx !== idx;

    const fattoBadge = isPicked ? (
      <div style={{position:'absolute',inset:0,borderRadius:24,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(34,197,94,0.18)',animation:'fattoIn 0.38s cubic-bezier(.34,1.56,.64,1) both',pointerEvents:'none'}}>
        <IcoSeal size={52} color="#22C55E"/>
      </div>
    ) : null;

    const square = (
      <div style={{position:'relative',width:SIZE,height:SIZE}}>
        <div style={{
          width:SIZE, height:SIZE, borderRadius:24,
          background: showColor ? h : (loading ? (theme.panelAlt||'#f0f0f0') : (isLink ? (theme.panelAlt||'#f0f0f0') : '#e8e8e8')),
          border:`2px solid rgba(0,0,0,${showColor?0.14:0.08})`,
          display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:5,
          opacity: (loading || (!showColor && !isLink)) ? 0.48 : 1,
          boxShadow:'0 10px 32px rgba(0,0,0,0.22)',
          WebkitTapHighlightColor:'transparent',
        }}>
          {isLink && !showColor && <>
            <IcoLink size={28} color={theme.sub}/>
            <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:10,color:theme.sub,letterSpacing:0.8}}>APRI →</span>
          </>}
          {isLink && showColor && <>
            <span style={{fontFamily:'"JetBrains Mono",monospace',fontWeight:700,fontSize:12,color:fg,letterSpacing:0.3,textAlign:'center',padding:'0 8px'}}>{h}</span>
            <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:9,color:fg,opacity:0.65,letterSpacing:0.8}}>APRI →</span>
          </>}
          {loading && <span style={{fontFamily:'Nebulica',fontSize:13,color:theme.sub}}>…</span>}
          {!isLink && !loading && showColor && <span style={{fontFamily:'"JetBrains Mono",monospace',fontWeight:700,fontSize:12,color:fg,letterSpacing:0.3,textAlign:'center',padding:'0 8px'}}>{h}</span>}
          {!isLink && !loading && !showColor && <span style={{fontFamily:'Nebulica',fontSize:14,color:'#bbb'}}>—</span>}
        </div>
        {fattoBadge}
      </div>
    );
    const currentDot = (pickedIdx === null && isCurrentHex && showColor)
      ? <div style={{width:8,height:8,borderRadius:99,background:'#22C55E',margin:'6px auto 0',flexShrink:0}}/>
      : null;
    const labelEl = (
      <div style={{fontFamily:'Nebulica',fontSize:10,fontWeight:700,color:theme.sub,
        marginTop:10,textAlign:'center',maxWidth:SIZE,lineHeight:1.35,
        letterSpacing:0.4,wordBreak:'break-word',display:'flex',flexDirection:'column',alignItems:'center'}}>
        {label}
        {currentDot}
      </div>
    );
    const outerStyle = {
      display:'flex', flexDirection:'column', alignItems:'center',
      transform:`rotate(${rotate}) translateY(${dy||0}px)`,
      cursor: isLink ? 'pointer' : (showColor ? 'pointer' : 'default'),
      WebkitTapHighlightColor:'transparent',
      pointerEvents: pickedIdx !== null ? 'none' : undefined,
    };
    const innerStyle = {
      display:'flex', flexDirection:'column', alignItems:'center',
      transform: popped
        ? (isFaded ? 'scale(0.72) translateY(16px)' : isPicked ? 'scale(1.07)' : 'scale(1)')
        : 'scale(0)',
      opacity: popped ? (isFaded ? 0 : 1) : 0,
      transition: pickedIdx !== null
        ? 'transform 0.38s cubic-bezier(.22,1,.36,1), opacity 0.38s'
        : 'transform 0.5s cubic-bezier(.34,1.56,.64,1), opacity 0.22s',
    };
    const inner = <div style={innerStyle}>{square}{labelEl}</div>;
    return isLink
      ? <a href={url} target="_blank" rel="noopener noreferrer" onClick={onLinkClick} style={{...outerStyle,textDecoration:'none'}}>{inner}</a>
      : <div onClick={showColor&&!loading?()=>doPick(idx,onPick):null} style={outerStyle}>{inner}</div>;
  }

  return (
    <>
      <div onClick={pickedIdx===null?onClose:null} style={{
        position:'fixed', inset:0,
        background:'rgba(0,0,0,0.5)',
        backdropFilter:open?'blur(10px)':'none',
        WebkitBackdropFilter:open?'blur(10px)':'none',
        zIndex:1050, opacity:open?1:0, pointerEvents:open?'auto':'none',
        transition:'opacity .3s',
      }}/>
      <div style={{
        position:'fixed', top:'50%', left:'50%',
        transform:`translate(-50%,-50%) scale(${open?1:0.88})`,
        opacity:open?1:0,
        pointerEvents:open?'auto':'none',
        width:'calc(100% - 32px)', maxWidth:520,
        zIndex:1060, borderRadius:28,
        background:theme.surface||'#fff',
        padding:'24px 20px 28px',
        boxShadow:'0 32px 80px rgba(0,0,0,0.28)',
        transition:'transform .32s cubic-bezier(.22,1.2,.36,1), opacity .25s',
      }}>
        <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:17,color:theme.ink,marginBottom:3}}>Scegli HEX</div>
        <div style={{fontFamily:'Nebulica',fontSize:13,color:theme.sub,marginBottom:28}}>
          {pantoneId} — tocca una card per applicare il colore
        </div>

        <div style={{display:'flex',justifyContent:'center',alignItems:'flex-end',gap:16,marginBottom:32,paddingBottom:6}}>
          <Card size={112} hex={dbHex} label="Database app" rotate="-10deg" dy={12}
            popped={popStates[0]} idx={0} isCurrentHex={isCurrentDb}
            onPick={()=>{ onSelect(dbHex.replace('#','')); onClose(); }}/>
          <Card size={112} isLink={!icoValid} url={icoUrl} hex={icoValid?'#'+icoV:null} label="icolorpalette"
            rotate="0deg" dy={0} popped={popStates[1]} idx={1} isCurrentHex={isCurrentIco}
            onLinkClick={()=>setLastSource('ico')}
            onPick={()=>{ onSelect(icoV); onClose(); }}/>
          <Card size={112} isLink={!chromaValid} url={chromaUrl} hex={chromaValid?'#'+chromaV:null} label="chromafinder"
            rotate="10deg" dy={12} popped={popStates[2]} idx={2} isCurrentHex={isCurrentChroma}
            onLinkClick={()=>setLastSource('chroma')}
            onPick={()=>{ onSelect(chromaV); onClose(); }}/>
        </div>

        <div>
          <div style={{fontFamily:'Nebulica',fontSize:10,letterSpacing:1.3,fontWeight:700,
            color:theme.sub,marginBottom:7}}>{lastSource==='chroma'?'CHROMAFINDER':'ICOLORPALETTE'} → incolla hex, poi tocca la card per applicare</div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input value={activeHex} onChange={e=>setActiveHex(e.target.value)}
              placeholder="Incolla HEX dal sito aperto (es. EA60A7)"
              style={{flex:1,height:44,borderRadius:12,border:`1.5px solid ${theme.line}`,
                padding:'0 14px',fontFamily:'"JetBrains Mono",monospace',fontSize:13,
                background:theme.field||theme.panel||'#f5f5f5',color:theme.ink,
                outline:'none',WebkitAppearance:'none'}}/>
            {activeValid&&<button onClick={()=>{onSelect(activeV);onClose();}} style={{
              height:44,padding:'0 18px',borderRadius:12,border:'none',flexShrink:0,
              background:theme.accent,color:theme.onAccent,
              fontFamily:'Nebulica',fontWeight:700,fontSize:13,cursor:'pointer'}}>Usa</button>}
          </div>
        </div>
      </div>
    </>
  );
}

function NuovaSheet({open, onClose, theme}) {
  const [pid, setPid] = React.useState('');
  const [hex, setHex] = React.useState('');
  const [hexAuto, setHexAuto] = React.useState(false);
  const [cat, setCat] = React.useState('');
  const [catAuto, setCatAuto] = React.useState(false);
  const [temp, setTemp] = React.useState('');
  const [cop, setCop] = React.useState('');
  const [note, setNote] = React.useState('');
  const [vecchioNome, setVecchioNome] = React.useState('');
  const [pag, setPag] = React.useState('');
  const [inks, setInks] = React.useState([{ink:'',dose:''},{ink:'',dose:''}]);
  const [saving, setSaving] = React.useState(false);
  const [msg, setMsg] = React.useState('');
  const [pickerOpen, setPickerOpen] = React.useState(false);
  const doseRefs = React.useRef([]);

  React.useEffect(()=>{
    if(!open){ setPid(''); setHex(''); setHexAuto(false); setCat(''); setCatAuto(false); setTemp(''); setCop(''); setNote(''); setVecchioNome(''); setPag(''); setInks([{ink:'',dose:''},{ink:'',dose:''}]); setMsg(''); setSaving(false); setPickerOpen(false); }
  },[open]);

  const onPidChange = v => {
    setPid(v);
    const raw = v.trim();
    // Try multiple key normalizations: exact, uppercase, "166U"→"166 U"
    const candidates = [
      raw,
      raw.toUpperCase(),
      raw.toUpperCase().replace(/([0-9])([A-Z])$/,'$1 $2'),
      raw.replace(/\s+/,' ').toUpperCase(),
    ];
    const dbHex = candidates.reduce((found, k) => found || PANTONE_DB[k], null);
    if (dbHex) {
      setHex(dbHex); setHexAuto(true);
      const fam = guessFamily(dbHex);
      if (fam) { setCat(fam); setCatAuto(true); }
    } else {
      if (hexAuto) { setHex(''); setHexAuto(false); }
      if (catAuto) { setCat(''); setCatAuto(false); }
    }
  };

  const addInkRow = ()=>{ if(inks.length<4) setInks([...inks,{ink:'',dose:''}]); };
  const removeInkRow = i=>{ if(inks.length>1) setInks(inks.filter((_,j)=>j!==i)); };
  const setField = (i,field,val)=>setInks(inks.map((r,j)=>j===i?{...r,[field]:val}:r));

  const submit = async ()=>{
    const finalPid=normalizePantoneCode(pid);
    if(!finalPid.trim()||!hex.trim()||!cat){ setMsg('Compila Pantone ID, HEX e Categoria.'); return; }
    if(allRicette.some(r=>r.Pantone_ID===finalPid)){ setMsg(`⚠ "${finalPid}" esiste già — modifica la ricetta esistente o usa un codice diverso.`); return; }
    const normHexNs=hex.replace('#','').trim().toUpperCase();
    if(/^[0-9A-Fa-f]{6}$/.test(normHexNs)){const exH=allRicette.find(r=>(r.HEX||'').replace('#','').trim().toUpperCase()===normHexNs);if(exH){setMsg(`⚠ L'HEX #${normHexNs} è già usato da "${exH.Pantone_ID}". Verifica il colore.`);return;}}
    const validInks = inks.filter(r=>r.ink.trim()&&r.dose.trim());
    if(validInks.length===0){ setMsg('Aggiungi almeno un inchiostro con la dose.'); return; }
    const totale = validInks.reduce((s,r)=>s+parseFloat(String(r.dose).replace(',','.'))||0, 0);
    if(Math.abs(totale-40)>0.15){ setMsg(`⚠ Totale ${totale.toFixed(1)} g (atteso 40 g) — salva lo stesso?`); if(!msg.includes('salva lo stesso')) return; }
    setSaving(true); setMsg('');
    try{
      await postGAS({action:'addRicetta',Pantone_ID:finalPid,HEX:'#'+hex.replace('#','').trim(),Categoria:cat,Temperatura:temp,Copertura:cop,Note:note,Vecchio_Nome:vecchioNome,Pagina:pag,
          componenti:validInks.map(r=>({Inchiostro:r.ink,'Dose_40g (g)':r.dose}))});
      setMsg('Ricetta salvata!');
      const newId=finalPid;
      allRicette.push({Pantone_ID:newId,HEX:'#'+hex.replace('#','').trim(),Categoria:cat,Temperatura:temp,Copertura:cop,Note:note,Vecchio_Nome:vecchioNome,Pagina:pag,Progetti:''});
      validInks.forEach(r=>allComponenti.push({Pantone_ID:newId,Inchiostro:r.ink,'Dose_40g (g)':r.dose}));
      transformData();
      newlySaved.add(newId);
      window._bumpData?.();
      setTimeout(()=>{ newlySaved.delete(newId); window._bumpData?.(); },8000);
      setTimeout(()=>onClose(), 1100);
    }catch(e){ setMsg('Errore di connessione.'); }
    setSaving(false);
  };

  const inkOpts = allInchiostri.length>0
    ? allInchiostri.map(i=>({code:i.Codice||i.Nome_completo, name:i.Nome_completo||''}))
    : [{code:'AS 90',name:'Base bianca'},{code:'AS 65',name:'Giallo'},{code:'AS 150',name:'Magenta'},
       {code:'AS 320',name:'Cyan'},{code:'AS 47',name:'Nero'},{code:'AS 12',name:'Rosso'},
       {code:'AS 88',name:'Blu'},{code:'AS 33',name:'Verde'},{code:'AS 70',name:'Arancio'}];
  const inp = {padding:'10px 14px',borderRadius:99,border:theme.borders?`${theme.borderWidth}px solid ${theme.ink}`:`1px solid ${theme.line}`,background:theme.panelAlt,fontFamily:'Nebulica',fontSize:14,color:theme.ink,outline:'none',boxSizing:'border-box',width:'100%'};
  const lbl = {fontFamily:'Nebulica',fontSize:11,letterSpacing:1.3,fontWeight:700,color:theme.sub,display:'block',marginBottom:5};
  const autoTag = {fontFamily:'Nebulica',fontSize:10,letterSpacing:1,fontWeight:700,color:theme.accent,marginLeft:6};

  if(!open) return null;
  return (
    <React.Fragment>
      <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:1010,background:'rgba(0,0,0,0.38)'}}/>
      <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',zIndex:1020,width:'min(530px, calc(100vw - 32px))',maxHeight:'88vh',overflowY:'auto',borderRadius:32,background:theme.panel,outline:theme.borders?`${theme.borderWidth}px solid ${theme.ink}`:`1px solid ${theme.line}`,boxShadow:`0 40px 80px rgba(0,0,0,0.28)`,padding:'26px 28px 32px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
          <span style={{fontFamily:theme.display,fontWeight:theme.displayWeight,fontSize:22,letterSpacing:-0.5,color:theme.ink,fontStyle:theme.isSerif?'italic':'normal'}}>Nuova ricetta</span>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:99,border:'none',cursor:'pointer',background:rgba('#000',0.08),display:'flex',alignItems:'center',justifyContent:'center'}}><IcoClose size={16} color={theme.ink}/></button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div>
            <span style={lbl}>PANTONE ID</span>
            <input value={pid} onChange={e=>onPidChange(e.target.value)} onBlur={e=>{const n=normalizePantoneCode(e.target.value);if(n!==e.target.value)onPidChange(n);}} placeholder="es. 166 U" style={inp}/>
          </div>
          <div>
            <span style={lbl}>HEX{hexAuto&&<span style={autoTag}>· AUTO</span>}</span>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input value={hex} onChange={e=>{setHex(e.target.value);setHexAuto(false);}} placeholder="D44800" style={{...inp,flex:1}}/>
              <div onClick={()=>setPickerOpen(true)} title="Confronta HEX" style={{width:36,height:36,borderRadius:'50%',flexShrink:0,cursor:'pointer',transition:'background .2s',background:hex.replace('#','').length>=6?'#'+hex.replace('#',''):theme.panelAlt,border:`1.5px solid ${hex.replace('#','').length>=6?'rgba(0,0,0,0.1)':theme.line}`}}/>
            </div>
          </div>
          <div>
            <span style={lbl}>CATEGORIA{catAuto&&<span style={autoTag}>· AUTO</span>}</span>
            <div style={{position:'relative'}}>
              <select value={cat} onChange={e=>{setCat(e.target.value);setCatAuto(false);}} style={{...inp,WebkitAppearance:'none',appearance:'none',paddingRight:32}}>
                <option value="">Scegli…</option>
                {FAMILIES.filter(f=>f!=='tutti').map(f=><option key={f} value={f}>{f}</option>)}
              </select>
              <svg style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}} width="11" height="7" viewBox="0 0 11 7"><path d="M1 1l4.5 4.5L10 1" stroke={theme.sub} strokeWidth="1.7" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
          </div>
          <div><span style={lbl}>PAGINA</span><input value={pag} onChange={e=>setPag(e.target.value)} type="number" placeholder="es. 42" style={inp}/></div>
          <div><span style={lbl}>TEMPERATURA</span><input value={temp} onChange={e=>setTemp(e.target.value)} placeholder="es. alta" style={inp}/></div>
          <div><span style={lbl}>COPERTURA</span><input value={cop} onChange={e=>setCop(e.target.value)} placeholder="es. media" style={inp}/></div>
        </div>
        <div style={{marginTop:14}}><span style={lbl}>VECCHIO NOME</span>
          <input value={vecchioNome} onChange={e=>setVecchioNome(e.target.value)} placeholder="es. ex 116 U, ex 7699 C" style={inp}/>
        </div>
        <div style={{marginTop:14}}><span style={lbl}>NOTE</span>
          <textarea value={note} onChange={e=>setNote(e.target.value)} rows={2} placeholder="note opzionali…" style={{...inp,borderRadius:16,resize:'vertical',lineHeight:1.45}}/>
        </div>
        <div style={{marginTop:20}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <span style={lbl}>INCHIOSTRI — dose a 40 g</span>
            {inks.length<4&&<button onClick={addInkRow} style={{border:'none',background:'transparent',cursor:'pointer',fontFamily:'Nebulica',fontWeight:700,fontSize:12,color:theme.accent}}>+ Aggiungi</button>}
          </div>
          {inks.map((row,i)=>(
            <div key={i} style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
              <InkSearchField value={row.ink} onChange={v=>setField(i,'ink',v)} options={inkOpts} style={inp} onConfirm={()=>doseRefs.current[i]?.focus()}/>
              <input ref={el=>doseRefs.current[i]=el} value={row.dose} onChange={e=>setField(i,'dose',e.target.value)} type="number" step="0.1" placeholder="g" style={{...inp,width:72,flex:'none'}}/>
              {inks.length>1&&<button onClick={()=>removeInkRow(i)} style={{width:32,height:32,borderRadius:99,border:'none',background:rgba('#000',0.06),cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><IcoClose size={12} color={theme.faint}/></button>}
            </div>
          ))}
        </div>
        {msg&&<div style={{marginTop:10,fontFamily:'Nebulica',fontSize:13,color:msg.includes('salvata')||msg.includes('Salvata')?theme.accent:theme.sub}}>{msg}</div>}
        <button onClick={submit} disabled={saving} style={{marginTop:18,width:'100%',height:52,borderRadius:99,cursor:saving?'default':'pointer',background:theme.accent,color:theme.onAccent,border:'none',fontFamily:'Nebulica',fontWeight:700,fontSize:15,opacity:saving?0.7:1}}>
          {saving?'Salvataggio…':'Salva ricetta'}
        </button>
      </div>
      <HexPickerSheet open={pickerOpen} onClose={()=>setPickerOpen(false)} pantoneId={pid.trim()} onSelect={h=>{setHex(h);setHexAuto(false);}} currentHex={hex} theme={theme}/>
    </React.Fragment>
  );
}

function EditSheet({open, editCode, onClose, theme}) {
  const [pid, setPid] = React.useState('');
  const [hex, setHex] = React.useState('');
  const [cat, setCat] = React.useState('');
  const [temp, setTemp] = React.useState('');
  const [cop, setCop] = React.useState('');
  const [note, setNote] = React.useState('');
  const [vecchioNome, setVecchioNome] = React.useState('');
  const [pag, setPag] = React.useState('');
  const [proj, setProj] = React.useState('');
  const [inks, setInks] = React.useState([]);
  const inkId = React.useRef(1);
  const [saving, setSaving] = React.useState(false);
  const [msg, setMsg] = React.useState('');
  const [pickerOpen, setPickerOpen] = React.useState(false);
  const pidTouched = React.useRef(false);

  React.useEffect(()=>{
    if(open && editCode){
      pidTouched.current = false;
      const r = allRicette.find(x=>x.Pantone_ID===editCode);
      setPid(editCode);
      setHex((r?.HEX||'').replace('#',''));
      setCat((r?.Categoria||'').toLowerCase().trim());
      setTemp(r?.Temperatura||'');
      const copRaw = (r?.Copertura||'').toLowerCase().trim();
      setCop(copRaw.startsWith('copr')?'coprente':copRaw.startsWith('semi')?'semi':copRaw.startsWith('tras')?'trasp':'');
      setNote(r?.Note||'');
      setVecchioNome(r?.Vecchio_Nome||'');
      setPag(r?.Pagina||'');
      setProj(r?.Progetti||'');
      const comps = allComponenti.filter(c=>c.Pantone_ID===editCode);
      inkId.current = comps.length + 1;
      setInks(comps.length>0 ? comps.map((c,i)=>({id:i+1,name:c.Inchiostro||'',g:c['Dose_40g (g)']||''})) : [{id:1,name:'',g:''},{id:2,name:'',g:''}]);
      setMsg(''); setSaving(false);
    }
  },[open, editCode]);

  React.useEffect(()=>{
    if(!pidTouched.current) return;
    const found = DESK_PANTONES.find(p=>p.code===pid.trim());
    if(found && found.hex) setHex(found.hex.replace('#',''));
  },[pid]);

  const setInkField = (id,field,val) => setInks(a=>a.map(r=>r.id===id?{...r,[field]:val}:r));
  const addInk = () => setInks(a=>[...a,{id:inkId.current++,name:'',g:''}]);
  const delInk = id => setInks(a=>a.length>1?a.filter(r=>r.id!==id):a);

  const submit = async ()=>{
    if(!pid.trim()||!cat){ setMsg('Compila Pantone ID e Categoria.'); return; }
    const newId = pid.trim();
    if(newId!==editCode && allRicette.some(r=>r.Pantone_ID===newId)){ setMsg(`⚠ "${newId}" esiste già — usa un codice diverso.`); return; }
    const normHexEs=hex.replace('#','').trim().toUpperCase();
    if(/^[0-9A-Fa-f]{6}$/.test(normHexEs)){const exH=allRicette.find(r=>r.Pantone_ID!==editCode&&(r.HEX||'').replace('#','').trim().toUpperCase()===normHexEs);if(exH){setMsg(`⚠ L'HEX #${normHexEs} è già usato da "${exH.Pantone_ID}". Verifica il colore.`);return;}}
    setSaving(true); setMsg('');
    try{
      const hexVal = '#'+hex.replace('#','').trim();
      const validInks = inks.filter(r=>r.name.trim()&&(parseFloat(r.g)||0)>0);
      const payload = {action:'editRicetta',Pantone_ID:editCode,HEX:hexVal,Categoria:cat,Temperatura:temp,Copertura:cop,Note:note,Vecchio_Nome:vecchioNome,Pagina:pag,Progetti:proj,componenti:validInks.map(r=>({Inchiostro:r.name,'Dose_40g (g)':r.g}))};
      if(newId!==editCode) payload.Pantone_ID_nuovo=newId;
      await postGAS(payload);
      // Ottimistico
      const rIdx = allRicette.findIndex(x=>x.Pantone_ID===editCode);
      if(rIdx>=0) allRicette[rIdx]={...allRicette[rIdx],Pantone_ID:newId,HEX:hexVal,Categoria:cat,Temperatura:temp,Copertura:cop,Note:note,Vecchio_Nome:vecchioNome,Pagina:pag,Progetti:proj};
      allComponenti = allComponenti.filter(c=>c.Pantone_ID!==editCode);
      validInks.forEach(r=>allComponenti.push({Pantone_ID:newId,Inchiostro:r.name,'Dose_40g (g)':r.g}));
      transformData(); window._bumpData?.();
      setMsg('Modifiche salvate!'); setTimeout(()=>onClose(), 1100);
    }catch(e){ setMsg('Errore di connessione.'); }
    setSaving(false);
  };

  const inp = {width:'100%',padding:'10px 14px',borderRadius:99,border:theme.borders?`${theme.borderWidth}px solid ${theme.ink}`:`1px solid ${theme.line}`,background:theme.panelAlt,fontFamily:'Nebulica',fontSize:14,color:theme.ink,outline:'none',boxSizing:'border-box'};
  const lbl = {fontFamily:'Nebulica',fontSize:11,letterSpacing:1.3,fontWeight:700,color:theme.sub,display:'block',marginBottom:5};
  const inkOpts = allInchiostri.length ? allInchiostri.map(i=>i.Codice||i.Nome_completo) : INK_POOL.map(i=>i.name);

  if(!open||!editCode) return null;
  return (
    <React.Fragment>
      <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:1010,background:'rgba(0,0,0,0.38)'}}/>
      <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',zIndex:1020,width:'min(520px, calc(100vw - 32px))',maxHeight:'90vh',overflowY:'auto',borderRadius:32,background:theme.panel,outline:theme.borders?`${theme.borderWidth}px solid ${theme.ink}`:`1px solid ${theme.line}`,boxShadow:`0 40px 80px rgba(0,0,0,0.28)`,padding:'26px 28px 32px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
          <span style={{fontFamily:theme.display,fontWeight:theme.displayWeight,fontSize:22,letterSpacing:-0.5,color:theme.ink,fontStyle:theme.isSerif?'italic':'normal'}}>Modifica ricetta</span>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:99,border:'none',cursor:'pointer',background:rgba('#000',0.08),display:'flex',alignItems:'center',justifyContent:'center'}}><IcoClose size={16} color={theme.ink}/></button>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div style={{gridColumn:'span 2'}}><span style={lbl}>PANTONE ID</span><input value={pid} onChange={e=>{pidTouched.current=true;setPid(e.target.value);}} onBlur={e=>{const n=normalizePantoneCode(e.target.value);if(n!==e.target.value){pidTouched.current=true;setPid(n);}}} placeholder="es. 166 U" style={inp}/></div>
          <div><span style={lbl}>HEX</span>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input value={hex} onChange={e=>setHex(e.target.value)} placeholder="D44800" style={{...inp,flex:1}}/>
              <div onClick={()=>setPickerOpen(true)} title="Confronta HEX" style={{width:36,height:36,borderRadius:'50%',flexShrink:0,cursor:'pointer',transition:'background .2s',background:hex.replace('#','').length>=6?'#'+hex.replace('#',''):theme.panelAlt,border:`1.5px solid ${hex.replace('#','').length>=6?'rgba(0,0,0,0.1)':theme.line}`}}/>
            </div>
          </div>
          <div><span style={lbl}>CATEGORIA</span>
            <div style={{position:'relative'}}>
              <select value={cat} onChange={e=>setCat(e.target.value)} style={{...inp,WebkitAppearance:'none',appearance:'none',paddingRight:32}}>
                <option value="">Scegli…</option>
                {FAMILIES.filter(f=>f!=='tutti').map(f=><option key={f} value={f}>{f}</option>)}
              </select>
              <svg style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}} width="11" height="7" viewBox="0 0 11 7"><path d="M1 1l4.5 4.5L10 1" stroke={theme.sub} strokeWidth="1.7" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
          </div>
          <div><span style={lbl}>PAGINA</span><input value={pag} onChange={e=>setPag(e.target.value)} type="number" placeholder="es. 42" style={inp}/></div>
          <div><span style={lbl}>TEMPERATURA</span>
            <div style={{position:'relative'}}>
              <select value={temp} onChange={e=>setTemp(e.target.value)} style={{...inp,WebkitAppearance:'none',appearance:'none',paddingRight:32}}>
                <option value="">Scegli…</option>
                {NF_TEMPS.map(t=><option key={t.k} value={t.k}>{t.l}</option>)}
              </select>
              <svg style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}} width="11" height="7" viewBox="0 0 11 7"><path d="M1 1l4.5 4.5L10 1" stroke={theme.sub} strokeWidth="1.7" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
          </div>
          <div style={{gridColumn:'span 2'}}>
            <span style={lbl}>COPERTURA</span>
            <div style={{display:'flex',gap:8}}>
              {[{k:'trasp',l:'Trasp.'},{k:'semi',l:'Semi'},{k:'coprente',l:'Coprente'}].map(({k,l})=>{
                const on=cop===k;
                return <button key={k} onClick={()=>setCop(on?'':k)} style={{flex:1,height:44,borderRadius:99,cursor:'pointer',fontFamily:'Nebulica',fontWeight:on?700:500,fontSize:14,border:theme.borders?`${theme.borderWidth}px solid ${on?theme.ink:theme.line}`:`1px solid ${on?theme.ink:theme.line}`,background:on?theme.ink:theme.panelAlt,color:on?theme.panel:theme.sub,transition:'background .15s,color .15s'}}>{l}</button>;
              })}
            </div>
          </div>
        </div>

        <div style={{marginTop:18}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <span style={lbl}>FORMULA · dose a 40 g</span>
            <button onClick={addInk} style={{height:30,padding:'0 14px',borderRadius:99,cursor:'pointer',fontFamily:'Nebulica',fontWeight:700,fontSize:12,border:`1px solid ${theme.line}`,background:theme.panelAlt,color:theme.ink}}>+ Aggiungi</button>
          </div>
          <datalist id="edit-ink-opts">{inkOpts.map(n=><option key={n} value={n}/>)}</datalist>
          {inks.map(row=>(
            <div key={row.id} style={{display:'flex',gap:8,marginBottom:8,alignItems:'center'}}>
              <input list="edit-ink-opts" value={row.name} onChange={e=>setInkField(row.id,'name',e.target.value)} placeholder="es. AS 40" style={{...inp,flex:1,padding:'8px 14px'}}/>
              <input value={row.g} onChange={e=>setInkField(row.id,'g',e.target.value)} type="number" step="0.01" placeholder="g" style={{...inp,width:84,padding:'8px 10px',textAlign:'right'}}/>
              <button onClick={()=>delInk(row.id)} style={{width:32,height:32,borderRadius:99,border:`1px solid ${theme.line}`,background:theme.panelAlt,cursor:'pointer',color:theme.sub,fontFamily:'Nebulica',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>×</button>
            </div>
          ))}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginTop:14}}>
          <div style={{gridColumn:'span 2'}}><span style={lbl}>VECCHIO NOME</span>
            <input value={vecchioNome} onChange={e=>setVecchioNome(e.target.value)} placeholder="es. ex 116 U, ex 7699 C" style={inp}/>
          </div>
          <div style={{gridColumn:'span 2'}}><span style={lbl}>NOTE</span>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={2} placeholder="note…" style={{...inp,borderRadius:16,resize:'vertical',lineHeight:1.45}}/>
          </div>
          <div style={{gridColumn:'span 2'}}><span style={lbl}>PROGETTI</span><input value={proj} onChange={e=>setProj(e.target.value)} placeholder="es. Brand Aurora, Packaging Olio" style={inp}/></div>
        </div>

        {msg&&<div style={{marginTop:10,fontFamily:'Nebulica',fontSize:13,color:msg.includes('Modif')||msg.includes('salvate')?theme.accent:theme.sub}}>{msg}</div>}
        <button onClick={submit} disabled={saving} style={{marginTop:18,width:'100%',height:52,borderRadius:99,cursor:saving?'default':'pointer',background:theme.accent,color:theme.onAccent,border:'none',fontFamily:'Nebulica',fontWeight:700,fontSize:15,opacity:saving?0.7:1}}>
          {saving?'Salvataggio…':'Salva modifiche'}
        </button>
        <button onClick={async()=>{
          if(!window.confirm(`Eliminare definitivamente "${editCode}"?\n\nL'operazione non può essere annullata.`)) return;
          setSaving(true); setMsg('');
          try{
            await postGAS({action:'deleteRicetta',Pantone_ID:editCode});
            allRicette = allRicette.filter(r=>r.Pantone_ID!==editCode);
            allComponenti = allComponenti.filter(c=>c.Pantone_ID!==editCode);
            transformData(); window._bumpData?.();
            onClose();
          }catch(e){ setMsg('Errore durante l\'eliminazione.'); setSaving(false); }
        }} disabled={saving} style={{marginTop:10,width:'100%',height:44,borderRadius:99,cursor:saving?'default':'pointer',background:'transparent',color:'#d32f2f',border:'1.5px solid #d32f2f',fontFamily:'Nebulica',fontWeight:700,fontSize:14,opacity:saving?0.5:1}}>
          Elimina ricetta
        </button>
      </div>
      <HexPickerSheet open={pickerOpen} onClose={()=>setPickerOpen(false)} pantoneId={pid.trim()} onSelect={h=>setHex(h)} currentHex={hex} theme={theme}/>
    </React.Fragment>
  );
}

function WalletUnified({pantone, open, qty, setQty, theme, headerH=176, codeSize=46, onMeasure}) {
  const fg = textOnDesk(pantone.hex);
  const recipe = React.useMemo(()=>makeRecipe(pantone),[pantone.code]);
  const panelRef = React.useRef(null);
  React.useLayoutEffect(()=>{
    if(!open||!onMeasure||!panelRef.current) return;
    onMeasure(headerH + panelRef.current.scrollHeight);
  },[open,pantone.code,headerH,theme.cardSurface,theme.display]);
  return (
    <div style={{width:'100%',height:'100%',borderRadius:34,background:pantone.hex,position:'relative',overflow:'hidden',outline:theme.borders?`${theme.borderWidth}px solid ${theme.ink}`:`1px solid ${theme.line}`}}>
      <div style={{padding:open?'24px 26px':'20px 22px',height:open?headerH:'100%',display:'flex',flexDirection:'column',justifyContent:'space-between',transition:`padding .45s ${SPRING_SOFT}`}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10}}>
          <PantoneCode code={pantone.code} tcx={pantone.tcx} fg={fg} size={open?64:codeSize} theme={theme}/>
          <span style={{fontFamily:'Nebulica',fontSize:12,fontWeight:600,color:fg,opacity:0.78,display:'inline-flex',alignItems:'center',gap:5,whiteSpace:'nowrap',paddingTop:5}}>
            <span style={{width:5,height:5,borderRadius:99,background:fg,opacity:0.5}}/>{pantone.ink} ink</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
          <span style={{fontFamily:'Nebulica',fontSize:open?17:14,fontWeight:500,color:fg,opacity:0.92}}>{pantone.name}</span>
          <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:10.5,color:fg,opacity:0.6,letterSpacing:0.4}}>PAG.{pantone.page}{copLabel(pantone.copertura)?' · '+copLabel(pantone.copertura):''}</span>
        </div>
      </div>
      <div ref={panelRef} style={{position:'absolute',left:0,right:0,top:headerH,bottom:0,...surface(theme),opacity:open?1:0,transform:open?'translateY(0)':'translateY(22px)',transition:`opacity .34s ease, transform .5s ${SPRING_SOFT}`,transitionDelay:open?'.12s':'0s',overflowY:'auto',padding:'20px 26px 24px'}}>
        <div style={{fontFamily:'Nebulica',fontSize:11,letterSpacing:1.5,fontWeight:700,color:theme.sub,marginBottom:9}}>QUANTITÀ</div>
        <QuantityPicker value={qty} onChange={setQty} theme={theme}/>
        <div style={{marginTop:20}}><InkFormula pantone={pantone} recipe={recipe} qty={qty} theme={theme} play={open} anim="stagger"/></div>
        <NotesBlock note={recipe.note} vecchioNome={recipe.vecchioNome} theme={theme}/>
        <div style={{marginTop:20}}><PrintButton theme={theme} onClick={()=>stampaPDF(pantone, recipe, qty)}/></div>
        <div style={{marginTop:14,display:'flex',justifyContent:'space-between',fontFamily:'Nebulica',fontSize:11,letterSpacing:1.3,fontWeight:700,color:theme.sub}}>
          <span>PROGETTO</span><span style={{color:theme.accent}}>→ {recipe.project}</span></div>
      </div>
    </div>
  );
}

      <div style={{padding:'4px 18px 12px'}}>

      </div>
      <div style={{flex:1,overflowY:'auto',padding:'4px 12px 22px',WebkitMaskImage:'linear-gradient(to bottom, transparent 0, #000 12px, #000 calc(100% - 14px), transparent 100%)',maskImage:'linear-gradient(to bottom, transparent 0, #000 12px, #000 calc(100% - 14px), transparent 100%)'}}>
        <div style={{position:'relative'}}>
          <div style={{position:'absolute',left:0,right:0,height:ROW,top:hiIdx*STEP,borderRadius:99,zIndex:0,background:rgba('#fff',theme.grey?0.5:0.58),backdropFilter:'blur(14px) saturate(150%)',WebkitBackdropFilter:'blur(14px) saturate(150%)',boxShadow:`0 8px 20px ${rgba('#000',0.08)}, inset 0 0 0 1px ${rgba('#fff',0.6)}`,opacity:hiIdx>=0?1:0,transition:`top .5s ${SPRING}, opacity .25s`}}/>
          {filtered.map(p=>{const on=p.code===selCode; return (
            <button key={p.code} onClick={()=>onPick(list.indexOf(p))} style={{position:'relative',zIndex:1,width:'100%',height:ROW,marginBottom:STEP-ROW,display:'flex',alignItems:'center',gap:12,textAlign:'left',cursor:'pointer',padding:'0 16px 0 12px',borderRadius:99,border:'none',background:'transparent'}}>
              <Swatch hex={p.hex} size={40} radius={99}/>
              <div style={{flex:1,minWidth:0}}>
                <span style={{fontFamily:theme.display,fontWeight:theme.isSerif?400:700,fontSize:17,letterSpacing:-0.4,color:theme.ink,fontStyle:theme.isSerif?'italic':'normal'}}>
                  {p.code.replace(' U','')}{p.code.includes(' U')&&<span style={{opacity:0.5,fontWeight:400,fontStyle:'normal'}}> U</span>}</span>
                <div style={{fontFamily:'Nebulica',fontSize:12,color:theme.sub,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
              </div>
              <div style={{height:40,display:'flex',alignItems:'center'}}><div style={{display:'flex',gap:3}}>{[0,1,2].map(i=>{const lvl=coverLvl(p.copertura),fill=i<lvl;return <span key={i} style={{width:7,height:7,borderRadius:99,background:fill?(on?theme.accent:rgba(theme.ink,0.5)):'transparent',boxShadow:fill?'none':`inset 0 0 0 1.5px ${rgba(theme.ink,0.22)}`}}/>;})}</div></div>
            </button>
          );})}
        </div>

function WalletRow({theme, mode, setMode, query, setQuery, onSettings, onNuova, initialOpen=null}) {
  const [family, setFamily] = React.useState('tutti');
  const [ink, setInk] = React.useState(0);
  const [attr, setAttr] = React.useState('tutti');
  const list = React.useMemo(()=>DESK_PANTONES.filter(p=>(family==='tutti'||p.family===family)&&(!ink||p.ink===ink)&&matchColorAttr(p.hex,attr)&&(!query||`${p.code} ${p.name} ${p.family}`.toLowerCase().includes(query.toLowerCase()))),[family,ink,attr,query,DESK_PANTONES.length]);
  const [sel, setSel] = React.useState(null);
  const [qty, setQty] = React.useState(100);
  const [scroll, setScroll] = React.useState(()=>initialOpen!=null?Math.max(0,initialOpen*236+105-500):0);
  const [hover, setHover] = React.useState(null);
  const drag = React.useRef({on:false,x0:0,s0:0,moved:false});
  const CARD_W=210,CARD_H=300,GAP=26,STEP=CARD_W+GAP,VIEW=1140,SB=300;
  const GROW_W=384,PART=(GROW_W-CARD_W)/2+34;
  const open = sel!==null && sel<list.length;
  const selP = open?list[sel]:null;
  const [measuredH, setMeasuredH] = React.useState(null);
  React.useEffect(()=>{setMeasuredH(null);},[sel]);
  const growH = open?(measuredH?Math.max(360,Math.min(760,measuredH)):Math.max(430,Math.min(720,walletOpenHeight(selP,150)))):624;
  const blobHex = open?selP.hex:(list[3]||list[0]||DESK_PANTONES[3]||{hex:'#FFCD00'}).hex;
  React.useEffect(()=>{setSel(null);},[family,ink,attr,query]);
  const maxScroll = Math.max(0, list.length*STEP-VIEW);
  const clampS = v=>Math.max(-40,Math.min(maxScroll+40,v));
  const onWheel = e=>{if(open)return; setScroll(s=>clampS(s+(Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY)));};
  const onDown = e=>{if(open)return; drag.current={on:true,x0:e.clientX,s0:scroll,moved:false}; try{e.currentTarget.setPointerCapture(e.pointerId);}catch(_){}};
  const onMove = e=>{if(!drag.current.on)return; const dx=e.clientX-drag.current.x0; if(Math.abs(dx)>4)drag.current.moved=true; setScroll(clampS(drag.current.s0-dx));};
  const onUp = ()=>{drag.current.on=false;};
  const openCard = i=>{setSel(i);setQty(100); const target=i*STEP+CARD_W/2-(VIEW/2-70); setScroll(Math.max(0,target));};
  return (
    <div style={{width:'100%',height:'100%',position:'relative'}}>
      <GrainBlobs theme={theme} blobHex={blobHex}/>
      <WalletTopBar theme={theme} mode={mode} setMode={setMode} onSettings={onSettings} onNuova={onNuova} open={open} onBack={()=>setSel(null)}/>
      <WalletSideList list={list} query={query} setQuery={setQuery} selCode={open?selP.code:null} onPick={openCard} theme={theme} family={family} setFamily={setFamily} ink={ink} setInk={setInk} attr={attr} setAttr={setAttr}/>
      <div onWheel={onWheel} onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}
        style={{position:'absolute',top:88,left:SB,right:0,bottom:0,zIndex:10,overflow:'hidden',cursor:open?'default':(drag.current.on?'grabbing':'grab'),touchAction:'none'}}>
        <div style={{position:'absolute',left:70,top:'50%',height:1,width:1}}>
          {list.map((p,i)=>{
            const isSel=i===sel;
            let x=i*STEP-scroll, y=-CARD_H/2, w=CARD_W, h=CARD_H, z=10, op=1, lift=0, scale=1;
            if(open){if(isSel){w=GROW_W;h=growH;x=x-(GROW_W-CARD_W)/2;y=-growH/2-6;z=100;}else{x+=i<sel?-PART:PART;op=0.32;scale=0.96;}}
            else if(hover===i){lift=-30;scale=1.05;z=50;}
            return (
              <div key={p.code}
                onMouseEnter={()=>!open&&setHover(i)} onMouseLeave={()=>!open&&setHover(null)}
                onClick={()=>{if(open)return; if(!drag.current.moved)openCard(i);}}
                style={{position:'absolute',left:0,top:0,width:w,height:h,transform:`translate(${x}px,${y+lift}px) scale(${scale})`,transformOrigin:'50% 50%',zIndex:z,opacity:op,cursor:open?'default':'pointer',transition:`transform .55s ${FLUID_SOFT}, width .55s ${FLUID_SOFT}, height .55s ${FLUID_SOFT}, opacity .4s`,filter:isSel&&open?'drop-shadow(0 38px 64px rgba(0,0,0,0.28))':(hover===i?'drop-shadow(0 26px 46px rgba(0,0,0,0.22))':'drop-shadow(0 16px 32px rgba(0,0,0,0.16))')}}>
                <WalletUnified pantone={p} open={isSel} qty={qty} setQty={setQty} theme={theme} codeSize={42} headerH={150} onMeasure={isSel?setMeasuredH:undefined}/>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{position:'absolute',bottom:34,left:SB,right:0,textAlign:'center',zIndex:30,opacity:open?0:1,transition:'opacity .3s',pointerEvents:'none',fontFamily:'Nebulica',fontSize:11,letterSpacing:1.5,fontWeight:700,color:theme.faint}}>
        ROTELLA O TRASCINA PER SCORRERE · CLICCA UNA CARTA</div>
      <div style={{position:'absolute',left:SB+30,bottom:30,display:'flex',flexDirection:'row',gap:12,zIndex:45}}>
        {[{left:true,d:'M14 6l-6 6 6 6',can:open?sel>0:scroll>2},{left:false,d:'M10 6l6 6-6 6',can:open?sel<list.length-1:scroll<maxScroll-2}].map((b,i)=>(
          <button key={i} disabled={!b.can} onClick={()=>{if(open){openCard(Math.max(0,Math.min(list.length-1,sel+(b.left?-1:1))));}else setScroll(s=>clampS(s+(b.left?-STEP*3:STEP*3)));}}
            style={{width:54,height:54,borderRadius:99,cursor:b.can?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',border:theme.borders?`${theme.borderWidth}px solid ${theme.ink}`:'none',background:rgba('#fff',theme.grey?0.82:0.88),backdropFilter:'blur(16px) saturate(160%)',WebkitBackdropFilter:'blur(16px) saturate(160%)',boxShadow:`0 6px 16px ${rgba('#000',0.08)}`,opacity:b.can?1:0.4}}>
            <Ico d={b.d} size={25} color={theme.accent} sw={2}/>
          </button>
        ))}
      </div>
    </div>
  );
}

function ensureGalleryKf() {
