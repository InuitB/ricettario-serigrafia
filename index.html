            </div>
            {sortedInkAgg.map((ink,i)=>(
              <div key={ink.name} style={{display:'flex',alignItems:'center',gap:14,padding:'11px 0',borderTop:i===0?'none':`1px solid ${theme.line}`}}>
                <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:14,background:theme.ink,color:'#fff',padding:'6px 14px',borderRadius:99,whiteSpace:'nowrap',flexShrink:0,minWidth:80,textAlign:'center'}}>{ink.name}</span>
                <div style={{flex:1,height:8,borderRadius:99,background:theme.line,overflow:'hidden'}}>
                  <div style={{width:`${(ink.grams/maxGrams)*100}%`,height:'100%',background:theme.accent,borderRadius:99,transition:'width .4s'}}/>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:20,color:theme.ink,letterSpacing:-0.5}}>{ink.grams.toFixed(ink.grams>=100?1:2)}</span>
                  <span style={{fontFamily:'Nebulica',fontSize:12,color:theme.faint,marginLeft:3}}>g tot</span>
                  <div style={{fontFamily:'Nebulica',fontSize:11,color:theme.sub,marginTop:2}}>×{ink.count} {ink.count===1?'formula':'formule'}</div>
                </div>
              </div>
            ))}
            {sortedInkAgg.length===0&&<div style={{color:theme.faint,fontFamily:'Nebulica',fontSize:14,padding:'20px 0'}}>Nessun inchiostro trovato.</div>}
          </div>
        )}
      </div>
    </div>
  );
}

// Movimento d'ingresso dell'intera scheda (handoff), direzionale rispetto allo scorrimento lista
function cardEnterAnim(variant, dir) {
  const D = dir === 'fromTop' ? 'Down' : 'Up';
  if (variant === 'spring')      return `cardSpring${D} .66s ${SPRING_SOFT} both`;
  if (variant === 'deck')        return `cardDeck${D} .62s ${FLUID_SOFT} both`;
  if (variant === 'deckGlide')   return `cardDeckGlide${D} .66s cubic-bezier(.22,.68,.24,1) both`;
  if (variant === 'deckSettle')  return `cardDeckSettle${D} .9s cubic-bezier(.16,.72,.2,1.01) both`;
  if (variant === 'deckFeather') return `cardDeckFeather${D} 1.15s cubic-bezier(.2,.6,.12,1) both`;
  if (variant === 'slide')       return `cardSlide${D} .52s ${FLUID_SOFT} both`;
  return `mBreath .6s cubic-bezier(.32,1.12,.4,1) both`;
}
function MasterMode({theme, mode, setMode, query, setQuery, onSettings, anim='rise', cardEnter='deck', onNuova, onEdit}) {
  const [family, setFamily] = React.useState('tutti');
  const [inkFilter, setInkFilter] = React.useState(0);
  const [attr, setAttr] = React.useState('tutti');
  const [selCode, setSelCode] = React.useState(null);
  const [qty, setQty] = React.useState(100);
  const [soloPreferiti, setSoloPref] = React.useState(false);
  const [sortMode, setSortMode] = React.useState('default');
  const [formulaSort, setFormulaSort] = React.useState(()=>localStorage.getItem('formulaSort')||'pct_desc');
  const [projectSet, setProjectSet] = React.useState(new Set());
  const [projectOpen, setProjectOpen] = React.useState(false);
  const [selectionMode, setSelectionMode] = React.useState(false);
  const [mescolaOpen, setMescolaOpen] = React.useState(false);
  const toggleProject = React.useCallback(code=>setProjectSet(prev=>{const s=new Set(prev);s.has(code)?s.delete(code):s.add(code);return s;}),[]);
  const setFormulaS = React.useCallback(k=>{setFormulaSort(k);localStorage.setItem('formulaSort',k);},[]);
  const exitSelectionMode = React.useCallback(()=>{setSelectionMode(false);setProjectSet(new Set());setProjectOpen(false);},[]);
  const [navDir, setNavDir] = React.useState(null);
  ensureMasterKf();
  const listRef = React.useRef(null);
  const navStateRef = React.useRef({});

  React.useEffect(()=>{
    window._selectCode=setSelCode;
    return()=>{ delete window._selectCode; };
  },[]);

  React.useEffect(()=>{
    if(selCode && newlySaved.has(selCode) && listRef.current){
      const idx = DESK_PANTONES.filter(p=>{
        if(family!=='tutti'&&p.family!==family) return false;
        if(inkFilter&&p.ink!==inkFilter) return false;
        return true;
      }).findIndex(p=>p.code===selCode);
      if(idx>=0) setTimeout(()=>{ if(listRef.current) listRef.current.scrollTop=Math.max(0,idx*70-80); },80);
    }
  },[selCode]);

  React.useEffect(()=>{
    function onKey(e){
      if(e.key!=='ArrowDown'&&e.key!=='ArrowUp') return;
      const ae=document.activeElement;
      if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT')) return;
      e.preventDefault();
      const {f,sel,lr}=navStateRef.current;
      if(!f||!sel) return;
      const dir=e.key==='ArrowDown'?1:-1;
      const ci=f.findIndex(p=>p.code===sel.code);
      const ni=ci+dir;
      if(ni>=0&&ni<f.length){
        setNavDir(dir>0?'down':'up');
        setSelCode(f[ni].code);
        if(lr&&lr.current){
          const itemH=70,visH=lr.current.clientHeight,curr=lr.current.scrollTop,target=ni*itemH;
          if(target<curr||target+itemH>curr+visH) lr.current.scrollTop=Math.max(0,target-(visH-itemH)/2);
        }
      }
    }
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[]);

  const filtered = applyFilterSort(DESK_PANTONES.filter(p=>{
    if(family!=='tutti'&&p.family!==family) return false;
    if(inkFilter&&p.ink!==inkFilter) return false;
    if(!matchColorAttr(p.hex,attr)) return false;
    if(query){const q=query.toLowerCase(); if(!`${p.code} ${p.name} ${p.family}`.toLowerCase().includes(q)) return false;}
    return true;
  }), {onlyFav:soloPreferiti, sort:sortMode});

  const initCode = selCode || (filtered[0]&&filtered[0].code) || (DESK_PANTONES[0]&&DESK_PANTONES[0].code);
  const selected = DESK_PANTONES.find(p=>p.code===initCode) || filtered[0] || DESK_PANTONES[0];
  React.useEffect(()=>{ if(!selCode&&DESK_PANTONES.length>0) setSelCode(DESK_PANTONES[0].code); },[DESK_PANTONES.length]);
  const hiIdx = filtered.findIndex(p=>p.code===(selected&&selected.code));
  navStateRef.current = {f:filtered, sel:selected, lr:listRef};
  const recipe = React.useMemo(()=>selected?makeRecipe(selected):null,[selected&&selected.code]);
  const fg = selected?textOnDesk(selected.hex):'#fff';
  const stagger = anim==='morph';

  const colRef=React.useRef(null), searchRowRef=React.useRef(null), headerRef=React.useRef(null);
  const bodyInnerRef=React.useRef(null), bodyWrapRef=React.useRef(null);
  const [cardH, setCardH] = React.useState(null);
  React.useLayoutEffect(()=>{
    const col=colRef.current, hd=headerRef.current, bi=bodyInnerRef.current;
    if(!col||!hd||!bi) return;
    const bw=theme.borders?theme.borderWidth*2:2;
    const avail=col.clientHeight-bw;
    const natural=hd.offsetHeight+bi.scrollHeight+37+bw; // 37 = bodyWrap padding (18+19)
    setCardH(Math.min(natural,avail));

  if (!selected) return (
    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:theme.bg,fontFamily:'Nebulica,system-ui,sans-serif',gap:16}}>

        <ModeOrb mode={mode} onChange={setMode} theme={theme}/>
      </div>
      <div style={{position:'relative',zIndex:10,display:'flex',height:'calc(100% - 88px)'}}>

            <div style={{display:'flex',alignItems:'center',gap:10}}>

              <FilterButton family={family} setFamily={setFamily} ink={inkFilter} setInk={setInkFilter} attr={attr} setAttr={setAttr} theme={theme} align="left"/>
            </div>
            <span style={{fontFamily:'Nebulica',fontSize:11,letterSpacing:1.4,fontWeight:700,color:theme.sub}}>{filtered.length} / {DESK_PANTONES.length} PANTONE</span>
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>setSoloPref(v=>!v)} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:5,padding:'5px 8px',borderRadius:99,fontFamily:'Nebulica',fontSize:10.5,fontWeight:700,letterSpacing:0.6,cursor:'pointer',border:`1.4px solid ${soloPreferiti?theme.ink:rgba(theme.ink,0.22)}`,background:soloPreferiti?theme.ink:'transparent',color:soloPreferiti?(theme.grey?'#0B0B0B':'#fff'):theme.sub,transition:'all .2s'}}>
                <IcoStar size={11} color={soloPreferiti?(theme.grey?'#0B0B0B':'#fff'):theme.sub} fill={soloPreferiti?(theme.grey?'#0B0B0B':'#fff'):'none'}/> PREFERITI
              </button>
              <button onClick={()=>selectionMode?exitSelectionMode():setSelectionMode(true)} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:5,padding:'5px 8px',borderRadius:99,fontFamily:'Nebulica',fontSize:10.5,fontWeight:700,letterSpacing:0.6,cursor:'pointer',border:`1.4px solid ${selectionMode?theme.accent:rgba(theme.ink,0.22)}`,background:selectionMode?theme.accent:'transparent',color:selectionMode?'#fff':theme.sub,transition:'all .22s'}}>

function squirclePath(w,h,r,n=5,pad=0){
  const x0=pad,y0=pad,W=w-pad*2,H=h-pad*2;
  r=Math.max(1,Math.min(r-pad,W/2,H/2));
  const k=2/n,seg=18,pts=[];
  const corner=(cx,cy,a0,a1)=>{for(let i=0;i<=seg;i++){const a=a0+(a1-a0)*(i/seg),c=Math.cos(a),s=Math.sin(a);pts.push([cx+r*Math.sign(c)*Math.pow(Math.abs(c),k),cy+r*Math.sign(s)*Math.pow(Math.abs(s),k)]);}};
  corner(x0+W-r,y0+r,-Math.PI/2,0);corner(x0+W-r,y0+H-r,0,Math.PI/2);corner(x0+r,y0+H-r,Math.PI/2,Math.PI);corner(x0+r,y0+r,Math.PI,Math.PI*1.5);
  return 'M'+pts.map(p=>p[0].toFixed(2)+' '+p[1].toFixed(2)).join(' L')+' Z';
}
function Squircle({radius=28,n=5,border,borderWidth=1.5,shadow,anim,outerStyle,style,className,children}){
  const ref=React.useRef(null);
  const [d,setD]=React.useState('');
  const [size,setSize]=React.useState([0,0]);
  React.useLayoutEffect(()=>{
    const el=ref.current;
    if(!el||typeof ResizeObserver==='undefined') return;
    const update=()=>{const w=el.offsetWidth,h=el.offsetHeight;if(w&&h){setSize([w,h]);setD(squirclePath(w,h,radius,n));}};
    update();const ro=new ResizeObserver(update);ro.observe(el);return()=>ro.disconnect();
  },[radius,n]);
  const clip=d?`path("${d}")`:'none';
  return (
    <div style={{position:'relative',filter:shadow?`drop-shadow(${shadow})`:'none',animation:anim||'none',...outerStyle}}>
      <div ref={ref} className={className} style={{position:'relative',borderRadius:radius,clipPath:clip,WebkitClipPath:clip,...style}}>
        {children}
      </div>
      {d&&border&&(<svg width={size[0]} height={size[1]} viewBox={`0 0 ${size[0]} ${size[1]}`} style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:5}}><path d={d} fill="none" stroke={border} strokeWidth={borderWidth*2} strokeLinejoin="round"/></svg>)}
    </div>
  );
}

function nfLookupHex(code){
  if(!code) return null;
  const raw=code.trim();
  const cands=[raw,raw.toUpperCase(),raw.toUpperCase().replace(/([0-9])([A-Z])$/,'$1 $2'),raw.replace(/\s+/,' ').toUpperCase()];
  const hit=cands.find(k=>PANTONE_DB[k]);
  if(hit) return PANTONE_DB[hit];
  const kn=raw.toLowerCase().replace(/\s/g,'');
  const p=DESK_PANTONES.find(p=>p.code.toLowerCase().replace(/\s/g,'')===kn);
  return p?p.hex:null;
}
function nfLookupEntry(code){
  if(!code) return null;
  const kn=code.trim().toLowerCase().replace(/\s/g,'');
  return DESK_PANTONES.find(p=>p.code.toLowerCase().replace(/\s/g,'')===kn)||null;
}
function nfEffHex(state){
  const h=(state.hex||'').replace('#','');
  if(/^[0-9a-f]{6}$/i.test(h)) return '#'+h;
  if(/^[0-9a-f]{3}$/i.test(h)) return '#'+h.split('').map(c=>c+c).join('');
  const auto=nfLookupHex(state.pantoneId);
  return auto||null;
}

function NuovaDesktop({open,onClose,theme}){
  ensureNuovaKf();
  const [tab,setTab]=React.useState('ricetta');
  const [pantoneId,setPantoneIdRaw]=React.useState('');
  const [hex,setHex]=React.useState('');
  const [hexAuto,setHexAuto]=React.useState(false);
  const [temp,setTemp]=React.useState(null);
  const [cover,setCover]=React.useState(null);
  const [cat,setCat]=React.useState(null);
  const [catAuto,setCatAuto]=React.useState(false);
  const [note,setNote]=React.useState('');
  const [vecchioNome,setVecchioNome]=React.useState('');
  const [page,setPage]=React.useState('');
  const [projects,setProjects]=React.useState([]);
  const [projInput,setProjInput]=React.useState('');
  const [inks,setInks]=React.useState([{id:1,name:'',g:''},{id:2,name:'',g:''}]);
  const inkId=React.useRef(3);
  const [saving,setSaving]=React.useState(false);
  const [msg,setMsg]=React.useState('');
  const [pickerOpen,setPickerOpen]=React.useState(false);

  const reset=React.useCallback(()=>{
    setTab('ricetta');setPantoneIdRaw('');setHex('');setHexAuto(false);setTemp(null);setCover(null);setCat(null);setCatAuto(false);
    setNote('');setVecchioNome('');setPage('');setProjects([]);setProjInput('');setInks([{id:1,name:'',g:''},{id:2,name:'',g:''}]);inkId.current=3;
    setSaving(false);setMsg('');setPickerOpen(false);
  },[]);
  React.useEffect(()=>{if(!open)reset();},[open,reset]);

  const setPantoneId=v=>{
    setPantoneIdRaw(v);
    const autoHex=nfLookupHex(v);
    if(autoHex){setHex(autoHex);setHexAuto(true);const f=guessFamily(autoHex);if(f){setCat(f.charAt(0).toUpperCase()+f.slice(1));setCatAuto(true);}}
    else{if(hexAuto){setHex('');setHexAuto(false);}if(catAuto){setCat(null);setCatAuto(false);}}
  };
  const setHexManual=v=>{setHex(v);setHexAuto(false);};
  const addInk=()=>setInks(a=>[...a,{id:inkId.current++,name:'',g:''}]);
  const setInk=(id,patch)=>setInks(a=>a.map(r=>r.id===id?{...r,...patch}:r));
  const delInk=id=>setInks(a=>a.length>1?a.filter(r=>r.id!==id):a);

  const state={tab,setTab,pantoneId,setPantoneId,hex,setHexManual,hexAuto,temp,setTemp,cover,setCover,cat,setCat,catAuto,note,setNote,vecchioNome,setVecchioNome,page,setPage,projects,setProjects,projInput,setProjInput,inks,addInk,setInk,delInk,openPicker:()=>setPickerOpen(true)};

  const submit=async()=>{
    const eff=nfEffHex(state);
    const finalPid2=normalizePantoneCode(pantoneId);
    if(!finalPid2.trim()||!eff||!cat){setMsg('Compila Pantone ID, Colore e Categoria.');return;}
    if(allRicette.some(r=>r.Pantone_ID===finalPid2)){setMsg(`⚠ "${finalPid2}" esiste già — modifica la ricetta esistente o usa un codice diverso.`);return;}
    const normHexNd=eff.replace('#','').trim().toUpperCase();
    if(/^[0-9A-Fa-f]{6}$/.test(normHexNd)){const exH=allRicette.find(r=>(r.HEX||'').replace('#','').trim().toUpperCase()===normHexNd);if(exH){setMsg(`⚠ L'HEX #${normHexNd} è già usato da "${exH.Pantone_ID}". Verifica il colore.`);return;}}
    const validInks=inks.filter(r=>r.name&&(parseFloat(r.g)||0)>0);
    if(validInks.length===0){setMsg('Aggiungi almeno un inchiostro con la dose.');return;}
    setSaving(true);setMsg('');
    try{
      await postGAS({action:'addRicetta',Pantone_ID:finalPid2,HEX:'#'+eff.replace('#','').trim(),Categoria:cat,Temperatura:temp||'',Copertura:cover||'',Note:note,Vecchio_Nome:vecchioNome,Pagina:page,Progetti:projects.join(', '),componenti:validInks.map(r=>({Inchiostro:r.name,'Dose_40g (g)':r.g}))});
      setMsg('Ricetta salvata!');
      const newId=finalPid2;
      allRicette.push({Pantone_ID:newId,HEX:'#'+eff.replace('#','').trim(),Categoria:cat,Temperatura:temp||'',Copertura:cover||'',Note:note,Vecchio_Nome:vecchioNome,Pagina:page,Progetti:projects.join(', ')});
      validInks.forEach(r=>allComponenti.push({Pantone_ID:newId,Inchiostro:r.name,'Dose_40g (g)':r.g}));
      transformData();
      newlySaved.add(newId);
      window._bumpData?.();
      window._selectCode?.(newId);
      setTimeout(()=>{ newlySaved.delete(newId); window._bumpData?.(); },8000);
      setTimeout(()=>onClose(),1100);
    }catch(e){setMsg('Errore di connessione.');}
    setSaving(false);
  };

  if(!open) return null;
  const eff=nfEffHex(state);
  const divider=`1px solid ${theme.line}`;
  return (
    <React.Fragment>
      <div onClick={onClose} style={{position:'absolute',inset:0,zIndex:820,background:rgba('#000',0.18)}}/>
      <div style={{position:'absolute',inset:0,zIndex:830,display:'flex',alignItems:'center',justifyContent:'center',padding:24,pointerEvents:'none'}}>
        <Squircle radius={34} border={theme.borders?theme.ink:theme.line} borderWidth={theme.borders?theme.borderWidth:1}
          shadow={`0 40px 90px ${rgba('#000',0.26)}`} anim={`nfPop .5s ${SPRING_SOFT} both`}
          outerStyle={{width:1120,maxWidth:'100%',height:820,maxHeight:'calc(100vh - 48px)',pointerEvents:'auto'}}
          style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',overflow:'hidden',...surface(theme)}}>
          <div style={{display:'flex',alignItems:'center',gap:20,padding:'16px 28px 12px',flexShrink:0}}>
            <div style={{flexShrink:0}}>
              <div style={{fontFamily:theme.display,fontWeight:theme.displayWeight,fontSize:28,letterSpacing:-0.8,color:theme.ink,lineHeight:1,fontStyle:theme.isSerif?'italic':'normal'}}>Nuova formula</div>
              <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:10,letterSpacing:1,color:theme.faint,marginTop:5}}>AGGIUNGE AL GOOGLE SHEET</div>
            </div>
            <div style={{flex:1,maxWidth:420,marginLeft:'auto'}}><NFSegTabs tab={state.tab} setTab={state.setTab} theme={theme}/></div>
            <IconPill Icon={IcoClose} theme={theme} size={46} onClick={onClose} title="Chiudi"/>
          </div>
          <div style={{flex:1,minHeight:0,display:'flex'}}>
            <div className="nf-scroll" style={{width:540,flexShrink:0,overflowY:'auto',padding:'16px 24px 20px',display:'flex',flexDirection:'column',gap:16,borderRight:divider,WebkitMaskImage:'linear-gradient(to bottom,transparent 0,#000 16px,#000 calc(100% - 16px),transparent 100%)',maskImage:'linear-gradient(to bottom,transparent 0,#000 16px,#000 calc(100% - 16px),transparent 100%)'}}>
              <NFIdentityFields state={state} theme={theme}/>
              <NFAttributeFields state={state} theme={theme}/>
              <NFMetaFields state={state} theme={theme}/>
            </div>
            <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',minHeight:0}}>
              <Squircle radius={24} border={theme.borders?theme.ink:theme.line} borderWidth={theme.borders?theme.borderWidth:1} shadow={`0 14px 34px ${rgba('#000',0.10)}`} outerStyle={{margin:'24px 28px 0',flexShrink:0}} style={{overflow:'hidden'}}>
                <NFPreviewHeader state={state} theme={theme} size={62}/>
              </Squircle>
              <div className="nf-scroll" style={{flex:1,minHeight:0,overflowY:'auto',padding:'20px 28px 8px'}}>
                <NFInkEditor state={state} theme={theme}/>
              </div>
              <div style={{padding:'10px 28px 20px',borderTop:divider,flexShrink:0}}>
                {msg&&<div style={{fontFamily:'Nebulica',fontSize:13,color:msg.includes('salvata')?theme.accent:theme.sub,marginBottom:10}}>{msg}</div>}
                <div style={{display:'flex',gap:12,alignItems:'center'}}>
                  <button onClick={onClose} style={{height:52,padding:'0 22px',borderRadius:99,cursor:'pointer',fontFamily:'Nebulica',fontWeight:700,fontSize:14.5,color:theme.ink,border:'none',...glass(theme,{strong:true})}}>Annulla</button>
                  <button onClick={submit} disabled={saving} style={{flex:1,height:52,padding:'0 26px',borderRadius:99,cursor:saving?'default':'pointer',border:'none',background:saving?theme.panelAlt:theme.accent,color:saving?theme.sub:theme.onAccent,fontFamily:'Nebulica',fontWeight:700,fontSize:15,letterSpacing:-0.2,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:9,boxShadow:saving?'none':`0 8px 22px ${rgba(theme.accent,0.32)}`}}>
                    <IcoCheck size={19} color={saving?theme.sub:theme.onAccent} sw={2.2}/> {saving?'Salvataggio…':'Salva ricetta'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        </Squircle>
      </div>
      <HexPickerSheet open={pickerOpen} onClose={()=>setPickerOpen(false)} pantoneId={pantoneId.trim()} onSelect={v=>{setHex(v);setHexAuto(false);}} currentHex={hex} theme={theme}/>
    </React.Fragment>
  );
}

function CaricaSheet({open, inkCode, onClose, theme, tare}) {
  const [selCode, setSelCode] = React.useState('');
  const [modo, setModo] = React.useState('pieni'); // 'pieni' | 'pesati'
  // Pieni
  const [nBarattoli, setNBarattoli] = React.useState(1);
  const [gPerBarattolo, setGPerBarattolo] = React.useState('1000');
  // Pesati
  const [jars, setJars] = React.useState(['']);
  const [note, setNote] = React.useState('');
  const [saving, setSaving] = React.useState(false);

  React.useEffect(()=>{
    if(open){ setSelCode(inkCode||''); setModo('pieni'); setNBarattoli(1); setGPerBarattolo('1000'); setJars(['']); setNote(''); setSaving(false); }
  },[open,inkCode]);

  const code = inkCode||selCode;
  const inkInfo = allInchiostri.find(i=>i.Codice===code);

  const totalePieni = nBarattoli * (parseFloat(String(gPerBarattolo).replace(',','.'))||0);
  const netti = jars.map(v=>{ const l=parseFloat(String(v).replace(',','.'))||0; return l>0?Math.max(0,l-tare):0; });
  const totalePesati = netti.reduce((s,n)=>s+n,0);
  const totale = modo==='pieni' ? totalePieni : totalePesati;

  const addJar = ()=>setJars(p=>[...p,'']);
  const removeJar = i=>setJars(p=>p.filter((_,idx)=>idx!==i));
  const setJarVal = (i,v)=>setJars(p=>p.map((x,idx)=>idx===i?v:x));

  const save = async()=>{
    if(!code||totale<=0) return;
    setSaving(true);
    await postInventario({action:'aggiungiCarico', carichi:[{inchiostro:code,grammi:totale}], note});
    setSaving(false);
    onClose();
  };

  const iStyle={width:'100%',fontFamily:'Nebulica',fontWeight:700,fontSize:15,color:theme.ink,background:'transparent',border:`1.4px solid ${rgba(theme.ink,0.22)}`,borderRadius:12,padding:'10px 14px',outline:'none',boxSizing:'border-box'};

  return (
    <>
      {open&&<div onClick={onClose} style={{position:'fixed',inset:0,zIndex:820,background:rgba('#000',0.28),backdropFilter:'blur(6px)',WebkitBackdropFilter:'blur(6px)'}}/>}
      <div style={{position:'fixed',bottom:0,left:'50%',transform:`translateX(-50%) translateY(${open?0:100}%)`,width:520,maxHeight:'82vh',overflowY:'auto',zIndex:830,...surface(theme),borderRadius:'28px 28px 0 0',padding:'28px 28px 48px',boxShadow:`0 -24px 70px ${rgba('#000',0.18)}`,transition:`transform .38s ${SPRING_SOFT}`,borderTop:theme.borders?`${theme.borderWidth}px solid ${theme.ink}`:`1px solid ${theme.line}`}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
          <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:20,color:theme.ink,letterSpacing:-0.4,flex:1}}>+ Carico magazzino</div>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:99,border:`1.4px solid ${rgba(theme.ink,0.2)}`,background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><IcoClose size={15} color={theme.ink}/></button>
        </div>

        {/* Segmented: Pieni / Pesati */}
        <div style={{display:'flex',gap:4,padding:4,borderRadius:14,background:rgba(theme.ink,0.07),marginBottom:20}}>
          {segBtn('pieni','📦  Barattoli pieni')}
          {segBtn('pesati','⚖️  Barattoli pesati')}
        </div>

        <div style={{fontFamily:'Nebulica',fontSize:11,letterSpacing:1.4,fontWeight:700,color:theme.sub,marginBottom:8}}>INCHIOSTRO</div>

          <div style={{display:'flex',alignItems:'center',gap:10,border:`1.4px solid ${theme.ink}`,borderRadius:12,padding:'10px 14px',marginBottom:20}}>

            <span style={{fontFamily:'Nebulica',color:theme.sub,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{inkInfo?.Nome_completo||''}</span>

            <select value={selCode} onChange={e=>setSelCode(e.target.value)} style={{...iStyle,paddingRight:32,appearance:'none',WebkitAppearance:'none'}}>
              <option value="">Seleziona inchiostro…</option>
              {allInchiostri.map(i=><option key={i.Codice} value={i.Codice}>{i.Codice}{i.Nome_completo?' — '+i.Nome_completo:''}</option>)}

        </>)}

        {/* Modalità PESATI */}
        {modo==='pesati' && (<>
          <div style={{fontFamily:'Nebulica',fontSize:11,letterSpacing:1.4,fontWeight:700,color:theme.sub,marginBottom:6}}>PESO LORDO BARATTOLI</div>
          <div style={{fontFamily:'Nebulica',fontSize:12,color:theme.faint,marginBottom:10}}>Tara sottratta automaticamente: {tare}g</div>
          {jars.map((val,i)=>{
            const l=parseFloat(String(val).replace(',','.'))||0;
            const netto=l>0?Math.max(0,l-tare):0;
            return (
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <div style={{flex:1,position:'relative'}}>
                  <input type="number" inputMode="decimal" placeholder={`Barattolo ${i+1} — peso lordo (g)`} value={val} onChange={e=>setJarVal(i,e.target.value)} style={{...iStyle,paddingRight:l>0?'90px':'14px'}}/>
                  {l>0&&<span style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',fontFamily:'Nebulica',fontWeight:700,fontSize:13,color:theme.accent,whiteSpace:'nowrap'}}>→ {netto.toFixed(0)}g</span>}
                </div>
                {jars.length>1&&<button onClick={()=>removeJar(i)} style={{width:34,height:34,borderRadius:99,border:`1.4px solid ${rgba(theme.ink,0.2)}`,background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><IcoClose size={13} color={theme.sub}/></button>}
              </div>
            );
          })}
          <button onClick={addJar} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'6px 16px',borderRadius:99,fontFamily:'Nebulica',fontWeight:700,fontSize:12,cursor:'pointer',border:`1.4px solid ${rgba(theme.ink,0.22)}`,background:'transparent',color:theme.sub,marginBottom:16}}>
            <IcoPlus size={14} color={theme.sub}/> Aggiungi barattolo
          </button>
        </>)}

        {/* Totale */}
        {totale>0&&<div style={{padding:'12px 16px',borderRadius:16,background:rgba(theme.accent,0.08),border:`1px solid ${rgba(theme.accent,0.2)}`,marginBottom:16}}>
          <span style={{fontFamily:'Nebulica',fontSize:14,color:theme.ink}}>Totale da aggiungere: </span>
          <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:22,color:theme.accent,letterSpacing:-0.5}}>{totale.toFixed(0)}</span>
          <span style={{fontFamily:'Nebulica',fontSize:13,color:theme.sub,marginLeft:4}}>g di {code||'?'}</span>
        </div>}

        <input placeholder="Note (opzionale)" value={note} onChange={e=>setNote(e.target.value)} style={{...iStyle,fontWeight:400,marginBottom:16}}/>
        <button onClick={save} disabled={!code||totale<=0||saving} style={{width:'100%',height:52,borderRadius:99,background:(!code||totale<=0||saving)?rgba(theme.ink,0.18):theme.ink,color:(!code||totale<=0||saving)?theme.faint:'#fff',border:'none',cursor:(!code||totale<=0||saving)?'default':'pointer',fontFamily:'Nebulica',fontWeight:700,fontSize:15,transition:'background .2s,color .2s'}}>
          {saving?'Salvataggio in corso…':`Aggiungi ${totale>0?totale.toFixed(0)+'g':''}${code?' di '+code:' al magazzino'}`}
        </button>
      </div>
    </>
  );
}

/* ═══════════════════ MESCOLA SHEET ═══════════════════ */
function MescolaSheet({open, pantone, recipe, qty, onClose, theme}) {
  const [note, setNote] = React.useState('');
  const [saving, setSaving] = React.useState(false);
  const [done, setDone] = React.useState(false);
  React.useEffect(()=>{if(open){setNote('');setSaving(false);setDone(false);}},[open]);
  if(!open||!pantone||!recipe) return null;
  const inks = recipe.inks.map(ink=>{
    const grammi=(ink.pct/100)*qty;
    const inv=allInventario.find(i=>i.inchiostro===ink.name);
    const disponibile=inv?inv.grammi:0;
    return {...ink,grammi,disponibile,ok:disponibile>=grammi};
  });
  const anyInsuf = inks.some(i=>!i.ok);
  const confirm = async()=>{
    setSaving(true);
    await postInventario({action:'registraMescola',pantone_id:pantone.code,qty,inks:inks.map(i=>({inchiostro:i.name,grammi:i.grammi})),note});
    setSaving(false);
    setDone(true);
    setTimeout(onClose,1400);
  };
  return (
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:820,background:rgba('#000',0.28),backdropFilter:'blur(6px)',WebkitBackdropFilter:'blur(6px)'}}/>
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:520,zIndex:830,...surface(theme),borderRadius:'28px 28px 0 0',padding:'28px 28px 48px',boxShadow:`0 -24px 70px ${rgba('#000',0.18)}`,borderTop:theme.borders?`${theme.borderWidth}px solid ${theme.ink}`:`1px solid ${theme.line}`}}>
        {done ? (
          <div style={{padding:'32px 0',textAlign:'center'}}>
            <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:22,color:theme.ink,marginBottom:8}}>✓ Mescola registrata</div>
            <div style={{fontFamily:'Nebulica',fontSize:13,color:theme.sub}}>Il magazzino è stato aggiornato</div>
          </div>
        ) : (
          <>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
              <div style={{flex:1}}>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:20,color:theme.ink,letterSpacing:-0.4}}>Conferma mescola</div>
                <div style={{fontFamily:'Nebulica',fontSize:12,color:theme.sub,marginTop:2}}>{pantone.code} · {qty}g totali</div>
              </div>
              <div style={{width:44,height:44,borderRadius:12,background:pantone.hex,flexShrink:0,boxShadow:`0 4px 14px ${rgba(pantone.hex,0.4)}`}}/>
              <button onClick={onClose} style={{width:36,height:36,borderRadius:99,border:`1.4px solid ${rgba(theme.ink,0.2)}`,background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><IcoClose size={15} color={theme.ink}/></button>
            </div>
            <div style={{fontFamily:'Nebulica',fontSize:11,letterSpacing:1.4,fontWeight:700,color:theme.sub,marginBottom:10}}>VERRÀ SCALATO DAL MAGAZZINO</div>
            {inks.map(ink=>(
              <div key={ink.name} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:`1px solid ${theme.line}`}}>
                <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,background:theme.ink,color:'#fff',padding:'4px 11px',borderRadius:99,flexShrink:0,minWidth:56,textAlign:'center'}}>{ink.name}</span>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'baseline',gap:4}}>
                    <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:18,color:theme.ink,letterSpacing:-0.4}}>{ink.grammi.toFixed(1)}</span>
                    <span style={{fontFamily:'Nebulica',fontSize:12,color:theme.faint}}>g usati</span>
                  </div>
                  <div style={{fontFamily:'Nebulica',fontSize:11,color:ink.ok?theme.faint:'#E4002B',marginTop:1}}>
                    {allInventario.length===0?'magazzino non caricato':ink.ok?`${ink.disponibile.toFixed(0)}g → ${(ink.disponibile-ink.grammi).toFixed(0)}g residui`:`⚠ Solo ${ink.disponibile.toFixed(0)}g disponibili`}
                  </div>
                </div>
                <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:15,color:ink.ok?theme.accent:'#E4002B',flexShrink:0}}>{ink.ok?'✓':'⚠'}</span>
              </div>
            ))}
            {anyInsuf&&<div style={{marginTop:10,padding:'9px 14px',borderRadius:12,background:rgba('#E4002B',0.06),border:`1px solid ${rgba('#E4002B',0.2)}`,fontFamily:'Nebulica',fontSize:12,color:'#E4002B'}}>Scorte insufficienti. Puoi comunque confermare.</div>}
            <input placeholder="Note (opzionale)" value={note} onChange={e=>setNote(e.target.value)} style={{width:'100%',fontFamily:'Nebulica',fontSize:14,color:theme.ink,background:'transparent',border:`1.4px solid ${rgba(theme.ink,0.22)}`,borderRadius:12,padding:'10px 14px',outline:'none',boxSizing:'border-box',marginTop:16,marginBottom:16}}/>
            <button onClick={confirm} disabled={saving} style={{width:'100%',height:52,borderRadius:99,background:saving?rgba(theme.ink,0.18):theme.ink,color:saving?theme.faint:'#fff',border:'none',cursor:saving?'default':'pointer',fontFamily:'Nebulica',fontWeight:700,fontSize:15,transition:'background .2s,color .2s'}}>
              {saving?'Salvataggio in corso…':'Conferma mescola →'}
            </button>
          </>
        )}
      </div>
    </>
  );
}

/* ═══════════════════ MAGAZZIN MODE ═══════════════════ */
function MagazzinMode({theme, mode, setMode, query, setQuery, onSettings, tare, alertThreshold}) {
  const [sortM, setSortM] = React.useState('az');
  const [filterM, setFilterM] = React.useState('tutti');
  const [caricaInk, setCaricaInk] = React.useState(null);
  const [caricaOpen, setCaricaOpen] = React.useState(false);
  const [scanOpen, setScanOpen] = React.useState(false);
  const [codiciOpen, setCodiciOpen] = React.useState(false);
  const [storicoOpen, setStoricoOpen] = React.useState(false);
  const openCarica = code=>{ setCaricaInk(code||null); setCaricaOpen(true); };
  const azzeraTutto = ()=>{ if(typeof confirm!=='undefined'&&!confirm('Azzerare TUTTO il magazzino (ogni inchiostro a 0 g)? Serve per rifare l\'inventario da capo. Lo storico resta.'))return; allInventario.forEach(i=>{i.grammi=0;}); postGAS({action:'azzeraMagazzino'}).catch(()=>{}); if(window._bumpData)window._bumpData(); };

  const inks = React.useMemo(()=>allInchiostri.map(ink=>{
    const code=ink.Codice||'';
    const inv=allInventario.find(i=>i.inchiostro===code);
    const grammi=inv?inv.grammi:0;
    const soglia=(inv&&inv.soglia!=null)?inv.soglia:alertThreshold;
    const status=grammi===0?'vuoto':grammi<soglia?'basso':'ok';
    const codici=allBarcodes.filter(b=>normInkCode(b.inchiostro)===normInkCode(code)).length;
    return {code,nome:ink.Nome_completo||code,tipo:ink.Tipologia||'',grammi,soglia,status,codici};
  }),[allInchiostri.length,allInventario.length,alertThreshold,allBarcodes.length]);

  // 1 barattolo = 1 kg → dai grammi deriva "N pieni + resto avviato"
  const jarsLabel=g=>{const interi=Math.floor(g/1000);const av=Math.round(g-interi*1000);if(interi>0&&av>0)return interi+' pieni + '+av+'g';if(interi>0)return interi+(interi===1?' pieno':' pieni');if(av>0)return av+'g avviato';return '—';};

  const filtered = React.useMemo(()=>{
    let list=[...inks];
    if(filterM==='basso') list=list.filter(i=>i.status!=='ok');
    else if(filterM==='in_mag') list=list.filter(i=>i.grammi>0);
    else if(filterM==='no_code') list=list.filter(i=>i.codici===0);
    if(query){const q=query.toLowerCase();list=list.filter(i=>i.code.toLowerCase().includes(q)||i.nome.toLowerCase().includes(q));}
    if(sortM==='az') list.sort((a,b)=>a.code.localeCompare(b.code,undefined,{numeric:true}));
    else if(sortM==='asc') list.sort((a,b)=>a.grammi-b.grammi);
    else if(sortM==='desc') list.sort((a,b)=>b.grammi-a.grammi);
    return list;
  },[inks,filterM,sortM,query]);
  const noCodeCnt=inks.filter(i=>i.codici===0).length;

  const maxG=Math.max(...inks.map(i=>i.grammi),1);
  const belowCnt=inks.filter(i=>i.status!=='ok').length;
  const totG=inks.reduce((s,i)=>s+i.grammi,0);
  const fmtG=g=>g>=1000?(g/1000).toFixed(2)+' kg':g.toFixed(0)+' g';
  React.useEffect(()=>{ loadInvDraft().then(()=>{ if(window._bumpData)window._bumpData(); }).catch(()=>{}); },[]);
  const invPaused=!scanOpen&&readInvSession();

  return (
    <div style={{width:'100%',height:'100%',position:'relative',display:'flex',flexDirection:'column'}}>
      <GrainBlobs theme={theme} blobHex={theme.accent}/>
      {/* Header */}
      <div style={{position:'relative',zIndex:20,height:88,display:'flex',alignItems:'center',padding:'0 28px',gap:16,flexShrink:0}}>
        <div style={{width:352,flexShrink:0,display:'flex',alignItems:'center'}}>
          <Logo theme={theme} onSettings={onSettings}/>
        </div>
        <div style={{width:600,flexShrink:0,display:'flex',alignItems:'center',gap:12}}>
          <div style={{flex:1}}><SearchPill value={query} onChange={setQuery} theme={theme} w="100%" placeholder="cerca inchiostro…"/></div>
          <button onClick={()=>setScanOpen(true)} style={{display:'inline-flex',alignItems:'center',gap:8,padding:'0 18px',height:44,borderRadius:99,fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:theme.ink,background:'transparent',border:`1.6px solid ${theme.ink}`,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>
            ⌨︎ Scansiona
          </button>
          <button onClick={()=>setCodiciOpen(true)} title="Vedi e correggi i codici a barre" style={{display:'inline-flex',alignItems:'center',gap:6,padding:'0 16px',height:44,borderRadius:99,fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:theme.sub,background:'transparent',border:`1.4px solid ${rgba(theme.ink,0.22)}`,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>
            ⌗ Codici
          </button>
          <button onClick={()=>setStoricoOpen(true)} title="Storico inventari per data" style={{display:'inline-flex',alignItems:'center',gap:6,padding:'0 16px',height:44,borderRadius:99,fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:theme.sub,background:'transparent',border:`1.4px solid ${rgba(theme.ink,0.22)}`,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>
            ⧗ Storico
          </button>
          <button onClick={()=>openCarica(null)} style={{display:'inline-flex',alignItems:'center',gap:8,padding:'0 22px',height:44,borderRadius:99,fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:'#fff',background:theme.ink,border:'none',cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>
            <IcoPlus size={16} color="#fff"/> Carico
          </button>
        </div>
        <div style={{flex:1}}/>
        <TransferBtn theme={theme}/>
        <ModeOrb mode={mode} onChange={setMode} theme={theme}/>
      </div>
      {/* Summary + controls */}
      <div style={{position:'relative',zIndex:10,padding:'0 28px 14px',display:'flex',alignItems:'center',gap:14,flexShrink:0,borderBottom:`1px solid ${theme.line}`}}>
        <div style={{display:'flex',gap:20,alignItems:'center'}}>
          <div><span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:22,color:theme.ink,letterSpacing:-0.5}}>{inks.filter(i=>i.grammi>0).length}</span><span style={{fontFamily:'Nebulica',fontSize:12,color:theme.sub,marginLeft:5}}>inchiostri in magazzino</span></div>
          <div><span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:22,color:theme.ink,letterSpacing:-0.5}}>{(totG/1000).toFixed(1)}</span><span style={{fontFamily:'Nebulica',fontSize:12,color:theme.sub,marginLeft:5}}>kg totali</span></div>
          {belowCnt>0&&<div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 14px',borderRadius:99,background:rgba('#E4002B',0.08),border:`1px solid ${rgba('#E4002B',0.2)}`}}><span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,color:'#E4002B'}}>⚠ {belowCnt} sotto soglia</span></div>}
          {noCodeCnt>0&&<div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 14px',borderRadius:99,background:rgba(theme.ink,0.05),border:`1px solid ${rgba(theme.ink,0.14)}`}}><span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,color:theme.sub}}>⌗ {noCodeCnt} senza codice</span></div>}
        </div>
        <div style={{flex:1}}/>
        {[['tutti','Tutti'],['in_mag','In magazzino'],['basso','Sotto soglia'],['no_code','Senza codice']].map(([k,l])=>(
          <button key={k} onClick={()=>setFilterM(k)} style={{padding:'4px 12px',borderRadius:99,fontFamily:'Nebulica',fontWeight:700,fontSize:11,cursor:'pointer',background:filterM===k?theme.ink:'transparent',color:filterM===k?'#fff':theme.sub,border:`1.4px solid ${filterM===k?theme.ink:rgba(theme.ink,0.22)}`,transition:'all .18s'}}>{l}</button>
        ))}
        {[['asc','↑ stock'],['desc','↓ stock'],['az','A–Z']].map(([k,l])=>(
          <button key={k} onClick={()=>setSortM(k)} style={{padding:'4px 12px',borderRadius:99,fontFamily:'Nebulica',fontWeight:700,fontSize:11,cursor:'pointer',background:sortM===k?theme.ink:'transparent',color:sortM===k?'#fff':theme.sub,border:`1.4px solid ${sortM===k?theme.ink:rgba(theme.ink,0.22)}`,transition:'all .18s'}}>{l}</button>
        ))}
        <div style={{width:1,height:18,background:theme.line}}/>
        <button onClick={azzeraTutto} title="Azzera tutto il magazzino (rifare l'inventario da capo)" style={{padding:'4px 12px',borderRadius:99,fontFamily:'Nebulica',fontWeight:700,fontSize:11,cursor:'pointer',background:'transparent',color:'#E4002B',border:`1.4px solid ${rgba('#E4002B',0.35)}`}}>⟲ Azzera</button>
      </div>
      {/* Ink list */}
      <div style={{position:'relative',zIndex:10,flex:1,overflowY:'auto',padding:'14px 28px 32px'}}>
        {invPaused&&(
          <div onClick={()=>setScanOpen(true)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderRadius:16,marginBottom:14,background:rgba(theme.accent,0.10),border:`1.5px solid ${rgba(theme.accent,0.35)}`,cursor:'pointer'}}>
            <span style={{fontSize:18}}>⏸</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:theme.ink}}>Inventario in corso — {invPaused.jars} barattoli, {invPaused.inks} inchiostri</div>
              <div style={{fontFamily:'Nebulica',fontSize:12,color:theme.sub,marginTop:1}}>In pausa, non ancora salvato. Tocca per riprendere.</div>
            </div>
            <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:13,color:'#fff',background:theme.accent,padding:'8px 16px',borderRadius:99,flexShrink:0}}>Riprendi →</span>
          </div>
        )}
        {allInventario.length===0&&allInchiostri.length>0&&(
          <div style={{padding:'16px',borderRadius:16,background:rgba(theme.accent,0.07),border:`1px solid ${rgba(theme.accent,0.2)}`,marginBottom:16,fontFamily:'Nebulica',fontSize:13,color:theme.sub}}>
            💡 Nessun dato in magazzino. Aggiorna prima il <strong style={{color:theme.ink}}>Code.gs</strong> di Apps Script, poi usa <strong style={{color:theme.ink}}>+ Carico</strong> per registrare le scorte.
          </div>
        )}
        {filtered.map(ink=>{
          const pct=(ink.grammi/maxG)*100;
          const sc=ink.status==='vuoto'?'#E4002B':ink.status==='basso'?'#FF8C00':theme.accent;
          const isAlert=ink.status!=='ok';
          return (
            <div key={ink.code} style={{display:'flex',alignItems:'center',gap:14,padding:'11px 16px',marginBottom:6,borderRadius:16,background:isAlert?rgba(sc,0.05):'transparent',border:`1px solid ${isAlert?rgba(sc,0.22):theme.line}`,transition:'background .2s'}}>
              <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,background:theme.ink,color:'#fff',padding:'5px 11px',borderRadius:99,whiteSpace:'nowrap',flexShrink:0,minWidth:54,textAlign:'center'}}>{ink.code}</div>
              <div style={{flex:'0 0 200px',minWidth:0}}>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:theme.ink,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ink.nome}</div>
                {ink.tipo&&<div style={{fontFamily:'Nebulica',fontSize:11,color:theme.faint,marginTop:1}}>{ink.tipo}</div>}
              </div>
              {(()=>{const n=ink.codici,col=n===0?'#E4002B':n>=2?'#1F8A5B':theme.sub,bgc=n===0?rgba('#E4002B',0.08):n>=2?rgba('#1F8A5B',0.10):rgba(theme.ink,0.05);
                return <div title={n===0?'Nessun codice a barre mappato':n+' codice/i mappati'} style={{flexShrink:0,minWidth:46,textAlign:'center',fontFamily:'Nebulica',fontWeight:700,fontSize:12,color:col,background:bgc,border:`1px solid ${n===0?rgba('#E4002B',0.2):n>=2?rgba('#1F8A5B',0.25):theme.line}`,borderRadius:99,padding:'4px 10px'}}>⌗ {n}</div>;})()}
              <div style={{flex:1,height:7,borderRadius:99,background:theme.line,overflow:'hidden'}}>
                <div style={{width:`${pct}%`,height:'100%',background:isAlert?sc:theme.accent,borderRadius:99,transition:'width .5s'}}/>
              </div>
              <div style={{textAlign:'right',flexShrink:0,minWidth:120}}>
                <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:20,color:isAlert?sc:theme.ink,letterSpacing:-0.5}}>{fmtG(ink.grammi)}</span>
                <div style={{fontFamily:'Nebulica',fontSize:10,color:theme.faint,marginTop:1}}>{ink.grammi>0?jarsLabel(ink.grammi):'soglia '+fmtG(ink.soglia)}</div>
              </div>
              <span style={{fontSize:16,flexShrink:0}}>{ink.status==='vuoto'?'🔴':ink.status==='basso'?'⚠️':'✓'}</span>
              <button onClick={()=>openCarica(ink.code)} style={{flexShrink:0,padding:'7px 16px',borderRadius:99,fontFamily:'Nebulica',fontWeight:700,fontSize:12,cursor:'pointer',background:theme.ink,color:'#fff',border:'none',whiteSpace:'nowrap'}}>+ Carico</button>
            </div>
          );
        })}
        {filtered.length===0&&<div style={{padding:'48px 0',textAlign:'center',fontFamily:'Nebulica',color:theme.faint,fontSize:14}}>{filterM!=='tutti'||query?'Nessun inchiostro corrisponde al filtro.':'Il foglio Inchiostri è vuoto o non ancora caricato.'}</div>}
      </div>
      <CaricaSheet open={caricaOpen} inkCode={caricaInk} onClose={()=>setCaricaOpen(false)} theme={theme} tare={tare}/>
      <ScannerOverlay open={scanOpen} accent={theme.accent} tare={tare} onClose={()=>setScanOpen(false)} onPick={code=>{ setScanOpen(false); openCarica(code); }}/>
      <CodiciManager open={codiciOpen} accent={theme.accent} onClose={()=>setCodiciOpen(false)}/>
      <StoricoManager open={storicoOpen} accent={theme.accent} onClose={()=>setStoricoOpen(false)}/>
    </div>
  );
}

const DESK_DEFAULTS = {

function DesktopApp({defaults}) {
  const [settings, setSettings] = React.useState(()=>({...defaults}));
  React.useEffect(()=>setSettings(s=>({...s,...defaults})),[
    defaults.theme,defaults.accent,defaults.display,defaults.grain,defaults.borders,
    defaults.borderWidth,defaults.cardSurface,defaults.blobShape,defaults.blobSpeed,
    defaults.blobAnim,defaults.modeTransition]);
  const setSetting = (k,v)=>setSettings(s=>({...s,[k]:v}));
  const theme = React.useMemo(()=>deriveTheme(settings),[settings.theme,settings.accent,settings.display,settings.grain,settings.borders,settings.borderWidth,settings.cardSurface,settings.btnStyle,settings.blobShape,settings.blobSpeed,settings.blobAnim,settings.bgTone,settings.colorGlow,settings.menuStart,settings.stockCheck,settings.qty40]);
  const [mode, setMode] = React.useState('master');
  const [query, setQuery] = React.useState('');
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const [nuovaOpen, setNuovaOpen] = React.useState(false);
  const [editCode, setEditCode] = React.useState(null);
  ensureModeKf();
  const ORDER=['master','wallet','gallery','magazzino'];
  const dirRef = React.useRef(1);
  const changeMode = m=>{if(m===mode)return; dirRef.current=ORDER.indexOf(m)>=ORDER.indexOf(mode)?1:-1; setMode(m);};
  const chrome = {theme, mode, setMode:changeMode, query, setQuery, onSettings:()=>setSettingsOpen(true), onNuova:()=>setNuovaOpen(true), onEdit:(code)=>setEditCode(code)};
  let Body = null;
  if(mode==='master') Body=<MasterMode {...chrome} anim={settings.masterAnim||'rise'} cardEnter={settings.cardEnter||'deck'}/>;
  if(mode==='wallet') Body=<WalletMode {...chrome}/>;
  if(mode==='gallery') Body=<GalleryMode {...chrome} formulaAnim="slide"/>;
  if(mode==='magazzino') Body=<MagazzinMode {...chrome} tare={settings.tare??107} alertThreshold={settings.alertThreshold??1000}/>;
  if(mode==='palette') Body=<PaletteModeDesktop {...chrome}/>;
  const trans = settings.modeTransition||'liquido';
  const animName = trans==='dissolvenza'?'modeFade':(trans==='scorrimento'?(dirRef.current>0?'modeSlideR':'modeSlideL'):'modeLiquid');
  return (
    <div style={{width:'100%',height:'100%',position:'relative',overflow:'hidden',background:theme.bg,fontFamily:'Nebulica,system-ui,sans-serif'}}>
      <div key={mode} style={{width:'100%',height:'100%',animation:`${animName} .52s ${FLUID_SOFT} both`}}>
        {Body}
      </div>
      {theme.menuStart==='aperto' && (
        <div style={{position:'absolute',top:22,right:28,zIndex:80,display:'flex',gap:10,alignItems:'center'}}>
          <TransferBtn theme={theme} overlay/>
          <LiquidPillDock items={modeDockItems(theme)} current={mode} onNavigate={changeMode} idleColor={theme.sub}/>
        </div>
      )}
      <SettingsPanel open={settingsOpen} onClose={()=>setSettingsOpen(false)} settings={settings} setSetting={setSetting} theme={theme}/>
      <NuovaDesktop open={nuovaOpen} onClose={()=>setNuovaOpen(false)} theme={theme}/>
      <EditSheet open={!!editCode} editCode={editCode} onClose={()=>setEditCode(null)} theme={theme}/>
    </div>
  );
}
function ensureModeKf() {
  if(document.getElementById('mode-kf')) return;

}

/* ═══════════════════ MOBILE: WALLET PROTO EXTRACT (V38) ═══════════════════ */
function WalletProtoExtract({
  liftTop=192, detailTop=118, detailHeight=592, liftScale=1.05,
  headerH=150, pillBorders=true, bg='#F4EFE2',
  accent='#0033FF', borderWidth=1.5, grain=true, blobAnim=true,
  blobShape='morbide', blobSpeed=1, onSettings, onNuova, onEdit, cardStyle='unified',
  activeTab='ricette', onTabChange,
}) {
  ensureBlobKeyframesV2();
  const [query, setQuery] = React.useState('');
  const [searchActive, setSearchActive] = React.useState(false);
  const [filterFamily, setFilterFamily] = React.useState('tutti');
  const [filterAttr, setFilterAttr] = React.useState('tutti');
  const [filterOpen, setFilterOpen] = React.useState(false);
  const [soloPreferiti, setSoloPref] = React.useState(false);
  const [sortMode, setSortMode] = React.useState('default');
  const searchInputRef = React.useRef(null);
  const allList = DESK_PANTONES;
  const favSize = favoritiSet.size;
  const list = React.useMemo(()=>applyFilterSort(allList.filter(p=>{
    const matchFamily = filterFamily==='tutti'||p.family===filterFamily;
    const matchAttr = matchColorAttr(p.hex, filterAttr);
    const matchQuery = !query||`${p.code} ${p.name} ${p.family||''}`.toLowerCase().includes(query.toLowerCase());
    return matchFamily&&matchAttr&&matchQuery;
  }), {onlyFav:soloPreferiti, sort:sortMode}),[allList, filterFamily, filterAttr, query, soloPreferiti, sortMode, favSize]);
  const [selectedIdx, setSelectedIdx] = React.useState(null);
  const [phase, setPhase] = React.useState('closed');
  const [scrollY, setScrollY] = React.useState(0);
  const [dragging, setDragging] = React.useState(false);
  const [bump, setBump] = React.useState(0);
  const [bumpDir, setBumpDir] = React.useState('open');
  const prevDetail = React.useRef(false);
  const drag = React.useRef({active:false,startY:0,startScroll:0,moved:false,id:null,lastY:0,lastT:0,velPxMs:0});
  const inertia = React.useRef({raf:null,vel:0,lastT:0,maxS:0});
  const areaRef = React.useRef(null);
  const timer = React.useRef(null);
  const scrollRef = React.useRef(0);
  const cardRefs = React.useRef({});
  const ACTIVE_H=178, L_TOP=170, STEP=108;
  const H = Math.max(400, window.innerHeight-L_TOP);
  const maxScroll = Math.max(0,(list.length-1)*STEP+ACTIVE_H-H);
  const isDetail = selectedIdx!==null;
  const selected = isDetail?list[selectedIdx]:null;
  const recipeVisible = phase==='open';
  React.useEffect(()=>()=>{clearTimeout(timer.current);if(inertia.current.raf)cancelAnimationFrame(inertia.current.raf);},[]);
  React.useEffect(()=>{
    if(prevDetail.current!==isDetail){setBumpDir(isDetail?'open':'close');setBump(b=>b+1);prevDetail.current=isDetail;}
  },[isDetail]);
  React.useEffect(()=>{ scrollRef.current=scrollY; },[scrollY]);
  const applyScrollDirect = sy=>{
    const visMax=H+ACTIVE_H*2;
    list.forEach((_,i)=>{
      const el=cardRefs.current[i]; if(!el) return;
      const s=i*STEP-sy;
      if(s>visMax) return;
      el.style.top=(s>=0?L_TOP+s:L_TOP)+'px';
    });
  };
  const openCard = i=>{
    if(phase!=='closed') return;
    setSelectedIdx(i); setPhase('lifting'); clearTimeout(timer.current);
    timer.current=setTimeout(()=>setPhase('open'),340);
  };
  const onBack = ()=>{
    if(phase!=='open') return;
    setPhase('closing'); clearTimeout(timer.current);
    timer.current=setTimeout(()=>{setPhase('closed');setSelectedIdx(null);},320);
  };
  const onAreaDown = e=>{
    if(phase!=='closed') return;
    if(inertia.current.raf){cancelAnimationFrame(inertia.current.raf);inertia.current.raf=null;}
    const rect=areaRef.current.getBoundingClientRect();
    const now=performance.now();
    drag.current={active:true,startY:e.clientY,startScroll:scrollRef.current,moved:false,id:e.pointerId,downLocalY:e.clientY-rect.top,lastY:e.clientY,lastT:now,velPxMs:0};
    try{e.currentTarget.setPointerCapture(e.pointerId);}catch(_){}
    setDragging(true);
  };
  const onAreaMove = e=>{
    if(!drag.current.active) return;
    const dy=e.clientY-drag.current.startY;
    if(Math.abs(dy)>5) drag.current.moved=true;
    const now=performance.now();
    const dt=now-drag.current.lastT;
    if(dt>0){const inst=(e.clientY-drag.current.lastY)/dt;drag.current.velPxMs=drag.current.velPxMs*0.6+inst*0.4;}
    drag.current.lastY=e.clientY; drag.current.lastT=now;
    const newSY=Math.max(0,Math.min(maxScroll,drag.current.startScroll-dy));
    scrollRef.current=newSY;
    applyScrollDirect(newSY);
  };
  const onAreaUp = e=>{
    if(!drag.current.active) return;
    drag.current.active=false; setDragging(false);
    if(!drag.current.moved){
      const el=document.elementFromPoint(e.clientX,e.clientY);
      const card=el&&el.closest('[data-cardidx]');
      if(card) openCard(parseInt(card.getAttribute('data-cardidx'),10));
    } else {
      const vel=drag.current.velPxMs;
      if(Math.abs(vel)>0.08){
        const ref=inertia.current;
        ref.vel=-vel;
        ref.lastT=performance.now();
        ref.maxS=maxScroll;
        const step=now=>{
          const dt=Math.min(now-ref.lastT,32); ref.lastT=now;
          ref.vel*=Math.pow(0.97,dt/16.67);
          if(Math.abs(ref.vel)<0.005){ref.raf=null;setScrollY(scrollRef.current);return;}
          const next=scrollRef.current+ref.vel*dt;
          const clamped=Math.max(0,Math.min(ref.maxS,next));
          if(clamped!==next) ref.vel=0;
          scrollRef.current=clamped;
          applyScrollDirect(clamped);
          ref.raf=requestAnimationFrame(step);
        };
        ref.raf=requestAnimationFrame(step);
      } else {
        setScrollY(scrollRef.current);
      }
    }
  };
  let dur,ease;
  if(phase==='lifting'){dur=340;ease=EASE_OPEN_SNAPPY;}
  else if(phase==='open'){dur=480;ease=EASE_OPEN_SPRING;}
  else if(phase==='closing'){dur=300;ease=EASE_CLOSE_QUICK;}
  else{dur=360;ease=EASE_CLOSE_CALM;}
  const layoutClosed = i=>{
    const s=i*STEP-scrollRef.current;
    if(s>=0) return {top:L_TOP+s,height:ACTIVE_H,scale:1,opacity:1,z:300+i};
    return {top:L_TOP,height:ACTIVE_H,scale:1,opacity:1,z:100+i};
  };
  const posFor = i=>{
    const isSel=i===selectedIdx;
    if(phase==='closed') return layoutClosed(i);
    if(isSel){
      if(phase==='open'){
        if(cardStyle==='split') return {top:118,height:170,opacity:1,z:999,scale:1};
        return {top:detailTop,height:walletOpenHeight(list[i],headerH),opacity:1,z:999,scale:1};
      }
      return {top:liftTop,height:ACTIVE_H,opacity:1,z:999,scale:liftScale};
    }
    return {top:760,height:ACTIVE_H,opacity:0,z:1,scale:0.96};
  };
  return (
    <div style={{width:'100%',height:'100%',background:bg,position:'relative',overflow:'hidden',fontFamily:'Nebulica,system-ui,sans-serif',WebkitFontSmoothing:'antialiased'}}>
      {(() => {
        const blobSizes = {morbide:{s:380,b:70,o:0.55},tonde:{s:260,b:40,o:0.65},ampie:{s:560,b:110,o:0.40},nessuna:{s:0,b:0,o:0}};
        const bs = blobSizes[blobShape]||blobSizes.morbide;
        const sp = Math.max(0.25,blobSpeed||1);
        const d1=(14/sp).toFixed(1), d2=(18/sp).toFixed(1);
        const showBlob = blobAnim && blobShape!=='nessuna' && selected;
        return (
          <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:0,opacity:recipeVisible&&showBlob?1:0,transition:'opacity .45s'}}>
            {showBlob&&<React.Fragment>
              <div style={{position:'absolute',top:'15%',left:'-25%',width:bs.s,height:bs.s,borderRadius:'50%',background:selected.hex,filter:`blur(${bs.b}px)`,opacity:bs.o,animation:`wp2blob1 ${d1}s ease-in-out infinite`}}/>
              <div style={{position:'absolute',bottom:'-10%',right:'-20%',width:Math.round(bs.s*0.94),height:Math.round(bs.s*0.94),borderRadius:'50%',background:selected.hex,filter:`blur(${bs.b}px)`,opacity:bs.o+0.1,animation:`wp2blob2 ${d2}s ease-in-out infinite`}}/>
            </React.Fragment>}
          </div>
        );
      })()}
      {grain&&<svg style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:0.1,mixBlendMode:'multiply',pointerEvents:'none',zIndex:1}}>
        <filter id="wpx-grain"><feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" stitchTiles="stitch"/><feColorMatrix values="0 0 0 0 0.35 0 0 0 0 0.3 0 0 0 0 0.25 0 0 0 0.4 0"/></filter>
        <rect width="100%" height="100%" filter="url(#wpx-grain)"/>
      </svg>}
      {/* TITLE — solo nella vista Ricette */}
      {activeTab==='ricette'&&<div style={{position:'absolute',top:'calc(env(safe-area-inset-top, 44px) + 2px)',left:18,right:18,zIndex:5,opacity:isDetail?0:1,transform:isDetail?'translateY(-6px)':'none',transition:'opacity .26s, transform .26s',pointerEvents:'none'}}>
        <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:26,lineHeight:0.95,letterSpacing:-0.8,color:'#0B0B0B'}}>Ricettario</div>
        <div style={{fontFamily:'Nebulica',fontSize:10,letterSpacing:1.4,fontWeight:700,color:'rgba(0,0,0,0.5)',marginTop:3}}>{list.length} PANTONE · SICO</div>
      </div>}
      {/* TOP BAR — solo nella vista Ricette (impostazioni/ricerca/filtro non c'entrano col Magazzino) */}
      {activeTab==='ricette'&&<div style={{position:'absolute',top:'calc(env(safe-area-inset-top, 44px) + 48px)',left:18,right:18,zIndex:1000,height:40}}>
        {onSettings&&(
          <div onClick={onSettings} style={{position:'absolute',left:0,top:0,width:40,height:40,borderRadius:99,background:bg,border:pillBorders?`${borderWidth}px solid #0B0B0B`:'1px solid rgba(0,0,0,0.08)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',zIndex:2,opacity:isDetail?0:1,pointerEvents:isDetail?'none':'auto',transition:'opacity .22s ease'}}>
            <IcoTune color="#0B0B0B"/>
          </div>
        )}
        <div onClick={isDetail?onBack:()=>{setSearchActive(true);setTimeout(()=>searchInputRef.current&&searchInputRef.current.focus(),60);}} style={{position:'absolute',left:isDetail?0:(onSettings?46:0),top:0,height:40,width:isDetail?124:(onSettings?'calc(100% - 92px)':'calc(100% - 50px)'),borderRadius:99,overflow:'hidden',background:bg,border:pillBorders?`${borderWidth}px solid #0B0B0B`:'1px solid rgba(0,0,0,0.08)',cursor:'pointer',pointerEvents:(isDetail?recipeVisible:true)?'auto':'none',transition:'width .54s cubic-bezier(.34,1.56,.55,1), left .54s cubic-bezier(.34,1.56,.55,1)',zIndex:2}}>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',gap:8,padding:'0 10px 0 14px',whiteSpace:'nowrap',pointerEvents:'none',opacity:isDetail?0:1,transition:isDetail?'opacity .12s ease':'opacity .28s ease .12s'}}>

            {searchActive?
              <input ref={searchInputRef} value={query} onChange={e=>setQuery(e.target.value)} onBlur={()=>{if(!query)setSearchActive(false);}} style={{flex:1,background:'transparent',border:'none',outline:'none',fontFamily:'Nebulica',fontSize:14,color:'#0B0B0B',pointerEvents:'auto'}} placeholder="cerca pantone…"/>
              :<span style={{flex:1,fontFamily:'Nebulica',fontSize:14,color:'rgba(0,0,0,0.4)',overflow:'hidden'}}>{query||'cerca pantone…'}</span>
            }
            {query&&<button onPointerDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();setQuery('');setSearchActive(false);}} style={{width:20,height:20,borderRadius:99,border:'none',background:'rgba(0,0,0,0.12)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,pointerEvents:'auto',marginRight:2}}>

const BEEP_TONES = {
  ok:    [{ freq: 987.77, start: 0, dur: 0.08, vol: 0.34 }, { freq: 1318.51, start: 0.07, dur: 0.13, vol: 0.34 }],
  warn:  [{ freq: 740, start: 0, dur: 0.11, vol: 0.32 }, { freq: 740, start: 0.15, dur: 0.14, vol: 0.32 }],

function buildBeepWav(tones){

    for(const seg of tones){ const lt=t-seg.start; if(lt<0||lt>=seg.dur) continue;
      const phase=2*Math.PI*seg.freq*lt; const wave=seg.shape==='square'?(Math.sin(phase)>=0?1:-1):Math.sin(phase);

  dv.setUint16(20,1,true);dv.setUint16(22,1,true);dv.setUint32(24,sr,true);dv.setUint32(28,sr*2,true);
  dv.setUint16(32,2,true);dv.setUint16(34,16,true);ws(36,'data');dv.setUint32(40,samples.length*2,true);

(function(){ let unlocked=false; const unlock=()=>{ if(unlocked)return; unlocked=true;

function useHidScanner({enabled,onScan}){
  const onScanRef=React.useRef(onScan); onScanRef.current=onScan;
  React.useEffect(()=>{ if(!enabled)return; let buf=''; let timer=null;
    const onKey=(e)=>{ const t=e.target; if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;
      if(e.key==='Enter'){ if(buf.length>=3) onScanRef.current(buf); buf=''; if(timer)clearTimeout(timer); return; }
      if(e.key.length===1){ buf+=e.key; if(timer)clearTimeout(timer); timer=setTimeout(()=>{buf='';},150); } };

    return ()=>{ document.removeEventListener('keydown',onKey); if(timer)clearTimeout(timer); };
