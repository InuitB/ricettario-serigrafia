async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const rows = json.table.rows;
  const cols = json.table.cols.map(c => (c.label || '').trim());
  if (!rows || rows.length === 0) return [];
  return rows.map(r => {
    const obj = {};
    cols.forEach((c, i) => {
      const val = r.c && r.c[i] ? (r.c[i].v !== null && r.c[i].v !== undefined ? String(r.c[i].v).trim() : '') : '';
      obj[c] = val;
    });
    return obj;
  }).filter(r => Object.values(r).some(v => v !== ''));
}

    return { code, hex, name, family, ink, page, copertura };
  });
}

function hashStr(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return Math.abs(h);
}

function textOnDesk(hex) {
  const h = (hex||'').replace('#','');

  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return (0.299*r + 0.587*g + 0.114*b)/255 > 0.62 ? '#0B0B0B' : '#fff';
}
const textOn4 = textOnDesk;
function rgba(hex, a) {
  let h = (hex||'').replace('#','');
  if (h.length === 3) h = h.split('').map(c=>c+c).join('');
  if (h.length < 6) return `rgba(0,0,0,${a})`;
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

function hexToHue(hex) {
  const h = (hex||'').replace('#','').padStart(6,'0');
  const r = parseInt(h.slice(0,2),16)/255, g = parseInt(h.slice(2,4),16)/255, b = parseInt(h.slice(4,6),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max-min;
  if (d === 0) return 0;
  let hue = max===r ? (g-b)/d%6 : max===g ? (b-r)/d+2 : (r-g)/d+4;
  return ((hue*60)+360)%360;
}

function applyFilterSort(list, {onlyFav=false, sort='default'}={}) {
  let result = onlyFav ? list.filter(p=>favoritiSet.has(p.code)) : list.slice();
  if (sort==='copertura_desc') result.sort((a,b)=>coverLvl(b.copertura)-coverLvl(a.copertura));
  else if (sort==='copertura_asc') result.sort((a,b)=>coverLvl(a.copertura)-coverLvl(b.copertura));
  else if (sort==='hue')    result.sort((a,b)=>hexToHue(a.hex)-hexToHue(b.hex));
  else if (sort==='codice') result.sort((a,b)=>a.code.localeCompare(b.code,undefined,{numeric:true}));
  return result;
}

function makeRecipeFallback(p) {
  const note = NOTES[p.code] || null;
  if (p.code === '699 U') return { inks:[{name:'AS 90',label:'Base bianca',pct:75},{name:'AS 65',label:'Giallo',pct:6.25},{name:'AS 150',label:'Magenta',pct:18.75}], project:'Risanamento 23', note };
  const h = hashStr(p.code);
  const n = Math.max(1, Math.min(p.ink||2, 4));
  const light = textOnDesk(p.hex) === '#0B0B0B';
  const idxs = [];
  if (light) idxs.push(0);
  let cursor = 1 + (h % 6);
  while (idxs.length < n) { const i = cursor % INK_POOL.length; if (!idxs.includes(i)) idxs.push(i); cursor += 1 + ((h >> idxs.length) % 4); }
  let weights = idxs.map((_,k) => { const seed = (h >> (k*3)) % 100; return k===0 ? (light ? 55+(seed%30) : 40+(seed%30)) : 6+(seed%26); });
  const sum = weights.reduce((a,b)=>a+b,0);
  let pcts = weights.map(w => Math.round((w/sum)*10000)/100);
  const diff = Math.round((100-pcts.reduce((a,b)=>a+b,0))*100)/100;
  pcts[pcts.length-1] = Math.round((pcts[pcts.length-1]+diff)*100)/100;
  const inks = idxs.map((i,k)=>({name:INK_POOL[i].name,label:INK_POOL[i].label,pct:pcts[k]})).sort((a,b)=>b.pct-a.pct);
  return { inks, project:PROJECTS[h % PROJECTS.length], note };
}

function makeRecipe(p) {
  if (!p) return makeRecipeFallback({code:'?',hex:'#888',ink:2});
  const code = typeof p === 'string' ? p : p.code;
  const pantone = typeof p === 'string' ? (DESK_PANTONES.find(x=>x.code===p)||{code,hex:'#888',ink:2}) : p;
  const comps = allComponenti.filter(c => c.Pantone_ID === code);
  if (comps.length === 0) return makeRecipeFallback(pantone);
  const r = allRicette.find(x => x.Pantone_ID === code);
  const note = (r && r.Note) ? r.Note : (NOTES[code]||null);
  const project = (r && r.Progetti) ? r.Progetti : PROJECTS[hashStr(code) % PROJECTS.length];
  const totalBase = comps.reduce((s,c) => s+(parseFloat(c['Dose_40g (g)'])||0), 0);
  const inks = comps.map(c => {
    const dose = parseFloat(c['Dose_40g (g)'])||0;
    const pct = totalBase > 0 ? Math.round((dose/totalBase)*10000)/100 : 0;
    return {name:c.Inchiostro, label:c.Inchiostro, pct};
  }).sort((a,b)=>b.pct-a.pct);
  return {inks, project, note};
}

function sortInkFormula(inks, key='pct_desc') {
  const s=[...inks];
  if(key==='pct_asc') return s.sort((a,b)=>a.pct-b.pct);
  if(key==='name_asc') return s.sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
  if(key==='name_desc') return s.sort((a,b)=>b.name.localeCompare(a.name,undefined,{numeric:true}));
  return s.sort((a,b)=>b.pct-a.pct);
}
function aggregateInks(codes, qty=100) {
  const map={};
  codes.forEach(code=>{
    const p=DESK_PANTONES.find(x=>x.code===code); if(!p) return;
    const r=makeRecipe(p);
    r.inks.forEach(ink=>{
      if(!map[ink.name]) map[ink.name]={count:0,grams:0};
      map[ink.name].count++;
      map[ink.name].grams+=(ink.pct/100)*qty;
    });
  });
  return Object.entries(map).map(([name,d])=>({name,...d})).sort((a,b)=>b.grams-a.grams);
}

function stampaPDF(pantone, recipe, qty) {
  if (!window.jspdf) { alert('jsPDF non disponibile'); return; }
  const { jsPDF } = window.jspdf;
  const W = 57, H = 25;
  const doc = new jsPDF({ unit:'mm', format:[W, H] });
  const hex = (pantone.hex||'#888888').replace('#','');
  const cr = parseInt(hex.slice(0,2),16)||0, cg = parseInt(hex.slice(2,4),16)||0, cb = parseInt(hex.slice(4,6),16)||0;
  // border
  doc.setDrawColor(0,0,0); doc.setLineWidth(0.35);
  doc.roundedRect(0.8, 0.8, W-1.6, H-1.6, 2, 2, 'S');
  // color swatch top-right
  doc.setFillColor(cr,cg,cb); doc.roundedRect(W-14.5, 1.8, 12, 10, 1.2, 1.2, 'F');
  doc.setDrawColor(180,180,180); doc.setLineWidth(0.15);
  doc.roundedRect(W-14.5, 1.8, 12, 10, 1.2, 1.2, 'S');
  // pantone code
  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(0,0,0);
  doc.text(pantone.code, 3, 8.5);
  // name
  doc.setFont('helvetica','normal'); doc.setFontSize(5.8); doc.setTextColor(90,90,90);
  doc.text(pantone.name||'', 3, 12.5);
  // separator
  doc.setDrawColor(200,200,200); doc.setLineWidth(0.15);
  doc.line(3, 14, W-3, 14);
  // ink bars
  const barMaxW = W-6, barH = 1.7, startY = 15.4;
  recipe.inks.slice(0, 4).forEach((ink, i) => {
    const y = startY + i * 2.3;
    if (y + barH > H - 1.2) return;
    const filledW = Math.max(0.8, (ink.pct/100)*barMaxW);
    doc.setFillColor(225,225,225); doc.roundedRect(3, y, barMaxW, barH, 0.5, 0.5, 'F');
    doc.setFillColor(cr,cg,cb); doc.roundedRect(3, y, filledW, barH, 0.5, 0.5, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(4.2); doc.setTextColor(30,30,30);
    doc.text(ink.name, 3.8, y+1.2);
    const grams = ((ink.pct/100)*qty).toFixed(1);
    doc.setFont('helvetica','normal'); doc.setFontSize(4.2);
    doc.text(`${grams}g`, W-3.2, y+1.2, {align:'right'});
  });
  // total
  doc.setFont('helvetica','bold'); doc.setFontSize(5); doc.setTextColor(0,0,0);
  doc.text(`Σ ${qty} g`, W-3.2, H-1.8, {align:'right'});
  doc.save(`etichetta_${pantone.code.replace(/ /g,'_')}.pdf`);
}

function glass(theme, {active=false, accent=false, strong=false}={}) {

function guessFamily(hexStr) {
  const h = hexStr.replace('#','');
  if (h.length < 6) return '';
  const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  const rf=r/255, gf=g/255, bf=b/255;
  const max=Math.max(rf,gf,bf), min=Math.min(rf,gf,bf), l=(max+min)/2;
  if (max===min) { return l<0.18?'nero':l>0.86?'bianco':'neutro'; }
  const d=max-min, s=l>0.5?d/(2-max-min):d/(max+min);
  let hue=0;
  if(max===rf) hue=((gf-bf)/d+(gf<bf?6:0));
  else if(max===gf) hue=(bf-rf)/d+2;
  else hue=(rf-gf)/d+4;
  hue=hue/6*360;
  if (s<0.13) { return l<0.18?'nero':l>0.86?'bianco':l<0.5&&hue>28&&hue<65?'beige':'neutro'; }
  if (hue<18||hue>=345) return 'rosso';
  if (hue<40) return 'arancio';
  if (hue<65) return 'giallo';
  if (hue<150) return 'verde';
  if (hue<195) return 'azzurro';
  if (hue<260) return 'blu';
  if (hue<290) return 'viola';
  if (hue<325) return 'rosa';
  return 'rosso';
}

function InkSearchField({value, onChange, options, style, onConfirm}) {
  const [q, setQ] = React.useState(value||'');
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(()=>{ setQ(value||''); },[value]);
  React.useEffect(()=>{
    if(!open) return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target)){setOpen(false);setQ(value||'');}};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[open,value]);
  const lq=q.toLowerCase();
  const filtered=options.filter(o=>!lq||o.code.toLowerCase().includes(lq)||(o.name&&o.name.toLowerCase().includes(lq)));
  const pick=o=>{onChange(o.code);setQ(o.code);setOpen(false);onConfirm?.();};
  const onKeyDown=e=>{
    if(e.key==='Enter'){
      e.preventDefault();
      if(open&&filtered.length>0){pick(filtered[0]);}
      else{setOpen(false);onConfirm?.();}
    } else if(e.key==='Escape'){setOpen(false);setQ(value||'');}
  };
  return (
    <div ref={ref} style={{position:'relative',flex:2,minWidth:0}}>
      <input value={q} onChange={e=>{setQ(e.target.value);setOpen(true);if(!e.target.value)onChange('');}}
        onFocus={()=>setOpen(true)} onKeyDown={onKeyDown} placeholder="Cerca inchiostro…" autoComplete="off" style={{...style,width:'100%'}}/>
      {open&&(
        <div style={{position:'absolute',top:'calc(100% + 3px)',left:0,right:0,zIndex:1200,background:'#fff',border:'1px solid rgba(0,0,0,0.10)',borderRadius:12,boxShadow:'0 8px 28px rgba(0,0,0,0.16)',maxHeight:190,overflowY:'auto'}}>
          {filtered.length===0&&<div style={{padding:'10px 14px',fontFamily:'Nebulica',fontSize:13,color:'rgba(0,0,0,0.38)'}}>Nessun risultato</div>}
          {filtered.map(o=>(
            <div key={o.code} onMouseDown={e=>{e.preventDefault();pick(o);}}
              style={{padding:'9px 14px',cursor:'pointer',fontFamily:'Nebulica',fontSize:13.5,display:'flex',alignItems:'center',justifyContent:'space-between',background:o.code===value?'rgba(0,51,255,0.06)':'transparent',borderBottom:'1px solid rgba(0,0,0,0.04)'}}>
              <span style={{fontWeight:700}}>{o.code}</span>
              {o.name&&<span style={{color:'rgba(0,0,0,0.40)',fontSize:12,marginLeft:8}}>{o.name}</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  },[open]);

      raw.toUpperCase(),

    ];
    const dbHex = candidates.reduce((found, k) => found || PANTONE_DB[k], null);
    if (dbHex) {
      setHex(dbHex); setHexAuto(true);
      const fam = guessFamily(dbHex);
      if (fam) { setCat(fam); setCatAuto(true); }
    } else {

      if (catAuto) { setCat(''); setCatAuto(false); }

  const addInkRow = ()=>{ if(inks.length<4) setInks([...inks,{ink:'',dose:''}]); };

      setCat((r?.Categoria||'').toLowerCase().trim());
      setTemp(r?.Temperatura||'');
      const copRaw = (r?.Copertura||'').toLowerCase().trim();
      setCop(copRaw.startsWith('copr')?'coprente':copRaw.startsWith('semi')?'semi':copRaw.startsWith('tras')?'trasp':'');
      setNote(r?.Note||'');
      setPag(r?.Pagina||'');
      setProj(r?.Progetti||'');
      const comps = allComponenti.filter(c=>c.Pantone_ID===editCode);
      inkId.current = comps.length + 1;
      setInks(comps.length>0 ? comps.map((c,i)=>({id:i+1,name:c.Inchiostro||'',g:c['Dose_40g (g)']||''})) : [{id:1,name:'',g:''},{id:2,name:'',g:''}]);
      setMsg(''); setSaving(false);
    }
  },[open, editCode]);

  React.useEffect(()=>{
    if(!pidTouched.current) return;
    const found = DESK_PANTONES.find(p=>p.code===pid.trim());
    if(found && found.hex) setHex(found.hex.replace('#',''));
  },[pid]);

  const setInkField = (id,field,val) => setInks(a=>a.map(r=>r.id===id?{...r,[field]:val}:r));
  const addInk = () => setInks(a=>[...a,{id:inkId.current++,name:'',g:''}]);
  const delInk = id => setInks(a=>a.length>1?a.filter(r=>r.id!==id):a);

  const submit = async ()=>{
    if(!pid.trim()||!cat){ setMsg('Compila Pantone ID e Categoria.'); return; }
    setSaving(true); setMsg('');
    try{
      const newId = pid.trim();
      const hexVal = '#'+hex.replace('#','').trim();
      const validInks = inks.filter(r=>r.name.trim()&&(parseFloat(r.g)||0)>0);
      const payload = {action:'editRicetta',Pantone_ID:editCode,HEX:hexVal,Categoria:cat,Temperatura:temp,Copertura:cop,Note:note,Pagina:pag,Progetti:proj,componenti:validInks.map(r=>({Inchiostro:r.name,'Dose_40g (g)':r.g}))};
      if(newId!==editCode) payload.Pantone_ID_nuovo=newId;
      await postGAS(payload);
      // Ottimistico
      const rIdx = allRicette.findIndex(x=>x.Pantone_ID===editCode);
      if(rIdx>=0) allRicette[rIdx]={...allRicette[rIdx],Pantone_ID:newId,HEX:hexVal,Categoria:cat,Temperatura:temp,Copertura:cop,Note:note,Pagina:pag,Progetti:proj};
      allComponenti = allComponenti.filter(c=>c.Pantone_ID!==editCode);
      validInks.forEach(r=>allComponenti.push({Pantone_ID:newId,Inchiostro:r.name,'Dose_40g (g)':r.g}));
      transformData(); window._bumpData?.();
      setMsg('Modifiche salvate!'); setTimeout(()=>onClose(), 1100);
    }catch(e){ setMsg('Errore di connessione.'); }
    setSaving(false);
  };

  const inp = {width:'100%',padding:'10px 14px',borderRadius:99,border:theme.borders?`${theme.borderWidth}px solid ${theme.ink}`:`1px solid ${theme.line}`,background:theme.panelAlt,fontFamily:'Nebulica',fontSize:14,color:theme.ink,outline:'none',boxSizing:'border-box'};
  const lbl = {fontFamily:'Nebulica',fontSize:11,letterSpacing:1.3,fontWeight:700,color:theme.sub,display:'block',marginBottom:5};
  const inkOpts = allInchiostri.length ? allInchiostri.map(i=>i.Codice||i.Nome_completo) : INK_POOL.map(i=>i.name);

  if(!open||!editCode) return null;
  return (
    <React.Fragment>
      <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:1010,background:'rgba(0,0,0,0.38)'}}/>
      <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',zIndex:1020,width:'min(520px, calc(100vw - 32px))',maxHeight:'90vh',overflowY:'auto',borderRadius:32,background:theme.panel,outline:theme.borders?`${theme.borderWidth}px solid ${theme.ink}`:`1px solid ${theme.line}`,boxShadow:`0 40px 80px rgba(0,0,0,0.28)`,padding:'26px 28px 32px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
          <span style={{fontFamily:theme.display,fontWeight:theme.displayWeight,fontSize:22,letterSpacing:-0.5,color:theme.ink,fontStyle:theme.isSerif?'italic':'normal'}}>Modifica ricetta</span>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:99,border:'none',cursor:'pointer',background:rgba('#000',0.08),display:'flex',alignItems:'center',justifyContent:'center'}}><IcoClose size={16} color={theme.ink}/></button>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div style={{gridColumn:'span 2'}}><span style={lbl}>PANTONE ID</span><input value={pid} onChange={e=>{pidTouched.current=true;setPid(e.target.value);}} placeholder="es. 166 U" style={inp}/></div>
          <div><span style={lbl}>HEX</span>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input value={hex} onChange={e=>setHex(e.target.value)} placeholder="D44800" style={{...inp,flex:1}}/>
              {hex.replace('#','').length>=6&&<div style={{width:36,height:36,borderRadius:'50%',background:'#'+hex.replace('#',''),flexShrink:0,border:`1px solid ${theme.line}`}}/>}
            </div>
          </div>
          <div><span style={lbl}>CATEGORIA</span>
            <div style={{position:'relative'}}>
              <select value={cat} onChange={e=>setCat(e.target.value)} style={{...inp,WebkitAppearance:'none',appearance:'none',paddingRight:32}}>
                <option value="">Scegli…</option>
                {FAMILIES.filter(f=>f!=='tutti').map(f=><option key={f} value={f}>{f}</option>)}
              </select>
              <svg style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}} width="11" height="7" viewBox="0 0 11 7"><path d="M1 1l4.5 4.5L10 1" stroke={theme.sub} strokeWidth="1.7" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
          </div>
          <div><span style={lbl}>PAGINA</span><input value={pag} onChange={e=>setPag(e.target.value)} type="number" placeholder="es. 42" style={inp}/></div>
          <div><span style={lbl}>TEMPERATURA</span>
            <div style={{position:'relative'}}>
              <select value={temp} onChange={e=>setTemp(e.target.value)} style={{...inp,WebkitAppearance:'none',appearance:'none',paddingRight:32}}>
                <option value="">Scegli…</option>
                {NF_TEMPS.map(t=><option key={t.k} value={t.k}>{t.l}</option>)}
              </select>
              <svg style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}} width="11" height="7" viewBox="0 0 11 7"><path d="M1 1l4.5 4.5L10 1" stroke={theme.sub} strokeWidth="1.7" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
          </div>
          <div style={{gridColumn:'span 2'}}>
            <span style={lbl}>COPERTURA</span>
            <div style={{display:'flex',gap:8}}>
              {[{k:'trasp',l:'Trasp.'},{k:'semi',l:'Semi'},{k:'coprente',l:'Coprente'}].map(({k,l})=>{
                const on=cop===k;
                return <button key={k} onClick={()=>setCop(on?'':k)} style={{flex:1,height:44,borderRadius:99,cursor:'pointer',fontFamily:'Nebulica',fontWeight:on?700:500,fontSize:14,border:theme.borders?`${theme.borderWidth}px solid ${on?theme.ink:theme.line}`:`1px solid ${on?theme.ink:theme.line}`,background:on?theme.ink:theme.panelAlt,color:on?theme.panel:theme.sub,transition:'background .15s,color .15s'}}>{l}</button>;
              })}
            </div>
          </div>
        </div>

        <div style={{marginTop:18}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <span style={lbl}>FORMULA · dose a 40 g</span>
            <button onClick={addInk} style={{height:30,padding:'0 14px',borderRadius:99,cursor:'pointer',fontFamily:'Nebulica',fontWeight:700,fontSize:12,border:`1px solid ${theme.line}`,background:theme.panelAlt,color:theme.ink}}>+ Aggiungi</button>
          </div>
          <datalist id="edit-ink-opts">{inkOpts.map(n=><option key={n} value={n}/>)}</datalist>
          {inks.map(row=>(
            <div key={row.id} style={{display:'flex',gap:8,marginBottom:8,alignItems:'center'}}>
              <input list="edit-ink-opts" value={row.name} onChange={e=>setInkField(row.id,'name',e.target.value)} placeholder="es. AS 40" style={{...inp,flex:1,padding:'8px 14px'}}/>
              <input value={row.g} onChange={e=>setInkField(row.id,'g',e.target.value)} type="number" step="0.01" placeholder="g" style={{...inp,width:84,padding:'8px 10px',textAlign:'right'}}/>
              <button onClick={()=>delInk(row.id)} style={{width:32,height:32,borderRadius:99,border:`1px solid ${theme.line}`,background:theme.panelAlt,cursor:'pointer',color:theme.sub,fontFamily:'Nebulica',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>×</button>
            </div>
          ))}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginTop:14}}>
          <div style={{gridColumn:'span 2'}}><span style={lbl}>NOTE</span>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={2} placeholder="note…" style={{...inp,borderRadius:16,resize:'vertical',lineHeight:1.45}}/>
          </div>
          <div style={{gridColumn:'span 2'}}><span style={lbl}>PROGETTI</span><input value={proj} onChange={e=>setProj(e.target.value)} placeholder="es. Brand Aurora, Packaging Olio" style={inp}/></div>
        </div>

        {msg&&<div style={{marginTop:10,fontFamily:'Nebulica',fontSize:13,color:msg.includes('Modif')||msg.includes('salvate')?theme.accent:theme.sub}}>{msg}</div>}
        <button onClick={submit} disabled={saving} style={{marginTop:18,width:'100%',height:52,borderRadius:99,cursor:saving?'default':'pointer',background:theme.accent,color:theme.onAccent,border:'none',fontFamily:'Nebulica',fontWeight:700,fontSize:15,opacity:saving?0.7:1}}>
          {saving?'Salvataggio…':'Salva modifiche'}
        </button>
      </div>
    </React.Fragment>
  );
}

        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
          <span style={{fontFamily:'Nebulica',fontSize:open?17:14,fontWeight:500,color:fg,opacity:0.92}}>{pantone.name}</span>
          <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:10.5,color:fg,opacity:0.6,letterSpacing:0.4}}>PAG.{pantone.page}{copLabel(pantone.copertura)?' · '+copLabel(pantone.copertura):''}</span>

      <div ref={panelRef} style={{position:'absolute',left:0,right:0,top:headerH,bottom:0,...surface(theme),opacity:open?1:0,transform:open?'translateY(0)':'translateY(22px)',transition:`opacity .34s ease, transform .5s ${SPRING_SOFT}`,transitionDelay:open?'.12s':'0s',overflowY:'auto',padding:'20px 26px 24px'}}>
        <div style={{fontFamily:'Nebulica',fontSize:11,letterSpacing:1.5,fontWeight:700,color:theme.sub,marginBottom:9}}>QUANTITÀ</div>
        <QuantityPicker value={qty} onChange={setQty} theme={theme}/>
        <div style={{marginTop:20}}><InkFormula pantone={pantone} recipe={recipe} qty={qty} theme={theme} play={open} anim="stagger"/></div>
        <NotesBlock note={recipe.note} theme={theme}/>
        <div style={{marginTop:20}}><PrintButton theme={theme} onClick={()=>stampaPDF(pantone, recipe, qty)}/></div>
        <div style={{marginTop:14,display:'flex',justifyContent:'space-between',fontFamily:'Nebulica',fontSize:11,letterSpacing:1.3,fontWeight:700,color:theme.sub}}>
          <span>PROGETTO</span><span style={{color:theme.accent}}>→ {recipe.project}</span></div>
      </div>
    </div>
  );
}

  const ROW=60, STEP=66;
  const hiIdx = filtered.findIndex(p=>p.code===selCode);
  return (
    <div style={{position:'absolute',top:88,left:0,bottom:0,width:300,zIndex:30,borderRight:`1px solid ${theme.line}`,display:'flex',flexDirection:'column'}}>

        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{flex:1,minWidth:0}}><SearchPill value={query} onChange={setQuery} theme={theme} w="100%" placeholder="cerca pantone…"/></div>
          {setFamily&&<FilterButton family={family} setFamily={setFamily} ink={ink} setInk={setInk} theme={theme} align="left"/>}
        </div>

        <div style={{position:'relative'}}>
          <div style={{position:'absolute',left:0,right:0,height:ROW,top:hiIdx*STEP,borderRadius:99,zIndex:0,background:rgba('#fff',theme.grey?0.5:0.58),backdropFilter:'blur(14px) saturate(150%)',WebkitBackdropFilter:'blur(14px) saturate(150%)',boxShadow:`0 8px 20px ${rgba('#000',0.08)}, inset 0 0 0 1px ${rgba('#fff',0.6)}`,opacity:hiIdx>=0?1:0,transition:`top .5s ${SPRING}, opacity .25s`}}/>
          {filtered.map(p=>{const on=p.code===selCode; return (
            <button key={p.code} onClick={()=>onPick(list.indexOf(p))} style={{position:'relative',zIndex:1,width:'100%',height:ROW,marginBottom:STEP-ROW,display:'flex',alignItems:'center',gap:12,textAlign:'left',cursor:'pointer',padding:'0 16px 0 12px',borderRadius:99,border:'none',background:'transparent'}}>
              <Swatch hex={p.hex} size={40} radius={99}/>
              <div style={{flex:1,minWidth:0}}>
                <span style={{fontFamily:theme.display,fontWeight:theme.isSerif?400:700,fontSize:17,letterSpacing:-0.4,color:theme.ink,fontStyle:theme.isSerif?'italic':'normal'}}>
                  {p.code.replace(' U','')}{p.code.includes(' U')&&<span style={{opacity:0.5,fontWeight:400,fontStyle:'normal'}}> U</span>}</span>
                <div style={{fontFamily:'Nebulica',fontSize:12,color:theme.sub,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>

function WalletMode({theme, mode, setMode, query, setQuery, onSettings, onNuova}) {

function WalletRow({theme, mode, setMode, query, setQuery, onSettings, onNuova, initialOpen=null}) {
  const [family, setFamily] = React.useState('tutti');
  const [ink, setInk] = React.useState(0);
  const list = React.useMemo(()=>DESK_PANTONES.filter(p=>(family==='tutti'||p.family===family)&&(!ink||p.ink===ink)&&(!query||`${p.code} ${p.name} ${p.family}`.toLowerCase().includes(query.toLowerCase()))),[family,ink,query,DESK_PANTONES.length]);
  const [sel, setSel] = React.useState(null);
  const [qty, setQty] = React.useState(100);
  const [scroll, setScroll] = React.useState(()=>initialOpen!=null?Math.max(0,initialOpen*236+105-500):0);
  const [hover, setHover] = React.useState(null);
  const drag = React.useRef({on:false,x0:0,s0:0,moved:false});
  const CARD_W=210,CARD_H=300,GAP=26,STEP=CARD_W+GAP,VIEW=1140,SB=300;
  const GROW_W=384,PART=(GROW_W-CARD_W)/2+34;
  const open = sel!==null && sel<list.length;
  const selP = open?list[sel]:null;
  const [measuredH, setMeasuredH] = React.useState(null);
  React.useEffect(()=>{setMeasuredH(null);},[sel]);
  const growH = open?(measuredH?Math.max(360,Math.min(760,measuredH)):Math.max(430,Math.min(720,walletOpenHeight(selP,150)))):624;
  const blobHex = open?selP.hex:(list[3]||list[0]||DESK_PANTONES[3]||{hex:'#FFCD00'}).hex;
  React.useEffect(()=>{setSel(null);},[family,ink,query]);
  const maxScroll = Math.max(0, list.length*STEP-VIEW);
  const clampS = v=>Math.max(-40,Math.min(maxScroll+40,v));
  const onWheel = e=>{if(open)return; setScroll(s=>clampS(s+(Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY)));};
  const onDown = e=>{if(open)return; drag.current={on:true,x0:e.clientX,s0:scroll,moved:false}; try{e.currentTarget.setPointerCapture(e.pointerId);}catch(_){}};
  const onMove = e=>{if(!drag.current.on)return; const dx=e.clientX-drag.current.x0; if(Math.abs(dx)>4)drag.current.moved=true; setScroll(clampS(drag.current.s0-dx));};
  const onUp = ()=>{drag.current.on=false;};
  const openCard = i=>{setSel(i);setQty(100); const target=i*STEP+CARD_W/2-(VIEW/2-70); setScroll(Math.max(0,target));};
  return (
    <div style={{width:'100%',height:'100%',position:'relative'}}>
      <GrainBlobs theme={theme} blobHex={blobHex}/>
      <WalletTopBar theme={theme} mode={mode} setMode={setMode} onSettings={onSettings} onNuova={onNuova} open={open} onBack={()=>setSel(null)}/>
      <WalletSideList list={list} query={query} setQuery={setQuery} selCode={open?selP.code:null} onPick={openCard} theme={theme} family={family} setFamily={setFamily} ink={ink} setInk={setInk}/>
      <div onWheel={onWheel} onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}
        style={{position:'absolute',top:88,left:SB,right:0,bottom:0,zIndex:10,overflow:'hidden',cursor:open?'default':(drag.current.on?'grabbing':'grab'),touchAction:'none'}}>
        <div style={{position:'absolute',left:70,top:'50%',height:1,width:1}}>
          {list.map((p,i)=>{
            const isSel=i===sel;
            let x=i*STEP-scroll, y=-CARD_H/2, w=CARD_W, h=CARD_H, z=10, op=1, lift=0, scale=1;
            if(open){if(isSel){w=GROW_W;h=growH;x=x-(GROW_W-CARD_W)/2;y=-growH/2-6;z=100;}else{x+=i<sel?-PART:PART;op=0.32;scale=0.96;}}
            else if(hover===i){lift=-30;scale=1.05;z=50;}
            return (
              <div key={p.code}
                onMouseEnter={()=>!open&&setHover(i)} onMouseLeave={()=>!open&&setHover(null)}
                onClick={()=>{if(open)return; if(!drag.current.moved)openCard(i);}}
                style={{position:'absolute',left:0,top:0,width:w,height:h,transform:`translate(${x}px,${y+lift}px) scale(${scale})`,transformOrigin:'50% 50%',zIndex:z,opacity:op,cursor:open?'default':'pointer',transition:`transform .55s ${FLUID_SOFT}, width .55s ${FLUID_SOFT}, height .55s ${FLUID_SOFT}, opacity .4s`,filter:isSel&&open?'drop-shadow(0 38px 64px rgba(0,0,0,0.28))':(hover===i?'drop-shadow(0 26px 46px rgba(0,0,0,0.22))':'drop-shadow(0 16px 32px rgba(0,0,0,0.16))')}}>
                <WalletUnified pantone={p} open={isSel} qty={qty} setQty={setQty} theme={theme} codeSize={42} headerH={150} onMeasure={isSel?setMeasuredH:undefined}/>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{position:'absolute',bottom:34,left:SB,right:0,textAlign:'center',zIndex:30,opacity:open?0:1,transition:'opacity .3s',pointerEvents:'none',fontFamily:'Nebulica',fontSize:11,letterSpacing:1.5,fontWeight:700,color:theme.faint}}>

function ensureGalleryKf() {

function squirclePath(w,h,r,n=5,pad=0){
  const x0=pad,y0=pad,W=w-pad*2,H=h-pad*2;
  r=Math.max(1,Math.min(r-pad,W/2,H/2));
  const k=2/n,seg=18,pts=[];
  const corner=(cx,cy,a0,a1)=>{for(let i=0;i<=seg;i++){const a=a0+(a1-a0)*(i/seg),c=Math.cos(a),s=Math.sin(a);pts.push([cx+r*Math.sign(c)*Math.pow(Math.abs(c),k),cy+r*Math.sign(s)*Math.pow(Math.abs(s),k)]);}};
  corner(x0+W-r,y0+r,-Math.PI/2,0);corner(x0+W-r,y0+H-r,0,Math.PI/2);corner(x0+r,y0+H-r,Math.PI/2,Math.PI);corner(x0+r,y0+r,Math.PI,Math.PI*1.5);
  return 'M'+pts.map(p=>p[0].toFixed(2)+' '+p[1].toFixed(2)).join(' L')+' Z';
}
function Squircle({radius=28,n=5,border,borderWidth=1.5,shadow,anim,outerStyle,style,className,children}){
  const ref=React.useRef(null);
  const [d,setD]=React.useState('');
  const [size,setSize]=React.useState([0,0]);
  React.useLayoutEffect(()=>{
    const el=ref.current;
    if(!el||typeof ResizeObserver==='undefined') return;
    const update=()=>{const w=el.offsetWidth,h=el.offsetHeight;if(w&&h){setSize([w,h]);setD(squirclePath(w,h,radius,n));}};
    update();const ro=new ResizeObserver(update);ro.observe(el);return()=>ro.disconnect();
  },[radius,n]);
  const clip=d?`path("${d}")`:'none';
  return (
    <div style={{position:'relative',filter:shadow?`drop-shadow(${shadow})`:'none',animation:anim||'none',...outerStyle}}>
      <div ref={ref} className={className} style={{position:'relative',borderRadius:radius,clipPath:clip,WebkitClipPath:clip,...style}}>
        {children}
      </div>
      {d&&border&&(<svg width={size[0]} height={size[1]} viewBox={`0 0 ${size[0]} ${size[1]}`} style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:5}}><path d={d} fill="none" stroke={border} strokeWidth={borderWidth*2} strokeLinejoin="round"/></svg>)}
    </div>
  );
}

function nfLookupHex(code){
  if(!code) return null;
  const raw=code.trim();
  const cands=[raw,raw.toUpperCase(),raw.toUpperCase().replace(/([0-9])([A-Z])$/,'$1 $2'),raw.replace(/\s+/,' ').toUpperCase()];
  const hit=cands.find(k=>PANTONE_DB[k]);
  if(hit) return PANTONE_DB[hit];
  const kn=raw.toLowerCase().replace(/\s/g,'');
  const p=DESK_PANTONES.find(p=>p.code.toLowerCase().replace(/\s/g,'')===kn);
  return p?p.hex:null;
}
function nfLookupEntry(code){
  if(!code) return null;
  const kn=code.trim().toLowerCase().replace(/\s/g,'');
  return DESK_PANTONES.find(p=>p.code.toLowerCase().replace(/\s/g,'')===kn)||null;
}
function nfEffHex(state){
  const h=(state.hex||'').replace('#','');
  if(/^[0-9a-f]{6}$/i.test(h)) return '#'+h;
  if(/^[0-9a-f]{3}$/i.test(h)) return '#'+h.split('').map(c=>c+c).join('');
  const auto=nfLookupHex(state.pantoneId);
  return auto||null;
}
function nfTotalG(state){return state.inks.reduce((s,r)=>s+(parseFloat(r.g)||0),0);}

  ensureNuovaKf();

  const [msg,setMsg]=React.useState('');

  const reset=React.useCallback(()=>{
    setTab('ricetta');setPantoneIdRaw('');setHex('');setHexAuto(false);setTemp(null);setCover(null);setCat(null);setCatAuto(false);
    setNote('');setPage('');setProjects([]);setProjInput('');setInks([{id:1,name:'',g:''},{id:2,name:'',g:''}]);inkId.current=3;
    setSaving(false);setMsg('');
  },[]);
  React.useEffect(()=>{if(!open)reset();},[open,reset]);

  const setPantoneId=v=>{
    setPantoneIdRaw(v);
    const autoHex=nfLookupHex(v);
    if(autoHex){setHex(autoHex);setHexAuto(true);const f=guessFamily(autoHex);if(f){setCat(f.charAt(0).toUpperCase()+f.slice(1));setCatAuto(true);}}
    else{if(hexAuto){setHex('');setHexAuto(false);}if(catAuto){setCat(null);setCatAuto(false);}}
  };
  const setHexManual=v=>{setHex(v);setHexAuto(false);};
  const addInk=()=>setInks(a=>[...a,{id:inkId.current++,name:'',g:''}]);
  const setInk=(id,patch)=>setInks(a=>a.map(r=>r.id===id?{...r,...patch}:r));
  const delInk=id=>setInks(a=>a.length>1?a.filter(r=>r.id!==id):a);

  const state={tab,setTab,pantoneId,setPantoneId,hex,setHexManual,hexAuto,temp,setTemp,cover,setCover,cat,setCat,catAuto,note,setNote,page,setPage,projects,setProjects,projInput,setProjInput,inks,addInk,setInk,delInk};

  const submit=async()=>{
    const eff=nfEffHex(state);
    if(!pantoneId.trim()||!eff||!cat){setMsg('Compila Pantone ID, Colore e Categoria.');return;}

    if(validInks.length===0){setMsg('Aggiungi almeno un inchiostro con la dose.');return;}
    setSaving(true);setMsg('');
    try{
      await postGAS({action:'addRicetta',Pantone_ID:pantoneId.trim(),HEX:'#'+eff.replace('#','').trim(),Categoria:cat,Temperatura:temp||'',Copertura:cover||'',Note:note,Pagina:page,Progetti:projects.join(', '),componenti:validInks.map(r=>({Inchiostro:r.name,'Dose_40g (g)':r.g}))});
      setMsg('Ricetta salvata!');
      const newId=pantoneId.trim();

      validInks.forEach(r=>allComponenti.push({Pantone_ID:newId,Inchiostro:r.name,'Dose_40g (g)':r.g}));
      transformData();
      newlySaved.add(newId);
      window._bumpData?.();

          outerStyle={{width:1120,maxWidth:'100%',height:820,maxHeight:'calc(100vh - 48px)',pointerEvents:'auto'}}
          style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',overflow:'hidden',...surface(theme)}}>

            <div style={{flexShrink:0}}>
              <div style={{fontFamily:theme.display,fontWeight:theme.displayWeight,fontSize:28,letterSpacing:-0.8,color:theme.ink,lineHeight:1,fontStyle:theme.isSerif?'italic':'normal'}}>Nuova formula</div>
              <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:10,letterSpacing:1,color:theme.faint,marginTop:5}}>AGGIUNGE AL GOOGLE SHEET</div>

            <IconPill Icon={IcoClose} theme={theme} size={46} onClick={onClose} title="Chiudi"/>
          </div>

            <div className="nf-scroll" style={{width:540,flexShrink:0,overflowY:'auto',padding:'16px 24px 20px',display:'flex',flexDirection:'column',gap:16,borderRight:divider,WebkitMaskImage:'linear-gradient(to bottom,transparent 0,#000 16px,#000 calc(100% - 16px),transparent 100%)',maskImage:'linear-gradient(to bottom,transparent 0,#000 16px,#000 calc(100% - 16px),transparent 100%)'}}>

                  <button onClick={submit} disabled={saving} style={{flex:1,height:52,padding:'0 26px',borderRadius:99,cursor:saving?'default':'pointer',border:'none',background:saving?theme.panelAlt:theme.accent,color:saving?theme.sub:theme.onAccent,fontFamily:'Nebulica',fontWeight:700,fontSize:15,letterSpacing:-0.2,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:9,boxShadow:saving?'none':`0 8px 22px ${rgba(theme.accent,0.32)}`}}>
                    <IcoCheck size={19} color={saving?theme.sub:theme.onAccent} sw={2.2}/> {saving?'Salvataggio…':'Salva ricetta'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        </Squircle>
      </div>
    </React.Fragment>
  );
}

/* ═══════════════════ CARICA SHEET ═══════════════════ */
function CaricaSheet({open, inkCode, onClose, theme, tare}) {
  const [selCode, setSelCode] = React.useState('');
  const [modo, setModo] = React.useState('pieni'); // 'pieni' | 'pesati'
  // Pieni
  const [nBarattoli, setNBarattoli] = React.useState(1);
  const [gPerBarattolo, setGPerBarattolo] = React.useState('1000');
  // Pesati
  const [jars, setJars] = React.useState(['']);
  const [note, setNote] = React.useState('');
  const [saving, setSaving] = React.useState(false);

  React.useEffect(()=>{
    if(open){ setSelCode(inkCode||''); setModo('pieni'); setNBarattoli(1); setGPerBarattolo('1000'); setJars(['']); setNote(''); setSaving(false); }
  },[open,inkCode]);

  const code = inkCode||selCode;
  const inkInfo = allInchiostri.find(i=>i.Codice===code);

  const totalePieni = nBarattoli * (parseFloat(gPerBarattolo)||0);
  const netti = jars.map(v=>{ const l=parseFloat(v)||0; return l>0?Math.max(0,l-tare):0; });
  const totalePesati = netti.reduce((s,n)=>s+n,0);
  const totale = modo==='pieni' ? totalePieni : totalePesati;

  const addJar = ()=>setJars(p=>[...p,'']);
  const removeJar = i=>setJars(p=>p.filter((_,idx)=>idx!==i));
  const setJarVal = (i,v)=>setJars(p=>p.map((x,idx)=>idx===i?v:x));

  const save = async()=>{
    if(!code||totale<=0) return;
    setSaving(true);
    await postInventario({action:'aggiungiCarico', carichi:[{inchiostro:code,grammi:totale}], note});
    setSaving(false);
    onClose();
  };

  const iStyle={width:'100%',fontFamily:'Nebulica',fontWeight:700,fontSize:15,color:theme.ink,background:'transparent',border:`1.4px solid ${rgba(theme.ink,0.22)}`,borderRadius:12,padding:'10px 14px',outline:'none',boxSizing:'border-box'};
  const segBtn=(k,l)=>(<button key={k} onClick={()=>setModo(k)} style={{flex:1,padding:'9px 0',borderRadius:10,fontFamily:'Nebulica',fontWeight:700,fontSize:13,cursor:'pointer',border:'none',background:modo===k?theme.ink:'transparent',color:modo===k?'#fff':theme.sub,transition:'background .18s,color .18s'}}>{l}</button>);

  return (
    <>
      {open&&<div onClick={onClose} style={{position:'fixed',inset:0,zIndex:820,background:rgba('#000',0.28),backdropFilter:'blur(6px)',WebkitBackdropFilter:'blur(6px)'}}/>}
      <div style={{position:'fixed',bottom:0,left:'50%',transform:`translateX(-50%) translateY(${open?0:100}%)`,width:520,maxHeight:'82vh',overflowY:'auto',zIndex:830,...surface(theme),borderRadius:'28px 28px 0 0',padding:'28px 28px 48px',boxShadow:`0 -24px 70px ${rgba('#000',0.18)}`,transition:`transform .38s ${SPRING_SOFT}`,borderTop:theme.borders?`${theme.borderWidth}px solid ${theme.ink}`:`1px solid ${theme.line}`}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
          <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:20,color:theme.ink,letterSpacing:-0.4,flex:1}}>+ Carico magazzino</div>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:99,border:`1.4px solid ${rgba(theme.ink,0.2)}`,background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><IcoClose size={15} color={theme.ink}/></button>
        </div>

        {/* Segmented: Pieni / Pesati */}
        <div style={{display:'flex',gap:4,padding:4,borderRadius:14,background:rgba(theme.ink,0.07),marginBottom:20}}>
          {segBtn('pieni','📦  Barattoli pieni')}
          {segBtn('pesati','⚖️  Barattoli pesati')}
        </div>

        {/* Inchiostro */}
        <div style={{fontFamily:'Nebulica',fontSize:11,letterSpacing:1.4,fontWeight:700,color:theme.sub,marginBottom:8}}>INCHIOSTRO</div>
        {inkCode ? (
          <div style={{display:'flex',alignItems:'center',gap:10,border:`1.4px solid ${theme.ink}`,borderRadius:12,padding:'10px 14px',marginBottom:20}}>
            <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:13,background:theme.ink,color:'#fff',padding:'4px 12px',borderRadius:99,flexShrink:0}}>{inkCode}</span>
            <span style={{fontFamily:'Nebulica',color:theme.sub,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{inkInfo?.Nome_completo||''}</span>
          </div>
        ) : (
          <div style={{position:'relative',marginBottom:20}}>
            <select value={selCode} onChange={e=>setSelCode(e.target.value)} style={{...iStyle,paddingRight:32,appearance:'none',WebkitAppearance:'none'}}>
              <option value="">Seleziona inchiostro…</option>
              {allInchiostri.map(i=><option key={i.Codice} value={i.Codice}>{i.Codice}{i.Nome_completo?' — '+i.Nome_completo:''}</option>)}
            </select>
            <svg style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}} width="10" height="7" viewBox="0 0 10 7"><path d="M1 1l4 4 4-4" stroke={theme.sub} strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
        )}

        {/* Modalità PIENI */}
        {modo==='pieni' && (<>
          <div style={{fontFamily:'Nebulica',fontSize:11,letterSpacing:1.4,fontWeight:700,color:theme.sub,marginBottom:10}}>QUANTITÀ</div>
          <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:12}}>
            <div style={{flex:1}}>
              <div style={{fontFamily:'Nebulica',fontSize:12,color:theme.sub,marginBottom:5}}>Numero barattoli</div>
              <div style={{display:'flex',alignItems:'center',gap:0,border:`1.4px solid ${rgba(theme.ink,0.22)}`,borderRadius:12,overflow:'hidden'}}>
                <button onClick={()=>setNBarattoli(n=>Math.max(1,n-1))} style={{width:44,height:44,border:'none',background:'transparent',cursor:'pointer',fontFamily:'Nebulica',fontWeight:700,fontSize:20,color:theme.ink,flexShrink:0}}>−</button>
                <span style={{flex:1,textAlign:'center',fontFamily:'Nebulica',fontWeight:700,fontSize:18,color:theme.ink}}>{nBarattoli}</span>
                <button onClick={()=>setNBarattoli(n=>n+1)} style={{width:44,height:44,border:'none',background:'transparent',cursor:'pointer',fontFamily:'Nebulica',fontWeight:700,fontSize:20,color:theme.ink,flexShrink:0}}>+</button>
              </div>
            </div>
            <div style={{flex:1}}>
              <div style={{fontFamily:'Nebulica',fontSize:12,color:theme.sub,marginBottom:5}}>Grammi netti per barattolo</div>
              <input type="number" inputMode="decimal" value={gPerBarattolo} onChange={e=>setGPerBarattolo(e.target.value)} style={{...iStyle,textAlign:'center'}} placeholder="es. 1000"/>
            </div>
          </div>
          {totalePieni>0&&<div style={{fontFamily:'Nebulica',fontSize:12,color:theme.sub,marginBottom:16}}>{nBarattoli} × {parseFloat(gPerBarattolo)||0}g = <strong style={{color:theme.ink}}>{totalePieni.toFixed(0)}g totali</strong></div>}
        </>)}

        {/* Modalità PESATI */}
        {modo==='pesati' && (<>
          <div style={{fontFamily:'Nebulica',fontSize:11,letterSpacing:1.4,fontWeight:700,color:theme.sub,marginBottom:6}}>PESO LORDO BARATTOLI</div>
          <div style={{fontFamily:'Nebulica',fontSize:12,color:theme.faint,marginBottom:10}}>Tara sottratta automaticamente: {tare}g</div>
          {jars.map((val,i)=>{
            const l=parseFloat(val)||0;
            const netto=l>0?Math.max(0,l-tare):0;
            return (
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <div style={{flex:1,position:'relative'}}>
                  <input type="number" inputMode="decimal" placeholder={`Barattolo ${i+1} — peso lordo (g)`} value={val} onChange={e=>setJarVal(i,e.target.value)} style={{...iStyle,paddingRight:l>0?'90px':'14px'}}/>
                  {l>0&&<span style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',fontFamily:'Nebulica',fontWeight:700,fontSize:13,color:theme.accent,whiteSpace:'nowrap'}}>→ {netto.toFixed(0)}g</span>}
                </div>
                {jars.length>1&&<button onClick={()=>removeJar(i)} style={{width:34,height:34,borderRadius:99,border:`1.4px solid ${rgba(theme.ink,0.2)}`,background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><IcoClose size={13} color={theme.sub}/></button>}
              </div>
            );
          })}
          <button onClick={addJar} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'6px 16px',borderRadius:99,fontFamily:'Nebulica',fontWeight:700,fontSize:12,cursor:'pointer',border:`1.4px solid ${rgba(theme.ink,0.22)}`,background:'transparent',color:theme.sub,marginBottom:16}}>
            <IcoPlus size={14} color={theme.sub}/> Aggiungi barattolo
          </button>
        </>)}

        {/* Totale */}
        {totale>0&&<div style={{padding:'12px 16px',borderRadius:16,background:rgba(theme.accent,0.08),border:`1px solid ${rgba(theme.accent,0.2)}`,marginBottom:16}}>
          <span style={{fontFamily:'Nebulica',fontSize:14,color:theme.ink}}>Totale da aggiungere: </span>
          <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:22,color:theme.accent,letterSpacing:-0.5}}>{totale.toFixed(0)}</span>
          <span style={{fontFamily:'Nebulica',fontSize:13,color:theme.sub,marginLeft:4}}>g di {code||'?'}</span>
        </div>}

        <input placeholder="Note (opzionale)" value={note} onChange={e=>setNote(e.target.value)} style={{...iStyle,fontWeight:400,marginBottom:16}}/>
        <button onClick={save} disabled={!code||totale<=0||saving} style={{width:'100%',height:52,borderRadius:99,background:(!code||totale<=0||saving)?rgba(theme.ink,0.18):theme.ink,color:(!code||totale<=0||saving)?theme.faint:'#fff',border:'none',cursor:(!code||totale<=0||saving)?'default':'pointer',fontFamily:'Nebulica',fontWeight:700,fontSize:15,transition:'background .2s,color .2s'}}>
          {saving?'Salvataggio in corso…':`Aggiungi ${totale>0?totale.toFixed(0)+'g':''}${code?' di '+code:' al magazzino'}`}
        </button>
      </div>
    </>
  );
}

/* ═══════════════════ MESCOLA SHEET ═══════════════════ */
function MescolaSheet({open, pantone, recipe, qty, onClose, theme}) {
  const [note, setNote] = React.useState('');
  const [saving, setSaving] = React.useState(false);
  const [done, setDone] = React.useState(false);
  React.useEffect(()=>{if(open){setNote('');setSaving(false);setDone(false);}},[open]);
  if(!open||!pantone||!recipe) return null;
  const inks = recipe.inks.map(ink=>{
    const grammi=(ink.pct/100)*qty;
    const inv=allInventario.find(i=>i.inchiostro===ink.name);
    const disponibile=inv?inv.grammi:0;
    return {...ink,grammi,disponibile,ok:disponibile>=grammi};
  });
  const anyInsuf = inks.some(i=>!i.ok);
  const confirm = async()=>{
    setSaving(true);
    await postInventario({action:'registraMescola',pantone_id:pantone.code,qty,inks:inks.map(i=>({inchiostro:i.name,grammi:i.grammi})),note});
    setSaving(false);
    setDone(true);
    setTimeout(onClose,1400);
  };
  return (
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:820,background:rgba('#000',0.28),backdropFilter:'blur(6px)',WebkitBackdropFilter:'blur(6px)'}}/>
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:520,zIndex:830,...surface(theme),borderRadius:'28px 28px 0 0',padding:'28px 28px 48px',boxShadow:`0 -24px 70px ${rgba('#000',0.18)}`,borderTop:theme.borders?`${theme.borderWidth}px solid ${theme.ink}`:`1px solid ${theme.line}`}}>
        {done ? (
          <div style={{padding:'32px 0',textAlign:'center'}}>
            <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:22,color:theme.ink,marginBottom:8}}>✓ Mescola registrata</div>
            <div style={{fontFamily:'Nebulica',fontSize:13,color:theme.sub}}>Il magazzino è stato aggiornato</div>
          </div>
        ) : (
          <>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
              <div style={{flex:1}}>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:20,color:theme.ink,letterSpacing:-0.4}}>Conferma mescola</div>
                <div style={{fontFamily:'Nebulica',fontSize:12,color:theme.sub,marginTop:2}}>{pantone.code} · {qty}g totali</div>
              </div>
              <div style={{width:44,height:44,borderRadius:12,background:pantone.hex,flexShrink:0,boxShadow:`0 4px 14px ${rgba(pantone.hex,0.4)}`}}/>
              <button onClick={onClose} style={{width:36,height:36,borderRadius:99,border:`1.4px solid ${rgba(theme.ink,0.2)}`,background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><IcoClose size={15} color={theme.ink}/></button>
            </div>
            <div style={{fontFamily:'Nebulica',fontSize:11,letterSpacing:1.4,fontWeight:700,color:theme.sub,marginBottom:10}}>VERRÀ SCALATO DAL MAGAZZINO</div>
            {inks.map(ink=>(
              <div key={ink.name} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:`1px solid ${theme.line}`}}>
                <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,background:theme.ink,color:'#fff',padding:'4px 11px',borderRadius:99,flexShrink:0,minWidth:56,textAlign:'center'}}>{ink.name}</span>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'baseline',gap:4}}>
                    <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:18,color:theme.ink,letterSpacing:-0.4}}>{ink.grammi.toFixed(1)}</span>
                    <span style={{fontFamily:'Nebulica',fontSize:12,color:theme.faint}}>g usati</span>
                  </div>
                  <div style={{fontFamily:'Nebulica',fontSize:11,color:ink.ok?theme.faint:'#E4002B',marginTop:1}}>
                    {allInventario.length===0?'magazzino non caricato':ink.ok?`${ink.disponibile.toFixed(0)}g → ${(ink.disponibile-ink.grammi).toFixed(0)}g residui`:`⚠ Solo ${ink.disponibile.toFixed(0)}g disponibili`}
                  </div>
                </div>
                <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:15,color:ink.ok?theme.accent:'#E4002B',flexShrink:0}}>{ink.ok?'✓':'⚠'}</span>
              </div>
            ))}
            {anyInsuf&&<div style={{marginTop:10,padding:'9px 14px',borderRadius:12,background:rgba('#E4002B',0.06),border:`1px solid ${rgba('#E4002B',0.2)}`,fontFamily:'Nebulica',fontSize:12,color:'#E4002B'}}>Scorte insufficienti. Puoi comunque confermare.</div>}
            <input placeholder="Note (opzionale)" value={note} onChange={e=>setNote(e.target.value)} style={{width:'100%',fontFamily:'Nebulica',fontSize:14,color:theme.ink,background:'transparent',border:`1.4px solid ${rgba(theme.ink,0.22)}`,borderRadius:12,padding:'10px 14px',outline:'none',boxSizing:'border-box',marginTop:16,marginBottom:16}}/>
            <button onClick={confirm} disabled={saving} style={{width:'100%',height:52,borderRadius:99,background:saving?rgba(theme.ink,0.18):theme.ink,color:saving?theme.faint:'#fff',border:'none',cursor:saving?'default':'pointer',fontFamily:'Nebulica',fontWeight:700,fontSize:15,transition:'background .2s,color .2s'}}>
              {saving?'Salvataggio in corso…':'Conferma mescola →'}
            </button>
          </>
        )}
      </div>
    </>
  );
}

/* ═══════════════════ MAGAZZIN MODE ═══════════════════ */
function MagazzinMode({theme, mode, setMode, query, setQuery, onSettings, tare, alertThreshold}) {
  const [sortM, setSortM] = React.useState('az');
  const [filterM, setFilterM] = React.useState('tutti');
  const [caricaInk, setCaricaInk] = React.useState(null);
  const [caricaOpen, setCaricaOpen] = React.useState(false);
  const openCarica = code=>{ setCaricaInk(code||null); setCaricaOpen(true); };

  const inks = React.useMemo(()=>allInchiostri.map(ink=>{
    const code=ink.Codice||'';
    const inv=allInventario.find(i=>i.inchiostro===code);
    const grammi=inv?inv.grammi:0;
    const soglia=(inv&&inv.soglia!=null)?inv.soglia:alertThreshold;
    const status=grammi===0?'vuoto':grammi<soglia?'basso':'ok';
    return {code,nome:ink.Nome_completo||code,tipo:ink.Tipologia||'',grammi,soglia,status};
  }),[allInchiostri.length,allInventario.length,alertThreshold]);

  const filtered = React.useMemo(()=>{
    let list=[...inks];
    if(filterM==='basso') list=list.filter(i=>i.status!=='ok');
    else if(filterM==='in_mag') list=list.filter(i=>i.grammi>0);
    if(query){const q=query.toLowerCase();list=list.filter(i=>i.code.toLowerCase().includes(q)||i.nome.toLowerCase().includes(q));}
    if(sortM==='az') list.sort((a,b)=>a.code.localeCompare(b.code,undefined,{numeric:true}));
    else if(sortM==='asc') list.sort((a,b)=>a.grammi-b.grammi);
    else if(sortM==='desc') list.sort((a,b)=>b.grammi-a.grammi);
    return list;
  },[inks,filterM,sortM,query]);

  const maxG=Math.max(...inks.map(i=>i.grammi),1);
  const belowCnt=inks.filter(i=>i.status!=='ok').length;
  const totG=inks.reduce((s,i)=>s+i.grammi,0);
  const fmtG=g=>g>=1000?(g/1000).toFixed(2)+' kg':g.toFixed(0)+' g';

  return (
    <div style={{width:'100%',height:'100%',position:'relative',display:'flex',flexDirection:'column'}}>
      <GrainBlobs theme={theme} blobHex={theme.accent}/>
      {/* Header */}
      <div style={{position:'relative',zIndex:20,height:88,display:'flex',alignItems:'center',padding:'0 28px',gap:16,flexShrink:0}}>
        <div style={{width:352,flexShrink:0,display:'flex',alignItems:'center'}}>
          <Logo theme={theme} onSettings={onSettings}/>
        </div>
        <div style={{width:600,flexShrink:0,display:'flex',alignItems:'center',gap:12}}>
          <div style={{flex:1}}><SearchPill value={query} onChange={setQuery} theme={theme} w="100%" placeholder="cerca inchiostro…"/></div>
          <button onClick={()=>openCarica(null)} style={{display:'inline-flex',alignItems:'center',gap:8,padding:'0 22px',height:44,borderRadius:99,fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:'#fff',background:theme.ink,border:'none',cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>
            <IcoPlus size={16} color="#fff"/> Carico
          </button>
        </div>
        <div style={{flex:1}}/>
        <ModeOrb mode={mode} onChange={setMode} theme={theme}/>
      </div>
      {/* Summary + controls */}
      <div style={{position:'relative',zIndex:10,padding:'0 28px 14px',display:'flex',alignItems:'center',gap:14,flexShrink:0,borderBottom:`1px solid ${theme.line}`}}>
        <div style={{display:'flex',gap:20,alignItems:'center'}}>
          <div><span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:22,color:theme.ink,letterSpacing:-0.5}}>{inks.filter(i=>i.grammi>0).length}</span><span style={{fontFamily:'Nebulica',fontSize:12,color:theme.sub,marginLeft:5}}>inchiostri in magazzino</span></div>
          <div><span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:22,color:theme.ink,letterSpacing:-0.5}}>{(totG/1000).toFixed(1)}</span><span style={{fontFamily:'Nebulica',fontSize:12,color:theme.sub,marginLeft:5}}>kg totali</span></div>
          {belowCnt>0&&<div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 14px',borderRadius:99,background:rgba('#E4002B',0.08),border:`1px solid ${rgba('#E4002B',0.2)}`}}><span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,color:'#E4002B'}}>⚠ {belowCnt} sotto soglia</span></div>}
        </div>
        <div style={{flex:1}}/>
        {[['tutti','Tutti'],['in_mag','In magazzino'],['basso','Sotto soglia']].map(([k,l])=>(
          <button key={k} onClick={()=>setFilterM(k)} style={{padding:'4px 12px',borderRadius:99,fontFamily:'Nebulica',fontWeight:700,fontSize:11,cursor:'pointer',background:filterM===k?theme.ink:'transparent',color:filterM===k?'#fff':theme.sub,border:`1.4px solid ${filterM===k?theme.ink:rgba(theme.ink,0.22)}`,transition:'all .18s'}}>{l}</button>
        ))}
        <div style={{width:1,height:18,background:theme.line}}/>
        {[['asc','↑ stock'],['desc','↓ stock'],['az','A–Z']].map(([k,l])=>(
          <button key={k} onClick={()=>setSortM(k)} style={{padding:'4px 12px',borderRadius:99,fontFamily:'Nebulica',fontWeight:700,fontSize:11,cursor:'pointer',background:sortM===k?theme.ink:'transparent',color:sortM===k?'#fff':theme.sub,border:`1.4px solid ${sortM===k?theme.ink:rgba(theme.ink,0.22)}`,transition:'all .18s'}}>{l}</button>
        ))}
      </div>
      {/* Ink list */}
      <div style={{position:'relative',zIndex:10,flex:1,overflowY:'auto',padding:'14px 28px 32px'}}>
        {allInventario.length===0&&allInchiostri.length>0&&(
          <div style={{padding:'16px',borderRadius:16,background:rgba(theme.accent,0.07),border:`1px solid ${rgba(theme.accent,0.2)}`,marginBottom:16,fontFamily:'Nebulica',fontSize:13,color:theme.sub}}>
            💡 Nessun dato in magazzino. Aggiorna prima il <strong style={{color:theme.ink}}>Code.gs</strong> di Apps Script, poi usa <strong style={{color:theme.ink}}>+ Carico</strong> per registrare le scorte.
          </div>
        )}
        {filtered.map(ink=>{
          const pct=(ink.grammi/maxG)*100;
          const sc=ink.status==='vuoto'?'#E4002B':ink.status==='basso'?'#FF8C00':theme.accent;
          const isAlert=ink.status!=='ok';

  const H = Math.max(400, window.innerHeight-L_TOP);
  const maxScroll = Math.max(0,(list.length-1)*STEP+ACTIVE_H-H);
  const isDetail = selectedIdx!==null;
  const selected = isDetail?list[selectedIdx]:null;
  const recipeVisible = phase==='open';
  React.useEffect(()=>()=>{clearTimeout(timer.current);if(inertia.current.raf)cancelAnimationFrame(inertia.current.raf);},[]);
  React.useEffect(()=>{
    if(prevDetail.current!==isDetail){setBumpDir(isDetail?'open':'close');setBump(b=>b+1);prevDetail.current=isDetail;}
  },[isDetail]);
  React.useEffect(()=>{ scrollRef.current=scrollY; },[scrollY]);
  const applyScrollDirect = sy=>{
    const visMax=H+ACTIVE_H*2;
    list.forEach((_,i)=>{
      const el=cardRefs.current[i]; if(!el) return;
      const s=i*STEP-sy;
      if(s>visMax) return;
      el.style.top=(s>=0?L_TOP+s:L_TOP)+'px';
    });
  };
  const openCard = i=>{
    if(phase!=='closed') return;
    setSelectedIdx(i); setPhase('lifting'); clearTimeout(timer.current);
    timer.current=setTimeout(()=>setPhase('open'),340);
  };
  const onBack = ()=>{
    if(phase!=='open') return;
    setPhase('closing'); clearTimeout(timer.current);
    timer.current=setTimeout(()=>{setPhase('closed');setSelectedIdx(null);},320);
  };
  const onAreaDown = e=>{
    if(phase!=='closed') return;
    if(inertia.current.raf){cancelAnimationFrame(inertia.current.raf);inertia.current.raf=null;}
    const rect=areaRef.current.getBoundingClientRect();
    const now=performance.now();
    drag.current={active:true,startY:e.clientY,startScroll:scrollRef.current,moved:false,id:e.pointerId,downLocalY:e.clientY-rect.top,lastY:e.clientY,lastT:now,velPxMs:0};
    try{e.currentTarget.setPointerCapture(e.pointerId);}catch(_){}
    setDragging(true);
  };
  const onAreaMove = e=>{
    if(!drag.current.active) return;
    const dy=e.clientY-drag.current.startY;
    if(Math.abs(dy)>5) drag.current.moved=true;
    const now=performance.now();
    const dt=now-drag.current.lastT;
    if(dt>0){const inst=(e.clientY-drag.current.lastY)/dt;drag.current.velPxMs=drag.current.velPxMs*0.6+inst*0.4;}
    drag.current.lastY=e.clientY; drag.current.lastT=now;
    const newSY=Math.max(0,Math.min(maxScroll,drag.current.startScroll-dy));
    scrollRef.current=newSY;
    applyScrollDirect(newSY);
  };
  const onAreaUp = e=>{
    if(!drag.current.active) return;
    drag.current.active=false; setDragging(false);
    if(!drag.current.moved){
      const el=document.elementFromPoint(e.clientX,e.clientY);
      const card=el&&el.closest('[data-cardidx]');
      if(card) openCard(parseInt(card.getAttribute('data-cardidx'),10));
    } else {
      const vel=drag.current.velPxMs;
      if(Math.abs(vel)>0.08){
        const ref=inertia.current;
        ref.vel=-vel;
        ref.lastT=performance.now();
        ref.maxS=maxScroll;
        const step=now=>{
          const dt=Math.min(now-ref.lastT,32); ref.lastT=now;
          ref.vel*=Math.pow(0.97,dt/16.67);
          if(Math.abs(ref.vel)<0.005){ref.raf=null;setScrollY(scrollRef.current);return;}
          const next=scrollRef.current+ref.vel*dt;
          const clamped=Math.max(0,Math.min(ref.maxS,next));
          if(clamped!==next) ref.vel=0;
          scrollRef.current=clamped;
          applyScrollDirect(clamped);
          ref.raf=requestAnimationFrame(step);
        };
        ref.raf=requestAnimationFrame(step);
      } else {
        setScrollY(scrollRef.current);
      }
    }
  };
  let dur,ease;
  if(phase==='lifting'){dur=340;ease=EASE_OPEN_SNAPPY;}
  else if(phase==='open'){dur=480;ease=EASE_OPEN_SPRING;}
  else if(phase==='closing'){dur=300;ease=EASE_CLOSE_QUICK;}
  else{dur=360;ease=EASE_CLOSE_CALM;}
  const layoutClosed = i=>{
    const s=i*STEP-scrollRef.current;
    if(s>=0) return {top:L_TOP+s,height:ACTIVE_H,scale:1,opacity:1,z:300+i};
    return {top:L_TOP,height:ACTIVE_H,scale:1,opacity:1,z:100+i};
  };
  const posFor = i=>{
    const isSel=i===selectedIdx;
    if(phase==='closed') return layoutClosed(i);
    if(isSel){
      if(phase==='open'){
        if(cardStyle==='split') return {top:118,height:170,opacity:1,z:999,scale:1};
        return {top:detailTop,height:walletOpenHeight(list[i],headerH),opacity:1,z:999,scale:1};
      }
      return {top:liftTop,height:ACTIVE_H,opacity:1,z:999,scale:liftScale};
    }
    return {top:760,height:ACTIVE_H,opacity:0,z:1,scale:0.96};
  };
  return (
    <div style={{width:'100%',height:'100%',background:bg,position:'relative',overflow:'hidden',fontFamily:'Nebulica,system-ui,sans-serif',WebkitFontSmoothing:'antialiased'}}>
      {(() => {
        const blobSizes = {morbide:{s:380,b:70,o:0.55},tonde:{s:260,b:40,o:0.65},ampie:{s:560,b:110,o:0.40},nessuna:{s:0,b:0,o:0}};
        const bs = blobSizes[blobShape]||blobSizes.morbide;

            {showBlob&&<React.Fragment>
              <div style={{position:'absolute',top:'15%',left:'-25%',width:bs.s,height:bs.s,borderRadius:'50%',background:selected.hex,filter:`blur(${bs.b}px)`,opacity:bs.o,animation:`wp2blob1 ${d1}s ease-in-out infinite`}}/>
              <div style={{position:'absolute',bottom:'-10%',right:'-20%',width:Math.round(bs.s*0.94),height:Math.round(bs.s*0.94),borderRadius:'50%',background:selected.hex,filter:`blur(${bs.b}px)`,opacity:bs.o+0.1,animation:`wp2blob2 ${d2}s ease-in-out infinite`}}/>
            </React.Fragment>}
          </div>
        );
      })()}
      {grain&&<svg style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:0.1,mixBlendMode:'multiply',pointerEvents:'none',zIndex:1}}>
        <filter id="wpx-grain"><feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" stitchTiles="stitch"/><feColorMatrix values="0 0 0 0 0.35 0 0 0 0 0.3 0 0 0 0 0.25 0 0 0 0.4 0"/></filter>
        <rect width="100%" height="100%" filter="url(#wpx-grain)"/>
      </svg>}
      {/* TITLE */}
      <div style={{position:'absolute',top:'calc(env(safe-area-inset-top, 44px) + 2px)',left:18,right:18,zIndex:5,opacity:isDetail?0:1,transform:isDetail?'translateY(-6px)':'none',transition:'opacity .26s, transform .26s',pointerEvents:'none'}}>
        <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:26,lineHeight:0.95,letterSpacing:-0.8,color:'#0B0B0B'}}>Ricettario</div>
        <div style={{fontFamily:'Nebulica',fontSize:10,letterSpacing:1.4,fontWeight:700,color:'rgba(0,0,0,0.5)',marginTop:3}}>{list.length} PANTONE · SICO</div>
      </div>
      {/* TOP BAR */}
      <div style={{position:'absolute',top:'calc(env(safe-area-inset-top, 44px) + 48px)',left:18,right:18,zIndex:1000,height:40}}>
        {onSettings&&(

        <div onClick={isDetail?onBack:()=>{setSearchActive(true);setTimeout(()=>searchInputRef.current&&searchInputRef.current.focus(),60);}} style={{position:'absolute',left:isDetail?0:(onSettings?46:0),top:0,height:40,width:isDetail?124:(onSettings?'calc(100% - 92px)':'calc(100% - 50px)'),borderRadius:99,overflow:'hidden',background:bg,border:pillBorders?`${borderWidth}px solid #0B0B0B`:'1px solid rgba(0,0,0,0.08)',cursor:'pointer',pointerEvents:(isDetail?recipeVisible:true)?'auto':'none',transition:'width .54s cubic-bezier(.34,1.56,.55,1), left .54s cubic-bezier(.34,1.56,.55,1)',zIndex:2}}>

          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>

      <div ref={areaRef} onPointerDown={onAreaDown} onPointerMove={onAreaMove} onPointerUp={onAreaUp} onPointerCancel={onAreaUp}
        style={{position:'absolute',top:0,left:18,right:18,bottom:0,zIndex:4,pointerEvents:phase==='closed'?'auto':'none',touchAction:'none',cursor:phase==='closed'?(dragging?'grabbing':'grab'):'default'}}>

          {list.map((p,i)=>{

              <div key={p.code} data-cardidx={i} ref={el=>{if(el)cardRefs.current[i]=el;else delete cardRefs.current[i];}} style={{position:'absolute',left:0,right:0,top:pos.top,height:pos.height,opacity:pos.opacity,zIndex:pos.z,transform:`scale(${pos.scale})`,transformOrigin:'50% 0%',pointerEvents:pos.opacity>0.2?'auto':'none',cursor:'inherit',transition:noAnim?'none':`top ${dur}ms ${ease}, height ${dur}ms ${ease}, transform ${dur}ms ${ease}, opacity ${Math.round(dur*0.8)}ms ease`,borderRadius:22,overflow:'hidden',boxShadow:isSel&&phase!=='closed'?'0 26px 48px rgba(0,0,0,0.22)':'0 10px 24px rgba(0,0,0,0.12)'}}>

              </div>
            );

        </div>
      </div>
      {cardStyle==='split'&&selected&&<SplitRecipePanel pantone={selected} open={recipeVisible} easeIn={EASE_OPEN_SPRING} easeOut={EASE_CLOSE_QUICK} pillBorders={pillBorders} borderWidth={borderWidth}/>}
      <BottomNav active={0} accent={accent} restColor="#0B0B0B" bg={bg} onNuova={onNuova}/>
    </div>
  );
}

};

function MobileApp() {
  const [settings, setSettings] = React.useState(MOBILE_DEFAULTS);
  const setSetting = (k,v) => setSettings(s=>({...s,[k]:v}));
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const [nuovaOpen, setNuovaOpen] = React.useState(false);
  const [editCode, setEditCode] = React.useState(null);
  const bg = settings.theme==='grey'?'#E6E4DE':'#F4EFE2';
  const mobileTheme = React.useMemo(()=>deriveTheme({
    theme:settings.theme, accent:settings.accent, display:'Nebulica',
    borders:settings.borders, borderWidth:settings.borderWidth,
    grain:settings.grain, blobAnim:settings.blobAnim,
    blobShape:settings.blobShape, blobSpeed:settings.blobSpeed,
    cardSurface:'opaco',
  }),[settings.theme,settings.accent,settings.borders,settings.borderWidth,settings.grain,settings.blobAnim,settings.blobShape,settings.blobSpeed]);
  React.useEffect(()=>{
    let m=document.querySelector('meta[name="theme-color"]');
    if(!m){m=document.createElement('meta');m.name='theme-color';document.head.appendChild(m);}
    m.content=bg;
    document.body.style.background=bg;
  },[bg]);
  return (
    <div style={{width:'100%',height:'100%',position:'relative'}}>
      <WalletProtoExtract
        bg={bg}
        accent={settings.accent}
        pillBorders={settings.borders}
        borderWidth={settings.borderWidth}
        grain={settings.grain}
        blobAnim={settings.blobAnim}
        blobShape={settings.blobShape}
        blobSpeed={settings.blobSpeed}
        onSettings={()=>setSettingsOpen(true)}
        onNuova={()=>setNuovaOpen(true)}
        onEdit={(code)=>setEditCode(code)}
        cardStyle={settings.cardStyle}
      />
      <MobileSettingsPanel
        open={settingsOpen}
        onClose={()=>setSettingsOpen(false)}
        settings={settings}
        setSetting={setSetting}
      />
      <NuovaSheet open={nuovaOpen} onClose={()=>setNuovaOpen(false)} theme={mobileTheme}/>
      <EditSheet open={!!editCode} editCode={editCode} onClose={()=>setEditCode(null)} theme={mobileTheme}/>
    </div>
  );
}

/* ═══════════════════ APP ROOT ═══════════════════ */
function LoadingScreen() {
  const [dots, setDots] = React.useState('');
  React.useEffect(()=>{const t=setInterval(()=>setDots(d=>d.length>=3?'':d+'.'),400); return()=>clearInterval(t);},[]);
  return (
    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#F4EFE2',fontFamily:'Nebulica,system-ui,sans-serif'}}>
      <div style={{width:56,height:56,borderRadius:'50%',background:'rgba(0,51,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:24}}>
        <div style={{width:24,height:24,borderRadius:'50%',border:'3px solid #0033FF',borderTopColor:'transparent',animation:'spin 0.8s linear infinite'}}/>
      </div>
      <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:22,letterSpacing:-0.6,color:'#0B0B0B'}}>Ricettario</div>
      <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:11,letterSpacing:1.2,color:'rgba(11,11,11,0.45)',marginTop:6}}>SICO · caricamento{dots}</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg);}}`}</style>
    </div>
  );
}

function ErrorScreen({onRetry}) {
  return (
    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#F4EFE2',fontFamily:'Nebulica,system-ui,sans-serif',padding:32}}>
      <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:20,color:'#0B0B0B',marginBottom:8}}>Errore di caricamento</div>
      <div style={{fontFamily:'Nebulica',fontSize:14,color:'rgba(11,11,11,0.55)',marginBottom:24,textAlign:'center',maxWidth:280}}>Controlla la connessione e che il foglio Google sia pubblico.</div>
      <button onClick={onRetry} style={{padding:'12px 28px',borderRadius:99,background:'#0033FF',color:'#fff',border:'none',fontFamily:'Nebulica',fontWeight:700,fontSize:15,cursor:'pointer'}}>Riprova</button>
    </div>
  );
}

function KioskView({ rawCode }) {
  const code = decodeURIComponent(rawCode.replace(/\+/g,' ')).trim();
  const [show, setShow] = React.useState(false);
  const [qty, setQty] = React.useState(100);

  const pantone = DESK_PANTONES.find(p => p.code === code);
  const recipe  = React.useMemo(() => pantone ? makeRecipe(pantone) : null, [code]);

  React.useEffect(() => {
    const t = setTimeout(() => setShow(true), 80);
    return () => clearTimeout(t);
  }, []);

  if (!pantone) {
    return (
      <div style={{
        position:'fixed', inset:0, background:'#F4EFE2', display:'flex',
        flexDirection:'column', alignItems:'center', justifyContent:'center',
        fontFamily:'Nebulica,system-ui,sans-serif', padding:32, gap:10, textAlign:'center',
      }}>
        <div style={{fontWeight:700, fontSize:18, color:'#0B0B0B'}}>Colore non trovato</div>
        <div style={{fontSize:14, color:'rgba(11,11,11,0.5)'}}>Il codice <b>{code}</b> non è presente nell'archivio.</div>
      </div>
    );
  }

  const fg    = textOnDesk(pantone.hex);
  const fgSub = fg === '#fff' ? 'rgba(255,255,255,0.6)' : 'rgba(11,11,11,0.48)';
  const blobColor = fg === '#fff' ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.10)';

  return (
    <div style={{
      position:'fixed', inset:0, overflow:'hidden',
      background: pantone.hex,
      fontFamily:'Nebulica,system-ui,sans-serif',
    }}>
      {/* Blobs per profondità */}
      {[
        {top:'-18%', left:'25%',  size:'75vw', delay:0  },
        {top:'60%',  left:'78%',  size:'60vw', delay:120},
        {top:'40%',  left:'-12%', size:'55vw', delay:60 },
      ].map((b,i) => (
        <div key={i} style={{
          position:'absolute', top:b.top, left:b.left,
          width:b.size, height:b.size, borderRadius:'50%',
          background:blobColor, filter:'blur(72px)',
          opacity: show ? 1 : 0,
          transition:`opacity 1s ease ${b.delay}ms`,
          pointerEvents:'none', transform:'translate(-50%,-50%)',
        }}/>
      ))}

      {/* Codice + nome (area colore in alto) */}
      <div style={{
        position:'absolute',
        top:'calc(env(safe-area-inset-top,44px) + 40px)',
        left:28,
        opacity: show ? 1 : 0,
        transform: show ? 'translateY(0)' : 'translateY(-10px)',
        transition:'opacity 0.5s ease 0.18s, transform 0.5s ease 0.18s',
      }}>
        <div style={{fontWeight:700, fontSize:44, color:fg, lineHeight:1, letterSpacing:'-1px', marginBottom:8}}>
          {pantone.code}
        </div>
        <div style={{fontSize:13, color:fgSub, letterSpacing:'1.5px', textTransform:'uppercase', fontWeight:500}}>
          {pantone.name.replace('*','')}
        </div>
      </div>

      {/* Card formula (sale dal basso) */}
      <div style={{
        position:'absolute', left:0, right:0, bottom:0, top:'38%',
        background:'#FEFCF8',
        borderRadius:'28px 28px 0 0',
        boxShadow:'0 -2px 36px rgba(0,0,0,0.13)',
        overflowY:'auto', WebkitOverflowScrolling:'touch',
        padding:`24px 24px calc(env(safe-area-inset-bottom,16px) + 32px)`,
        transform: show ? 'translateY(0)' : 'translateY(100%)',
        transition:`transform 0.55s ${EASE_OPEN_SPRING} 0.05s`,
      }}>
        {/* Pillole quantità */}
        <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:7, marginBottom:24}}>
          {QUANTITIES.map(q => (
            <button key={q.grams} onClick={() => setQty(q.grams)} style={{
              padding:'11px 0', borderRadius:99,
              border:`1.5px solid ${qty===q.grams ? pantone.hex : 'rgba(11,11,11,0.14)'}`,
              background: qty===q.grams ? pantone.hex : 'transparent',
              color: qty===q.grams ? textOnDesk(pantone.hex) : '#0B0B0B',
              fontFamily:'Nebulica', fontWeight:700, fontSize:12,
              cursor:'pointer', outline:'none',
              transition:'background 0.18s, border-color 0.18s, color 0.18s',
              WebkitTapHighlightColor:'transparent',
            }}>
              {q.label}
            </button>
          ))}
        </div>

        {/* Intestazione formula */}
        <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:20}}>
          <div style={{flex:1, height:1, background:'rgba(11,11,11,0.10)'}}/>
          <span style={{fontSize:11, fontWeight:700, letterSpacing:'1.5px', color:'rgba(11,11,11,0.38)', textTransform:'uppercase'}}>
            FORMULA · {recipe.inks.length} {recipe.inks.length===1?'INCHIOSTRO':'INCHIOSTRI'}
          </span>
          <div style={{flex:1, height:1, background:'rgba(11,11,11,0.10)'}}/>
        </div>

        {/* Righe inchiostro */}
        <div style={{display:'flex', flexDirection:'column', gap:16}}>
          {recipe.inks.map((ink, i) => {
            const g = (ink.pct/100)*qty;
            const gs = g < 10 ? g.toFixed(2) : g.toFixed(1);
            return (
              <div key={ink.name} style={{
                opacity: show ? 1 : 0,
                transform: show ? 'translateY(0)' : 'translateY(6px)',
                transition:`opacity 0.4s ease ${0.3+i*0.08}s, transform 0.4s ease ${0.3+i*0.08}s`,
              }}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:6}}>
                  <span style={{fontWeight:600, fontSize:15, color:'#0B0B0B'}}>{ink.name}</span>
                  <span style={{fontWeight:700, fontSize:17, color:'#0B0B0B', fontVariantNumeric:'tabular-nums'}}>
                    {gs} <span style={{fontSize:12, fontWeight:500, color:'rgba(11,11,11,0.38)'}}>g</span>
                  </span>
                </div>
                <div style={{height:5, borderRadius:99, background:'rgba(11,11,11,0.07)', overflow:'hidden'}}>
                  <div style={{
                    height:'100%', borderRadius:99,
                    background:pantone.hex, opacity:0.75,
                    width:`${ink.pct}%`,
                    transition:'width 0.35s ease',
                  }}/>
                </div>
              </div>
            );
          })}
        </div>

        {/* Totale */}
        <div style={{
          display:'flex', justifyContent:'space-between', alignItems:'center',
          marginTop:22, paddingTop:18,
          borderTop:'1.5px solid rgba(11,11,11,0.08)',
        }}>
          <span style={{fontSize:11, fontWeight:700, letterSpacing:'1.5px', color:'rgba(11,11,11,0.38)', textTransform:'uppercase'}}>
            TOTALE
          </span>
          <span style={{fontWeight:700, fontSize:20, color:'#0B0B0B', fontVariantNumeric:'tabular-nums'}}>
            {qty>=1000?'1 000':qty} <span style={{fontSize:13, fontWeight:500, color:'rgba(11,11,11,0.38)'}}>g</span>
          </span>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [status, setStatus] = React.useState('loading');
  const [dataVer, setDataVer] = React.useState(0);
  const [isMobile] = React.useState(()=>window.innerWidth<1024);
  const kioskCode = React.useMemo(()=>{ const p=new URLSearchParams(window.location.search); return p.get('pantone')||null; },[]);

  const doLoad = React.useCallback(()=>{
    setStatus('loading');
    loadData().then(()=>{
      setDataVer(v=>v+1);
      setStatus('ready');
      loadFavoriti();
      loadInventario();
    }).catch(err=>{
      console.error('Errore caricamento:', err);
      setStatus('error');
    });
  },[]);

  React.useEffect(()=>{ doLoad(); },[]);

  React.useEffect(()=>{
    window._bumpData=()=>setDataVer(v=>v+1);
    window._refreshData=()=>{ loadData().then(()=>setDataVer(v=>v+1)).catch(()=>{}); };
    return()=>{ delete window._bumpData; delete window._refreshData; };
  },[]);

  if(status==='loading') return <LoadingScreen/>;
  if(status==='error') return <ErrorScreen onRetry={doLoad}/>;
  if(kioskCode) return <KioskView rawCode={kioskCode}/>;

  if(isMobile) {
    return <MobileApp/>;
  }
  return <DesktopApp defaults={DESK_DEFAULTS}/>;
}

const rootEl = document.getElementById('root');
const reactRoot = ReactDOM.createRoot(rootEl);
reactRoot.render(<App/>);

</script>
