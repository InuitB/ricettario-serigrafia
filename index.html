async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const rows = json.table.rows;
  const cols = json.table.cols.map(c => (c.label || '').trim());
  if (!rows || rows.length === 0) return [];
  return rows.map(r => {
    const obj = {};
    cols.forEach((c, i) => {
      const val = r.c && r.c[i] ? (r.c[i].v !== null && r.c[i].v !== undefined ? String(r.c[i].v).trim() : '') : '';
      obj[c] = val;
    });
    return obj;
  }).filter(r => Object.values(r).some(v => v !== ''));
}

async function loadData() {
  const [ricette, componenti, inchiostri] = await Promise.all([
    fetchSheet('Ricette'), fetchSheet('Componenti'), fetchSheet('Inchiostri'),
  ]);
  allRicette = ricette;
  allComponenti = componenti;
  allInchiostri = inchiostri;
  transformData();
}

function transformData() {
  DESK_PANTONES = allRicette.map(r => {
    const code = r.Pantone_ID;
    const hexRaw = (r.HEX || PANTONE_DB[code] || 'CCCCCC').replace('#','').toUpperCase();
    const hex = '#' + hexRaw;
    const name = PANTONE_NAMES[code] || code;
    const family = (r.Categoria || 'neutro').toLowerCase().trim();
    const comps = allComponenti.filter(c => c.Pantone_ID === code);
    const ink = Math.max(1, comps.length);
    const page = parseInt(r.Pagina) || 0;
    const coherence = 70 + (hashStr(code) % 30);
    return { code, hex, name, family, ink, page, coherence };
  });
}

/* ═══════════════════ HELPERS ═══════════════════ */
function hashStr(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return Math.abs(h);
}
function textOnDesk(hex) {
  const h = (hex||'').replace('#','');
  if (h.length < 6) return '#0B0B0B';
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return (0.299*r + 0.587*g + 0.114*b)/255 > 0.62 ? '#0B0B0B' : '#fff';
}
const textOn4 = textOnDesk;
function rgba(hex, a) {
  let h = (hex||'').replace('#','');
  if (h.length === 3) h = h.split('').map(c=>c+c).join('');
  if (h.length < 6) return `rgba(0,0,0,${a})`;
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

const NOTES = {
  '699 U':'Aggiungere la base bianca per ultima e mescolare lentamente. Tende a virare al caldo dopo 48h: tenere il barattolo coperto.',
  '072 U':'Inchiostro molto coprente: stendere uno strato sottile. Resa migliore su carta patinata.',

  '266 U':'Cliente Brand Aurora: tolleranza ΔE ≤ 1,5. Confrontare sempre con la guida fisica.',
};
const PROJECTS = ['Risanamento 23','Catalogo Primavera','Brand Aurora','Packaging Olio','Manifesto Teatro','Rivista N.12'];
const INK_POOL = [
  {name:'AS 90',label:'Base bianca'},{name:'AS 65',label:'Giallo'},{name:'AS 150',label:'Magenta'},
  {name:'AS 320',label:'Cyan'},{name:'AS 47',label:'Nero'},{name:'AS 12',label:'Rosso'},
  {name:'AS 88',label:'Blu'},{name:'AS 33',label:'Verde'},{name:'AS 70',label:'Arancio'},
];

function makeRecipeFallback(p) {
  const note = NOTES[p.code] || null;
  if (p.code === '699 U') return { inks:[{name:'AS 90',label:'Base bianca',pct:75},{name:'AS 65',label:'Giallo',pct:6.25},{name:'AS 150',label:'Magenta',pct:18.75}], project:'Risanamento 23', note };
  const h = hashStr(p.code);
  const n = Math.max(1, Math.min(p.ink||2, 4));
  const light = textOnDesk(p.hex) === '#0B0B0B';
  const idxs = [];
  if (light) idxs.push(0);
  let cursor = 1 + (h % 6);
  while (idxs.length < n) { const i = cursor % INK_POOL.length; if (!idxs.includes(i)) idxs.push(i); cursor += 1 + ((h >> idxs.length) % 4); }
  let weights = idxs.map((_,k) => { const seed = (h >> (k*3)) % 100; return k===0 ? (light ? 55+(seed%30) : 40+(seed%30)) : 6+(seed%26); });
  const sum = weights.reduce((a,b)=>a+b,0);
  let pcts = weights.map(w => Math.round((w/sum)*10000)/100);
  const diff = Math.round((100-pcts.reduce((a,b)=>a+b,0))*100)/100;
  pcts[pcts.length-1] = Math.round((pcts[pcts.length-1]+diff)*100)/100;
  const inks = idxs.map((i,k)=>({name:INK_POOL[i].name,label:INK_POOL[i].label,pct:pcts[k]})).sort((a,b)=>b.pct-a.pct);
  return { inks, project:PROJECTS[h % PROJECTS.length], note };
}

function makeRecipe(p) {
  if (!p) return makeRecipeFallback({code:'?',hex:'#888',ink:2});
  const code = typeof p === 'string' ? p : p.code;
  const pantone = typeof p === 'string' ? (DESK_PANTONES.find(x=>x.code===p)||{code,hex:'#888',ink:2}) : p;
  const comps = allComponenti.filter(c => c.Pantone_ID === code);
  if (comps.length === 0) return makeRecipeFallback(pantone);
  const r = allRicette.find(x => x.Pantone_ID === code);
  const note = (r && r.Note) ? r.Note : (NOTES[code]||null);
  const project = (r && r.Progetti) ? r.Progetti : PROJECTS[hashStr(code) % PROJECTS.length];
  const totalBase = comps.reduce((s,c) => s+(parseFloat(c['Dose_40g (g)'])||0), 0);
  const inks = comps.map(c => {
    const dose = parseFloat(c['Dose_40g (g)'])||0;
    const pct = totalBase > 0 ? Math.round((dose/totalBase)*10000)/100 : 0;
    return {name:c.Inchiostro, label:c.Inchiostro, pct};
  }).sort((a,b)=>b.pct-a.pct);
  return {inks, project, note};
}

function walletOpenHeight(pantone, headerH=150) {
  const r = makeRecipe(pantone);
  const rows = r.inks.length;
  const body = 20+23+40+20+24+rows*47+(r.note?76:0)+20+48+14+18+26;
  return Math.round(headerH + body);
}

function deriveTheme(t) {

function IToggle({value, onChange, theme}) {

    <button onClick={()=>onChange(!value)} style={{width:50,height:30,borderRadius:99,border:'none',cursor:'pointer',background:value?theme.accent:rgba('#000',0.16),position:'relative',transition:`background .3s ${QUICK}`,flexShrink:0}}>
      <span style={{position:'absolute',top:3,left:3,width:24,height:24,borderRadius:99,background:'#fff',boxShadow:'0 2px 5px rgba(0,0,0,0.25)',transform:value?'translateX(20px)':'translateX(0)',transition:`transform .34s ${SPRING}`}}/>
    </button>
  );
}
function ISlider({value, min, max, step, onChange, theme, unit=''}) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:12,flex:1}}>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(parseFloat(e.target.value))} style={{flex:1,accentColor:theme.accent,cursor:'pointer'}}/>
      <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:12,color:theme.sub,minWidth:38,textAlign:'right'}}>{value}{unit}</span>
    </div>
  );
}

function SettingsPanel({open, onClose, settings, setSetting, theme}) {
  const accents = ['#0033FF','#E4002B','#1F8A5B','#F66257','#0B0B0B'];
  const fonts = ['Nebulica','Bricolage Grotesque','Instrument Serif'];
  const shapes = [{k:'morbide',l:'Morbide'},{k:'tonde',l:'Tonde'},{k:'ampie',l:'Ampie'},{k:'nessuna',l:'Nessuna'}];
  const Row = ({label,children})=>(
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:16,padding:'12px 0',borderTop:`1px solid ${theme.line}`}}>
      <span style={{fontFamily:'Nebulica',fontSize:14,fontWeight:600,color:theme.ink,whiteSpace:'nowrap'}}>{label}</span>
      {children}
    </div>
  );
  const Block = ({label,children})=>(
    <div style={{padding:'12px 0',borderTop:`1px solid ${theme.line}`}}>
      <div style={{fontFamily:'Nebulica',fontSize:14,fontWeight:600,color:theme.ink,marginBottom:9}}>{label}</div>
      {children}
    </div>
  );
  const Pills = ({value,options,onChange})=>(
    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
      {options.map(o=>{const on=value===o.k; return <button key={o.k} onClick={()=>onChange(o.k)} style={{padding:'7px 13px',borderRadius:99,cursor:'pointer',fontFamily:'Nebulica',fontWeight:600,fontSize:12.5,color:on?'#fff':theme.sub,...glass(theme,{active:on})}}>{o.l}</button>;})}
    </div>
  );
  const Head = t=><div style={{fontFamily:'Nebulica',fontSize:11,letterSpacing:1.3,fontWeight:700,color:theme.faint,margin:'14px 0 2px'}}>{t}</div>;
  return (
    <React.Fragment>

      <div style={{position:'absolute',top:88,left:28,width:348,maxHeight:'calc(100% - 116px)',overflowY:'auto',zIndex:810,transformOrigin:'0% 0%',transform:open?'scale(1)':'scale(.9)',opacity:open?1:0,pointerEvents:open?'auto':'none',transition:`transform .42s ${SPRING}, opacity .3s`,borderRadius:28,padding:'20px 22px 22px',background:theme.panel,border:`1px solid ${theme.line}`,boxShadow:`0 30px 70px ${rgba('#000',0.22)}`}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
          <span style={{fontFamily:theme.display,fontWeight:theme.displayWeight,fontSize:22,letterSpacing:-0.5,color:theme.ink,fontStyle:theme.isSerif?'italic':'normal'}}>Impostazioni</span>
          <IconPill Icon={IcoClose} theme={theme} size={36} onClick={onClose} title="Chiudi"/>
        </div>
        {Head('GRAFICA')}
        <Row label="Sfondo"><div style={{display:'flex',gap:8}}>{[{k:'cream',c:'#F4EFE2'},{k:'grey',c:'#E6E4DE'}].map(o=>{const on=settings.theme===o.k; return <button key={o.k} onClick={()=>setSetting('theme',o.k)} style={{width:34,height:34,borderRadius:99,cursor:'pointer',background:o.c,border:on?`2.5px solid ${theme.ink}`:`1px solid ${theme.line2}`,boxShadow:on?`0 0 0 2px ${theme.panel}, 0 0 0 3.5px ${theme.ink}`:'none'}}/>;})}
        </div></Row>
        <Row label="Accento"><div style={{display:'flex',gap:8}}>{accents.map(c=>{const on=settings.accent===c; return <button key={c} onClick={()=>setSetting('accent',c)} style={{width:30,height:30,borderRadius:99,cursor:'pointer',background:c,border:'none',boxShadow:on?`0 0 0 2px ${theme.panel}, 0 0 0 4px ${theme.ink}`:`inset 0 0 0 1px ${rgba('#000',0.1)}`}}/>;})}
        </div></Row>
        <Row label="Bordi neri"><IToggle value={settings.borders} onChange={v=>setSetting('borders',v)} theme={theme}/></Row>
        <Row label="Spessore bordo"><ISlider value={settings.borderWidth} min={0.5} max={4} step={0.5} unit="px" onChange={v=>setSetting('borderWidth',v)} theme={theme}/></Row>
        <Block label="Superficie scheda"><Pills value={settings.cardSurface} options={[{k:'opaco',l:'Opaca'},{k:'frosted',l:'Frosted'},{k:'trasparente',l:'Trasparente'}]} onChange={v=>setSetting('cardSurface',v)}/></Block>
        {Head('SFONDO · BLOB')}
        <Block label="Forme blob"><Pills value={settings.blobShape} options={shapes} onChange={v=>setSetting('blobShape',v)}/></Block>
        <Row label="Grana"><IToggle value={settings.grain} onChange={v=>setSetting('grain',v)} theme={theme}/></Row>

        <Row label="Velocità"><ISlider value={settings.blobSpeed} min={0.25} max={2.5} step={0.25} unit="×" onChange={v=>setSetting('blobSpeed',v)} theme={theme}/></Row>
        {Head('MASTER · ANIMAZIONE')}
        <Block label="Comparsa del dettaglio"><Pills value={settings.masterAnim||'rise'} options={[{k:'rise',l:'A · Slide-up'},{k:'morph',l:'B · Liquid + stagger'}]} onChange={v=>setSetting('masterAnim',v)}/></Block>
        {Head('TRANSIZIONE MODALITÀ')}
        <Block label="Animazione cambio vista"><Pills value={settings.modeTransition||'liquido'} options={[{k:'liquido',l:'Liquido'},{k:'scorrimento',l:'Scorrimento'},{k:'dissolvenza',l:'Dissolvenza'}]} onChange={v=>setSetting('modeTransition',v)}/></Block>
        {Head('FONT TITOLI')}
        <div style={{display:'flex',flexDirection:'column',gap:7,marginTop:6}}>
          {fonts.map(f=>{const on=settings.display===f; return (
            <button key={f} onClick={()=>setSetting('display',f)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',padding:'10px 15px',borderRadius:99,...glass(theme,{active:on}),fontFamily:f,fontSize:16,fontWeight:f==='Instrument Serif'?400:700,color:on?'#fff':theme.ink,fontStyle:f==='Instrument Serif'?'italic':'normal'}}>
              <span>{f}</span><span style={{fontFamily:f,fontStyle:f==='Instrument Serif'?'italic':'normal'}}>699 U</span>
            </button>
          );})}
        </div>
      </div>
    </React.Fragment>
  );
}

function WalletUnified({pantone, open, qty, setQty, theme, headerH=176, codeSize=46, onMeasure}) {
  const fg = textOnDesk(pantone.hex);
  const recipe = React.useMemo(()=>makeRecipe(pantone),[pantone.code]);
  const panelRef = React.useRef(null);
  React.useLayoutEffect(()=>{
    if(!open||!onMeasure||!panelRef.current) return;
    onMeasure(headerH + panelRef.current.scrollHeight);
  },[open,pantone.code,headerH,theme.cardSurface,theme.display]);
  return (
    <div style={{width:'100%',height:'100%',borderRadius:34,background:pantone.hex,position:'relative',overflow:'hidden',border:theme.borders?`${theme.borderWidth}px solid ${theme.ink}`:'none'}}>
      <div style={{padding:open?'24px 26px':'20px 22px',height:open?headerH:'100%',display:'flex',flexDirection:'column',justifyContent:'space-between',transition:`padding .45s ${SPRING_SOFT}`}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10}}>
          <PantoneCode code={pantone.code} tcx={pantone.tcx} fg={fg} size={open?64:codeSize} theme={theme}/>
          <span style={{fontFamily:'Nebulica',fontSize:12,fontWeight:600,color:fg,opacity:0.78,display:'inline-flex',alignItems:'center',gap:5,whiteSpace:'nowrap',paddingTop:5}}>
            <span style={{width:5,height:5,borderRadius:99,background:fg,opacity:0.5}}/>{pantone.ink} ink</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
          <span style={{fontFamily:'Nebulica',fontSize:open?17:14,fontWeight:500,color:fg,opacity:0.92}}>{pantone.name}</span>
          <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:10.5,color:fg,opacity:0.6,letterSpacing:0.4}}>PAG.{pantone.page} · {pantone.coherence}%</span>
        </div>
      </div>
      <div ref={panelRef} style={{position:'absolute',left:0,right:0,top:headerH,bottom:0,...surface(theme),opacity:open?1:0,transform:open?'translateY(0)':'translateY(22px)',transition:`opacity .34s ease, transform .5s ${SPRING_SOFT}`,transitionDelay:open?'.12s':'0s',overflowY:'auto',padding:'20px 26px 24px'}}>
        <div style={{fontFamily:'Nebulica',fontSize:11,letterSpacing:1.5,fontWeight:700,color:theme.sub,marginBottom:9}}>QUANTITÀ</div>
        <QuantityPicker value={qty} onChange={setQty} theme={theme}/>
        <div style={{marginTop:20}}><InkFormula pantone={pantone} recipe={recipe} qty={qty} theme={theme} play={open} anim="stagger"/></div>
        <NotesBlock note={recipe.note} theme={theme}/>
        <div style={{marginTop:20}}><PrintButton theme={theme}/></div>
        <div style={{marginTop:14,display:'flex',justifyContent:'space-between',fontFamily:'Nebulica',fontSize:11,letterSpacing:1.3,fontWeight:700,color:theme.sub}}>
          <span>PROGETTO</span><span style={{color:theme.accent}}>→ {recipe.project}</span></div>
      </div>
    </div>
  );
}

function WalletSideList({list, query, setQuery, selCode, onPick, theme, family, setFamily, ink, setInk}) {
  const q = (query||'').toLowerCase();
  const filtered = list.filter(p=>!q||`${p.code} ${p.name} ${p.family}`.toLowerCase().includes(q));
  const ROW=60, STEP=66;
  const hiIdx = filtered.findIndex(p=>p.code===selCode);
  return (
    <div style={{position:'absolute',top:88,left:0,bottom:0,width:300,zIndex:30,borderRight:`1px solid ${theme.line}`,display:'flex',flexDirection:'column'}}>
      <div style={{padding:'4px 18px 12px'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{flex:1,minWidth:0}}><SearchPill value={query} onChange={setQuery} theme={theme} w="100%" placeholder="cerca pantone…"/></div>
          {setFamily&&<FilterButton family={family} setFamily={setFamily} ink={ink} setInk={setInk} theme={theme} align="left"/>}
        </div>
        <div style={{fontFamily:'Nebulica',fontSize:10.5,letterSpacing:1.3,fontWeight:700,color:theme.sub,marginTop:12}}>{filtered.length} PANTONE</div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'4px 12px 22px',WebkitMaskImage:'linear-gradient(to bottom, transparent 0, #000 12px, #000 calc(100% - 14px), transparent 100%)',maskImage:'linear-gradient(to bottom, transparent 0, #000 12px, #000 calc(100% - 14px), transparent 100%)'}}>
        <div style={{position:'relative'}}>
          <div style={{position:'absolute',left:0,right:0,height:ROW,top:hiIdx*STEP,borderRadius:99,zIndex:0,background:rgba('#fff',theme.grey?0.5:0.58),backdropFilter:'blur(14px) saturate(150%)',WebkitBackdropFilter:'blur(14px) saturate(150%)',boxShadow:`0 8px 20px ${rgba('#000',0.08)}, inset 0 0 0 1px ${rgba('#fff',0.6)}`,opacity:hiIdx>=0?1:0,transition:`top .5s ${SPRING}, opacity .25s`}}/>
          {filtered.map(p=>{const on=p.code===selCode; return (
            <button key={p.code} onClick={()=>onPick(list.indexOf(p))} style={{position:'relative',zIndex:1,width:'100%',height:ROW,marginBottom:STEP-ROW,display:'flex',alignItems:'center',gap:12,textAlign:'left',cursor:'pointer',padding:'0 16px 0 12px',borderRadius:99,border:'none',background:'transparent'}}>
              <Swatch hex={p.hex} size={40} radius={99}/>
              <div style={{flex:1,minWidth:0}}>
                <span style={{fontFamily:theme.display,fontWeight:theme.isSerif?400:700,fontSize:17,letterSpacing:-0.4,color:theme.ink,fontStyle:theme.isSerif?'italic':'normal'}}>
                  {p.code.replace(' U','')}{p.code.includes(' U')&&<span style={{opacity:0.5,fontWeight:400,fontStyle:'normal'}}> U</span>}</span>
                <div style={{fontFamily:'Nebulica',fontSize:12,color:theme.sub,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
              </div>
              <div style={{display:'flex',gap:3}}>{Array.from({length:p.ink}).map((_,i)=><span key={i} style={{width:5,height:5,borderRadius:99,background:on?theme.accent:theme.faint}}/>)}</div>
            </button>
          );})}
        </div>
      </div>
    </div>
  );
}

function WalletMode({theme, mode, setMode, query, setQuery, onSettings}) {
  return <WalletRow theme={theme} mode={mode} setMode={setMode} query={query} setQuery={setQuery} onSettings={onSettings}/>;
}

function WalletRow({theme, mode, setMode, query, setQuery, onSettings, initialOpen=null}) {
  const [family, setFamily] = React.useState('tutti');
  const [ink, setInk] = React.useState(0);
  const list = React.useMemo(()=>DESK_PANTONES.filter(p=>(family==='tutti'||p.family===family)&&(!ink||p.ink===ink)&&(!query||`${p.code} ${p.name} ${p.family}`.toLowerCase().includes(query.toLowerCase()))),[family,ink,query,DESK_PANTONES.length]);
  const [sel, setSel] = React.useState(null);
  const [qty, setQty] = React.useState(100);
  const [scroll, setScroll] = React.useState(()=>initialOpen!=null?Math.max(0,initialOpen*236+105-500):0);
  const [hover, setHover] = React.useState(null);
  const drag = React.useRef({on:false,x0:0,s0:0,moved:false});
  const CARD_W=210,CARD_H=300,GAP=26,STEP=CARD_W+GAP,VIEW=1140,SB=300;
  const GROW_W=384,PART=(GROW_W-CARD_W)/2+34;
  const open = sel!==null && sel<list.length;
  const selP = open?list[sel]:null;
  const [measuredH, setMeasuredH] = React.useState(null);
  React.useEffect(()=>{setMeasuredH(null);},[sel]);
  const growH = open?(measuredH?Math.max(360,Math.min(760,measuredH)):Math.max(430,Math.min(720,walletOpenHeight(selP,150)))):624;
  const blobHex = open?selP.hex:(list[3]||list[0]||DESK_PANTONES[3]||{hex:'#FFCD00'}).hex;
  React.useEffect(()=>{setSel(null);},[family,ink,query]);
  const maxScroll = Math.max(0, list.length*STEP-VIEW);
  const clampS = v=>Math.max(-40,Math.min(maxScroll+40,v));
  const onWheel = e=>{if(open)return; setScroll(s=>clampS(s+(Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY)));};
  const onDown = e=>{if(open)return; drag.current={on:true,x0:e.clientX,s0:scroll,moved:false}; try{e.currentTarget.setPointerCapture(e.pointerId);}catch(_){}};
  const onMove = e=>{if(!drag.current.on)return; const dx=e.clientX-drag.current.x0; if(Math.abs(dx)>4)drag.current.moved=true; setScroll(clampS(drag.current.s0-dx));};
  const onUp = ()=>{drag.current.on=false;};
  const openCard = i=>{setSel(i);setQty(100); const target=i*STEP+CARD_W/2-(VIEW/2-70); setScroll(Math.max(0,target));};
  return (
    <div style={{width:'100%',height:'100%',position:'relative'}}>
      <GrainBlobs theme={theme} blobHex={blobHex}/>
      <WalletTopBar theme={theme} mode={mode} setMode={setMode} onSettings={onSettings} open={open} onBack={()=>setSel(null)}/>
      <WalletSideList list={list} query={query} setQuery={setQuery} selCode={open?selP.code:null} onPick={openCard} theme={theme} family={family} setFamily={setFamily} ink={ink} setInk={setInk}/>
      <div onWheel={onWheel} onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}
        style={{position:'absolute',top:88,left:SB,right:0,bottom:0,zIndex:10,overflow:'hidden',cursor:open?'default':(drag.current.on?'grabbing':'grab'),touchAction:'none'}}>
        <div style={{position:'absolute',left:70,top:'50%',height:1,width:1}}>
          {list.map((p,i)=>{
            const isSel=i===sel;
            let x=i*STEP-scroll, y=-CARD_H/2, w=CARD_W, h=CARD_H, z=10, op=1, lift=0, scale=1;
            if(open){if(isSel){w=GROW_W;h=growH;x=x-(GROW_W-CARD_W)/2;y=-growH/2-6;z=100;}else{x+=i<sel?-PART:PART;op=0.32;scale=0.96;}}
            else if(hover===i){lift=-30;scale=1.05;z=50;}
            return (
              <div key={p.code}
                onMouseEnter={()=>!open&&setHover(i)} onMouseLeave={()=>!open&&setHover(null)}
                onClick={()=>{if(open)return; if(!drag.current.moved)openCard(i);}}
                style={{position:'absolute',left:0,top:0,width:w,height:h,transform:`translate(${x}px,${y+lift}px) scale(${scale})`,transformOrigin:'50% 50%',zIndex:z,opacity:op,cursor:open?'default':'pointer',transition:`transform .55s ${FLUID_SOFT}, width .55s ${FLUID_SOFT}, height .55s ${FLUID_SOFT}, opacity .4s`,filter:isSel&&open?'drop-shadow(0 38px 64px rgba(0,0,0,0.28))':(hover===i?'drop-shadow(0 26px 46px rgba(0,0,0,0.22))':'drop-shadow(0 16px 32px rgba(0,0,0,0.16))')}}>
                <WalletUnified pantone={p} open={isSel} qty={qty} setQty={setQty} theme={theme} codeSize={42} headerH={150} onMeasure={isSel?setMeasuredH:undefined}/>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{position:'absolute',bottom:34,left:SB,right:0,textAlign:'center',zIndex:30,opacity:open?0:1,transition:'opacity .3s',pointerEvents:'none',fontFamily:'Nebulica',fontSize:11,letterSpacing:1.5,fontWeight:700,color:theme.faint}}>
        ROTELLA O TRASCINA PER SCORRERE · CLICCA UNA CARTA</div>
      <div style={{position:'absolute',left:SB+30,bottom:30,display:'flex',flexDirection:'row',gap:12,zIndex:45}}>
        {[{left:true,d:'M14 6l-6 6 6 6',can:open?sel>0:scroll>2},{left:false,d:'M10 6l6 6-6 6',can:open?sel<list.length-1:scroll<maxScroll-2}].map((b,i)=>(
          <button key={i} disabled={!b.can} onClick={()=>{if(open){openCard(Math.max(0,Math.min(list.length-1,sel+(b.left?-1:1))));}else setScroll(s=>clampS(s+(b.left?-STEP*3:STEP*3)));}}
            style={{width:54,height:54,borderRadius:99,cursor:b.can?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',border:theme.borders?`${theme.borderWidth}px solid ${theme.ink}`:'none',background:rgba('#fff',theme.grey?0.82:0.88),backdropFilter:'blur(16px) saturate(160%)',WebkitBackdropFilter:'blur(16px) saturate(160%)',boxShadow:`0 6px 16px ${rgba('#000',0.08)}`,opacity:b.can?1:0.4}}>
            <Ico d={b.d} size={25} color={theme.accent} sw={2}/>
          </button>
        ))}
      </div>
    </div>
  );
}

const CARD_W_GAL = 196;

      <div style={{width:'100%',height:172,borderRadius:16,background:p.hex,position:'relative',overflow:'hidden',boxShadow:`inset 0 0 0 1px ${rgba('#000',0.07)}`}}>
        <div style={{position:'absolute',top:12,right:12,display:'flex',gap:3.5}}>
          {Array.from({length:p.ink}).map((_,i)=><span key={i} style={{width:6,height:6,borderRadius:99,background:fg,opacity:0.72}}/>)}
        </div>
      </div>
      <div style={{padding:'13px 7px 6px'}}>
        <div style={{fontFamily:theme.display,fontWeight:theme.isSerif?400:700,fontSize:22,letterSpacing:-0.6,color:theme.ink,fontStyle:theme.isSerif?'italic':'normal',lineHeight:1}}>
          {p.code.replace(' U','')}{p.code.includes(' U')&&<span style={{opacity:0.5,fontWeight:400,fontStyle:'normal'}}> U</span>}{p.tcx&&<span style={{opacity:0.5,fontWeight:400,fontSize:13,marginLeft:4}}>TCX</span>}
        </div>
        <div style={{fontFamily:'Nebulica',fontSize:14,fontWeight:500,color:theme.ink,opacity:0.82,marginTop:5}}>{p.name}</div>
        <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:10,color:theme.faint,marginTop:6,letterSpacing:0.3,textTransform:'uppercase'}}>{p.family} · {p.hex.toUpperCase()}</div>
      </div>
    </button>

  const [fullW, setFullW] = React.useState(1440);
  ensureGalleryKf();
  React.useLayoutEffect(()=>{
    const measure=()=>{if(rootRef.current)setFullW(rootRef.current.clientWidth);};
    measure(); window.addEventListener('resize',measure); return ()=>window.removeEventListener('resize',measure);
  },[]);

          <div style={{position:'relative',height:rows*STEPY}}>
            {filtered.map((p,i)=>{

              return (
                <div key={p.code} style={{position:'absolute',left:0,top:0,width:CARD_W_GAL,transform:`translate(${col*STEPX}px,${row*STEPY}px)`,transition:`transform .6s ${FLUID_SOFT} ${col*28+row*16}ms`,willChange:'transform'}}>
                  <SwatchCard p={p} theme={theme} active={p.code===selCode} onClick={()=>{setSelCode(p.code);setQty(100);}}/>

        {sel&&<React.Fragment>
          <div key={'gh-'+sel.code} style={{background:sel.hex,padding:'30px 32px 26px',position:'relative',animation:`gFade .4s ${QUICK} both`}}>

function DesktopApp({defaults}) {
  const [settings, setSettings] = React.useState(()=>({...defaults}));
  React.useEffect(()=>setSettings(s=>({...s,...defaults})),[
    defaults.theme,defaults.accent,defaults.display,defaults.grain,defaults.borders,
    defaults.borderWidth,defaults.cardSurface,defaults.blobShape,defaults.blobSpeed,
    defaults.blobAnim,defaults.modeTransition]);
  const setSetting = (k,v)=>setSettings(s=>({...s,[k]:v}));
  const theme = React.useMemo(()=>deriveTheme(settings),[settings.theme,settings.accent,settings.display,settings.grain,settings.borders,settings.borderWidth,settings.cardSurface,settings.blobShape,settings.blobSpeed,settings.blobAnim]);
  const [mode, setMode] = React.useState('master');
  const [query, setQuery] = React.useState('');
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  ensureModeKf();
  const ORDER=['master','wallet','gallery'];
  const dirRef = React.useRef(1);
  const changeMode = m=>{if(m===mode)return; dirRef.current=ORDER.indexOf(m)>=ORDER.indexOf(mode)?1:-1; setMode(m);};
  const chrome = {theme, mode, setMode:changeMode, query, setQuery, onSettings:()=>setSettingsOpen(true)};
  let Body = null;
  if(mode==='master') Body=<MasterMode {...chrome} anim={settings.masterAnim||'rise'}/>;
  if(mode==='wallet') Body=<WalletMode {...chrome}/>;
  if(mode==='gallery') Body=<GalleryMode {...chrome} formulaAnim="slide"/>;
  const trans = settings.modeTransition||'liquido';
  const animName = trans==='dissolvenza'?'modeFade':(trans==='scorrimento'?(dirRef.current>0?'modeSlideR':'modeSlideL'):'modeLiquid');
  return (
    <div style={{width:'100%',height:'100%',position:'relative',overflow:'hidden',background:theme.bg,fontFamily:'Nebulica,system-ui,sans-serif'}}>
      <div key={mode} style={{width:'100%',height:'100%',animation:`${animName} .52s ${FLUID_SOFT} both`}}>
        {Body}
      </div>
      <SettingsPanel open={settingsOpen} onClose={()=>setSettingsOpen(false)} settings={settings} setSetting={setSetting} theme={theme}/>
    </div>
  );
}

/* ═══════════════════ MOBILE: WALLET PROTO EXTRACT (V38) ═══════════════════ */
function WalletProtoExtract({
  liftTop=196, detailTop=104, detailHeight=592, liftScale=1.05,
  headerH=150, pillBorders=true, bg='#F4EFE2',
}) {
  ensureBlobKeyframesV2();
  const list = DESK_PANTONES;
  const [selectedIdx, setSelectedIdx] = React.useState(null);
  const [phase, setPhase] = React.useState('closed');
  const [scrollY, setScrollY] = React.useState(0);
  const [dragging, setDragging] = React.useState(false);
  const [bump, setBump] = React.useState(0);
  const [bumpDir, setBumpDir] = React.useState('open');
  const prevDetail = React.useRef(false);
  const drag = React.useRef({active:false,startY:0,startScroll:0,moved:false,id:null});
  const areaRef = React.useRef(null);
  const timer = React.useRef(null);
  const ACTIVE_H=178, L_TOP=182, H=500, STEP=108, PIN=6;
  const maxScroll = Math.max(0,(list.length-1)*STEP+ACTIVE_H-H);
  const isDetail = selectedIdx!==null;
  const selected = isDetail?list[selectedIdx]:null;
  const recipeVisible = phase==='open';
  React.useEffect(()=>()=>clearTimeout(timer.current),[]);
  React.useEffect(()=>{
    if(prevDetail.current!==isDetail){setBumpDir(isDetail?'open':'close');setBump(b=>b+1);prevDetail.current=isDetail;}
  },[isDetail]);
  const openCard = i=>{
    if(phase!=='closed') return;
    setSelectedIdx(i); setPhase('lifting'); clearTimeout(timer.current);
    timer.current=setTimeout(()=>setPhase('open'),340);
  };
  const onBack = ()=>{
    if(phase!=='open') return;
    setPhase('closing'); clearTimeout(timer.current);
    timer.current=setTimeout(()=>{setPhase('closed');setSelectedIdx(null);},320);
  };
  const onAreaDown = e=>{
    if(phase!=='closed') return;
    const rect=areaRef.current.getBoundingClientRect();
    drag.current={active:true,startY:e.clientY,startScroll:scrollY,moved:false,id:e.pointerId,downLocalY:e.clientY-rect.top};
    try{e.currentTarget.setPointerCapture(e.pointerId);}catch(_){}
    setDragging(true);
  };
  const onAreaMove = e=>{
    if(!drag.current.active) return;
    const dy=e.clientY-drag.current.startY;
    if(Math.abs(dy)>5) drag.current.moved=true;
    setScrollY(Math.max(0,Math.min(maxScroll,drag.current.startScroll-dy)));
  };
  const onAreaUp = e=>{
    if(!drag.current.active) return;
    drag.current.active=false; setDragging(false);
    if(!drag.current.moved){
      const el=document.elementFromPoint(e.clientX,e.clientY);
      const card=el&&el.closest('[data-cardidx]');
      if(card) openCard(parseInt(card.getAttribute('data-cardidx'),10));
    }
  };
  let dur,ease;
  if(phase==='lifting'){dur=340;ease=EASE_OPEN_SNAPPY;}
  else if(phase==='open'){dur=480;ease=EASE_OPEN_SPRING;}
  else if(phase==='closing'){dur=300;ease=EASE_CLOSE_QUICK;}
  else{dur=360;ease=EASE_CLOSE_CALM;}
  const layoutClosed = i=>{
    const sy=i*STEP-scrollY;
    if(sy>=PIN) return {top:L_TOP+sy,height:ACTIVE_H,scale:1,opacity:1,z:300+i};
    const depth=(PIN-sy)/STEP;
    const syPinned=Math.max(0,PIN-Math.min(depth,3)*7);
    return {top:L_TOP+syPinned,height:ACTIVE_H,scale:Math.max(0.82,1-depth*0.05),opacity:Math.max(0,1.18-depth*0.24),z:100+i};
  };
  const posFor = i=>{
    const isSel=i===selectedIdx;
    if(phase==='closed') return layoutClosed(i);
    if(isSel){
      if(phase==='open') return {top:detailTop,height:detailHeight,opacity:1,z:999,scale:1};
      return {top:liftTop,height:ACTIVE_H,opacity:1,z:999,scale:liftScale};
    }
    return {top:760,height:ACTIVE_H,opacity:0,z:1,scale:0.96};
  };
  return (
    <div style={{width:'100%',height:'100%',background:bg,position:'relative',overflow:'hidden',fontFamily:'Nebulica,system-ui,sans-serif',WebkitFontSmoothing:'antialiased'}}>
      <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:0,opacity:recipeVisible?1:0,transition:'opacity .45s'}}>
        {selected&&<React.Fragment>
          <div style={{position:'absolute',top:'15%',left:'-25%',width:380,height:380,borderRadius:'50%',background:selected.hex,filter:'blur(70px)',opacity:0.5,animation:'wp2blob1 14s ease-in-out infinite'}}/>
          <div style={{position:'absolute',bottom:'-10%',right:'-20%',width:360,height:360,borderRadius:'50%',background:selected.hex,filter:'blur(70px)',opacity:0.6,animation:'wp2blob2 18s ease-in-out infinite'}}/>
        </React.Fragment>}
      </div>
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:0.1,mixBlendMode:'multiply',pointerEvents:'none',zIndex:1}}>
        <filter id="wpx-grain"><feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" stitchTiles="stitch"/><feColorMatrix values="0 0 0 0 0.35 0 0 0 0 0.3 0 0 0 0 0.25 0 0 0 0.4 0"/></filter>
        <rect width="100%" height="100%" filter="url(#wpx-grain)"/>
      </svg>
      {/* TOP BAR */}
      <div style={{position:'absolute',top:60,left:18,right:18,zIndex:1000,height:40}}>
        <div onClick={isDetail?onBack:undefined} style={{position:'absolute',left:0,top:0,height:40,width:isDetail?124:'calc(100% - 50px)',borderRadius:99,overflow:'hidden',background:'#fff',border:pillBorders?'1.5px solid #0B0B0B':'1px solid rgba(0,0,0,0.08)',cursor:isDetail?'pointer':'default',pointerEvents:(isDetail?recipeVisible:true)?'auto':'none',transition:'width .54s cubic-bezier(.34,1.56,.55,1)',zIndex:2}}>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',padding:'0 16px',gap:10,whiteSpace:'nowrap',pointerEvents:'none',opacity:isDetail?0:1,transition:isDetail?'opacity .12s ease':'opacity .28s ease .12s'}}>
            <IconSearch color="#0B0B0B"/><span style={{fontFamily:'Nebulica',fontSize:14,color:'rgba(0,0,0,0.4)'}}>cerca pantone…</span>
          </div>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',padding:'0 14px 0 12px',gap:6,whiteSpace:'nowrap',pointerEvents:'none',opacity:isDetail?1:0,transition:isDetail?'opacity .26s ease .14s':'opacity .12s ease'}}>
            <IconBack color="#0B0B0B"/><span style={{fontFamily:'Nebulica',fontSize:14,fontWeight:600,color:'#0B0B0B'}}>Ricette</span>
          </div>
        </div>
        <div key={'circle-'+bump} style={{position:'absolute',right:0,top:0,width:40,height:40,borderRadius:99,background:'#fff',border:pillBorders?'1.5px solid #0B0B0B':'1px solid rgba(0,0,0,0.08)',display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:(isDetail?recipeVisible:true)?'auto':'none',zIndex:2,animation:bump?`wp2circleBump .46s cubic-bezier(.34,1.4,.5,1) ${bumpDir==='close'?'.26s':'0s'} both`:'none'}}>
          <div style={{position:'absolute',opacity:isDetail?0:1,transition:isDetail?'opacity .12s':'opacity .16s .26s'}}><IconFilter color="#0B0B0B"/></div>
          <div style={{position:'absolute',opacity:isDetail?1:0,transition:isDetail?'opacity .2s .06s':'opacity .14s .24s'}}><IconEdit color="#0B0B0B"/></div>
        </div>
      </div>
      {/* TITLE */}
      <div style={{position:'absolute',top:110,left:18,right:18,zIndex:5,opacity:isDetail?0:1,transform:isDetail?'translateY(-6px)':'none',transition:'opacity .26s, transform .26s',pointerEvents:'none'}}>
        <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:30,lineHeight:0.95,letterSpacing:-1,color:'#0B0B0B'}}>Ricettario</div>
        <div style={{fontFamily:'Nebulica',fontSize:10,letterSpacing:1.4,fontWeight:700,color:'rgba(0,0,0,0.5)',marginTop:3}}>{list.length} PANTONE · SICO</div>
      </div>
      {/* CARDS */}
      <div ref={areaRef} onPointerDown={onAreaDown} onPointerMove={onAreaMove} onPointerUp={onAreaUp} onPointerCancel={onAreaUp}
        style={{position:'absolute',top:0,left:18,right:18,bottom:0,zIndex:4,pointerEvents:phase==='closed'?'auto':'none',touchAction:'none',cursor:phase==='closed'?(dragging?'grabbing':'grab'):'default'}}>
        <div style={{position:'relative',width:'100%',height:'100%',pointerEvents:'none'}}>
          {list.map((p,i)=>{
            const isSel=i===selectedIdx;
            const pos=posFor(i);
            const noAnim=phase==='closed'&&dragging;
            return (
              <div key={p.code} data-cardidx={i} style={{position:'absolute',left:0,right:0,top:pos.top,height:pos.height,opacity:pos.opacity,zIndex:pos.z,transform:`scale(${pos.scale})`,transformOrigin:'50% 0%',pointerEvents:pos.opacity>0.2?'auto':'none',cursor:'inherit',transition:noAnim?'none':`top ${dur}ms ${ease}, height ${dur}ms ${ease}, transform ${dur}ms ${ease}, opacity ${Math.round(dur*0.8)}ms ease`,filter:isSel&&phase!=='closed'?'drop-shadow(0 26px 48px rgba(0,0,0,0.24))':'drop-shadow(0 14px 28px rgba(0,0,0,0.14))'}}>
                {isSel?<UnifiedCard pantone={p} recipeVisible={recipeVisible} headerH={headerH}/>:<WalletCardV2 pantone={p} expanded={false}/>}
              </div>
            );
          })}
        </div>
      </div>
      <div style={{position:'absolute',bottom:120,left:0,right:0,textAlign:'center',zIndex:41,fontFamily:'Nebulica',fontSize:9,letterSpacing:1.4,fontWeight:700,color:'rgba(0,0,0,0.4)',opacity:isDetail?0:1,transition:'opacity .3s',pointerEvents:'none'}}>↕ TRASCINA · TOCCA UNA CARD</div>
      <BottomNav active={0} accent="#0033FF" restColor="#0B0B0B" bg={bg}/>
    </div>
  );
}

  return (
    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#F4EFE2',fontFamily:'Nebulica,system-ui,sans-serif',padding:32}}>
      <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:20,color:'#0B0B0B',marginBottom:8}}>Errore di caricamento</div>
      <div style={{fontFamily:'Nebulica',fontSize:14,color:'rgba(11,11,11,0.55)',marginBottom:24,textAlign:'center',maxWidth:280}}>Controlla la connessione e che il foglio Google sia pubblico.</div>
      <button onClick={onRetry} style={{padding:'12px 28px',borderRadius:99,background:'#0033FF',color:'#fff',border:'none',fontFamily:'Nebulica',fontWeight:700,fontSize:15,cursor:'pointer'}}>Riprova</button>
    </div>
  );
}

function App() {
  const [status, setStatus] = React.useState('loading');
  const [dataVer, setDataVer] = React.useState(0);
  const [isMobile] = React.useState(()=>window.innerWidth<1024);

  const doLoad = React.useCallback(()=>{
    setStatus('loading');
    loadData().then(()=>{
      setDataVer(v=>v+1);
      setStatus('ready');
    }).catch(err=>{
      console.error('Errore caricamento:', err);
      setStatus('error');
    });
  },[]);

  React.useEffect(()=>{ doLoad(); },[]);

  if(status==='loading') return <LoadingScreen/>;
  if(status==='error') return <ErrorScreen onRetry={doLoad}/>;

  if(isMobile) {
    return <WalletProtoExtract bg="#F4EFE2"/>;
  }
  return <DesktopApp defaults={DESK_DEFAULTS}/>;
}

const rootEl = document.getElementById('root');
const reactRoot = ReactDOM.createRoot(rootEl);
reactRoot.render(<App/>);

</script>
</body>
</html>
