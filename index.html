*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'Nebulica', system-ui, sans-serif;
  --bg: #f7f6f2;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.1);
  --border-strong: rgba(0,0,0,0.2);
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #999;
  --accent: #1a1a1a;
  --radius: 14px;
  --radius-sm: 8px;
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ── */
.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}

/* ── HEADER ── */
.header {
  padding: 56px 20px 12px;
  background: var(--bg);
}
.header-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
  line-height: 1;
}
.header-title span {
  font-weight: 400;
  color: var(--text-2);
}
.header-sub {
  font-size: 12px;
  color: var(--text-3);
  letter-spacing: 0.06em;
  margin-top: 3px;
  text-transform: uppercase;
}

/* ── SEARCH ── */
.search-wrap {
  padding: 10px 20px;
}
.search-inner {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
}
.search-inner svg {
  width: 16px; height: 16px;
  stroke: var(--text-3);
  flex-shrink: 0;
}
.search-inner input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: var(--font);
  font-size: 15px;
  color: var(--text);
}
.search-inner input::placeholder { color: var(--text-3); }

/* ── CHIPS ── */
.chips {
  display: flex;
  gap: 7px;
  padding: 6px 20px 10px;
  overflow-x: auto;
  scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  font-family: var(--font);
  font-size: 13px;
  padding: 5px 14px;
  border-radius: 20px;
  border: 0.5px solid var(--border-strong);
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.chip.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}

/* ── LIST VIEW ── */
#view-list { flex: 1; }
.list-count {
  font-size: 11px;
  color: var(--text-3);
  padding: 0 20px 6px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.recipe-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 11px 20px;
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.recipe-item:first-child { border-top: 0.5px solid var(--border); }
.recipe-item:active { background: #f0efeb; }
.swatch {
  width: 44px; height: 44px;
  border-radius: 10px;
  border: 0.5px solid rgba(0,0,0,0.08);
  flex-shrink: 0;
}
.recipe-meta { flex: 1; min-width: 0; }
.recipe-id {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -0.3px;
}
.recipe-cat {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 1px;
}
.recipe-arrow {
  width: 7px; height: 12px;
  stroke: var(--text-3);
  flex-shrink: 0;
}
.empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--text-3);
  font-size: 14px;
}

/* ── LOADING ── */
.loading {
  padding: 60px 20px;
  text-align: center;
  color: var(--text-3);
  font-size: 14px;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--text-2);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── DETAIL VIEW ── */
#view-detail { display: none; flex: 1; flex-direction: column; }

.detail-header {
  padding: 56px 20px 16px;
  background: var(--bg);
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.back-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px 6px 10px;
  font-family: var(--font);
  font-size: 14px;
  color: var(--text-2);
  cursor: pointer;
  margin-bottom: 16px;
  -webkit-tap-highlight-color: transparent;
  width: fit-content;
}
.back-btn svg { width:14px; height:14px; stroke: var(--text-2); }

.detail-top {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.big-swatch {
  width: 64px; height: 64px;
  border-radius: 14px;
  border: 0.5px solid rgba(0,0,0,0.08);
  flex-shrink: 0;
}
.detail-name {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1;
  color: var(--text);
}
.detail-hex {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 4px;
  letter-spacing: 0.04em;
}
.detail-badge {
  display: inline-block;
  margin-top: 7px;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 0.5px solid var(--border-strong);
  color: var(--text-2);
  background: var(--surface);
}
.detail-note {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 5px;
  font-style: italic;
}

.detail-body {
  flex: 1;
  padding: 0 20px 100px;
}

.section-label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-2);
  margin-bottom: 10px;
}

/* ── QTY SELECTOR ── */
.qty-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}
.qty-btn {
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  padding: 12px;
  border-radius: 999px;
  border: 2px solid var(--text);
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.qty-btn.active {
  background: var(--text);
  color: #fff;
  border-color: var(--text);
}
.qty-btn:not(.active) {
  color: var(--text);
}
.qty-custom {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 2px solid var(--text);
  border-radius: 999px;
  padding: 10px 14px;
  margin-bottom: 20px;
}
.qty-custom label {
  font-size: 13px;
  color: var(--text-3);
  white-space: nowrap;
}
.qty-custom input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  text-align: right;
  width: 80px;
}
.qty-custom span {
  font-size: 13px;
  color: var(--text-2);
}

/* ── FORMULA TABLE ── */
.formula-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 2px solid var(--text);
  overflow: hidden;
  margin-bottom: 16px;
}
.ink-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  border-bottom: 1px solid rgba(0,0,0,0.1);
}
.ink-row:last-child { border-bottom: none; }
.ink-code {
  font-size: 13px;
  font-weight: 700;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: 6px;
  padding: 3px 9px;
  color: var(--text);
  min-width: 58px;
  text-align: center;
  flex-shrink: 0;
}
.ink-bar-wrap {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.ink-bar-fill {
  height: 100%;
  background: var(--text);
  border-radius: 2px;
  transition: width 0.4s ease;
}
.ink-dose {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  min-width: 68px;
  text-align: right;
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: var(--text);
  border-radius: var(--radius-sm);
  margin-bottom: 20px;
}
.total-row span:first-child {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
}
.total-row span:last-child {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
}

/* ── BOTTOM NAV ── */
.nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  display: flex;
  background: rgba(247,246,242,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 0.5px solid var(--border);
  padding: 10px 0 max(16px, env(safe-area-inset-bottom));
  z-index: 100;
}

/* ── INCHIOSTRI VIEW ── */
#view-inks { display: none; flex: 1; flex-direction: column; padding-bottom: 80px; }
#view-ink-detail { display: none; flex: 1; flex-direction: column; padding-bottom: 80px; }

.inks-header { padding: 52px 20px 12px; }
.inks-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); line-height: 1; }
.inks-sub { font-size: 12px; color: var(--text-3); letter-spacing: 0.06em; margin-top: 3px; text-transform: uppercase; }

.inks-search { padding: 0 20px 8px; }
.inks-search .search-inner { border: 2px solid var(--text) !important; border-radius: 999px !important; }
.inks-search .search-inner input { font-size: 15px; }

.tipo-chips { display: flex; gap: 7px; padding: 4px 20px 10px; overflow-x: auto; scrollbar-width: none; }
.tipo-chips::-webkit-scrollbar { display: none; }
.tipo-chips .chip { font-size: 13px; padding: 6px 16px; }

.group-header {
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-3); padding: 10px 20px 5px;
  background: var(--bg);
}

.ink-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 20px; background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  cursor: pointer; transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.ink-item:active { background: #f0efeb; }
.ink-item:first-child { border-top: 0.5px solid var(--border); }
.ink-code-list { font-size: 22px; font-weight: 700; color: var(--text); min-width: 70px; letter-spacing: -0.3px; }
.ink-name-list { flex: 1; font-size: 15px; color: var(--text-2); }
.ink-count-badge {
  font-size: 11px; font-weight: 700;
  background: var(--bg); border: 0.5px solid var(--border-strong);
  border-radius: 20px; padding: 2px 8px; color: var(--text-2);
}

/* detail */
.ink-det-back { display: flex; align-items: center; gap: 5px; padding: 52px 20px 4px; cursor: pointer; }
.ink-det-back svg { width: 14px; height: 14px; stroke: var(--text-2); }
.ink-det-back span { font-size: 14px; color: var(--text-2); }
.ink-det-hero { padding: 8px 20px 16px; }
.ink-det-code { font-size: 36px; font-weight: 700; letter-spacing: -1px; color: var(--text); line-height: 1; }
.ink-det-fullname { font-size: 13px; color: var(--text-3); margin-top: 4px; }
.ink-det-badge {
  display: inline-block; margin-top: 8px;
  font-size: 11px; font-weight: 700; padding: 4px 14px;
  border-radius: 999px; border: 2px solid var(--text);
  color: var(--text); background: var(--surface);
}
.sec-lbl-ink { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); padding: 0 20px; margin-bottom: 10px; }

.ricetta-linked {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 20px; background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  cursor: pointer; transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.ricetta-linked:first-child { border-top: 0.5px solid var(--border); }
.ricetta-linked:active { background: #f0efeb; }
.rl-swatch { width: 40px; height: 40px; border-radius: 10px; border: 0.5px solid rgba(0,0,0,0.08); flex-shrink: 0; }
.rl-meta { flex: 1; }
.rl-id { font-size: 16px; font-weight: 700; color: var(--text); }
.rl-cat { font-size: 12px; color: var(--text-3); margin-top: 1px; }
.rl-dose { text-align: right; }
.rl-dose-val { font-size: 15px; font-weight: 700; color: var(--text); }
.rl-dose-lbl { font-size: 10px; color: var(--text-3); }

.ink-total-box {
  margin: 12px 20px 0;
  background: var(--text); border-radius: var(--radius);
  padding: 12px 16px; display: flex;
  justify-content: space-between; align-items: center;
}
.ink-total-box span:first-child { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
.ink-total-box span:last-child { font-size: 20px; font-weight: 700; color: #fff; }

.no-ricette { padding: 40px 20px; text-align: center; color: var(--text-3); font-size: 14px; }
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.nav-item svg { width: 22px; height: 22px; stroke: var(--text-3); }
.nav-item.active svg { stroke: var(--text); }
.nav-item span {
  font-family: var(--font);
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.03em;
}
.nav-item.active span { color: var(--text); }

/* ── ERROR ── */
.error-msg {
  background: #fff3f3;
  border: 0.5px solid #ffcccc;
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  font-size: 13px;
  color: #c0392b;
  margin: 10px 20px;
  line-height: 1.5;
}

    <div class="search-wrap">
      <div class="search-inner">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="cerca Pantone..." oninput="filterList()">
      </div>
    </div>

    <div class="chips" id="chips-wrap">
      <div class="chip active" onclick="setFilter(this,'')">tutti</div>
    </div>

    <div class="list-count" id="list-count"></div>
    <div id="recipe-list"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="view-detail">
    <div style="padding: 52px 20px 0;">
      <button class="back-btn" onclick="showList()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Ricette
      </button>
      <div class="detail-top">
        <div class="big-swatch" id="detail-swatch"></div>
        <div>
          <div class="detail-name" id="detail-name"></div>
          <div class="detail-hex" id="detail-hex" style="display:none"></div>
          <div class="detail-badge" id="detail-cat"></div>
          <div class="detail-note" id="detail-note"></div>
        </div>
      </div>
    </div>

    <div class="detail-body">
      <div style="height:20px"></div>
      <div class="section-label">Quantità</div>
      <div class="qty-grid">
        <div class="qty-btn active" onclick="setQty(100,this)">100 g</div>
        <div class="qty-btn" onclick="setQty(300,this)">300 g</div>
        <div class="qty-btn" onclick="setQty(500,this)">500 g</div>
        <div class="qty-btn" onclick="setQty(1000,this)">1 kg</div>
      </div>
      <div class="qty-custom">
        <label>oppure inserisci</label>
        <input type="number" id="qty-custom-input" value="100" min="1" step="1" oninput="setQty(parseFloat(this.value)||40,null)">
        <span>g</span>
      </div>

      <div class="section-label">Formula</div>
      <div class="formula-card" id="formula-card"></div>
      <div class="total-row">
        <span>totale miscela</span>
        <span id="total-val">—</span>
      </div>
    </div>
  </div>

  <!-- INKS LIST VIEW -->
  <div id="view-inks">
    <div class="inks-header">
      <div class="inks-title">INCHIOSTRI</div>
      <div class="inks-sub">Catalogo SICO</div>
    </div>
    <div class="inks-search">
      <div class="search-inner">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="ink-search-input" placeholder="cerca codice o colore..." oninput="filterInks()">
      </div>
    </div>
    <div class="tipo-chips" id="tipo-chips">
      <div class="chip active" onclick="setTipoFilter(this,'')">tutti</div>
      <div class="chip" onclick="setTipoFilter(this,'STANDARD')">standard</div>
      <div class="chip" onclick="setTipoFilter(this,'MONOTONE')">monotone</div>
      <div class="chip" onclick="setTipoFilter(this,'FLUO')">fluo</div>
      <div class="chip" onclick="setTipoFilter(this,'CMYK')">cmyk</div>
      <div class="chip" onclick="setTipoFilter(this,'METALLIZZATI')">metallizzati</div>
    </div>
    <div id="inks-list"></div>
  </div>

  <!-- INK DETAIL VIEW -->
  <div id="view-ink-detail">
    <div class="ink-det-back" onclick="showInks()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span>Inchiostri</span>
    </div>
    <div class="ink-det-hero">
      <div class="ink-det-code" id="ink-det-code"></div>
      <div class="ink-det-fullname" id="ink-det-fullname"></div>
      <div class="ink-det-badge" id="ink-det-badge"></div>
    </div>
    <div class="sec-lbl-ink">Usato in queste ricette</div>
    <div id="ink-ricette-list"></div>
    <div class="ink-total-box">
      <span>ricette collegate</span>
      <span id="ink-ricette-count">0</span>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="nav">
    <div class="nav-item active" id="nav-ricette" onclick="showList()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 3v7.5L5.5 17A2 2 0 0 0 7.28 20h9.44a2 2 0 0 0 1.78-3L15 10.5V3"/><line x1="9" y1="3" x2="15" y2="3"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <span>ricette</span>
    </div>
    <div class="nav-item" id="nav-ink" onclick="showInks()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-2.5-5.5S13 5 12 2c0 0-4.5 4.5-6.5 7.5S5 15 5 15a7 7 0 0 0 7 7z"/>
      </svg>
      <span>inchiostri</span>
    </div>
    <div class="nav-item" id="nav-new">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <span>aggiungi</span>
    </div>
  </nav>

</div>

<script>
const SHEET_ID = '1uIirqJTLIu74AQo5VeaDVRcFNykF1q0oVp4jTihaUtw';
const BASE = 40;

let allRicette = [];
let allComponenti = [];
let allInchiostri = [];
let activeFilter = '';
let activeId = null;
let activeQty = 100;

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const rows = json.table.rows;
  const cols = json.table.cols.map(c => (c.label || '').trim());
  if (!rows || rows.length === 0) return [];
  return rows.map(r => {
    const obj = {};
    cols.forEach((c,i) => {
      const val = r.c && r.c[i] ? (r.c[i].v !== null && r.c[i].v !== undefined ? String(r.c[i].v).trim() : '') : '';
      obj[c] = val;
    });
    return obj;
  }).filter(r => Object.values(r).some(v => v !== ''));
}

async function loadData() {
  const listEl = document.getElementById('recipe-list');
  listEl.innerHTML = '<div class="loading"><div class="spinner"></div>Caricamento ricette...</div>';
  try {
    const [ricette, componenti, inchiostri] = await Promise.all([
      fetchSheet('Ricette'),
      fetchSheet('Componenti'),
      fetchSheet('Inchiostri')
    ]);
    allRicette = ricette;
    allComponenti = componenti;
    allInchiostri = inchiostri;
    buildCategoryChips();
    filterList();
  } catch(e) {
    listEl.innerHTML = '<div class="error-msg">Errore nel caricamento dei dati. Controlla la connessione e che il foglio sia pubblico.</div>';
    console.error(e);
  }
}

function buildCategoryChips() {
  const cats = [...new Set(allRicette.map(r => r.Categoria).filter(Boolean))].sort();
  const wrap = document.getElementById('chips-wrap');
  wrap.innerHTML = '<div class="chip active" onclick="setFilter(this,\'\')">tutti</div>';
  cats.forEach(cat => {
    const d = document.createElement('div');
    d.className = 'chip';
    d.textContent = cat.toLowerCase();
    d.onclick = function() { setFilter(this, cat); };
    wrap.appendChild(d);
  });
}

function setFilter(el, cat) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = cat;
  filterList();
}

function filterList() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const filtered = allRicette.filter(r =>
    (activeFilter === '' || r.Categoria === activeFilter) &&
    (r.Pantone_ID.toLowerCase().includes(q) ||
     (r.Categoria||'').toLowerCase().includes(q) ||
     (r.Note||'').toLowerCase().includes(q))
  );
  const listEl = document.getElementById('recipe-list');
  const countEl = document.getElementById('list-count');
  countEl.textContent = filtered.length + ' formula' + (filtered.length !== 1 ? 'e' : '');

  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty">Nessun risultato</div>';
    return;
  }
  listEl.innerHTML = filtered.map(r => {
    const nInk = allComponenti.filter(c => c.Pantone_ID === r.Pantone_ID).length;
    return `<div class="recipe-item" onclick="showDetail('${r.Pantone_ID.replace(/'/g,"\\'")}')">
      <div class="swatch" style="background:#${r.HEX}"></div>
      <div class="recipe-meta">
        <div class="recipe-id">${r.Pantone_ID}</div>
        <div class="recipe-cat">${r.Categoria||''} · ${nInk} inchiostri</div>
      </div>
      <svg class="recipe-arrow" viewBox="0 0 8 13" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 1 7 6.5 1 12"/>
      </svg>
    </div>`;
  }).join('');
}

function showDetail(id) {
  activeId = id;
  activeQty = 100;
  const r = allRicette.find(x => x.Pantone_ID === id);
  if (!r) return;

  document.getElementById('detail-swatch').style.background = '#' + r.HEX;
  document.getElementById('detail-name').textContent = r.Pantone_ID;
  document.getElementById('detail-hex').textContent = '#' + r.HEX;
  document.getElementById('detail-cat').textContent = r.Categoria || '';
  const noteEl = document.getElementById('detail-note');
  noteEl.textContent = r.Note || '';
  noteEl.style.display = r.Note ? 'block' : 'none';

  document.querySelectorAll('.qty-btn').forEach((b,i) => {
    b.classList.toggle('active', i === 0);
  });
  document.getElementById('qty-custom-input').value = 100;

  renderFormula();

  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-detail').style.display = 'flex';
  document.getElementById('nav-ricette').classList.remove('active');
  window.scrollTo(0,0);
}

function showList() {
  document.getElementById('view-list').style.display = 'block';
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('nav-ricette').classList.add('active');
}

function setQty(qty, el) {
  if (!qty || qty <= 0) return;
  activeQty = qty;
  document.querySelectorAll('.qty-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('qty-custom-input').value = qty;
  renderFormula();
}

function renderFormula() {
  const comps = allComponenti.filter(c => c.Pantone_ID === activeId);
  const factor = activeQty / BASE;
  const maxDose = Math.max(...comps.map(c => parseFloat(c['Dose_40g (g)'])||0));
  const totalBase = comps.reduce((s,c) => s + (parseFloat(c['Dose_40g (g)'])||0), 0);

  document.getElementById('formula-card').innerHTML = comps.map(c => {
    const dose = parseFloat(c['Dose_40g (g)']) || 0;
    const scaled = (dose * factor).toFixed(2);
    const barW = maxDose > 0 ? Math.round((dose / maxDose) * 100) : 0;
    return `<div class="ink-row">
      <div class="ink-code">${c.Inchiostro}</div>
      <div class="ink-bar-wrap"><div class="ink-bar-fill" style="width:${barW}%"></div></div>
      <div class="ink-dose">${scaled} g</div>
    </div>`;
  }).join('');

  document.getElementById('total-val').textContent = (totalBase * factor).toFixed(1) + ' g';
}


let activeTipoFilter = '';

function showInks() {
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-inks').style.display = 'flex';
  document.getElementById('view-ink-detail').style.display = 'none';
  document.getElementById('nav-ricette').classList.remove('active');
  document.getElementById('nav-ink').classList.add('active');
  window.scrollTo(0,0);
  filterInks();
}

function showInkDetail(codice) {
  const ink = allInchiostri.find(i => i.Codice === codice);
  if (!ink) return;
  document.getElementById('ink-det-code').textContent = ink.Codice;
  document.getElementById('ink-det-fullname').textContent = ink.Nome_completo || ink.Codice;
  document.getElementById('ink-det-badge').textContent = ink.Tipologia || '';
  const ricette = allComponenti.filter(c => c.Inchiostro === codice);
  const count = ricette.length;
  document.getElementById('ink-ricette-count').textContent = count;
  const listEl = document.getElementById('ink-ricette-list');
  if (count === 0) {
    listEl.innerHTML = '<div class="no-ricette">Nessuna ricetta usa questo inchiostro</div>';
  } else {
    listEl.innerHTML = ricette.map(c => {
      const r = allRicette.find(x => x.Pantone_ID === c.Pantone_ID) || {};
      return `<div class="ricetta-linked" onclick="selectRecipeFromInk('${c.Pantone_ID}')">
        <div class="rl-swatch" style="background:#${r.HEX||'eee'}"></div>
        <div class="rl-meta">
          <div class="rl-id">${c.Pantone_ID}</div>
          <div class="rl-cat">${r.Categoria||''}</div>
        </div>
        <div class="rl-dose">
          <div class="rl-dose-val">${parseFloat(c['Dose_40g (g)']).toFixed(2)} g</div>
          <div class="rl-dose-lbl">base 40g</div>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('view-inks').style.display = 'none';
  document.getElementById('view-ink-detail').style.display = 'flex';
  window.scrollTo(0,0);
}

function selectRecipeFromInk(id) {
  showDetail(id);
  document.getElementById('nav-ricette').classList.add('active');
  document.getElementById('nav-ink').classList.remove('active');
}

function setTipoFilter(el, tipo) {
  document.querySelectorAll('.tipo-chips .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeTipoFilter = tipo;
  filterInks();
}

function filterInks() {
  const q = (document.getElementById('ink-search-input').value || '').toLowerCase();
  const filtered = allInchiostri.filter(i =>
    (activeTipoFilter === '' || i.Tipologia === activeTipoFilter) &&
    (i.Codice.toLowerCase().includes(q) || (i.Nome_completo||'').toLowerCase().includes(q))
  );
  const listEl = document.getElementById('inks-list');
  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty">Nessun inchiostro trovato</div>';
    return;
  }
  const gruppi = {};
  filtered.forEach(i => {
    const t = i.Tipologia || 'ALTRO';
    if (!gruppi[t]) gruppi[t] = [];
    gruppi[t].push(i);
  });
  listEl.innerHTML = Object.entries(gruppi).map(([tipo, inks]) => {
    const rows = inks.map(i => {
      const nRicette = allComponenti.filter(c => c.Inchiostro === i.Codice).length;
      const colName = (i.Nome_completo||'').replace(/^AS \d+ - /, '');
      return `<div class="ink-item" onclick="showInkDetail('${i.Codice}')">
        <div class="ink-code-list">${i.Codice}</div>
        <div class="ink-name-list">${colName}</div>
        ${nRicette > 0 ? `<div class="ink-count-badge">${nRicette}</div>` : ''}
        <svg style="width:7px;height:12px;stroke:var(--text-3);flex-shrink:0" viewBox="0 0 8 13" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 1 7 6.5 1 12"/></svg>
      </div>`;
    }).join('');
    return `<div class="group-header">${tipo.toLowerCase()}</div>${rows}`;
  }).join('');
}

loadData();
</script>
</body>
</html>
