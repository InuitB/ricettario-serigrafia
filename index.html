          else if(err&&Z.NotFoundException&&err instanceof Z.NotFoundException){ if(lastCode!==null&&now-lastSeen>LEAVE_GAP)lastCode=null; }
        }).catch((e)=>{ if(stopped)return; const msg=(e&&e.message)?e.message:String(e);
          setCameraError(/permission|notallowed|denied/i.test(msg)?'Accesso alla fotocamera negato — controlla i permessi Safari.':'Fotocamera non disponibile.'); setCameraLoading(false); });
        setCameraLoading(false);
      }catch(e){ if(!stopped){ setCameraError('Fotocamera non disponibile.'); setCameraLoading(false); } }
    },120);
    return ()=>{ stopped=true; clearTimeout(timer);
      try{ if(reader&&reader.reset)reader.reset(); }catch(e){}
      try{ const v=videoRef.current; if(v&&v.srcObject){ v.srcObject.getTracks().forEach(t=>t.stop()); v.srcObject=null; } }catch(e){}
    };
  },[enabled,videoRef]);
  return {cameraLoading,cameraError};
}
// Normalizza un codice per il confronto con la sigla inchiostro: "AS  40" ⇒ "AS40"
const normInkCode = s => String(s||'').toUpperCase().replace(/\s+/g,'');

// Legge la sessione inventario in pausa: la più recente tra locale (localStorage) e remota (condivisa).
function invSessionSummary(s){
  if(!s||!s.tally)return null;
  const rows=Object.keys(s.tally).map(k=>s.tally[k]).filter(v=>v&&(v.jars>0||v.open>0));
  if(!rows.length)return null;
  return {jars:rows.reduce((a,v)=>a+(v.jars||0),0), inks:rows.length, purpose:s.purpose||'inventario', ts:s.ts||0};
}
function readInvSession(){
  let local=null; try{ local=JSON.parse(localStorage.getItem('mag_inv_session')||'null'); }catch(e){}
  const L=invSessionSummary(local), R=invSessionSummary(invDraftRemote);
  if(L&&R) return L.ts>=R.ts?L:R;
  return L||R;
}

// Overlay scanner del magazzino. Tre scopi:
//  · inventario → conta sigillati (+1kg) e pesa gli aperti; Salva SOSTITUISCE lo stock.
//  · nuovi      → solo sigillati; Salva AGGIUNGE allo stock (ordini nuovi).
//  · impara     → mappa i barcode → inchiostro, senza contare kg.
function ScannerOverlay({open, onPick, onClose, accent='#0033FF', tare=107}){
  // Desktop/Mac (nessun touch) → solo lettore esterno, la fotocamera non si attiva.
  const noCam = (typeof navigator!=='undefined') && (navigator.maxTouchPoints||0)===0;
  const [mode,setMode]=React.useState(noCam?'hid':'camera');
  const [purpose,setPurpose]=React.useState('inventario'); // 'inventario' | 'nuovi' | 'impara'
  const [subMode,setSubMode]=React.useState('sigillato');  // 'sigillato' | 'pesare' (solo inventario)
  const [tally,setTally]=React.useState({});               // {ink:{jars,open}} conteggio sessione
  const [log,setLog]=React.useState([]);                   // registro impara: [{barcode,ink,status}]
  const [flash,setFlash]=React.useState(null);
  const [toast,setToast]=React.useState(null);             // feedback "+1 AS15"
  const [unknown,setUnknown]=React.useState(null);         // codice non riconosciuto
  const [pickQ,setPickQ]=React.useState('');
  const [weighFor,setWeighFor]=React.useState(null);       // inchiostro in pesata (barattolo aperto)
  const [gross,setGross]=React.useState('');
  const videoRef=React.useRef(null);
  const flashT=React.useRef(null), toastT=React.useRef(null), seqRef=React.useRef(0);
  const ink='#0B0B0B';
  const SKEY='mag_inv_session';
  const isCount = purpose==='inventario'||purpose==='nuovi';
  const effSub = purpose==='nuovi' ? 'sigillato' : subMode;
  const inkName = code=>{ const o=allInchiostri.find(x=>x.Codice===code); return (o&&o.Nome_completo)||code; };
  const doFlash=k=>{ setFlash(k); if(flashT.current)clearTimeout(flashT.current); flashT.current=setTimeout(()=>setFlash(null),500); };
  const doToast=t=>{ setToast(t); if(toastT.current)clearTimeout(toastT.current); toastT.current=setTimeout(()=>setToast(null),1100); };
  const pushLog=(barcode,ink,status)=>setLog(l=>[{barcode,ink,status},...l.filter(e=>e.barcode!==barcode)].slice(0,60));
  const bump=(ink,dj,openVal)=>{ const o=++seqRef.current; setTally(t=>{ const cur=t[ink]||{jars:0,open:0,ord:0}; return {...t,[ink]:{jars:Math.max(0,cur.jars+(dj||0)),open:openVal!=null?openVal:cur.open,ord:o}}; }); };
  const ricomincia=()=>{ if(typeof confirm==='undefined'||confirm('Svuotare il conteggio in corso?')){ setTally({}); seqRef.current=0; try{localStorage.removeItem(SKEY);}catch(e){} clearInvDraftRemote(); } };

  // All'apertura ripristina la sessione più recente tra locale e remota (ripresa multi-dispositivo).
  React.useEffect(()=>{ if(!open) return;
    setUnknown(null); setPickQ(''); setMode(noCam?'hid':'camera'); setLog([]); setWeighFor(null); setGross('');
    let local=null; try{ local=JSON.parse(localStorage.getItem(SKEY)||'null'); }catch(e){}
    const remote=invDraftRemote;
    const pick=(local&&local.tally&&Object.keys(local.tally).length&&remote&&remote.tally&&Object.keys(remote.tally).length)
      ? ((local.ts||0)>=(remote.ts||0)?local:remote)
      : ((local&&local.tally&&Object.keys(local.tally).length)?local:remote);
    if(pick&&pick.tally&&Object.keys(pick.tally).length){ setTally(pick.tally); setPurpose(pick.purpose||'inventario'); setSubMode(pick.subMode||'sigillato'); seqRef.current=pick.seq||0; }
    else { setTally({}); setPurpose('inventario'); setSubMode('sigillato'); seqRef.current=0; }
  },[open]);
  // Salva la sessione in corso in locale a ogni modifica → sopravvive a chiusura/ricarica (stesso dispositivo).
  React.useEffect(()=>{ if(!open)return; try{ if(Object.keys(tally).length) localStorage.setItem(SKEY,JSON.stringify({purpose,subMode,tally,seq:seqRef.current,ts:(typeof Date!=='undefined'?Date.now():0)})); }catch(e){} },[tally,purpose,subMode,open]);

  const addJar=(inkCode)=>{ playBeep('ok'); doFlash('ok'); bump(inkCode,1); doToast('+1 '+inkCode); };
  const startWeigh=(inkCode)=>{ playBeep('ok'); doFlash('ok'); setWeighFor(inkCode); setGross(''); };

  const resolve=React.useCallback((raw)=>{
    if(weighFor) return; // durante la pesata ignora nuove scansioni finché non confermi
    const rawTrim=String(raw).trim();
    const norm=normInkCode(rawTrim);
    if(norm.length<2){ playBeep('warn'); doFlash('warn'); return; }
    const mapped=allBarcodes.find(b=>normInkCode(b.barcode)===norm);
    const sigla =allInchiostri.find(x=>normInkCode(x.Codice)===norm);
    const inkCode = mapped ? mapped.inchiostro : (sigla ? sigla.Codice : null);
    if(inkCode){
      if(purpose==='impara'){ playBeep('ok'); doFlash('ok'); pushLog(rawTrim,inkCode,mapped?'known':'sigla'); return; }
      if(effSub==='pesare') startWeigh(inkCode); else addJar(inkCode);
      return;
    }
    playBeep('warn'); doFlash('warn'); setUnknown(rawTrim);
  },[purpose,effSub,weighFor]);

  // Assegna un codice sconosciuto a un inchiostro e LO SALVA nel foglio condiviso
  const assignUnknown=React.useCallback((inkCode)=>{
    const bc=unknown;
    if(bc){
      allBarcodes=allBarcodes.filter(b=>b.barcode!==bc).concat([{barcode:bc,inchiostro:inkCode}]);
      postGAS({action:'mapBarcode',barcode:bc,inchiostro:inkCode}).then(()=>loadBarcodeMap()).catch(()=>{});
      playBeep('saved');
    }
    setUnknown(null); setPickQ('');
    if(purpose==='impara'){ if(bc)pushLog(bc,inkCode,'new'); return; }
    if(effSub==='pesare') startWeigh(inkCode); else addJar(inkCode);
  },[unknown,purpose,effSub]);

  const confirmWeigh=()=>{ const g=parseFloat(String(gross).replace(',','.')); const net=(!isNaN(g)&&g>0)?Math.max(0,Math.round(g-tare)):0; if(weighFor){ bump(weighFor,0,net); doToast(weighFor+': '+net+'g aperto'); playBeep('saved'); } setWeighFor(null); setGross(''); };

  const tallyRows=React.useMemo(()=>Object.keys(tally).map(k=>({ink:k,jars:tally[k].jars,open:tally[k].open,ord:tally[k].ord||0,grammi:tally[k].jars*1000+tally[k].open}))
    .filter(r=>r.jars>0||r.open>0).sort((a,b)=>b.ord-a.ord),[tally]);
  const totJars=tallyRows.reduce((s,r)=>s+r.jars,0);
  const totG=tallyRows.reduce((s,r)=>s+r.grammi,0);

  // PAUSA: salva la bozza (locale + condivisa) senza toccare il magazzino → riprendibile ovunque.
  const pausa=()=>{
    if(tallyRows.length){ const draft={purpose,subMode,tally,seq:seqRef.current,ts:(typeof Date!=='undefined'?Date.now():0)};
      try{localStorage.setItem(SKEY,JSON.stringify(draft));}catch(e){} saveInvDraftRemote(draft); playBeep('ok'); }
    onClose();
  };
  // CHIUDI: finalizza → scrive nel magazzino e cancella la bozza (locale + condivisa).
  const chiudi=()=>{
    if(!tallyRows.length){ onClose(); return; }
    tallyRows.forEach(r=>{
      const idx=allInventario.findIndex(i=>i.inchiostro===r.ink);
      if(purpose==='nuovi'){ const add=r.jars*1000; if(idx>=0) allInventario[idx].grammi=(allInventario[idx].grammi||0)+add; else allInventario.push({inchiostro:r.ink,grammi:add,soglia:null,note:''}); }
      else { if(idx>=0) allInventario[idx].grammi=r.grammi; else allInventario.push({inchiostro:r.ink,grammi:r.grammi,soglia:null,note:''}); }
    });
    if(purpose==='nuovi'){ postGAS({action:'aggiungiCarico',carichi:tallyRows.map(r=>({inchiostro:r.ink,grammi:r.jars*1000})),riferimento:'nuovi barattoli'}).catch(()=>{}); }
    else {
      const items=tallyRows.map(r=>({inchiostro:r.ink,grammi:r.grammi,jars:r.jars,open:r.open}));
      const sessionId='inv_'+(typeof Date!=='undefined'?Date.now():0)+'_'+(typeof Math!=='undefined'?Math.floor(Math.random()*1000):0);
      // chiudiInventario = stock assoluto + storico datato; fallback al vecchio aggiornaStock se non deployato
      postGAS({action:'chiudiInventario',items,sessionId}).catch(()=>{ items.forEach(it=>postGAS({action:'aggiornaStock',inchiostro:it.inchiostro,grammi:it.grammi}).catch(()=>{})); });
    }
    playBeep('saved'); if(window._bumpData)window._bumpData(); setTally({}); seqRef.current=0; try{localStorage.removeItem(SKEY);}catch(e){} clearInvDraftRemote(); onClose();
  };

  useHidScanner({enabled:open&&mode==='hid'&&!unknown&&!weighFor, onScan:resolve});
  const {cameraLoading,cameraError}=useCameraScanner({enabled:open&&mode==='camera'&&!unknown&&!weighFor, onScan:resolve, videoRef});

  const pickList=React.useMemo(()=>{
    const q=pickQ.toLowerCase();
    return allInchiostri.filter(x=>{const c=(x.Codice||'').toLowerCase(),n=(x.Nome_completo||'').toLowerCase();return !q||c.includes(q)||n.includes(q);}).slice(0,40);
  },[pickQ,unknown]);

  const title = purpose==='impara'?'Impara codici':purpose==='nuovi'?'Nuovi barattoli':'Inventario';
  const net = (()=>{ const g=parseFloat(String(gross).replace(',','.')); return (!isNaN(g)&&g>0)?Math.max(0,Math.round(g-tare)):0; })();

  return (
    <div style={{position:'fixed',inset:0,zIndex:2000,background:'#0B0B0B',display:open?'flex':'none',flexDirection:'column',fontFamily:'Nebulica,Arial,sans-serif'}}>
      {/* header */}
      <div style={{padding:'calc(env(safe-area-inset-top,44px) + 12px) 16px 10px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <button onClick={pausa} title="Chiudi (mette in pausa il conteggio)" style={{width:44,height:44,borderRadius:99,border:'none',background:'rgba(255,255,255,0.14)',color:'#fff',fontSize:20,cursor:'pointer'}}>✕</button>
        <div style={{color:'#fff',fontFamily:'Nebulica',fontWeight:700,fontSize:18}}>{title}</div>
        <div style={{flex:1}}/>
        <div style={{display:'flex',gap:6,background:'rgba(255,255,255,0.12)',borderRadius:99,padding:4}}>
          {(noCam?[['hid','⌨︎ Lettore esterno']]:[['camera','📷'],['hid','⌨︎']]).map(([k,l])=>(
            <button key={k} onClick={()=>setMode(k)} style={{padding:'8px 14px',borderRadius:99,border:'none',cursor:'pointer',background:mode===k?'#fff':'transparent',color:mode===k?'#0B0B0B':'#fff',fontWeight:700,fontSize:14}}>{l}</button>
          ))}
        </div>
      </div>
      {/* Selettore scopo */}
      {!unknown && !weighFor && (
        <div style={{padding:'0 16px 8px',flexShrink:0}}>
          <div style={{display:'flex',gap:4,background:'rgba(255,255,255,0.10)',borderRadius:14,padding:4}}>
            {[['inventario','📦 Inventario'],['nuovi','➕ Nuovi'],['impara','⌗ Impara']].map(([k,l])=>(
              <button key={k} onClick={()=>setPurpose(k)} style={{flex:1,padding:'9px 6px',borderRadius:11,border:'none',cursor:'pointer',background:purpose===k?'#fff':'transparent',color:purpose===k?'#0B0B0B':'rgba(255,255,255,0.85)',fontFamily:'Nebulica',fontWeight:700,fontSize:13}}>{l}</button>
            ))}
          </div>
          {purpose==='inventario' && (
            <div style={{display:'flex',gap:4,background:'rgba(255,255,255,0.06)',borderRadius:12,padding:4,marginTop:6}}>
              {[['sigillato','📦 Sigillato +1kg'],['pesare','⚖️ Pesa aperto']].map(([k,l])=>(
                <button key={k} onClick={()=>setSubMode(k)} style={{flex:1,padding:'7px 6px',borderRadius:9,border:'none',cursor:'pointer',background:subMode===k?'rgba(255,255,255,0.85)':'transparent',color:subMode===k?'#0B0B0B':'rgba(255,255,255,0.7)',fontFamily:'Nebulica',fontWeight:700,fontSize:12}}>{l}</button>
              ))}
            </div>
          )}
        </div>
      )}

      {unknown ? (
        /* codice non riconosciuto → scelta manuale */
        <div style={{flex:1,display:'flex',flexDirection:'column',background:'#F4EFE2',borderRadius:'22px 22px 0 0',overflow:'hidden'}}>
          <div style={{padding:'18px 18px 10px'}}>
            <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:16,color:ink}}>Codice non riconosciuto</div>
            <div style={{fontFamily:'Nebulica',fontSize:13,color:'rgba(11,11,11,0.55)',marginTop:4}}>Ho letto <b style={{color:ink}}>{unknown}</b>. Scegli l'inchiostro: lo <b>collego a questo codice</b> (vale su tutti i dispositivi){isCount?<> e lo <b>conto</b></>:null}.</div>
            <input value={pickQ} onChange={e=>setPickQ(e.target.value)} placeholder="cerca inchiostro…" style={{width:'100%',boxSizing:'border-box',marginTop:12,border:'1.5px solid rgba(11,11,11,0.16)',borderRadius:12,padding:'11px 14px',fontSize:16,fontFamily:'Nebulica',background:'#fff',outline:'none'}}/>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'0 14px 24px'}}>
            {pickList.map(x=>(
              <div key={x.Codice} onClick={()=>assignUnknown(x.Codice)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',marginBottom:6,borderRadius:14,background:'#fff',border:'1px solid rgba(11,11,11,0.10)',cursor:'pointer'}}>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,background:ink,color:'#fff',padding:'6px 10px',borderRadius:99,minWidth:52,textAlign:'center'}}>{x.Codice}</div>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:ink,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.Nome_completo||x.Codice}</div>
              </div>
            ))}
            <button onClick={()=>setUnknown(null)} style={{width:'100%',height:46,marginTop:8,borderRadius:12,border:'1.5px solid rgba(11,11,11,0.2)',background:'transparent',color:ink,fontFamily:'Nebulica',fontWeight:700,fontSize:14,cursor:'pointer'}}>↺ Riprova a scansionare</button>
          </div>
        </div>
      ) : weighFor ? (
        /* pesata barattolo aperto */
        <div style={{flex:1,display:'flex',flexDirection:'column',background:'#F4EFE2',borderRadius:'22px 22px 0 0',overflow:'hidden'}}>
          <div style={{padding:'20px 18px'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
              <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:13,background:ink,color:'#fff',padding:'6px 12px',borderRadius:99}}>{weighFor}</div>
              <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:16,color:ink}}>{inkName(weighFor)}</div>
            </div>
            <div style={{fontFamily:'Nebulica',fontSize:13,color:'rgba(11,11,11,0.55)',marginBottom:6}}>Peso <b>lordo</b> del barattolo aperto (g):</div>
            <input autoFocus value={gross} onChange={e=>setGross(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')confirmWeigh();}} inputMode="decimal" placeholder="es. 640" style={{width:'100%',boxSizing:'border-box',border:'1.5px solid rgba(11,11,11,0.16)',borderRadius:12,padding:'13px 14px',fontSize:22,fontFamily:'Nebulica',fontWeight:700,background:'#fff',outline:'none',color:ink}}/>
            <div style={{fontFamily:'Nebulica',fontSize:13,color:'rgba(11,11,11,0.55)',marginTop:10}}>Tara {tare}g → <b style={{color:ink,fontSize:16}}>{net}g</b> netti</div>
            <div style={{display:'flex',gap:10,marginTop:18}}>
              <button onClick={()=>{setWeighFor(null);setGross('');}} style={{flex:1,height:50,borderRadius:14,border:'1.5px solid rgba(11,11,11,0.2)',background:'transparent',color:ink,fontFamily:'Nebulica',fontWeight:700,fontSize:15,cursor:'pointer'}}>Annulla</button>
              <button onClick={confirmWeigh} style={{flex:2,height:50,borderRadius:14,border:'none',background:accent,color:textOnDesk(accent),fontFamily:'Nebulica',fontWeight:700,fontSize:15,cursor:'pointer'}}>Aggiungi {net}g</button>
            </div>
          </div>
        </div>
      ) : (
        <div style={{flex:1,display:'flex',flexDirection:'column',padding:'0 16px',minHeight:0}}>
          <div style={{position:'relative',flexShrink:0}}>
            {mode==='camera' ? (
              <div style={{position:'relative',width:'100%',height:'30vh',borderRadius:20,overflow:'hidden',background:'#000',border:`3px solid ${flash==='ok'?'#16A34A':flash==='warn'?'#E4A11B':'rgba(255,255,255,0.15)'}`,transition:'border-color .15s'}}>
                <video ref={videoRef} playsInline muted autoPlay style={{width:'100%',height:'100%',objectFit:'cover'}}></video>
                <div style={{position:'absolute',left:'10%',right:'10%',top:'46%',height:2,background:'#4ade80',boxShadow:'0 0 8px #4ade80'}}/>
                {cameraLoading&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontFamily:'Nebulica',fontSize:14}}>Avvio fotocamera…</div>}
                {cameraError&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',textAlign:'center',padding:24,color:'#fff',fontFamily:'Nebulica',fontSize:14}}>{cameraError}</div>}
              </div>
            ) : (
              <div style={{width:'100%',height:'16vh',display:'flex',alignItems:'center',justifyContent:'center',textAlign:'center',color:'rgba(255,255,255,0.85)',fontFamily:'Nebulica',fontSize:15,lineHeight:1.4,border:`3px solid ${flash==='ok'?'#16A34A':flash==='warn'?'#E4A11B':'rgba(255,255,255,0.15)'}`,borderRadius:20,padding:16}}>
                {effSub==='pesare'?'Scansiona il barattolo aperto da pesare.':'Pronto per il lettore esterno. Scansiona i barattoli.'}
              </div>
            )}
            {toast&&<div style={{position:'absolute',left:'50%',top:12,transform:'translateX(-50%)',background:'#16A34A',color:'#fff',fontFamily:'Nebulica',fontWeight:700,fontSize:15,padding:'8px 18px',borderRadius:99,boxShadow:'0 6px 18px rgba(0,0,0,0.3)'}}>{toast}</div>}
          </div>

          {purpose==='impara' ? (
            <>
              <div style={{color:'rgba(255,255,255,0.7)',fontFamily:'Nebulica',fontSize:13,textAlign:'center',padding:'12px 8px 8px'}}>
                Scansiona <b style={{color:'#fff'}}>tutti i codici</b> (anche i due su uno stesso barattolo). Registro i codici <b style={{color:'#fff'}}>senza contare kg</b>.
              </div>
              <div style={{flex:1,overflowY:'auto',margin:'0 0 8px',padding:'0 2px',minHeight:0}}>
                <div style={{display:'flex',justifyContent:'center',gap:16,padding:'4px 0 10px',color:'rgba(255,255,255,0.9)',fontFamily:'Nebulica',fontWeight:700,fontSize:13}}>
                  <span>✓ {log.filter(e=>e.status==='new').length} nuovi</span>
                  <span style={{color:'rgba(255,255,255,0.5)'}}>{log.filter(e=>e.status!=='new').length} già noti</span>
                </div>
                {log.map((e,idx)=>(
                  <div key={e.barcode+idx} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',marginBottom:5,borderRadius:11,background:'rgba(255,255,255,0.08)'}}>
                    <span style={{fontSize:13}}>{e.status==='new'?'🆕':e.status==='sigla'?'🔤':'✓'}</span>
                    <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:11,color:'rgba(255,255,255,0.7)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{e.barcode}</span>
                    <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,color:'#fff',background:'rgba(255,255,255,0.16)',padding:'3px 9px',borderRadius:99,flexShrink:0}}>{e.ink}</span>
                  </div>
                ))}
              </div>
              <ManualInkEntry onSubmit={resolve} accent={accent}/>
            </>
          ) : (
            <>
              <div style={{display:'flex',alignItems:'center',gap:14,padding:'10px 2px 8px',color:'#fff',fontFamily:'Nebulica',fontWeight:700,fontSize:14,flexShrink:0}}>
                <span>{totJars} barattoli</span>
                <span style={{color:'rgba(255,255,255,0.55)'}}>{tallyRows.length} inchiostri</span>
                <span style={{color:'rgba(255,255,255,0.55)'}}>{(totG/1000).toFixed(1)} kg</span>
                <div style={{flex:1}}/>
                {tallyRows.length>0&&<button onClick={ricomincia} style={{background:'transparent',border:'none',color:'rgba(255,255,255,0.5)',fontFamily:'Nebulica',fontWeight:700,fontSize:12,cursor:'pointer'}}>↺ Ricomincia</button>}
              </div>
              <div style={{flex:1,overflowY:'auto',padding:'0 2px',minHeight:0}}>
                {tallyRows.length===0 && <div style={{textAlign:'center',color:'rgba(255,255,255,0.4)',fontFamily:'Nebulica',fontSize:13,padding:'18px 0'}}>{effSub==='pesare'?'Scansiona un barattolo aperto per pesarlo.':'Scansiona i barattoli sigillati: +1 kg ciascuno.'}</div>}
                {tallyRows.map(r=>(
                  <div key={r.ink} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 10px',marginBottom:5,borderRadius:12,background:'rgba(255,255,255,0.08)'}}>
                    <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,color:'#0B0B0B',background:'#fff',padding:'4px 9px',borderRadius:99,minWidth:48,textAlign:'center',flexShrink:0}}>{r.ink}</span>
                    <span style={{flex:1,minWidth:0,color:'rgba(255,255,255,0.8)',fontFamily:'Nebulica',fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{inkName(r.ink)}</span>
                    {r.open>0&&<span style={{fontFamily:'Nebulica',fontSize:11,color:'#4ade80',flexShrink:0}}>+{r.open}g</span>}
                    <button onClick={()=>bump(r.ink,-1)} style={{width:28,height:28,borderRadius:99,border:'none',background:'rgba(255,255,255,0.16)',color:'#fff',fontSize:16,cursor:'pointer',flexShrink:0,lineHeight:1}}>−</button>
                    <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:15,color:'#fff',minWidth:22,textAlign:'center',flexShrink:0}}>{r.jars}</span>
                    <button onClick={()=>bump(r.ink,1)} style={{width:28,height:28,borderRadius:99,border:'none',background:'rgba(255,255,255,0.16)',color:'#fff',fontSize:16,cursor:'pointer',flexShrink:0,lineHeight:1}}>+</button>
                  </div>
                ))}
              </div>
              <div style={{flexShrink:0,paddingBottom:'calc(env(safe-area-inset-bottom,12px) + 10px)'}}>
                <ManualInkEntry onSubmit={resolve} accent={accent}/>
                <div style={{display:'flex',gap:8,marginTop:2}}>
                  <button onClick={pausa} disabled={!tallyRows.length} style={{flex:1,height:52,borderRadius:14,border:'1.5px solid rgba(255,255,255,0.3)',background:'transparent',color:'#fff',fontFamily:'Nebulica',fontWeight:700,fontSize:15,cursor:tallyRows.length?'pointer':'default',opacity:tallyRows.length?1:0.4}}>⏸ Pausa</button>
                  <button onClick={chiudi} disabled={!tallyRows.length} style={{flex:2,height:52,borderRadius:14,border:'none',background:tallyRows.length?'#16A34A':'rgba(255,255,255,0.14)',color:'#fff',fontFamily:'Nebulica',fontWeight:700,fontSize:15,cursor:tallyRows.length?'pointer':'default'}}>
                    {purpose==='nuovi'?`Chiudi · +${totJars} barattoli`:`Chiudi inventario · ${(totG/1000).toFixed(1)} kg`}
                  </button>
                </div>
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}
function ManualInkEntry({onSubmit, accent}){
  const ref=React.useRef(null);
  const go=()=>{ const v=ref.current?ref.current.value:''; if(v){ onSubmit(v); if(ref.current)ref.current.value=''; } };
  return (
    <div style={{display:'flex',gap:8,padding:'0 0 calc(env(safe-area-inset-bottom,16px) + 16px)'}}>
      <input ref={ref} placeholder="oppure scrivi la sigla (es. AS 40)" onKeyDown={e=>{if(e.key==='Enter')go();}} style={{flex:1,boxSizing:'border-box',border:'none',borderRadius:12,padding:'13px 14px',fontSize:16,fontFamily:'Nebulica',background:'rgba(255,255,255,0.14)',color:'#fff',outline:'none'}}/>
      <button onClick={go} style={{border:'none',background:'#fff',color:'#0B0B0B',borderRadius:12,padding:'0 20px',fontFamily:'Nebulica',fontWeight:700,fontSize:15,cursor:'pointer'}}>OK</button>
    </div>
  );
}

// Pannello gestione codici: vedi quali inchiostri hanno/non hanno codici, cerca un codice
// per sapere a chi è associato, e riassegna un codice all'inchiostro giusto (fix mis-scan).
function CodiciManager({open, onClose, accent='#0033FF'}){
  const [q,setQ]=React.useState('');
  const [onlyMissing,setOnlyMissing]=React.useState(false);
  const [reassign,setReassign]=React.useState(null); // barcode in riassegnazione
  const [pickQ,setPickQ]=React.useState('');
  const [tick,setTick]=React.useState(0);
  const ink='#0B0B0B';

  React.useEffect(()=>{ if(open){ setQ(''); setOnlyMissing(false); setReassign(null); setPickQ('');
    loadBarcodeMap().then(()=>setTick(t=>t+1)).catch(()=>{}); } },[open]);

  const rows=React.useMemo(()=>{
    const map={};
    allInchiostri.forEach(x=>{ const c=x.Codice||''; if(c) map[c]={codice:c,nome:x.Nome_completo||c,codes:[]}; });
    allBarcodes.forEach(b=>{ const k=b.inchiostro; if(!map[k]) map[k]={codice:k,nome:k,codes:[]}; map[k].codes.push(b.barcode); });
    let list=Object.values(map);
    if(q){ const s=q.toLowerCase(); list=list.filter(r=>r.codice.toLowerCase().includes(s)||r.nome.toLowerCase().includes(s)||r.codes.some(c=>c.toLowerCase().includes(s))); }
    if(onlyMissing) list=list.filter(r=>r.codes.length===0);
    list.sort((a,b)=>a.codice.localeCompare(b.codice,undefined,{numeric:true}));
    return list;
  },[q,onlyMissing,tick]);

  const withCode=React.useMemo(()=>new Set(allBarcodes.map(b=>b.inchiostro)).size,[tick]);
  const pickList=React.useMemo(()=>{ const s=pickQ.toLowerCase();
    return allInchiostri.filter(x=>{const c=(x.Codice||'').toLowerCase(),n=(x.Nome_completo||'').toLowerCase();return !s||c.includes(s)||n.includes(s);}).slice(0,40);
  },[pickQ,reassign]);

  const doReassign=(inkCode)=>{ const bc=reassign; if(!bc)return;
    allBarcodes=allBarcodes.filter(b=>b.barcode!==bc).concat([{barcode:bc,inchiostro:inkCode}]);
    postGAS({action:'mapBarcode',barcode:bc,inchiostro:inkCode}).then(()=>loadBarcodeMap()).catch(()=>{});
    try{playBeep('saved');}catch(e){}
    setReassign(null); setPickQ(''); setTick(t=>t+1); if(window._bumpData)window._bumpData();
  };

  if(!open) return null;
  return (
    <div style={{position:'fixed',inset:0,zIndex:2000,background:'#F4EFE2',display:'flex',flexDirection:'column',fontFamily:'Nebulica,Arial,sans-serif'}}>
      <div style={{padding:'calc(env(safe-area-inset-top,20px) + 14px) 18px 12px',display:'flex',alignItems:'center',gap:12,flexShrink:0,borderBottom:'1px solid rgba(11,11,11,0.08)'}}>
        <button onClick={onClose} style={{width:40,height:40,borderRadius:99,border:'none',background:'rgba(11,11,11,0.06)',color:ink,fontSize:18,cursor:'pointer'}}>✕</button>
        <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:18,color:ink}}>Codici a barre</div>
        <div style={{flex:1}}/>
        <div style={{fontFamily:'Nebulica',fontSize:12,color:'rgba(11,11,11,0.5)'}}>{withCode} con codice</div>
      </div>

      {reassign ? (
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <div style={{padding:'16px 18px 8px'}}>
            <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:15,color:ink}}>Riassegna codice</div>
            <div style={{fontFamily:'Nebulica',fontSize:13,color:'rgba(11,11,11,0.55)',marginTop:3}}><b style={{fontFamily:'"JetBrains Mono",monospace'}}>{reassign}</b> → scegli l'inchiostro corretto:</div>
            <input value={pickQ} onChange={e=>setPickQ(e.target.value)} placeholder="cerca inchiostro…" style={{width:'100%',boxSizing:'border-box',marginTop:10,border:'1.5px solid rgba(11,11,11,0.16)',borderRadius:12,padding:'11px 14px',fontSize:16,fontFamily:'Nebulica',background:'#fff',outline:'none'}}/>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'0 14px 24px'}}>
            {pickList.map(x=>(
              <div key={x.Codice} onClick={()=>doReassign(x.Codice)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',marginBottom:6,borderRadius:14,background:'#fff',border:'1px solid rgba(11,11,11,0.10)',cursor:'pointer'}}>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,background:ink,color:'#fff',padding:'6px 10px',borderRadius:99,minWidth:52,textAlign:'center'}}>{x.Codice}</div>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:ink}}>{x.Nome_completo||x.Codice}</div>
              </div>
            ))}
            <button onClick={()=>{setReassign(null);setPickQ('');}} style={{width:'100%',height:44,marginTop:8,borderRadius:12,border:'1.5px solid rgba(11,11,11,0.2)',background:'transparent',color:ink,fontFamily:'Nebulica',fontWeight:700,fontSize:14,cursor:'pointer'}}>Annulla</button>
          </div>
        </div>
      ) : (
        <>
          <div style={{padding:'12px 18px 8px',display:'flex',gap:10,alignItems:'center',flexShrink:0}}>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="cerca codice o inchiostro…" style={{flex:1,boxSizing:'border-box',border:'1.5px solid rgba(11,11,11,0.14)',borderRadius:12,padding:'11px 14px',fontSize:16,fontFamily:'Nebulica',background:'#fff',outline:'none'}}/>
            <button onClick={()=>setOnlyMissing(v=>!v)} style={{padding:'10px 14px',borderRadius:99,border:'none',cursor:'pointer',background:onlyMissing?ink:'rgba(11,11,11,0.07)',color:onlyMissing?'#fff':ink,fontFamily:'Nebulica',fontWeight:700,fontSize:13,whiteSpace:'nowrap'}}>Senza codice</button>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'6px 14px 40px'}}>
            {rows.map(r=>(
              <div key={r.codice} style={{display:'flex',alignItems:'flex-start',gap:12,padding:'12px 14px',marginBottom:6,borderRadius:14,background:'#fff',border:`1px solid ${r.codes.length===0?'rgba(228,0,43,0.18)':'rgba(11,11,11,0.08)'}`}}>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,background:ink,color:'#fff',padding:'6px 10px',borderRadius:99,minWidth:54,textAlign:'center',flexShrink:0}}>{r.codice}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:ink,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.nome}</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:6}}>
                    {r.codes.length===0
                      ? <span style={{fontFamily:'Nebulica',fontSize:12,color:'rgba(228,0,43,0.7)'}}>— nessun codice</span>
                      : r.codes.map(c=>(
                        <button key={c} onClick={()=>{setReassign(c);setPickQ('');}} title="Tocca per riassegnare a un altro inchiostro" style={{fontFamily:'"JetBrains Mono",monospace',fontSize:11,color:ink,background:'rgba(11,11,11,0.06)',border:'1px solid rgba(11,11,11,0.12)',borderRadius:8,padding:'5px 9px',cursor:'pointer'}}>{c} ✎</button>
                      ))}
                  </div>
                </div>
              </div>
            ))}
            {rows.length===0&&<div style={{padding:'40px 0',textAlign:'center',fontFamily:'Nebulica',color:'rgba(11,11,11,0.35)',fontSize:14}}>Nessun risultato.</div>}
          </div>
        </>
      )}
    </div>
  );
}

// Storico inventari: legge il foglio 'InventariStorico' (via gviz) e lo sfoglia
// per data (ogni 'Chiudi inventario' = una sessione) o per inchiostro (andamento nel tempo).
function StoricoManager({open, onClose, accent='#0033FF'}){
  const [rows,setRows]=React.useState(null); // null = caricamento
  const [tab,setTab]=React.useState('inventari'); // 'inventari' | 'inchiostro'
  const [sel,setSel]=React.useState(null);   // sessione selezionata
  const [inkSel,setInkSel]=React.useState(''); // inchiostro selezionato
  const [q,setQ]=React.useState('');
  const ink='#0B0B0B', sub='rgba(11,11,11,0.5)', faint='rgba(11,11,11,0.35)';

  React.useEffect(()=>{ if(open){ setRows(null); setSel(null); setInkSel(''); setQ(''); setTab('inventari');
    fetchSheet('InventariStorico').then(r=>setRows(r||[])).catch(()=>setRows([])); } },[open]);

  const fmtDate=iso=>{ try{ const d=new Date(iso); if(isNaN(d.getTime()))return String(iso); return d.toLocaleString('it-IT',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(e){ return String(iso); } };
  const fmtG=g=>g>=1000?(g/1000).toFixed(2)+' kg':Math.round(g)+' g';
  const inkName=code=>{ const o=allInchiostri.find(x=>x.Codice===code); return (o&&o.Nome_completo)||code; };

  const sessions=React.useMemo(()=>{
    if(!rows) return [];
    const map={};
    rows.forEach(r=>{ const s=r.Sessione||r.Timestamp; if(!s)return; if(!map[s]) map[s]={sessione:s,ts:r.Timestamp||'',inks:[]}; map[s].inks.push({code:r.Inchiostro,grammi:parseFloat(r.Grammi)||0}); if(!map[s].ts&&r.Timestamp)map[s].ts=r.Timestamp; });
    return Object.keys(map).map(k=>({...map[k],totG:map[k].inks.reduce((a,i)=>a+i.grammi,0)})).sort((a,b)=>String(b.ts).localeCompare(String(a.ts)));
  },[rows]);

  const inkOptions=React.useMemo(()=>{
    if(!rows) return [];
    const set={}; rows.forEach(r=>{ if(r.Inchiostro)set[r.Inchiostro]=1; });
    const s=q.toLowerCase();
    return Object.keys(set).filter(c=>!s||c.toLowerCase().includes(s)||inkName(c).toLowerCase().includes(s)).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true})).slice(0,80);
  },[rows,q]);

  const inkHistory=React.useMemo(()=>{
    if(!rows||!inkSel) return [];
    const h=rows.filter(r=>r.Inchiostro===inkSel).map(r=>({ts:r.Timestamp,grammi:parseFloat(r.Grammi)||0})).sort((a,b)=>String(a.ts).localeCompare(String(b.ts)));
    return h.map((e,i)=>({...e,delta:i>0?e.grammi-h[i-1].grammi:null})).reverse();
  },[rows,inkSel]);

  if(!open) return null;
  const selSession=sessions.find(s=>s.sessione===sel);
  return (
    <div style={{position:'fixed',inset:0,zIndex:2000,background:'#F4EFE2',display:'flex',flexDirection:'column',fontFamily:'Nebulica,Arial,sans-serif'}}>
      <div style={{padding:'calc(env(safe-area-inset-top,20px) + 14px) 18px 10px',display:'flex',alignItems:'center',gap:12,flexShrink:0,borderBottom:'1px solid rgba(11,11,11,0.08)'}}>
        <button onClick={()=>{ if(sel){setSel(null);} else if(inkSel){setInkSel('');} else onClose(); }} style={{width:40,height:40,borderRadius:99,border:'none',background:'rgba(11,11,11,0.06)',color:ink,fontSize:18,cursor:'pointer'}}>{(sel||inkSel)?'‹':'✕'}</button>
        <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:18,color:ink}}>Storico inventari</div>
      </div>

      {!sel && !inkSel && (
        <div style={{padding:'10px 18px 4px',display:'flex',gap:6,flexShrink:0}}>
          {[['inventari','Per data'],['inchiostro','Per inchiostro']].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:'9px 10px',borderRadius:12,border:'none',cursor:'pointer',background:tab===k?ink:'rgba(11,11,11,0.06)',color:tab===k?'#fff':ink,fontFamily:'Nebulica',fontWeight:700,fontSize:13.5}}>{l}</button>
          ))}
        </div>
      )}

      <div style={{flex:1,overflowY:'auto',padding:'12px 14px 40px'}}>
        {rows===null && <div style={{padding:'48px 0',textAlign:'center',color:faint,fontFamily:'Nebulica',fontSize:14}}>Carico lo storico…</div>}
        {rows!==null && rows.length===0 && <div style={{padding:'48px 18px',textAlign:'center',color:sub,fontFamily:'Nebulica',fontSize:14,lineHeight:1.5}}>Nessun inventario registrato.<br/>Chiudi il tuo primo inventario per iniziare lo storico.</div>}

        {/* DETTAGLIO SESSIONE */}
        {rows!==null && selSession && (
          <>
            <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:15,color:ink,margin:'2px 4px 2px'}}>{fmtDate(selSession.ts)}</div>
            <div style={{fontFamily:'Nebulica',fontSize:12,color:sub,margin:'0 4px 12px'}}>{selSession.inks.length} inchiostri · {(selSession.totG/1000).toFixed(1)} kg</div>
            {selSession.inks.slice().sort((a,b)=>a.code.localeCompare(b.code,undefined,{numeric:true})).map(it=>(
              <div key={it.code} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',marginBottom:6,borderRadius:14,background:'#fff',border:'1px solid rgba(11,11,11,0.08)'}}>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,background:ink,color:'#fff',padding:'5px 10px',borderRadius:99,minWidth:52,textAlign:'center',flexShrink:0}}>{it.code}</div>
                <div style={{flex:1,fontFamily:'Nebulica',fontSize:13,color:ink,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{inkName(it.code)}</div>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:16,color:ink}}>{fmtG(it.grammi)}</div>
              </div>
            ))}
          </>
        )}

        {/* LISTA INVENTARI (per data) */}
        {rows!==null && rows.length>0 && !sel && !inkSel && tab==='inventari' && sessions.map(s=>(
          <div key={s.sessione} onClick={()=>setSel(s.sessione)} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',marginBottom:8,borderRadius:16,background:'#fff',border:'1px solid rgba(11,11,11,0.08)',cursor:'pointer'}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:ink}}>{fmtDate(s.ts)}</div>
              <div style={{fontFamily:'Nebulica',fontSize:12,color:sub,marginTop:2}}>{s.inks.length} inchiostri · {(s.totG/1000).toFixed(1)} kg</div>
            </div>
            <span style={{color:faint,fontSize:20}}>›</span>
          </div>
        ))}

        {/* PER INCHIOSTRO */}
        {rows!==null && rows.length>0 && !sel && !inkSel && tab==='inchiostro' && (
          <>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="cerca inchiostro…" style={{width:'100%',boxSizing:'border-box',marginBottom:10,border:'1.5px solid rgba(11,11,11,0.14)',borderRadius:12,padding:'11px 14px',fontSize:16,fontFamily:'Nebulica',background:'#fff',outline:'none'}}/>
            {inkOptions.map(c=>(
              <div key={c} onClick={()=>setInkSel(c)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',marginBottom:6,borderRadius:14,background:'#fff',border:'1px solid rgba(11,11,11,0.08)',cursor:'pointer'}}>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,background:ink,color:'#fff',padding:'5px 10px',borderRadius:99,minWidth:52,textAlign:'center'}}>{c}</div>
                <div style={{flex:1,fontFamily:'Nebulica',fontSize:13,color:ink}}>{inkName(c)}</div>
                <span style={{color:faint,fontSize:18}}>›</span>
              </div>
            ))}
          </>
        )}

        {/* STORIA DI UN INCHIOSTRO */}
        {rows!==null && inkSel && (
          <>
            <div style={{display:'flex',alignItems:'center',gap:10,margin:'2px 4px 12px'}}>
              <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,background:ink,color:'#fff',padding:'5px 11px',borderRadius:99}}>{inkSel}</div>
              <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:15,color:ink}}>{inkName(inkSel)}</div>
            </div>
            {inkHistory.map((e,i)=>(
              <div key={e.ts+i} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',marginBottom:6,borderRadius:14,background:'#fff',border:'1px solid rgba(11,11,11,0.08)'}}>
                <div style={{flex:1,minWidth:0,fontFamily:'Nebulica',fontSize:13,color:ink}}>{fmtDate(e.ts)}</div>
                {e.delta!=null && <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,color:e.delta<0?'#E4002B':e.delta>0?'#1F8A5B':faint}}>{e.delta<0?'▼ ':e.delta>0?'▲ ':''}{fmtG(Math.abs(e.delta))}</div>}
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:16,color:ink,minWidth:70,textAlign:'right'}}>{fmtG(e.grammi)}</div>
              </div>
            ))}
            <div style={{fontFamily:'Nebulica',fontSize:11.5,color:faint,margin:'8px 4px',lineHeight:1.5}}>▼ rosso = calo tra due inventari (consumo) · ▲ verde = aumento (carico/nuovo).</div>
          </>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════ MAGAZZINO MOBILE ═══════════════════ */
// Modello: UN numero (grammi totali) per inchiostro. Da lì si deriva kg + "X pieni / Yg avviato".
// Inventario = barattoli sigillati (stepper, 1 = 1kg) + barattolo aperto pesato (lordo − tara).
// Salva come valore ASSOLUTO (aggiornaStock) → sostituisce il conteggio precedente.
function MagazzinoMobile({accent='#0033FF', bg='#F4EFE2', tare=107, alertThreshold=1000, onTabChange, onNuova}){
  const [query,setQuery]=React.useState('');
  const [filterM,setFilterM]=React.useState('tutti');
  const [caricaInk,setCaricaInk]=React.useState(null);
  const [scanOpen,setScanOpen]=React.useState(false);
  const [codiciOpen,setCodiciOpen]=React.useState(false);
  const [storicoOpen,setStoricoOpen]=React.useState(false);
  const ink='#0B0B0B', sub='rgba(11,11,11,0.5)', faint='rgba(11,11,11,0.35)', line='rgba(11,11,11,0.10)';
  const azzeraTutto=()=>{ if(typeof confirm!=='undefined'&&!confirm('Azzerare TUTTO il magazzino (ogni inchiostro a 0 g)? Serve per rifare l\'inventario da capo. Lo storico resta.'))return; allInventario.forEach(i=>{i.grammi=0;}); postGAS({action:'azzeraMagazzino'}).catch(()=>{}); if(window._bumpData)window._bumpData(); };

  const inks=React.useMemo(()=>allInchiostri.map(x=>{
    const code=x.Codice||'';
    const inv=allInventario.find(i=>i.inchiostro===code);
    const grammi=inv?inv.grammi:0;
    const soglia=(inv&&inv.soglia!=null)?inv.soglia:alertThreshold;
    const status=grammi<=0?'vuoto':grammi<soglia?'basso':'ok';
    const codici=allBarcodes.filter(b=>normInkCode(b.inchiostro)===normInkCode(code)).length;
    return {code,nome:x.Nome_completo||code,tipo:x.Tipologia||'',grammi,soglia,status,codici};
  }),[allInchiostri.length,allInventario.length,alertThreshold,allBarcodes.length]);

  const filtered=React.useMemo(()=>{
    let list=[...inks];
    if(filterM==='basso') list=list.filter(i=>i.status!=='ok');
    else if(filterM==='in_mag') list=list.filter(i=>i.grammi>0);
    else if(filterM==='no_code') list=list.filter(i=>i.codici===0);
    if(query){const q=query.toLowerCase();list=list.filter(i=>i.code.toLowerCase().includes(q)||i.nome.toLowerCase().includes(q));}
    list.sort((a,b)=>a.code.localeCompare(b.code,undefined,{numeric:true}));
    return list;
  },[inks,filterM,query]);

  const maxG=Math.max.apply(null,inks.map(i=>i.grammi).concat([1]));
  const totG=inks.reduce((s,i)=>s+i.grammi,0);
  const inStock=inks.filter(i=>i.grammi>0).length;
  const belowCnt=inks.filter(i=>i.status!=='ok').length;
  const noCodeCnt=inks.filter(i=>i.codici===0).length;
  const fmtG=g=>g>=1000?(g/1000).toFixed(2)+' kg':Math.round(g)+' g';
  const jarsLabel=g=>{const interi=Math.floor(g/1000);const av=Math.round(g-interi*1000);if(interi>0&&av>0)return interi+' pieni + '+av+'g';if(interi>0)return interi+(interi===1?' pieno':' pieni');if(av>0)return av+'g avviato';return 'vuoto';};
  React.useEffect(()=>{ loadInvDraft().then(()=>{ if(window._bumpData)window._bumpData(); }).catch(()=>{}); },[]);
  const invPaused=!scanOpen&&readInvSession();

  return (
    <div style={{position:'absolute',inset:0,zIndex:100,display:'flex',flexDirection:'column',background:bg,fontFamily:'Nebulica,Arial,sans-serif',overflow:'hidden'}}>
      {/* header */}
      <div style={{padding:'calc(env(safe-area-inset-top,44px) + 14px) 18px 0',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:21,letterSpacing:-0.5,color:ink}}>Magazzino</div>
          <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:9,letterSpacing:1.1,color:sub,background:'rgba(11,11,11,0.06)',padding:'5px 10px',borderRadius:8}}>
            {(totG/1000).toFixed(1)} KG · {inStock} INK
          </div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="cerca inchiostro…" style={{flex:1,minWidth:0,boxSizing:'border-box',border:'1.5px solid rgba(11,11,11,0.14)',borderRadius:14,padding:'11px 14px',fontSize:16,fontFamily:'Nebulica',background:'#fff',color:ink,outline:'none'}}/>
          <button onClick={()=>setScanOpen(true)} style={{flexShrink:0,display:'inline-flex',alignItems:'center',gap:7,padding:'0 16px',borderRadius:14,border:'none',background:ink,color:'#fff',fontFamily:'Nebulica',fontWeight:700,fontSize:14,cursor:'pointer'}}>📷 Scansiona</button>
          <button onClick={()=>setCodiciOpen(true)} title="Codici a barre" style={{flexShrink:0,width:46,borderRadius:14,border:`1.5px solid rgba(11,11,11,0.14)`,background:'#fff',color:ink,fontFamily:'Nebulica',fontWeight:700,fontSize:16,cursor:'pointer'}}>⌗</button>
          <button onClick={()=>setStoricoOpen(true)} title="Storico inventari" style={{flexShrink:0,width:46,borderRadius:14,border:`1.5px solid rgba(11,11,11,0.14)`,background:'#fff',color:ink,fontFamily:'Nebulica',fontWeight:700,fontSize:16,cursor:'pointer'}}>⧗</button>
        </div>
        <div style={{display:'flex',gap:7,padding:'12px 0'}}>
          {[['tutti','Tutti'],['in_mag','In magazzino'],['basso','Sotto soglia'],['no_code','Senza codice']].map(([k,l])=>{
            const on=filterM===k;
            return <button key={k} onClick={()=>setFilterM(k)} style={{padding:'7px 13px',borderRadius:99,border:'none',cursor:'pointer',background:on?ink:'rgba(11,11,11,0.07)',color:on?'#fff':ink,fontFamily:'Nebulica',fontWeight:700,fontSize:13,whiteSpace:'nowrap'}}>{l}{k==='basso'&&belowCnt>0?' · '+belowCnt:''}{k==='no_code'&&noCodeCnt>0?' · '+noCodeCnt:''}</button>;
          })}
          <button onClick={azzeraTutto} title="Azzera magazzino" style={{padding:'7px 13px',borderRadius:99,border:`1.4px solid ${rgba('#E4002B',0.35)}`,cursor:'pointer',background:'transparent',color:'#E4002B',fontFamily:'Nebulica',fontWeight:700,fontSize:13,whiteSpace:'nowrap'}}>⟲ Azzera</button>
        </div>
      </div>
      {/* list */}
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch',padding:'0 14px 150px'}}>
        {invPaused&&(
          <div onClick={()=>setScanOpen(true)} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',borderRadius:14,margin:'2px 4px 12px',background:rgba(accent,0.10),border:`1.5px solid ${rgba(accent,0.35)}`,cursor:'pointer'}}>
            <span style={{fontSize:17}}>⏸</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:13.5,color:ink}}>Inventario in corso — {invPaused.jars} barattoli</div>
              <div style={{fontFamily:'Nebulica',fontSize:11.5,color:sub,marginTop:1}}>In pausa, non salvato. Tocca per riprendere.</div>
            </div>
            <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,color:'#fff',background:accent,padding:'7px 13px',borderRadius:99,flexShrink:0}}>Riprendi</span>
          </div>
        )}
        {allInventario.length===0&&allInchiostri.length>0&&(
          <div style={{padding:'14px 16px',borderRadius:14,background:rgba(accent,0.07),border:`1px solid ${rgba(accent,0.2)}`,margin:'2px 4px 14px',fontFamily:'Nebulica',fontSize:13,color:sub,lineHeight:1.5}}>
            💡 Nessun dato in magazzino. Tocca un inchiostro e registra le scorte (barattoli pieni + barattolo aperto).
          </div>
        )}
        {filtered.map(i=>{
          const pct=Math.min(100,(i.grammi/maxG)*100);
          const sc=i.status==='vuoto'?'#E4002B':i.status==='basso'?'#FF8C00':accent;
          const alert=i.status!=='ok';
          return (
            <div key={i.code} onClick={()=>setCaricaInk(i.code)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',marginBottom:8,borderRadius:16,background:'#fff',border:`1px solid ${alert?rgba(sc,0.35):line}`,cursor:'pointer',boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
              <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,background:ink,color:'#fff',padding:'6px 10px',borderRadius:99,whiteSpace:'nowrap',flexShrink:0,minWidth:52,textAlign:'center'}}>{i.code}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:ink,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{i.nome}</div>
                <div style={{height:5,borderRadius:99,background:'rgba(11,11,11,0.08)',margin:'6px 0 4px',overflow:'hidden'}}>
                  <div style={{width:pct+'%',height:'100%',background:sc,borderRadius:99}}/>
                </div>
                <div style={{fontFamily:'Nebulica',fontSize:11,color:faint}}>{jarsLabel(i.grammi)}</div>
              </div>
              {(()=>{const n=i.codici,col=n===0?'#E4002B':n>=2?'#1F8A5B':sub,bgc=n===0?rgba('#E4002B',0.08):n>=2?rgba('#1F8A5B',0.10):'rgba(11,11,11,0.05)';
                return <div title={n===0?'Nessun codice mappato':n+' codice/i mappati'} style={{flexShrink:0,fontFamily:'Nebulica',fontWeight:700,fontSize:11,color:col,background:bgc,borderRadius:99,padding:'3px 8px',whiteSpace:'nowrap'}}>⌗{n}</div>;})()}
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:18,color:alert?sc:ink,letterSpacing:-0.5}}>{fmtG(i.grammi)}</div>
                <div style={{fontFamily:'Nebulica',fontSize:10,color:faint,marginTop:1}}>{i.status==='vuoto'?'vuoto':i.status==='basso'?'sotto soglia':'soglia '+fmtG(i.soglia)}</div>
              </div>
            </div>
          );
        })}
        {filtered.length===0&&<div style={{padding:'48px 0',textAlign:'center',fontFamily:'Nebulica',color:faint,fontSize:14}}>{query||filterM!=='tutti'?'Nessun inchiostro corrisponde.':'Foglio Inchiostri vuoto o non caricato.'}</div>}
      </div>
      <CaricaMobileSheet code={caricaInk} onClose={()=>setCaricaInk(null)} tare={tare} accent={accent}/>
      <ScannerOverlay open={scanOpen} accent={accent} tare={tare} onClose={()=>setScanOpen(false)} onPick={code=>{ setScanOpen(false); setCaricaInk(code); }}/>
      <CodiciManager open={codiciOpen} accent={accent} onClose={()=>setCodiciOpen(false)}/>
      <StoricoManager open={storicoOpen} accent={accent} onClose={()=>setStoricoOpen(false)}/>
      <BottomNav activeKey="magazzino" accent={accent} restColor="#0B0B0B" bg={bg} onNuova={onNuova} onTabChange={onTabChange}/>
    </div>
  );
}

function CaricaMobileSheet({code, onClose, tare=107, accent='#0033FF'}){
  const open=!!code;
  const ink='#0B0B0B', sub='rgba(11,11,11,0.5)', faint='rgba(11,11,11,0.4)';
  const inkObj=code?allInchiostri.find(x=>(x.Codice||'')===code):null;
  const inv=code?allInventario.find(i=>i.inchiostro===code):null;
  const cur=inv?inv.grammi:0;
  const [sigillati,setSigillati]=React.useState(0);
  const [apertoLordo,setApertoLordo]=React.useState('');
  const [saving,setSaving]=React.useState(false);

  React.useEffect(()=>{
    if(!code)return;
    const interi=Math.floor(cur/1000);
    const rem=Math.max(0,cur-interi*1000);
    setSigillati(interi);
    setApertoLordo(rem>0?String(Math.round(rem+tare)):'');
    setSaving(false);
  },[code]);

  const parse=v=>{const n=parseFloat(String(v).replace(',','.'));return isNaN(n)?0:n;};
  const lordo=parse(apertoLordo);
  const nettoAperto=lordo>0?Math.max(0,lordo-tare):0;
  const totale=sigillati*1000+nettoAperto;
  const fmtKg=g=>g>=1000?(g/1000).toFixed(2)+' kg':Math.round(g)+' g';
  const step=d=>setSigillati(s=>Math.max(0,s+d));

  const salva=async()=>{
    if(!code||saving)return;
    setSaving(true);
    try{
      await postInventario({action:'aggiornaStock',inchiostro:code,grammi:Math.round(totale)});
      onClose();
    }catch(e){ alert('Errore salvataggio: '+(e&&e.message?e.message:e)); setSaving(false); }
  };

  return (
    <div>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',backdropFilter:'blur(3px)',WebkitBackdropFilter:'blur(3px)',opacity:open?1:0,pointerEvents:open?'auto':'none',transition:'opacity .3s',zIndex:1010}}/>
      <div style={{position:'fixed',left:0,right:0,bottom:0,background:'#F4EFE2',borderRadius:'24px 24px 0 0',padding:'10px 20px calc(env(safe-area-inset-bottom,16px) + 20px)',transform:open?'translateY(0)':'translateY(100%)',transition:'transform .42s cubic-bezier(.2,.85,.25,1)',zIndex:1020,boxShadow:'0 -8px 40px rgba(0,0,0,0.2)',maxHeight:'88vh',overflowY:'auto'}}>
        <div style={{width:38,height:4,borderRadius:99,background:'rgba(0,0,0,0.14)',margin:'0 auto 14px'}}/>
        {code&&(
          <div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
              <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:13,background:ink,color:'#fff',padding:'6px 12px',borderRadius:99}}>{code}</div>
              <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:16,color:ink,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{inkObj?(inkObj.Nome_completo||code):code}</div>
            </div>
            <div style={{fontFamily:'Nebulica',fontSize:12,color:sub,marginBottom:18}}>In magazzino ora: <b style={{color:ink}}>{fmtKg(cur)}</b> · registra l'inventario aggiornato</div>

            <div style={{background:'#fff',borderRadius:16,padding:'14px 16px',marginBottom:12,border:'1px solid rgba(11,11,11,0.08)'}}>
              <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:ink}}>Barattoli sigillati</div>
              <div style={{fontFamily:'Nebulica',fontSize:11,color:faint,marginBottom:12}}>1 barattolo = 1 kg</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <button onClick={()=>step(-1)} style={{width:48,height:48,borderRadius:14,border:'1.5px solid '+ink,background:'transparent',color:ink,fontSize:24,fontWeight:700,cursor:'pointer'}}>−</button>
                <div style={{textAlign:'center'}}>
                  <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:32,color:ink,lineHeight:1}}>{sigillati}</div>
                  <div style={{fontFamily:'Nebulica',fontSize:11,color:faint}}>{sigillati} kg</div>
                </div>
                <button onClick={()=>step(1)} style={{width:48,height:48,borderRadius:14,border:'none',background:ink,color:'#fff',fontSize:24,fontWeight:700,cursor:'pointer'}}>+</button>
              </div>
            </div>

            <div style={{background:'#fff',borderRadius:16,padding:'14px 16px',marginBottom:14,border:'1px solid rgba(11,11,11,0.08)'}}>
              <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:ink}}>Barattolo aperto</div>
              <div style={{fontFamily:'Nebulica',fontSize:11,color:faint,marginBottom:10}}>peso lordo sulla bilancia — tara {tare}g sottratta in automatico</div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <input value={apertoLordo} onChange={e=>setApertoLordo(e.target.value)} inputMode="decimal" placeholder="lordo (g)" style={{flex:1,boxSizing:'border-box',border:'1.5px solid rgba(11,11,11,0.16)',borderRadius:12,padding:'12px 14px',fontSize:17,fontFamily:'Nebulica',background:'#F4EFE2',color:ink,outline:'none'}}/>
                <div style={{textAlign:'right',minWidth:92}}>
                  <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:18,color:ink}}>{nettoAperto>0?Math.round(nettoAperto)+' g':'—'}</div>
                  <div style={{fontFamily:'Nebulica',fontSize:10,color:faint}}>netto</div>
                </div>
              </div>
            </div>

            <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:12,padding:'0 4px'}}>
              <span style={{fontFamily:'Nebulica',fontSize:13,color:sub}}>Totale disponibile</span>
              <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:26,color:ink,letterSpacing:-1}}>{fmtKg(totale)}</span>
            </div>
            <button onClick={salva} disabled={saving} style={{width:'100%',height:52,borderRadius:16,border:'none',background:saving?'rgba(11,11,11,0.4)':ink,color:'#fff',fontFamily:'Nebulica',fontWeight:700,fontSize:16,cursor:saving?'default':'pointer'}}>{saving?'Salvataggio…':'Salva inventario'}</button>
            <div style={{fontFamily:'Nebulica',fontSize:11,color:faint,textAlign:'center',marginTop:10}}>Sostituisce il valore attuale con questo conteggio.</div>
          </div>
        )}
      </div>
    </div>
  );
}

      }}>
        {/* Intestazione colorata */}
        <div style={{background:pantone.hex, padding:'22px 22px 20px', position:'relative'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
            <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:60,lineHeight:0.85,letterSpacing:-2.2,color:fg}}>
              {pantone.code.replace(' U','').replace('Black','BLACK')}
              {pantone.code.includes(' U')&&<span style={{fontFamily:'Nebulica',fontWeight:400,opacity:0.6,marginLeft:-3}}> U</span>}
            </div>
            <span style={{fontFamily:'Nebulica',fontSize:11,fontWeight:600,color:fg,opacity:0.75,display:'inline-flex',alignItems:'center',gap:5,whiteSpace:'nowrap',paddingTop:6}}>
              <span style={{width:5,height:5,borderRadius:99,background:fg,opacity:0.5}}/>{pantone.ink} ink
            </span>
          </div>
          <div style={{marginTop:14,display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
            <span style={{fontFamily:'Nebulica',fontSize:15,fontWeight:500,color:fg,opacity:0.88}}>{pantone.name.replace('*','')}</span>
            {pantone.page&&<span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:10,color:fg,opacity:0.55,letterSpacing:0.6}}>PAG.{pantone.page}</span>}
          </div>
        </div>

        {/* Corpo formula (bianco) */}
        <div style={{background:'#fff',padding:'16px 18px 22px'}}>
          <div style={{fontFamily:'Nebulica',fontSize:10,letterSpacing:1.4,fontWeight:700,color:'rgba(0,0,0,0.5)'}}>QUANTITÀ</div>
          <div style={{marginTop:7,display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
            {[100,300,500,1000].map(q=>(
              <div key={q} onClick={()=>setQty(q)} style={{padding:'9px 0',textAlign:'center',borderRadius:99,background:q===qty?'#0B0B0B':'#fff',color:q===qty?'#fff':'#0B0B0B',border:'1.5px solid #0B0B0B',fontFamily:'Nebulica',fontWeight:700,fontSize:12,cursor:'pointer',WebkitTapHighlightColor:'transparent'}}>
                {q<1000?q+' g':'1 kg'}
              </div>
            ))}
          </div>
          <div style={{marginTop:16,display:'flex',justifyContent:'space-between',fontFamily:'Nebulica',fontSize:10,letterSpacing:1.4,fontWeight:700,color:'rgba(0,0,0,0.5)'}}>
            <span>FORMULA · {recipe.inks.length} INK</span><span>Σ {qty.toFixed(0)} g</span>
          </div>
          <div style={{marginTop:2}}>
            {recipe.inks.map(ink=>{
              const grams=(ink.pct/100)*qty;
              return (
                <div key={ink.name} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderTop:'1px solid rgba(0,0,0,0.08)'}}>
                  <div style={{padding:'5px 11px',borderRadius:99,background:'#0B0B0B',color:'#fff',fontFamily:'Nebulica',fontWeight:700,fontSize:11,whiteSpace:'nowrap',minWidth:56,textAlign:'center'}}>{ink.name}</div>
                  <div style={{flex:1,height:4,borderRadius:99,background:'rgba(0,0,0,0.08)'}}>
                    <div style={{height:'100%',width:`${ink.pct}%`,background:pantone.hex,borderRadius:99}}/>
                  </div>
                  <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:15,color:'#0B0B0B',minWidth:50,textAlign:'right'}}>
                    {grams.toFixed(2)}<span style={{opacity:0.45,fontWeight:400,fontSize:10,marginLeft:2}}>g</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// Normalize ink code: strip spaces, uppercase, apply known aliases
function txNormCode(c){
  const s=String(c||'').trim().toUpperCase().replace(/\s+/g,'');
  if(s==='AS91')return'AS90';
  if(s==='AS35')return'AS34';
  return s;
}

// Normalize formula to percentage map {normCode: pct}
function txNormInks(inks){
  const getDose=k=>k.dose!=null?+k.dose:parseFloat(k['Dose_40g (g)'])||0;
  const total=inks.reduce((s,k)=>s+getDose(k),0);
  if(!total)return{};
  const m={};
  for(const ink of inks){
    const code=txNormCode(ink.code||ink.Inchiostro||'');
    if(code)m[code]=(m[code]||0)+getDose(ink)/total*100;
  }
  return m;
}

// Compare two normalized formula maps → {score 0-100, diffs per code}
function txCompare(a,b){
  const codes=new Set([...Object.keys(a),...Object.keys(b)]);
  let sum=0;const diffs={};
  for(const c of codes){const d=Math.abs((a[c]||0)-(b[c]||0));diffs[c]=d;sum+=d;}
  return{score:Math.round(Math.max(0,100-sum/2)*10)/10,diffs};
}

// Parse Monday name like "190 ― ex708 U" or "196?" → {newCode, oldCode, uncertain}
function txParseName(name){
  const m=name.match(/^(.+?)\s*[\u2015\u2014\u2013\-]{1,2}\s*ex\s*(.+)$/i);
  if(m)return{newCode:m[1].trim().replace(/\?$/,''),oldCode:m[2].trim(),uncertain:m[1].includes('?')};
  return{newCode:name.replace(/\?$/,'').trim(),oldCode:null,uncertain:name.includes('?')};
}

// Normalize Pantone code: "115" → "115 U", "115U" → "115 U", "577B" → "577B" (custom)
function normalizePantoneCode(s){
  if(!s)return s;
  const t=s.trim();
  if(/\s*[Uu]$/.test(t))return t.replace(/\s*[Uu]$/,' U');
  if(/^\d+$/.test(t))return t+' U';
  return t;
}

// Find best matching recipe in allRicette for given Monday inks
function txFindMatch(mfInks){
  if(!mfInks||!mfInks.length)return null;
  const mfNorm=txNormInks(mfInks);
  if(!Object.keys(mfNorm).length)return null;
  let best=null;
  for(const r of allRicette){
    const comps=allComponenti.filter(c=>String(c.Pantone_ID)===String(r.Pantone_ID));
    if(!comps.length)continue;
    const rNorm=txNormInks(comps);
    const{score,diffs}=txCompare(mfNorm,rNorm);
    if(!best||score>best.score)best={r,score,diffs,comps};
  }
  return best;
}

// ═══════════════ COLLEGAMENTO ESPLICITO Monday ⇄ Ricetta ═══════════════
// Ogni ricetta ricorda da quale formula Monday nasce (campo Monday_ID nel foglio).
// Per le 34 ricette già esistenti (salvate prima che esistesse il campo) usiamo
// questa mappa di backfill, ricostruita dal Vecchio_Nome e confermata dall'utente.
// Così l'app è corretta da subito; i nuovi import scrivono Monday_ID nel foglio.
const MONDAY_BACKFILL = {
  '121 U':5,'2372 U':4,'7487 U':26,'7451 U':28,'283 U':24,'543 U':54,'1235 U':34,
  'Black 6 U':45,'2091 U':3,'Pantone Reflex Blue':15,'Pantone Reflex Blue U':15,'3405 U':51,'336 U':47,
  '2402 U':19,'2305 U':56,'230 U':11,'200 U':35,'250 U':30,'2036 U':42,'191 U':9,
  '489 U':10,'2965 U':44,'322 U':17,'3965 U':21,'204 U':66,'183 U':33,'323 U':18,
  '309 U':16,'2132 U':39,'2123 U':37,'2388 U':14,'3595 U':40,'330 U':49,'2339 U':67,
  '284 U':27,
};
// Mappa normalizzata (spazi collassati + maiuscolo) per tollerare doppi spazi / nbsp nel foglio.
const _txNormPid=s=>(s||'').trim().replace(/\s+/g,' ').toUpperCase();
const MONDAY_BACKFILL_NORM=Object.fromEntries(Object.entries(MONDAY_BACKFILL).map(([k,v])=>[_txNormPid(k),v]));
// Restituisce l'id Monday di una ricetta: dal foglio se presente, altrimenti dalla mappa.
function getMondayId(r){
  if(!r)return null;
  const raw=r.Monday_ID;
  if(raw!=null&&String(raw).trim()!==''){const n=parseInt(raw,10);if(!isNaN(n))return n;}
  const bf=MONDAY_BACKFILL_NORM[_txNormPid(r.Pantone_ID)];
  return bf!=null?bf:null;
}

// Verifica se una formula (percentuali normalizzate) è identica al 100% a una ricetta.
// "Identica" = stessi inchiostri e ogni percentuale entro EPS. Usato per bloccare doppioni.
const TX_FORMULA_EPS=0.15;
function txFormulaIdentica(mfNorm,rNorm){
  const codes=new Set([...Object.keys(mfNorm),...Object.keys(rNorm)]);
  for(const c of codes){if(Math.abs((mfNorm[c]||0)-(rNorm[c]||0))>TX_FORMULA_EPS)return false;}
  return true;
}

// ═══════════════ DIAGNOSI QC: la formula app combacia con la sua origine Monday? ═══════════════
// Ritorna {origine, appInks, verdict, matchMf, adjusted, rows}
//  verdict: 'coerente' | 'aggiustata' | 'scambio' | 'diversa' | 'no-origine'
function qcDiagnose(r){
  const comps=allComponenti.filter(c=>String(c.Pantone_ID)===String(r.Pantone_ID));
  const appNorm=txNormInks(comps);
  const mondayId=getMondayId(r);
  const origine=(mondayId!=null)?MONDAY_FORMULAS.find(f=>f.id===mondayId):null;
  // miglior corrispondenza esatta tra TUTTE le Monday
  let exact=null;
  for(const mf of MONDAY_FORMULAS){ if(txFormulaIdentica(txNormInks(mf.inks),appNorm)){ exact=mf; break; } }
  let verdict, adjusted=false, matchMf=origine||exact||null;
  if(origine){
    const oNorm=txNormInks(origine.inks);
    if(txFormulaIdentica(oNorm,appNorm)){
      verdict='coerente'; matchMf=origine;
      const sc=txCompare(oNorm,appNorm).score; adjusted = sc<99.9; // ritoccata ma stesso colore
    } else if(exact){ verdict='scambio'; matchMf=exact; }
    else { const sc=txCompare(oNorm,appNorm).score; verdict = sc>=97?'aggiustata':'diversa'; matchMf=origine; adjusted=(verdict==='aggiustata'); }
  } else {
    verdict = exact ? 'scambio' : 'no-origine'; matchMf = exact;
  }
  // tabella confronto per inchiostro (Monday vs App)
  const rows=[];
  const mfInks=matchMf?matchMf.inks:[];
  const codes=new Set([...mfInks.map(i=>txNormCode(i.code)),...comps.map(c=>txNormCode(c.Inchiostro))]);
  const mfBy={}; mfInks.forEach(i=>{mfBy[txNormCode(i.code)]=(mfBy[txNormCode(i.code)]||0)+(+i.dose||0);});
  const apBy={}; comps.forEach(c=>{apBy[txNormCode(c.Inchiostro)]=(apBy[txNormCode(c.Inchiostro)]||0)+(parseFloat(c['Dose_40g (g)'])||0);});
  [...codes].sort().forEach(code=>{ const m=mfBy[code]||0, a=apBy[code]||0; rows.push({code,monday:m,app:a,diff:a-m}); });
  return {origine, mondayId, verdict, matchMf, adjusted, rows, comps};
}
function qcVerdictLabel(v){
  return v==='coerente'?{t:'✅ Formula coerente',c:'#1F8A5B'}
    :v==='aggiustata'?{t:'🔧 Aggiustata per i 40 g',c:'#B26A00'}
    :v==='scambio'?{t:'🔁 Combacia con un ALTRO colore',c:'#E4002B'}
    :v==='diversa'?{t:'🔴 Non combacia con nessuna Monday',c:'#E4002B'}
    :{t:'➖ Nata nell\'app (nessuna origine Monday)',c:'rgba(11,11,11,0.45)'};
}

    else if(filt==='daverif') l=l.filter(x=>!x.green&&!x.qc.problema);
    if(query){const s=query.toLowerCase();l=l.filter(x=>x.pid.toLowerCase().includes(s)||nameOf(x.pid).toLowerCase().includes(s));}
    return [...l].sort((a,b)=>a.pid.localeCompare(b.pid,undefined,{numeric:true}));
  },[all,filt,query]);

  const cur=sel?all.find(x=>x.pid===sel):null;
  const auxOf=diag=>{ const id=diag.mondayId; return (id!=null)?verificheAux[id]:null; };

  const chip=(label,on,color)=>({padding:'8px 13px',borderRadius:99,border:'none',cursor:'pointer',fontFamily:'Nebulica',fontWeight:700,fontSize:13,whiteSpace:'nowrap',background:on?color:'rgba(11,11,11,0.06)',color:on?'#fff':ink});

  return (
    <div style={{position:'fixed',inset:0,zIndex:2000,background:'#F4EFE2',display:'flex',flexDirection:'column',fontFamily:'Nebulica,Arial,sans-serif'}}>
      <div style={{padding:'calc(env(safe-area-inset-top,20px) + 14px) 20px 12px',display:'flex',alignItems:'center',gap:14,flexShrink:0,borderBottom:`1px solid ${line}`}}>
        <button onClick={()=>{ if(sel)setSel(null); else back(); }} style={{width:40,height:40,borderRadius:99,border:'none',background:'rgba(11,11,11,0.06)',color:ink,fontSize:18,cursor:'pointer'}}>{sel?'‹':'✕'}</button>
        <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:19,color:ink}}>Verifica colori</div>
        <div style={{flex:1}}/>
        <div style={{fontFamily:'Nebulica',fontSize:12,color:sub}}>{nGreen}/{all.length} verificati</div>
      </div>

      {!sel && (
        <div style={{padding:'12px 20px 8px',display:'flex',flexWrap:'wrap',gap:8,alignItems:'center',flexShrink:0}}>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="cerca colore…" style={{flex:'1 1 200px',minWidth:150,boxSizing:'border-box',border:`1.5px solid ${line}`,borderRadius:12,padding:'10px 14px',fontSize:15,fontFamily:'Nebulica',background:'#fff',outline:'none'}}/>
          {[['tutti','Tutti',ink],['daverif','Da verificare · '+nTodo,ink],['sospetta','Formula sospetta · '+nSusp,'#E4002B'],['problema','Problemi · '+nProb,'#E4002B'],['verde','Verdi · '+nGreen,'#1F8A5B']].map(([k,l,c])=>(
            <button key={k} onClick={()=>setFilt(k)} style={chip(l,filt===k,c)}>{l}</button>
          ))}
        </div>
      )}

      <div style={{flex:1,overflowY:'auto',padding:'8px 16px 40px'}}>
        {/* LISTA */}
        {!sel && list.map(x=>{
          const vl=qcVerdictLabel(x.diag.verdict);
          return (
            <div key={x.pid} onClick={()=>setSel(x.pid)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',marginBottom:7,borderRadius:16,background:'#fff',border:`1px solid ${x.qc.problema?'rgba(228,0,43,0.35)':x.green?'rgba(31,138,91,0.35)':line}`,cursor:'pointer'}}>
              <div style={{width:34,height:34,borderRadius:10,flexShrink:0,background:(x.r.HEX&&x.r.HEX.length>=6)?(x.r.HEX[0]==='#'?x.r.HEX:'#'+x.r.HEX):'#ddd',border:'1px solid rgba(0,0,0,0.1)'}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:15,color:ink}}>{x.pid}</div>
                <div style={{fontFamily:'Nebulica',fontSize:11.5,color:vl.c,marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{vl.t}</div>
              </div>
              <div style={{display:'flex',gap:3,flexShrink:0}}>
                {QC_KEYS.map(k=><span key={k} title={k} style={{width:8,height:8,borderRadius:99,background:x.qc[k]?'#1F8A5B':'rgba(11,11,11,0.15)'}}/>)}
              </div>
              {x.qc.problema&&<span style={{fontSize:15}}>⚠️</span>}
              {x.green&&<span style={{fontSize:15,color:'#1F8A5B'}}>✓</span>}
            </div>
          );
        })}
        {!sel && list.length===0 && <div style={{padding:'40px 0',textAlign:'center',color:faint,fontFamily:'Nebulica',fontSize:14}}>Nessun colore in questo filtro.</div>}

        {/* DETTAGLIO */}
        {cur && (()=>{ const {r,pid,qc,diag}=cur; const vl=qcVerdictLabel(diag.verdict); const aux=auxOf(diag); const green=qcGreen(pid);
          const setK=(k,v)=>{ saveVerificaQC(pid,{[k]:v}); setTick(t=>t+1); };
          return (
            <div>
              {/* intestazione colore */}
              <div style={{display:'flex',alignItems:'center',gap:14,padding:'4px 4px 14px'}}>
                <div style={{width:56,height:56,borderRadius:14,flexShrink:0,background:(r.HEX&&r.HEX.length>=6)?(r.HEX[0]==='#'?r.HEX:'#'+r.HEX):'#ddd',border:'1px solid rgba(0,0,0,0.1)'}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:22,color:ink}}>{pid}</div>
                  <div style={{fontFamily:'Nebulica',fontSize:13,color:vl.c,fontWeight:700,marginTop:2}}>{vl.t}</div>
                </div>
                {green&&<span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,color:'#fff',background:'#1F8A5B',padding:'6px 12px',borderRadius:99}}>VERIFICATO</span>}
              </div>

              {/* confronto formula Monday vs App */}
              <div style={{background:'#fff',borderRadius:16,border:`1px solid ${line}`,padding:'14px 16px',marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
                  <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:11,letterSpacing:1,color:sub}}>{diag.matchMf?('◀ ORIGINALE: '+diag.matchMf.name):'NESSUNA ORIGINE MONDAY'}</span>
                  {diag.adjusted&&<span title="Formula ritoccata per far tornare i 40 g" style={{fontFamily:'Nebulica',fontWeight:700,fontSize:11,color:'#B26A00'}}>🔧 aggiustata</span>}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr auto auto auto',gap:'4px 12px',alignItems:'center',fontFamily:'"JetBrains Mono",monospace',fontSize:12}}>
                  <span style={{color:faint,fontWeight:700,fontSize:9.5,letterSpacing:0.5}}>INCHIOSTRO</span>
                  <span style={{color:faint,fontWeight:700,fontSize:9.5,textAlign:'right'}}>MONDAY</span>
                  <span style={{color:faint,fontWeight:700,fontSize:9.5,textAlign:'right'}}>APP</span>
                  <span style={{color:faint,fontWeight:700,fontSize:9.5,textAlign:'right'}}>DIFF</span>
                  {diag.rows.map(rw=>{ const d=rw.diff; const bad=Math.abs(d)>TX_FORMULA_EPS;
                    return (<React.Fragment key={rw.code}>
                      <span style={{color:ink,fontWeight:700}}>{rw.code}</span>
                      <span style={{color:sub,textAlign:'right'}}>{rw.monday?fmt(rw.monday):'—'}</span>
                      <span style={{color:ink,textAlign:'right'}}>{rw.app?fmt(rw.app):'—'}</span>
                      <span style={{textAlign:'right',fontWeight:700,color:bad?'#E4002B':'rgba(11,11,11,0.3)'}}>{d===0?'·':(d>0?'+':'')+fmt(d)}</span>
                    </React.Fragment>);
                  })}
                </div>
              </div>

              {/* spunte Aux (promemoria) */}
              {aux&&<div style={{fontFamily:'Nebulica',fontSize:12,color:sub,margin:'0 4px 12px'}}>Aux ha dichiarato: {['barattolo','codice','copertura','hex'].filter(k=>aux[k]).map(k=>k).join(', ')||'niente'} {aux.done?' · fatto':''}</div>}

              {/* le 5 pillole + azioni */}
              <div style={{background:'#fff',borderRadius:16,border:`1px solid ${line}`,padding:'14px 16px'}}>
                <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:11,letterSpacing:1,color:sub,marginBottom:10}}>LE MIE VERIFICHE</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                  {[['barattolo','Barattolo'],['formula','Formula'],['codice','Codice'],['copertura','Copertura'],['hex','HEX']].map(([k,l])=>{
                    const on=!!qc[k];
                    return <button key={k} onClick={()=>setK(k,!on)} style={{padding:'10px 16px',borderRadius:99,border:'none',cursor:'pointer',fontFamily:'Nebulica',fontWeight:700,fontSize:14,background:on?'#1F8A5B':'rgba(11,11,11,0.07)',color:on?'#fff':ink}}>{on?'✓ ':''}{l}</button>;
                  })}
                </div>
                <div style={{display:'flex',gap:8,marginTop:14}}>
                  <button onClick={()=>{ saveVerificaQC(pid,{barattolo:true,formula:true,codice:true,copertura:true,hex:true}); setTick(t=>t+1); }} style={{flex:1,height:48,borderRadius:14,border:'none',cursor:'pointer',background:'#1F8A5B',color:'#fff',fontFamily:'Nebulica',fontWeight:700,fontSize:15}}>✓ OK a tutto</button>
                  <button onClick={()=>setK('problema',!qc.problema)} style={{flex:1,height:48,borderRadius:14,border:`1.5px solid ${qc.problema?'#E4002B':'rgba(11,11,11,0.2)'}`,cursor:'pointer',background:qc.problema?'#E4002B':'transparent',color:qc.problema?'#fff':ink,fontFamily:'Nebulica',fontWeight:700,fontSize:15}}>⚠ Problema</button>
                </div>
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

function sperimInks(s){ const out=[]; for(let i=1;i<=6;i++){ const nm=s['Inchiostro_'+i]; if(nm) out.push({name:String(nm),real:parseFloat(String(s['Dose_reale_'+i]||'').replace(',','.'))||0,g40:parseFloat(String(s['Dose_40g_'+i]||'').replace(',','.'))||0}); } return out; }

// ── ID esperimenti: SIGLA[contatore]-ddmmyy+LETTERA ────────────────────────
// La lettera = variazione della stessa ricetta (A,B,C…). Il contatore (RED2)
// distingue due colori DIVERSI della stessa famiglia nello stesso giorno.
function parseSperimId(id){
  const m=/^([A-Z]+?)(\d*)-(\d{6})([A-Z])$/.exec(String(id||'').trim());
  if(!m) return null;
  return {sigla:m[1], counter:m[2]?parseInt(m[2],10):1, date:m[3], letter:m[4]};
}
function _idStr(sigla,counter,date,letter){ return sigla+(counter===1?'':String(counter))+'-'+date+letter; }
function todayBase(){ const d=new Date(); return String(d.getDate()).padStart(2,'0')+String(d.getMonth()+1).padStart(2,'0')+String(d.getFullYear()).slice(-2); }
// nuovo colore distinto della famiglia famKey, oggi = dateBase
function nextNewSperimId(famKey, list, dateBase){
  const fam=FAM_BY_KEY[famKey]; if(!fam) return '';
  const used=new Set();
  (list||[]).forEach(s=>{const p=parseSperimId(s.Sperim_ID); if(p&&p.sigla===fam.en&&p.date===dateBase) used.add(p.counter);});
  let c=1; while(used.has(c)) c++;
  return _idStr(fam.en,c,dateBase,'A');
}
// variazione di un colore esistente: stessa sigla+contatore+data, prossima lettera libera
function nextVariationSperimId(parentId, list){
  const p=parseSperimId(parentId); if(!p) return null;
  const letters=new Set();
  (list||[]).forEach(s=>{const q=parseSperimId(s.Sperim_ID); if(q&&q.sigla===p.sigla&&q.counter===p.counter&&q.date===p.date) letters.add(q.letter);});
  for(let i=0;i<26;i++){const L=String.fromCharCode(65+i); if(!letters.has(L)) return _idStr(p.sigla,p.counter,p.date,L);}
  return _idStr(p.sigla,p.counter,p.date,'Z');
}
// attributi catalogo di un esperimento (da campi salvati, con fallback dedotto da HEX / ID)
function sperimAttrs(s){
  const hex=String(s.HEX||'').trim();
  const famFromId=(()=>{const p=parseSperimId(s.Sperim_ID); return p&&FAM_BY_EN[p.sigla]?FAM_BY_EN[p.sigla].key:'';})();
  const fam=s.Famiglia || (hex?guessFamily(hex):'') || famFromId;
  return {
    hex,
    fam,
    tone: s.Tone || (hex?classifyTone(hex):''),
    intensity: s.Intensity || (hex?classifyIntensity(hex):''),
    fluo: s.Fluo?true:(hex?isFluoHex(hex):false),
    pastel: s.Pastel?true:(hex?isPastelHex(hex):false),
  };
}

                    {s.Artista&&<span style={{fontFamily:'Nebulica',fontSize:12,color:faint}}>· {s.Artista}</span>}

        )}
