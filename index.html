      {compareKey&&<SperimCompare rows={rows||[]} lineKey={lineKey} keyStr={compareKey} onClose={()=>setCompareKey(null)}/>}
    </div>
  );
}

// ── Confronto variazioni della stessa linea colore (formule affiancate) ────
function SperimCompare({rows,lineKey,keyStr,onClose}){
  const ink='#0B0B0B', sub='rgba(11,11,11,0.55)', faint='rgba(11,11,11,0.4)', line='rgba(11,11,11,0.12)', accent='#5856D6';
  const fmt=g=>{const n=Math.round(g*100)/100; return n%1===0?n.toFixed(0):n.toFixed(2);};
  const vars=rows.filter(s=>lineKey(s.Sperim_ID)===keyStr).sort((a,b)=>String(a.Sperim_ID).localeCompare(String(b.Sperim_ID)));
  // unione ordinata degli inchiostri presenti in tutta la linea (righe allineate fra colonne)
  const inkOrder=[]; vars.forEach(s=>sperimInks(s).forEach(k=>{ if(!inkOrder.includes(k.name)) inkOrder.push(k.name); }));
  return (
    <div style={{position:'fixed',inset:0,zIndex:2100,background:'#F4EFE2',display:'flex',flexDirection:'column',fontFamily:'Nebulica,Arial,sans-serif'}}>
      <div style={{padding:'calc(env(safe-area-inset-top,20px) + 14px) 18px 10px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <button onClick={onClose} style={{width:44,height:44,borderRadius:99,border:'none',background:'rgba(11,11,11,0.06)',color:ink,fontSize:22,cursor:'pointer'}}>←</button>
        <div><div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:20,letterSpacing:-0.5,color:ink}}>Confronto</div>
        <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:12,color:faint}}>{keyStr} · {vars.length} varianti</div></div>
      </div>
      <div style={{flex:1,overflow:'auto',WebkitOverflowScrolling:'touch',padding:'8px 18px 40px'}}>
        <div style={{display:'flex',gap:12,minWidth:'min-content'}}>
          {vars.map(s=>{ const its=sperimInks(s); const at=sperimAttrs(s); const byName={}; its.forEach(k=>byName[k.name]=k.g40); const tot=its.reduce((a,k)=>a+k.g40,0);
            return (
              <div key={s.Sperim_ID} style={{flex:'0 0 auto',width:210,background:'#fff',borderRadius:18,border:`1px solid ${line}`,padding:'14px 15px'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  {at.fam&&FAM_BY_KEY[at.fam]&&<span style={{width:14,height:14,borderRadius:99,background:FAM_BY_KEY[at.fam].dot,boxShadow:'inset 0 0 0 1px rgba(0,0,0,0.14)'}}/>}
                  <span style={{fontFamily:'"JetBrains Mono",monospace',fontWeight:700,fontSize:16,color:ink}}>{s.Sperim_ID}</span>
                </div>
                {inkOrder.map(nm=>{ const g=byName[nm]; return (
                  <div key={nm} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',opacity:g?1:0.32}}>
                    <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:11,background:g?ink:'transparent',color:g?'#fff':faint,border:g?'none':`1px solid ${line}`,padding:'3px 7px',borderRadius:99,minWidth:44,textAlign:'center'}}>{nm}</span>
                    <div style={{flex:1,height:6,borderRadius:99,background:'rgba(11,11,11,0.07)',overflow:'hidden'}}><div style={{height:'100%',width:Math.min(100,((g||0)/40*100*2.5))+'%',background:accent,borderRadius:99}}/></div>
                    <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:13,color:g?ink:faint,minWidth:34,textAlign:'right'}}>{g?fmt(g):'–'}</span>
                  </div>
                );})}

// ── Promuovi esperimento → ricetta Pantone ────────────────────────────────
function SperimPromoSheet({exp,onClose,onDone}){
  const ink='#0B0B0B', sub='rgba(11,11,11,0.55)', faint='rgba(11,11,11,0.4)', line='rgba(11,11,11,0.12)';
  const at=sperimAttrs(exp);
  const [code,setCode]=React.useState('');
  const [hex,setHex]=React.useState(at.hex?at.hex.replace('#',''):'');
  const [categoria,setCategoria]=React.useState(at.fam||'');
  const [copertura,setCopertura]=React.useState('');
  const [temperatura,setTemperatura]=React.useState('');
  const [pagina,setPagina]=React.useState('');
  const [saving,setSaving]=React.useState(false);
  const [err,setErr]=React.useState('');
  const fmt=g=>{const n=Math.round(g*100)/100; return n%1===0?n.toFixed(0):n.toFixed(2);};
  const its=sperimInks(exp);
  const norm=x=>String(x||'').trim().toUpperCase().replace(/\s+/g,' ');
  const dupCode=code.trim()&&allRicette.some(r=>norm(r.Pantone_ID)===norm(code));
  const dupHex=hex.replace('#','').length>=6&&allRicette.some(r=>norm(r.HEX)===norm('#'+hex.replace('#','')));
  const inp={width:'100%',boxSizing:'border-box',border:`1.5px solid ${line}`,borderRadius:14,padding:'13px 15px',fontSize:16,fontFamily:'Nebulica',background:'#fff',outline:'none',color:ink};
  const lbl={fontFamily:'Nebulica',fontSize:12,fontWeight:700,letterSpacing:1.2,color:faint,margin:'12px 2px 6px'};
  const salva=async()=>{
    if(!code.trim()){ setErr('Inserisci il codice Pantone.'); return; }
    if(dupCode){ setErr('"'+code.trim()+'" esiste già — usa un codice diverso.'); return; }
    if(!categoria){ setErr('Scegli una categoria.'); return; }
    setSaving(true); setErr('');
    const HX=hex.replace('#','').length>=3?('#'+hex.replace('#','')):'';
    const componenti=its.map(k=>({Inchiostro:k.name,'Dose_40g (g)':Math.round(k.g40*100)/100}));
    const payload={action:'promuoviSperimentazione',Sperim_ID:exp.Sperim_ID,Pantone_ID:code.trim(),HEX:HX,
      Categoria:categoria,Temperatura:temperatura,Copertura:copertura,Note:exp.Note||'',Pagina:pagina,
      Progetti:exp.Progetto||'',Artista:exp.Artista||'',componenti};
    try{ await postGAS(payload);
      allRicette.push({Pantone_ID:code.trim(),HEX:HX,Categoria:categoria,Temperatura:temperatura,Copertura:copertura,Note:exp.Note||'',Pagina:pagina,Progetti:exp.Progetto||'',Artista:exp.Artista||''});
      componenti.forEach(c=>allComponenti.push({Pantone_ID:code.trim(),Inchiostro:c.Inchiostro,'Dose_40g (g)':c['Dose_40g (g)']}));
      if(window._bumpData) window._bumpData();
      onDone(exp.Sperim_ID, code.trim());
    }catch(e){ setErr('Errore di salvataggio.'); setSaving(false); }
  };
  return (
    <div style={{position:'fixed',inset:0,zIndex:2100,background:'rgba(0,0,0,0.34)',backdropFilter:'blur(3px)',display:'flex',flexDirection:'column',justifyContent:'flex-end'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#F7F6F3',borderRadius:'24px 24px 0 0',padding:'8px 18px calc(env(safe-area-inset-bottom,16px) + 18px)',maxHeight:'92vh',overflowY:'auto',fontFamily:'Nebulica,Arial,sans-serif'}}>
        <div style={{width:40,height:5,borderRadius:99,background:'rgba(11,11,11,0.18)',margin:'8px auto 14px'}}/>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
          <div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:20,color:ink}}>Promuovi a Pantone</div>
          <div style={{flex:1}}/>
          <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:13,color:faint}}>{exp.Sperim_ID}</span>
        </div>
        <div style={{fontFamily:'Nebulica',fontSize:13,color:sub,lineHeight:1.45,marginBottom:6}}>La formula a 40 g diventa una ricetta ufficiale. L'esperimento resta in archivio come "promosso".</div>

        <div style={lbl}>CODICE PANTONE *</div>
        <input value={code} onChange={e=>setCode(e.target.value)} placeholder="es. 166 U" style={{...inp,borderColor:dupCode?'#E4002B':line}}/>
        {dupCode&&<div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12.5,color:'#E4002B',margin:'6px 2px 0'}}>⚠ esiste già una ricetta con questo codice</div>}

        <div style={{display:'flex',gap:10}}>
          <div style={{flex:1}}>
            <div style={lbl}>HEX</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{width:40,height:40,borderRadius:11,flexShrink:0,background:hex.replace('#','').length>=3?('#'+hex.replace('#','')):'#fff',border:`1.5px solid ${line}`}}/>
              <input value={hex} onChange={e=>setHex(e.target.value.replace('#','').slice(0,6))} placeholder="HEX" style={{...inp,padding:'13px 12px'}}/>
            </div>
          </div>
          <div style={{flex:1}}>
            <div style={lbl}>CATEGORIA *</div>
            <select value={categoria} onChange={e=>setCategoria(e.target.value)} style={{...inp,appearance:'auto'}}>
              <option value="">—</option>
              {COLOR_FAMILIES.map(f=><option key={f.key} value={f.key}>{f.it}</option>)}
            </select>
          </div>
        </div>
        {dupHex&&<div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:12,color:'#B26A00',margin:'6px 2px 0'}}>⚠ questo HEX è già usato da un'altra ricetta (puoi comunque procedere)</div>}

        <div style={{display:'flex',gap:10}}>
          <div style={{flex:1}}><div style={lbl}>COPERTURA</div><input value={copertura} onChange={e=>setCopertura(e.target.value)} placeholder="coprente…" style={inp}/></div>
          <div style={{flex:1}}><div style={lbl}>TEMPERATURA</div><input value={temperatura} onChange={e=>setTemperatura(e.target.value)} placeholder="—" style={inp}/></div>
        </div>

        <div style={lbl}>FORMULA · 40 g</div>
        <div style={{background:'#fff',borderRadius:14,border:`1px solid ${line}`,padding:'10px 14px'}}>
          {its.map((k,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'4px 0'}}>
              <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:ink}}>{k.name}</span>
              <span style={{fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:sub}}>{fmt(k.g40)} g</span>
            </div>
          ))}
        </div>

        {err&&<div style={{fontFamily:'Nebulica',fontWeight:700,fontSize:14,color:'#E4002B',margin:'12px 2px 0'}}>{err}</div>}
        <div style={{display:'flex',gap:10,marginTop:16}}>
          <button onClick={onClose} style={{flex:1,height:54,borderRadius:15,border:`1.5px solid ${line}`,background:'transparent',color:sub,fontFamily:'Nebulica',fontWeight:700,fontSize:16,cursor:'pointer'}}>Annulla</button>
          <button onClick={salva} disabled={saving||dupCode} style={{flex:2,height:54,borderRadius:15,border:'none',background:'#1F8A5B',color:'#fff',fontFamily:'Nebulica',fontWeight:700,fontSize:16,cursor:'pointer',opacity:(saving||dupCode)?0.6:1}}>{saving?'Promuovo…':'Conferma promozione'}</button>
        </div>
      </div>
    </div>
  );
}

// ── HEX vicini liberi ─────────────────────────────────────────────────────
// Genera alternative HEX vicine a un colore ma non ancora usate da nessuna ricetta.
function hslToHex(h,s,l){
  s/=100;l/=100;
  const k=n=>(n+h/30)%12,a=s*Math.min(l,1-l);
  const f=n=>{const v=l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));return Math.round(v*255).toString(16).padStart(2,'0');};
  return '#'+f(0)+f(8)+f(4);
}
function hexAlternativesVicine(hex,usedSet,n=3){
  const {h,s,l}=hexToHSL(hex);
  const out=[];const seen=new Set([...usedSet].map(x=>x.toUpperCase()));
  seen.add(hex.toUpperCase());
  // Perturbazioni progressive di luminosità e tonalità, dalla più vicina alla più lontana
  const deltas=[[0,3],[0,-3],[4,0],[-4,0],[0,6],[0,-6],[8,2],[-8,-2],[0,9],[0,-9],[12,0],[-12,0]];
  for(const [dh,dl] of deltas){
    const nl=Math.max(4,Math.min(96,l+dl));
    const nh=((h+dh)%360+360)%360;
    const cand=hslToHex(nh,s,nl).toUpperCase();
    if(!seen.has(cand)){seen.add(cand);out.push(cand);if(out.length>=n)break;}
  }
  return out;
}

    conflictDupCodeApp:w=>`Code déjà dans l\'app avec formule différente : ${w}`,
    conflictDupHex:(h,w)=>`HEX ${h} identique à : ${w}`,
    conflictDupFormula:w=>`Formule identique à : ${w}`,
  },
};

function TransferGroup({label,color,items,selected,onSelect,transferredMap,S,txState}){
  const[open,setOpen]=React.useState(true);
  if(!items.length)return null;
  return(
    <div>
      <div onClick={()=>setOpen(o=>!o)} style={{padding:'10px 18px',display:'flex',alignItems:'center',gap:8,cursor:'pointer',borderBottom:'1px solid rgba(0,0,0,0.07)',background:'rgba(0,0,0,0.025)',userSelect:'none'}}>
        <span style={{fontFamily:'Nebulica',fontSize:10,fontWeight:700,letterSpacing:1.3,color}}>{label.toUpperCase()}</span>
        <span style={{marginLeft:'auto',fontFamily:'Nebulica',fontSize:11,fontWeight:700,color:'rgba(0,0,0,0.35)'}}>{items.length} {open?'▾':'▸'}</span>
      </div>
      {open&&<div style={{padding:'6px 10px 10px'}}>
        {items.map(mf=>{
          const isSel=selected===mf.id;
          const{newCode:mfCode}=txParseName(mf.name);
          // Collegamento esplicito: la ricetta che nasce da questa formula Monday (o null).
          const linkedRecipe=transferredMap[mf.id]||null;
          const inApp=!!linkedRecipe;
          const st0=txState[mf.id]||{};
          const allVerified=!!(inApp&&st0.barattolo&&st0.codice&&st0.copertura&&st0.hex);
          return(
            <div key={mf.id} onClick={()=>onSelect(isSel?null:mf.id)}
              style={{marginBottom:8,borderRadius:16,padding:'14px 15px 12px',cursor:'pointer',
                background:isSel?'rgba(0,0,0,0.07)':'rgba(255,255,255,0.95)',
                border:`1.5px solid ${allVerified?'rgba(22,163,74,0.3)':isSel?'rgba(0,0,0,0.18)':'rgba(0,0,0,0.07)'}`,
                boxShadow:isSel?'none':'0 1px 5px rgba(0,0,0,0.06)',
                transition:'all .12s'}}>
              {/* Riga 1: tag + icone alert */}
              {(()=>{
                const st=txState[mf.id]||{};
                const pill=(label,bg,col)=><span style={{fontFamily:'Nebulica',fontSize:9,letterSpacing:1.1,fontWeight:700,padding:'3px 8px',borderRadius:99,background:bg,color:col}}>{label}</span>;
                return(
                  <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap',marginBottom:10}}>
                    {pill(S.tagMonday,'rgba(59,130,246,0.12)','#2563EB')}
                    {st.barattolo?pill(S.tagBarattoloOk,'rgba(161,98,7,0.12)','#A16207'):pill(S.tagBarattolo+' —','rgba(0,0,0,0.04)','rgba(0,0,0,0.25)')}
                    {st.copertura&&pill(S.tagCopertura,'rgba(124,58,237,0.12)','#6D28D9')}
                    {st.hex&&pill(S.tagHex,'rgba(8,145,178,0.12)','#0E7490')}
                    <div style={{display:'flex',gap:5,flexShrink:0,alignItems:'center',marginLeft:'auto'}}>
                      {mf.flags.includes('corrected_to_40g')&&<span title={S.ttCorrected}><IcoBolt size={15} color="#D97706"/></span>}
                      {mf.flags.includes('as90_code_fixed')&&<span title={S.ttAS90}><IcoWrench size={15} color="rgba(0,0,0,0.38)"/></span>}
                      {mf.flags.includes('not_40g')&&<span title={S.ttNot40g}><IcoQuestionMark size={16} color="#EF4444"/></span>}
                      {mf.name.includes('?')&&<span title={S.ttUncertain}><IcoQuestionMark size={16} color="#D97706"/></span>}
                      {allVerified&&<IcoCheckSeal size={17} color="#16A34A"/>}
                    </div>
                  </div>
                );
              })()}
              {/* Riga 2: codice nuovo (dalla ricetta collegata) + "ex nome Monday" */}
              {(()=>{
                const displayCode=linkedRecipe?linkedRecipe.Pantone_ID:(mfCode||mf.name);
                const mondayDiffers=linkedRecipe&&(displayCode||'').trim().toUpperCase()!==(mfCode||'').trim().toUpperCase();
                const exLabel=mondayDiffers?(mfCode||mf.name):null;
                return(
                  <div style={{display:'flex',alignItems:'flex-start',gap:10,minWidth:0}}>
                    <div style={{minWidth:0,flexShrink:1}}>
                      <div style={{fontFamily:'Nebulica',fontSize:28,fontWeight:700,color:'#0B0B0B',lineHeight:1.15,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{displayCode}</div>
                      {exLabel&&<div style={{fontFamily:'Nebulica',fontSize:12,color:'rgba(0,0,0,0.35)',marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>ex {exLabel}</div>}
                    </div>
                    {inApp&&<div style={{display:'flex',alignItems:'center',height:32,flexShrink:0}}><IcoCheckSeal size={28} color="#16A34A"/></div>}
                  </div>
                );
              })()}
            </div>
          );
        })}
      </div>}
    </div>
  );
}

function TransferDetail({formula,linkedRecipe,isDiscarded,onToggleDiscard,onImported,S,txState,updateTxState,lang}){
  const{newCode,oldCode,uncertain}=txParseName(formula.name);
  const inApp=!!linkedRecipe;
  // Titolo = codice nuovo della ricetta collegata (se esiste), altrimenti codice Monday.
  const displayTitle=linkedRecipe?linkedRecipe.Pantone_ID:(newCode||formula.name);
  const mondayCodeDiffers=!!(linkedRecipe&&(displayTitle||'').trim().toUpperCase()!==(newCode||'').trim().toUpperCase());
  const dtExLabel=mondayCodeDiffers?(newCode||formula.name):null;
  const corrected=formula.flags.includes('corrected_to_40g');
  const autoCategoria=React.useMemo(()=>{
    const candidates=[newCode,newCode?.toUpperCase(),(newCode||'').toUpperCase().replace(/([0-9])([A-Z])$/,'$1 $2')];
    const dbH=candidates.reduce((f,k)=>f||(k&&PANTONE_DB[k]),null);
    return dbH?guessFamily(dbH):'';
  },[newCode]);
  const[form,setForm]=React.useState({
    pantoneId:newCode,
    hex:'',
    categoria:autoCategoria,
    copertura:'',
    pagina:formula.page_note||'',
    vecchioNome:(()=>{const c=oldCode||newCode;return(c&&!/[?]/.test(c))?'ex '+c:'';})(),
    note:corrected?`⚠ dose conv. da ${formula.total.toFixed(2)}g — verificare prima di stampare`:'',
    progetti:'',
  });
  const[saving,setSaving]=React.useState(false);
  const[saved,setSaved]=React.useState(false);
  const[saveErr,setSaveErr]=React.useState('');
  const[hexAlts,setHexAlts]=React.useState([]);
  const[pickerOpen,setPickerOpen]=React.useState(false);
  const setF=(k,v)=>{setForm(f=>({...f,[k]:v}));if(k==='hex'){setHexAlts([]);setSaveErr('');}};

  async function handleImport(){
    const finalPantoneId=normalizePantoneCode(form.pantoneId);
    if(!finalPantoneId.trim()){setSaveErr(S.errPantone);return;}
    if(!form.hex.trim()){setSaveErr(S.errHex);return;}
    // REGOLA 1 — codice Pantone unico
    const normId=finalPantoneId.trim().toUpperCase().replace(/\s+/g,' ');
    const existCode=allRicette.find(r=>(r.Pantone_ID||'').trim().toUpperCase().replace(/\s+/g,' ')===normId);
    if(existCode){setSaveErr(`Il codice "${finalPantoneId.trim()}" esiste già nell'app. Usa un codice diverso.`);return;}
    // REGOLA 2 — HEX unico (blocco duro + 3 alternative vicine libere)
    const normHex=form.hex.replace('#','').trim().toUpperCase();
    if(!/^[0-9A-Fa-f]{6}$/.test(normHex)){setSaveErr('HEX non valido: servono 6 cifre esadecimali.');return;}
    const usedHex=new Set(allRicette.map(r=>(r.HEX||'').replace('#','').trim().toUpperCase()).filter(h=>h.length===6).map(h=>'#'+h));
    const existHex=allRicette.find(r=>(r.HEX||'').replace('#','').trim().toUpperCase()===normHex);
    if(existHex){
      const alts=hexAlternativesVicine('#'+normHex,usedHex,3);
      setHexAlts(alts);
      setSaveErr(`L'HEX #${normHex} è già usato da "${existHex.Pantone_ID}". Due Pantone non possono avere lo stesso HEX. Scegli un HEX vicino qui sotto o cambialo a mano.`);
      return;
    }
    // REGOLA 3 — formula unica (nessuna ricetta identica al 100%)
    const mfN=txNormInks(formula.inks);
    for(const r of allRicette){
      const comps=allComponenti.filter(c=>String(c.Pantone_ID)===String(r.Pantone_ID));
      if(!comps.length)continue;
      if(txFormulaIdentica(mfN,txNormInks(comps))){
        setSaveErr(`Formula identica a "${r.Pantone_ID}" (stessi inchiostri e stesse dosi). Non puoi avere due ricette con la stessa formula.`);
        return;
      }
    }
    setSaving(true);setSaveErr('');setHexAlts([]);
    try{
      const hexVal='#'+normHex;
      const componenti=formula.inks.map(ink=>({Inchiostro:ink.code,'Dose_40g (g)':ink.dose}));
      // Monday_ID = collegamento esplicito alla formula di origine.
      await postGAS({action:'addRicetta',Pantone_ID:finalPantoneId,HEX:hexVal,Categoria:form.categoria,Temperatura:'',Copertura:form.copertura,Note:form.note,Vecchio_Nome:form.vecchioNome,Pagina:form.pagina,Progetti:form.progetti,Monday_ID:formula.id,componenti});
      allRicette.push({Pantone_ID:finalPantoneId,HEX:hexVal,Categoria:form.categoria,Temperatura:'',Copertura:form.copertura,Note:form.note,Vecchio_Nome:form.vecchioNome,Pagina:form.pagina,Progetti:form.progetti,Monday_ID:formula.id});
      componenti.forEach(c=>allComponenti.push({Pantone_ID:finalPantoneId,...c}));
      window._bumpData?.();
      setSaved(true);onImported();
    }catch(e){setSaveErr(String(e));}
    finally{setSaving(false);}
  }

  // Tabella confronto: formula Monday vs formula della ricetta collegata (se esiste).
  const linkedComps=React.useMemo(()=>linkedRecipe?allComponenti.filter(c=>String(c.Pantone_ID)===String(linkedRecipe.Pantone_ID)):[],[linkedRecipe]);
  const mfNorm=React.useMemo(()=>txNormInks(formula.inks),[formula.id]);
  const rNorm=React.useMemo(()=>linkedComps.length?txNormInks(linkedComps):{},[linkedComps]);
  const allCompCodes=React.useMemo(()=>[...new Set([...Object.keys(mfNorm),...Object.keys(rNorm)])].sort(),[mfNorm,rNorm]);

  const inputStyle={width:'100%',height:38,borderRadius:10,border:'1.5px solid rgba(0,0,0,0.18)',padding:'0 12px',fontFamily:'Nebulica',fontSize:13,outline:'none',boxSizing:'border-box',background:'#FAFAFA'};
  const labelStyle={fontFamily:'Nebulica',fontSize:9,letterSpacing:1.4,fontWeight:700,color:'rgba(0,0,0,0.42)',marginBottom:5};

  return(
    <div style={{maxWidth:660}}>
      {/* Name + badges */}
      <div style={{marginBottom:20}}>
        <div style={{marginBottom:8}}>
          <div style={{fontFamily:'Nebulica',fontSize:22,fontWeight:700,letterSpacing:-0.5,color:'#0B0B0B',lineHeight:1.1}}>{displayTitle}</div>
          {dtExLabel&&<div style={{fontFamily:'Nebulica',fontSize:13,color:'rgba(0,0,0,0.42)',marginTop:3}}>ex {dtExLabel}</div>}
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {formula.source&&<span style={{fontFamily:'Nebulica',fontSize:9,letterSpacing:1.3,fontWeight:700,color:'rgba(0,0,0,0.45)',background:'rgba(0,0,0,0.07)',padding:'3px 9px',borderRadius:99}}>{formula.source}</span>}
          {formula.page_note&&<span style={{fontFamily:'Nebulica',fontSize:9,letterSpacing:1.3,fontWeight:700,color:'rgba(0,0,0,0.45)',background:'rgba(0,0,0,0.07)',padding:'3px 9px',borderRadius:99}}>{S.pageAbbr} {formula.page_note}</span>}
          {uncertain&&<span style={{fontFamily:'Nebulica',fontSize:9,letterSpacing:1.3,fontWeight:700,color:'#EF4444',background:'rgba(239,68,68,0.1)',padding:'3px 9px',borderRadius:99}}>{S.badgeUncertain}</span>}
          {formula.flags.includes('corrected_to_40g')&&<span style={{fontFamily:'Nebulica',fontSize:9,letterSpacing:1.3,fontWeight:700,color:'#D97706',background:'rgba(217,119,6,0.1)',padding:'3px 9px',borderRadius:99,display:'inline-flex',alignItems:'center',gap:5}}><IcoBolt size={10} color="#D97706"/>{S.badgeCorrected}</span>}
          {formula.flags.includes('as90_code_fixed')&&<span style={{fontFamily:'Nebulica',fontSize:9,letterSpacing:1.3,fontWeight:700,color:'#8B5CF6',background:'rgba(139,92,246,0.1)',padding:'3px 9px',borderRadius:99,display:'inline-flex',alignItems:'center',gap:5}}><IcoWrench size={11} color="#8B5CF6"/>{S.badgeAS90}</span>}
          {formula.flags.includes('not_40g')&&<span style={{fontFamily:'Nebulica',fontSize:9,letterSpacing:1.3,fontWeight:700,color:'#EF4444',background:'rgba(239,68,68,0.1)',padding:'3px 9px',borderRadius:99}}>{S.badgeNot40g(formula.total.toFixed(2))}</span>}
          {formula.duplicate_of&&<span style={{fontFamily:'Nebulica',fontSize:9,letterSpacing:1.3,fontWeight:700,color:'#F59E0B',background:'rgba(245,158,11,0.1)',padding:'3px 9px',borderRadius:99}}>{S.badgeDuplicate}: {formula.duplicate_of}</span>}
        </div>
      </div>

      {/* Verifiche */}
      {(()=>{
        const st=txState[formula.id]||{};
        const toggleBtn=(key,label,activeColor,activeBg)=>{
          const on=!!st[key];
          return(
            <button onClick={()=>updateTxState(formula.id,key,!on)}
              style={{flex:1,height:44,borderRadius:99,border:on?`1.5px solid ${activeColor}`:'1.5px solid rgba(0,0,0,0.13)',
                background:on?activeBg:'rgba(0,0,0,0.03)',fontFamily:'Nebulica',fontSize:11,fontWeight:700,
                color:on?activeColor:'rgba(0,0,0,0.45)',cursor:'pointer',transition:'all .15s',
                display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
              <IcoCheckCircle size={13} color={on?activeColor:'rgba(0,0,0,0.22)'}/>{label}
            </button>
          );
        };
        const allVerified=!!(inApp&&st.barattolo&&st.codice&&st.copertura&&st.hex);
        return(
          <div style={{marginBottom:22}}>
            <div style={{fontFamily:'Nebulica',fontSize:9,letterSpacing:1.5,fontWeight:700,color:'rgba(0,0,0,0.38)',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
              {S.verifySection.toUpperCase()}
              {allVerified&&<IcoCheckSeal size={13} color="#16A34A"/>}
            </div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {toggleBtn('barattolo',S.btnBarattolo,'#A16207','rgba(161,98,7,0.1)')}
              {toggleBtn('codice',S.btnCodice,'#9D174D','rgba(157,23,77,0.1)')}
              {toggleBtn('copertura',S.btnCopertura,'#6D28D9','rgba(124,58,237,0.1)')}
              {toggleBtn('hex',S.btnHex,'#0E7490','rgba(8,145,178,0.1)')}
            </div>
            {allVerified&&<div style={{marginTop:10,display:'flex',alignItems:'center',gap:8,padding:'10px 14px',borderRadius:99,background:'rgba(22,163,74,0.08)',border:'1px solid rgba(22,163,74,0.2)'}}>
              <IcoCheckSeal size={16} color="#16A34A"/>
              <span style={{fontFamily:'Nebulica',fontSize:11,fontWeight:700,color:'#16A34A',letterSpacing:0.5}}>{S.allVerifiedLabel||'Tutto verificato'}</span>
            </div>}
          </div>
        );
      })()}
      {/* Formula Monday */}
      <div style={{marginBottom:22,background:'rgba(0,0,0,0.03)',borderRadius:14,padding:'16px 18px'}}>
        <div style={{fontFamily:'Nebulica',fontSize:9,letterSpacing:1.5,fontWeight:700,color:'rgba(0,0,0,0.38)',marginBottom:10}}>FORMULA MONDAY · {formula.inks.length} {S.headerInks} · Σ {formula.total.toFixed(3)}g</div>
        {formula.inks.map(ink=>{
          const pct=(ink.dose/formula.total*100);
          return(
            <div key={ink.code+ink.dose} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderTop:'1px solid rgba(0,0,0,0.06)'}}>
              <div style={{fontFamily:'Nebulica',fontSize:11,fontWeight:700,background:'#0B0B0B',color:'#fff',padding:'3px 10px',borderRadius:99,minWidth:56,textAlign:'center',flexShrink:0}}>{ink.code}</div>
              <div style={{flex:1,height:3,borderRadius:99,background:'rgba(0,0,0,0.08)'}}>
                <div style={{width:pct+'%',height:'100%',borderRadius:99,background:'#0B0B0B',minWidth:2}}/>
              </div>
              <div style={{fontFamily:'Nebulica',fontSize:12,fontWeight:700,minWidth:58,textAlign:'right'}}>{ink.dose.toFixed(3)}<span style={{fontSize:9,opacity:0.45,marginLeft:2}}>g</span></div>
              <div style={{fontFamily:'Nebulica',fontSize:10,color:'rgba(0,0,0,0.38)',minWidth:36,textAlign:'right'}}>{pct.toFixed(1)}%</div>
            </div>
          );
        })}
      </div>

      {/* Confronto formula: Monday vs ricetta collegata (solo se già in app) */}
      {linkedRecipe&&allCompCodes.length>0&&(
        <div style={{marginBottom:22,borderRadius:14,padding:'16px 18px',background:'rgba(34,197,94,0.06)',border:'1px solid rgba(34,197,94,0.2)'}}>
          <div style={{fontFamily:'Nebulica',fontSize:9,letterSpacing:1.5,fontWeight:700,color:'#16A34A',marginBottom:10}}>CONFRONTO CON {linkedRecipe.Pantone_ID}</div>
          <div style={{display:'grid',gridTemplateColumns:'auto 1fr 1fr auto',gap:'3px 12px',alignItems:'center'}}>
            {S.tableHeaders.map(h=>(
              <div key={h} style={{fontFamily:'Nebulica',fontSize:9,letterSpacing:1.2,fontWeight:700,color:'rgba(0,0,0,0.38)',paddingBottom:4}}>{h}</div>
            ))}
            {allCompCodes.map(code=>{
              const mPct=mfNorm[code]||0;
              const rPct=rNorm[code]||0;
              const diff=Math.abs(mPct-rPct);
              const isGood=diff<0.5,isWarn=diff>=0.5&&diff<5,isBad=diff>=5;
              return(
                <React.Fragment key={code}>
                  <div style={{fontFamily:'Nebulica',fontSize:11,fontWeight:700}}>{code}</div>
                  <div style={{fontFamily:'Nebulica',fontSize:11,color:mPct===0?'rgba(0,0,0,0.25)':'rgba(0,0,0,0.7)'}}>{mPct.toFixed(1)}%</div>
                  <div style={{fontFamily:'Nebulica',fontSize:11,color:rPct===0?'rgba(0,0,0,0.25)':'rgba(0,0,0,0.7)'}}>{rPct.toFixed(1)}%</div>
                  <div style={{fontFamily:'Nebulica',fontSize:11,fontWeight:700,color:isBad?'#EF4444':isWarn?'#D97706':'#22C55E'}}>{isGood?'✓':'±'+diff.toFixed(1)+'%'}</div>
                </React.Fragment>
              );
            })}
          </div>
        </div>
      )}

      {/* Action */}
      {saved||inApp?(
        <div style={{background:'rgba(34,197,94,0.09)',borderRadius:14,padding:'18px 20px',border:'1px solid rgba(34,197,94,0.22)',textAlign:'center'}}>
          <div style={{fontFamily:'Nebulica',fontSize:15,fontWeight:700,color:'#16A34A'}}>{saved?S.importedTitle:S.alreadyTitle(displayTitle)}</div>
          <div style={{fontFamily:'Nebulica',fontSize:11,color:'rgba(0,0,0,0.5)',marginTop:5}}>{saved?S.importedSub(form.pantoneId):S.alreadySub}</div>
        </div>
      ):isDiscarded?(
        <div style={{background:'rgba(0,0,0,0.04)',borderRadius:14,padding:'18px 20px',border:'1px solid rgba(0,0,0,0.12)',textAlign:'center'}}>
          <div style={{fontFamily:'Nebulica',fontSize:14,fontWeight:700,color:'rgba(0,0,0,0.5)'}}>{lang==='fr'?'Formule écartée':'Formula scartata'}</div>
          <button onClick={onToggleDiscard} style={{marginTop:12,padding:'9px 18px',borderRadius:99,background:'transparent',color:'rgba(0,0,0,0.6)',border:'1.5px solid rgba(0,0,0,0.2)',fontFamily:'Nebulica',fontSize:12,fontWeight:700,cursor:'pointer'}}>{lang==='fr'?'Restaurer':'Ripristina'}</button>
        </div>
      ):(
        <>
        <div style={{background:'#fff',borderRadius:16,padding:'22px',border:'1px solid rgba(0,0,0,0.1)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
            <div style={{fontFamily:'Nebulica',fontSize:12,fontWeight:700,letterSpacing:0.3,color:'#0B0B0B'}}>{S.importTitle}</div>
            <button onClick={onToggleDiscard} title={lang==='fr'?'Écarter cette formule':'Scarta questa formula'} style={{padding:'6px 12px',borderRadius:99,background:'transparent',color:'rgba(0,0,0,0.4)',border:'1.5px solid rgba(0,0,0,0.15)',fontFamily:'Nebulica',fontSize:10,fontWeight:700,letterSpacing:0.5,cursor:'pointer'}}>✕ {lang==='fr'?'Écarter':'Scarta'}</button>
          </div>
          <div style={{marginBottom:12}}>
            <div style={labelStyle}>{S.labelPantone}</div>
            <input value={form.pantoneId} onChange={e=>setF('pantoneId',e.target.value)} onBlur={e=>setF('pantoneId',normalizePantoneCode(e.target.value))} style={inputStyle} placeholder={S.phPantone}/>
            {uncertain&&<div style={{fontFamily:'Nebulica',fontSize:10,color:'#D97706',marginTop:4}}>{S.uncertainWarn}</div>}
          </div>
          <div style={{marginBottom:12,display:'flex',gap:8,alignItems:'flex-end'}}>
            <div style={{flex:1}}>
              <div style={labelStyle}>{S.labelHex}</div>
              <input value={form.hex} onChange={e=>{let v=e.target.value;if(/^[0-9A-Fa-f]{6}$/.test(v))v='#'+v;setF('hex',v);if(/^#[0-9A-Fa-f]{6}$/i.test(v)){const fam=guessFamily(v);if(fam&&!form.categoria)setF('categoria',fam);}}} style={inputStyle} placeholder="#FFCC00"/>
            </div>
            <button onClick={()=>setPickerOpen(true)} title="Scegli colore" style={{width:38,height:38,borderRadius:8,border:'1.5px solid rgba(0,0,0,0.18)',cursor:'pointer',flexShrink:0,background:(()=>{const h=form.hex?'#'+form.hex.replace('#',''):null;return h&&/^#[0-9A-Fa-f]{6}$/i.test(h)?h:'rgba(0,0,0,0.1)'})(),boxSizing:'border-box',padding:0}}/>
          </div>
          <div style={{marginBottom:12}}>
            <div style={labelStyle}>CATEGORIA</div>
            <select value={form.categoria} onChange={e=>setF('categoria',e.target.value)} style={{...inputStyle,cursor:'pointer'}}>
              <option value="">—</option>
              <option value="rosso">Rosso</option>
              <option value="arancio">Arancio</option>
              <option value="giallo">Giallo</option>
              <option value="verde">Verde</option>
              <option value="azzurro">Azzurro</option>
              <option value="blu">Blu</option>
              <option value="viola">Viola</option>
              <option value="rosa">Rosa</option>
              <option value="beige">Beige</option>
              <option value="neutro">Neutro</option>
              <option value="bianco">Bianco</option>
              <option value="nero">Nero</option>
            </select>
          </div>
          <div style={{marginBottom:12}}>
            <div style={labelStyle}>VECCHIO NOME</div>
            <input value={form.vecchioNome} onChange={e=>setF('vecchioNome',e.target.value)} style={inputStyle} placeholder="es. ex 116 U, ex 7699 C"/>
          </div>
          <div style={{marginBottom:12}}>
            <div style={labelStyle}>{S.labelCopertura}</div>
            <select value={form.copertura} onChange={e=>setF('copertura',e.target.value)} style={{...inputStyle,cursor:'pointer'}}>
              <option value="">—</option>
              <option value="coprente">Coprente</option>
              <option value="semi">Semi</option>
              <option value="trasp">Trasp.</option>
            </select>
          </div>
          <div style={{marginBottom:12,display:'grid',gridTemplateColumns:'80px 1fr',gap:10}}>
            <div>
              <div style={labelStyle}>{S.labelPagina}</div>
              <input value={form.pagina} onChange={e=>setF('pagina',e.target.value)} style={inputStyle} placeholder="42"/>
            </div>
            <div>
              <div style={labelStyle}>{S.labelNote}</div>
              <input value={form.note} onChange={e=>setF('note',e.target.value)} style={inputStyle} placeholder={S.phNote}/>
            </div>
          </div>
          {saveErr&&<div style={{fontFamily:'Nebulica',fontSize:11,color:'#EF4444',marginBottom:10,padding:'8px 12px',background:'rgba(239,68,68,0.07)',borderRadius:8}}>{saveErr}</div>}
          {hexAlts.length>0&&(
            <div style={{marginBottom:12}}>
              <div style={{...labelStyle,marginBottom:7}}>{lang==='fr'?'HEX PROCHES LIBRES':'HEX VICINI LIBERI'}</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {hexAlts.map(alt=>(
                  <button key={alt} onClick={()=>{setF('hex',alt);}} style={{display:'flex',alignItems:'center',gap:7,padding:'6px 12px 6px 6px',borderRadius:99,border:'1.5px solid rgba(0,0,0,0.15)',background:'#fff',cursor:'pointer',fontFamily:'Nebulica',fontSize:12,fontWeight:700,color:'#0B0B0B'}}>
                    <span style={{width:22,height:22,borderRadius:'50%',background:alt,flexShrink:0,border:'1px solid rgba(0,0,0,0.1)'}}/>{alt}
                  </button>
                ))}
              </div>
            </div>
          )}
          <button onClick={handleImport} disabled={saving} style={{height:44,borderRadius:99,background:saving?'rgba(0,0,0,0.3)':'#0B0B0B',color:'#fff',border:'none',fontFamily:'Nebulica',fontSize:14,fontWeight:700,width:'100%',cursor:saving?'default':'pointer',transition:'background .2s'}}>
            {saving?S.saving:S.importBtn}
          </button>
        </div>
      <HexPickerSheet open={pickerOpen} onClose={()=>setPickerOpen(false)} pantoneId={form.pantoneId.trim()} onSelect={h=>{const hh='#'+h.replace('#','');setF('hex',hh);const fam=guessFamily(hh);if(fam)setF('categoria',fam);setPickerOpen(false);}} currentHex={form.hex} theme={{panelAlt:'#F0EDE8'}}/>
      </>
    )}
    </div>
  );
}

function TransferPanel(){
  const[selected,setSelected]=React.useState(null);
  const[lang,setLang]=React.useState(()=>{try{return localStorage.getItem('tx_lang')||'it';}catch(e){return 'it';}});
  const S=TX[lang]||TX.it;
  const toggleLang=()=>setLang(l=>{const n=l==='it'?'fr':'it';try{localStorage.setItem('tx_lang',n);}catch(e){}return n;});
  // Backfill: scrive una volta i Monday_ID delle 34 ricette esistenti nel foglio (rende permanente il collegamento).
  const[backfillState,setBackfillState]=React.useState('idle'); // idle | running | done | error
  const runBackfill=async()=>{
    setBackfillState('running');
    try{const r=await postGAS({action:'backfillMondayIds',map:MONDAY_BACKFILL});setBackfillState('done');}
    catch(e){setBackfillState('error');}
  };
  // Scartati: formule Monday che l'utente ha deciso di NON importare (prove superate).
  const[discarded,setDiscarded]=React.useState(()=>{
    try{return new Set(JSON.parse(localStorage.getItem('tx_discarded')||'[]'));}
    catch(e){return new Set();}
  });
  const toggleDiscard=(id)=>setDiscarded(prev=>{
    const n=new Set(prev);if(n.has(id))n.delete(id);else n.add(id);
    try{localStorage.setItem('tx_discarded',JSON.stringify([...n]));}catch(e){}
    return n;
  });
  const[txState,setTxState]=React.useState(()=>{
    try{return JSON.parse(localStorage.getItem('tx_state')||'{}');}
    catch(e){return{};}
  });
  const TX_VERIFICA_KEYS=new Set(['barattolo','codice','copertura','hex']);
  const updateTxState=(id,key,val)=>setTxState(prev=>{
    const n={...prev,[id]:{...(prev[id]||{}),[key]:val}};
    try{localStorage.setItem('tx_state',JSON.stringify(n));}catch(e){}
    if(TX_VERIFICA_KEYS.has(key)){
      const st=n[id]||{};
      fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'salvaVerifica',formula_id:id,barattolo:!!st.barattolo,codice:!!st.codice,copertura:!!st.copertura,hex:!!st.hex})}).catch(()=>{});
    }
    return n;
  });
  React.useEffect(()=>{
    let localState={};
    try{localState=JSON.parse(localStorage.getItem('tx_state')||'{}');}catch(e){}
    fetch(SCRIPT_URL+'?action=getVerifiche')
      .then(r=>r.json())
      .then(d=>{
        if(!d||!d.verifiche)return;
        const sheetsIds=new Set(Object.keys(d.verifiche));
        // Sync retroattivo: spunte presenti solo in localStorage → le mando a Sheets
        for(const[id,st]of Object.entries(localState)){
          if(!sheetsIds.has(String(id))&&(st.barattolo||st.codice||st.copertura||st.hex)){
            fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'salvaVerifica',formula_id:Number(id),barattolo:!!st.barattolo,codice:!!st.codice,copertura:!!st.copertura,hex:!!st.hex})}).catch(()=>{});
          }
        }
        // Merge Sheets → txState
        if(Object.keys(d.verifiche).length>0){
          setTxState(prev=>{
            const merged={...prev};
            for(const[id,v]of Object.entries(d.verifiche)){
              merged[id]={...(merged[id]||{}),...v};
            }
            try{localStorage.setItem('tx_state',JSON.stringify(merged));}catch(e){}
            return merged;
          });
        }
      }).catch(()=>{});
  },[]);
  const[activeFilter,setActiveFilter]=React.useState('all');
  const[searchQuery,setSearchQuery]=React.useState('');
  // ── Collegamento deterministico Monday ⇄ Ricetta ─────────────────────────
  // transferredMap[mondayId] = ricetta app che nasce da quella formula.
  // È l'unica verità: nessun match fuzzy, nessun confronto di nomi o formule.
  const transferredMap=React.useMemo(()=>{
    const m={};
    for(const r of allRicette){const id=getMondayId(r);if(id!=null&&!m[id])m[id]=r;}
    return m;
  },[allRicette.length]);

  // Categorizzazione: fatto se esiste una ricetta collegata; scartato se marcato; altrimenti da importare.
  const{confirmed,todo,discardedList}=React.useMemo(()=>{
    const confirmed=[],todo=[],discardedList=[];
    for(const mf of MONDAY_FORMULAS){
      if(transferredMap[mf.id])confirmed.push(mf);
      else if(discarded.has(mf.id))discardedList.push(mf);
      else todo.push(mf);
    }
    // Ordina i "fatti" nello stesso ordine del foglio/wallet (ordine di approvazione),
    // così il confronto riga-per-riga con il wallet è immediato.
    confirmed.sort((a,b)=>{
      const ia=allRicette.indexOf(transferredMap[a.id]);
      const ib=allRicette.indexOf(transferredMap[b.id]);
      return (ia<0?9999:ia)-(ib<0?9999:ib);
    });
    return{confirmed,todo,discardedList};
  },[transferredMap,discarded]);

  const filterFn=React.useCallback(mf=>{
    if(searchQuery){
      const q=searchQuery.toLowerCase();
      if(!mf.name.toLowerCase().includes(q))return false;
    }
    if(activeFilter==='all')return true;
    const st=txState[mf.id]||{};
    const inApp=!!transferredMap[mf.id];
    if(activeFilter==='inapp')return inApp;
    if(activeFilter==='noapp')return !inApp;
    if(activeFilter==='barattolo')return!!st.barattolo;
    if(activeFilter==='nobarattolo')return!st.barattolo;
    if(activeFilter==='nocopertura')return!st.copertura;
    if(activeFilter==='nohex')return!st.hex;
    return true;
  },[activeFilter,searchQuery,txState,transferredMap]);

  const flatItems=React.useMemo(()=>
    [...confirmed,...todo,...discardedList].filter(filterFn),
  [confirmed,todo,discardedList,filterFn]);

  // Keyboard navigation
  React.useEffect(()=>{
    const fn=e=>{
      if(e.key!=='ArrowDown'&&e.key!=='ArrowUp')return;
      e.preventDefault();
      const idx=selected?flatItems.findIndex(f=>f.id===selected):-1;
      const ni=e.key==='ArrowDown'?Math.min(idx+1,flatItems.length-1):Math.max(idx-1,0);
      if(flatItems[ni])setSelected(flatItems[ni].id);
    };
    window.addEventListener('keydown',fn);
    return()=>window.removeEventListener('keydown',fn);
  },[flatItems,selected]);

  const sel=selected?MONDAY_FORMULAS.find(f=>f.id===selected):null;

  const FILTERS=[
    {id:'all',label:S.filterAll},
    {id:'inapp',label:S.filterInApp},
    {id:'noapp',label:S.filterNoBarattolo.replace('Senza barattolo','Solo Monday').replace('Sans pot','Monday seulement')},
    {id:'barattolo',label:S.filterBarattolo},
    {id:'nobarattolo',label:S.filterNoBarattolo},
    {id:'nocopertura',label:S.filterNoCopertura},
    {id:'nohex',label:S.filterNoHex},
  ];
  // Fix "noapp" label properly
  FILTERS[2]={id:'noapp',label:lang==='fr'?'Monday seulement':'Solo Monday'};

  const chipStyle=(active)=>({
    fontFamily:'Nebulica',fontSize:10,letterSpacing:0.8,fontWeight:700,
    padding:'5px 10px',borderRadius:99,border:'none',cursor:'pointer',
    whiteSpace:'nowrap',transition:'all .12s',
    background:active?'#0B0B0B':'rgba(0,0,0,0.06)',
    color:active?'#fff':'rgba(0,0,0,0.5)',
  });

  return(
    <div style={{position:'fixed',inset:0,background:'#F4EFE2',display:'flex',flexDirection:'column',fontFamily:'Nebulica,Arial,sans-serif',zIndex:9999}}>
      <div style={{height:58,display:'flex',alignItems:'center',padding:'0 28px',borderBottom:'1.5px solid rgba(0,0,0,0.09)',flexShrink:0,gap:14,background:'#F4EFE2'}}>
        <a href={window.location.href.split('?')[0].split('#')[0]} style={{fontFamily:'Nebulica',fontSize:11,fontWeight:700,letterSpacing:0.5,color:'rgba(0,0,0,0.62)',textDecoration:'none',border:'1.5px solid rgba(0,0,0,0.18)',borderRadius:99,padding:'5px 12px'}}>← Wallet</a>
        <div style={{width:1,height:16,background:'rgba(0,0,0,0.14)'}}/>
        <span style={{fontFamily:'Nebulica',fontSize:15,fontWeight:700,letterSpacing:-0.2}}>{S.panelTitle}</span>
        <div style={{marginLeft:'auto',display:'flex',gap:18,alignItems:'center'}}>
          <span style={{fontFamily:'Nebulica',fontSize:11,fontWeight:700,color:'#16A34A'}}>✅ {confirmed.length}</span>
          <span style={{fontFamily:'Nebulica',fontSize:11,fontWeight:700,color:'#D97706'}}>🔶 {todo.length}</span>
          {discardedList.length>0&&<span style={{fontFamily:'Nebulica',fontSize:11,fontWeight:700,color:'rgba(0,0,0,0.35)'}}>✕ {discardedList.length}</span>}
          <button onClick={runBackfill} disabled={backfillState==='running'||backfillState==='done'} title="Scrive i collegamenti Monday_ID nel foglio (una tantum)" style={{height:24,padding:'0 10px',borderRadius:99,border:'1.5px solid rgba(0,0,0,0.14)',background:backfillState==='done'?'rgba(22,163,74,0.1)':'transparent',fontFamily:'Nebulica',fontSize:9.5,fontWeight:700,letterSpacing:0.5,cursor:backfillState==='done'?'default':'pointer',color:backfillState==='done'?'#16A34A':backfillState==='error'?'#EF4444':'rgba(0,0,0,0.45)'}}>{backfillState==='running'?'…':backfillState==='done'?'✓ COLLEGATO':backfillState==='error'?'ERRORE':'⛓ COLLEGA FOGLIO'}</button>
          <span style={{fontFamily:'Nebulica',fontSize:10,color:'rgba(0,0,0,0.3)',fontWeight:700,background:'rgba(0,0,0,0.06)',padding:'3px 9px',borderRadius:99}}>{S.panelTotal(MONDAY_FORMULAS.length)}</span>
          <button onClick={toggleLang} style={{height:28,padding:'0 12px',borderRadius:99,border:'1.5px solid rgba(0,0,0,0.18)',background:'transparent',fontFamily:'Nebulica',fontSize:11,fontWeight:700,cursor:'pointer',letterSpacing:0.5,color:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',gap:5}}>
            <span style={{opacity:lang==='it'?1:0.3}}>IT</span>
            <span style={{opacity:0.25}}>/</span>
            <span style={{opacity:lang==='fr'?1:0.3}}>FR</span>
          </button>
        </div>
      </div>
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {/* Sidebar */}
        <div style={{width:480,borderRight:'1.5px solid rgba(0,0,0,0.09)',display:'flex',flexDirection:'column',flexShrink:0,background:'rgba(255,255,255,0.35)'}}>
          {/* Search bar */}
          <div style={{padding:'10px 12px',flexShrink:0,borderBottom:'1px solid rgba(0,0,0,0.07)'}}>
            <div style={{position:'relative',display:'flex',alignItems:'center'}}>
              <svg style={{position:'absolute',left:11,pointerEvents:'none',flexShrink:0}} width="14" height="14" viewBox="0 0 20 20" fill="none">
                <circle cx="8.5" cy="8.5" r="5.75" stroke="rgba(0,0,0,0.35)" strokeWidth="1.8"/>
                <line x1="13" y1="13" x2="18" y2="18" stroke="rgba(0,0,0,0.35)" strokeWidth="1.8" strokeLinecap="round"/>
              </svg>
              <input
                value={searchQuery}
                onChange={e=>setSearchQuery(e.target.value)}
                placeholder={lang==='fr'?'Rechercher…':'Cerca…'}
                style={{width:'100%',height:36,borderRadius:99,border:'1.5px solid rgba(0,0,0,0.13)',background:'rgba(255,255,255,0.8)',padding:'0 32px 0 32px',fontFamily:'Nebulica',fontSize:13,fontWeight:500,outline:'none',boxSizing:'border-box',color:'#0B0B0B'}}
              />
              {searchQuery&&<button onClick={()=>setSearchQuery('')} style={{position:'absolute',right:10,background:'none',border:'none',cursor:'pointer',padding:0,lineHeight:1,color:'rgba(0,0,0,0.4)',fontSize:16,fontWeight:700}}>×</button>}
            </div>
          </div>
          {/* Filter bar */}
          <div style={{padding:'8px 10px',display:'flex',gap:6,overflowX:'auto',flexShrink:0,borderBottom:'1px solid rgba(0,0,0,0.07)',WebkitOverflowScrolling:'touch'}}>
            {FILTERS.map(f=>(
              <button key={f.id} onClick={()=>setActiveFilter(f.id)} style={chipStyle(activeFilter===f.id)}>{f.label}</button>
            ))}
          </div>
          {/* Groups */}
          <div style={{flex:1,overflowY:'auto'}}>
            <TransferGroup label={'✅ '+S.groupConfirmed} color="#16A34A" items={confirmed.filter(filterFn)} selected={selected} onSelect={setSelected} transferredMap={transferredMap} S={S} txState={txState}/>
            <TransferGroup label={'🔶 '+S.groupTodo} color="#D97706" items={todo.filter(filterFn)} selected={selected} onSelect={setSelected} transferredMap={transferredMap} S={S} txState={txState}/>
            <TransferGroup label={'✕ '+(lang==='fr'?'Écartés':'Scartati')} color="rgba(0,0,0,0.4)" items={discardedList.filter(filterFn)} selected={selected} onSelect={setSelected} transferredMap={transferredMap} S={S} txState={txState}/>
          </div>
        </div>
        {/* Detail */}
        <div style={{flex:1,overflowY:'auto',padding:'32px 48px'}}>
          {sel
            ?<TransferDetail key={sel.id} formula={sel} linkedRecipe={transferredMap[sel.id]||null} isDiscarded={discarded.has(sel.id)} onToggleDiscard={()=>toggleDiscard(sel.id)} onImported={()=>window._bumpData?.()} S={S} txState={txState} updateTxState={updateTxState} lang={lang}/>
            :<div style={{color:'rgba(0,0,0,0.28)',fontFamily:'Nebulica',fontSize:13,paddingTop:100,textAlign:'center',letterSpacing:0.5}}>{S.emptyState}</div>
          }
        </div>
      </div>
    </div>
  );
}


function App() {
  const [status, setStatus] = React.useState('loading');
  const [dataVer, setDataVer] = React.useState(0);
  const [isMobile] = React.useState(()=>window.innerWidth<1024);
  const kioskCode = React.useMemo(()=>{ const p=new URLSearchParams(window.location.search); return p.get('pantone')||null; },[]);
  const isTransfer = React.useMemo(()=>new URLSearchParams(window.location.search).has('transfer'),[]);
  const isVerifica = React.useMemo(()=>new URLSearchParams(window.location.search).has('verifica'),[]);
  const isEsperimenti = React.useMemo(()=>new URLSearchParams(window.location.search).has('esperimenti'),[]);

  const doLoad = React.useCallback(()=>{
    setStatus('loading');
    loadData().then(()=>{
      setDataVer(v=>v+1);
      setStatus('ready');
      loadFavoriti();
      loadApprovati();
      loadVerificati();
      loadInventario().then(()=>setDataVer(v=>v+1)).catch(()=>{});
      loadBarcodeMap().then(()=>setDataVer(v=>v+1)).catch(()=>{});
      loadInvDraft().then(()=>setDataVer(v=>v+1)).catch(()=>{});
      loadVerificaQC().then(()=>setDataVer(v=>v+1)).catch(()=>{});
      loadVerificheAux().then(()=>setDataVer(v=>v+1)).catch(()=>{});
    }).catch(err=>{
      console.error('Errore caricamento:', err);
      setStatus('error');
    });
  },[]);

  React.useEffect(()=>{ doLoad(); },[]);

  React.useEffect(()=>{
    window._bumpData=()=>setDataVer(v=>v+1);
    window._refreshData=()=>{ loadData().then(()=>setDataVer(v=>v+1)).catch(()=>{}); };
    return()=>{ delete window._bumpData; delete window._refreshData; };
  },[]);

  if(status==='loading') return <LoadingScreen/>;
  if(status==='error') return <ErrorScreen onRetry={doLoad}/>;
  if(kioskCode) return <KioskView rawCode={kioskCode}/>;
  if(isTransfer) return <TransferPanel/>;
  if(isVerifica) return <VerificaQCPage/>;
  if(isEsperimenti) return <EsperimentiPage/>;

  if(isMobile) {
    return <MobileApp/>;
  }
  return <DesktopApp defaults={DESK_DEFAULTS}/>;
}

const rootEl = document.getElementById('root');
const reactRoot = ReactDOM.createRoot(rootEl);
reactRoot.render(<App/>);

</script>
</body>
