<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Scanner — Pagina di prova</title>
<!-- Stessi CDN dell'app (unpkg per React/Babel). ZXing UMD globale: window.ZXing -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Arial, sans-serif;
    background: #F4EFE2; color: #0B0B0B;
    padding: env(safe-area-inset-top,0) 0 0 0;
    min-height: 100vh;
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 18px 16px 48px; }
  h1 { font-size: 20px; font-weight: 800; margin: 6px 0 2px; letter-spacing: -0.3px; }
  .sub { font-size: 13px; color: #6b6355; margin: 0 0 18px; }
  .seg { display: flex; gap: 8px; background: #e7e0cf; padding: 5px; border-radius: 16px; margin-bottom: 16px; }
  .seg button {
    flex: 1; border: none; cursor: pointer; font-size: 15px; font-weight: 700;
    padding: 12px 0; border-radius: 12px; background: transparent; color: #6b6355; transition: all .18s;
  }
  .seg button.on { background: #0B0B0B; color: #fff; }
  .card {
    background: #fff; border-radius: 22px; padding: 18px; margin-bottom: 16px;
    border: 2px solid transparent; transition: border-color .15s, box-shadow .15s;
    box-shadow: 0 6px 22px rgba(0,0,0,.06);
  }
  .card.flash-ok   { border-color: #16A34A; box-shadow: 0 0 0 4px rgba(22,163,74,.18); }
  .card.flash-warn { border-color: #E4A11B; box-shadow: 0 0 0 4px rgba(228,161,27,.18); }
  .videobox {
    position: relative; width: 100%; aspect-ratio: 4/3; background: #000;
    border-radius: 16px; overflow: hidden; margin-bottom: 4px;
  }
  .videobox video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .corner { position: absolute; width: 30px; height: 30px; border: 3px solid #fff; opacity: .9; }
  .corner.tl { top: 14px; left: 14px; border-right: none; border-bottom: none; border-radius: 8px 0 0 0; }
  .corner.tr { top: 14px; right: 14px; border-left: none; border-bottom: none; border-radius: 0 8px 0 0; }
  .corner.bl { bottom: 14px; left: 14px; border-right: none; border-top: none; border-radius: 0 0 0 8px; }
  .corner.br { bottom: 14px; right: 14px; border-left: none; border-top: none; border-radius: 0 0 8px 0; }
  .scanline { position: absolute; left: 8%; right: 8%; height: 2px; background: #4ade80; box-shadow: 0 0 8px #4ade80; animation: scan 1.8s ease-in-out infinite; }
  @keyframes scan { 0%,100% { top: 18%; } 50% { top: 82%; } }
  .msg { font-size: 13px; color: #6b6355; padding: 8px 2px 0; }
  .msg.err { color: #E4002B; font-weight: 700; }
  .hidhint { text-align: center; padding: 26px 12px; color: #6b6355; font-size: 15px; line-height: 1.5; }
  .hidhint b { color: #0B0B0B; }
  .counter { display: flex; align-items: baseline; gap: 10px; }
  .counter .n { font-size: 56px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
  .counter .lbl { font-size: 13px; color: #6b6355; }
  .lastcode { margin-top: 8px; font-size: 15px; }
  .lastcode .code { font-family: ui-monospace, Menlo, monospace; font-weight: 700; font-size: 18px; }
  .recent { list-style: none; margin: 10px 0 0; padding: 0; }
  .recent li { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-top: 1px solid #efe9db; color: #6b6355; }
  .recent li .c { font-family: ui-monospace, Menlo, monospace; color: #0B0B0B; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .row button, .mini {
    border: 1.5px solid #d8d0bd; background: #fff; color: #0B0B0B; border-radius: 12px;
    padding: 9px 14px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .manual { display: flex; gap: 8px; margin-top: 14px; }
  .manual input { flex: 1; border: 1.5px solid #d8d0bd; border-radius: 12px; padding: 11px 14px; font-size: 16px; background: #fff; }
  .manual button { border: none; background: #0B0B0B; color: #fff; border-radius: 12px; padding: 0 18px; font-weight: 700; cursor: pointer; }
  .foot { font-size: 12px; color: #9a917f; margin-top: 22px; line-height: 1.5; }
  .badge { display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:99px; background:#e7e0cf; color:#6b6355; margin-left:8px; vertical-align:middle;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
/* ============================================================================
   MODULO SCANSIONE — porting di docs/SCANNER_SPEC.md a React 18 + Babel standalone
   (no build step, no TypeScript). Le 8 REGOLE ASSOLUTE sono rispettate.
   ========================================================================== */

/* ── BLOCCO 1: playBeep — HTMLAudioElement + WAV generato a runtime (REGOLA 1) ── */
const BEEP_TONES = {
  ok:    [{ freq: 987.77, start: 0, dur: 0.08, vol: 0.34 }, { freq: 1318.51, start: 0.07, dur: 0.13, vol: 0.34 }],
  warn:  [{ freq: 740, start: 0, dur: 0.11, vol: 0.32 }, { freq: 740, start: 0.15, dur: 0.14, vol: 0.32 }],
  error: [{ freq: 330, start: 0, dur: 0.16, vol: 0.32, shape: 'square' }, { freq: 196, start: 0.17, dur: 0.28, vol: 0.32, shape: 'square' }],
  start: [{ freq: 659.25, start: 0, dur: 0.09, vol: 0.30 }, { freq: 987.77, start: 0.085, dur: 0.09, vol: 0.30 }, { freq: 1318.51, start: 0.17, dur: 0.18, vol: 0.32 }],
  saved: [{ freq: 1046.50, start: 0, dur: 0.10, vol: 0.30 }, { freq: 783.99, start: 0.10, dur: 0.26, vol: 0.30 }],
};

function buildBeepWav(tones) {
  const sr = 44100;
  const total = Math.max.apply(null, tones.map(t => t.start + t.dur)) + 0.02;
  const n = Math.ceil(sr * total);
  const samples = new Int16Array(n);
  const attack = 0.004;
  for (let i = 0; i < n; i++) {
    const t = i / sr; let s = 0;
    for (const seg of tones) {
      const lt = t - seg.start;
      if (lt < 0 || lt >= seg.dur) continue;
      const phase = 2 * Math.PI * seg.freq * lt;
      const wave = seg.shape === 'square' ? (Math.sin(phase) >= 0 ? 1 : -1) : Math.sin(phase);
      const a = lt < attack ? lt / attack : 1;
      const env = a * Math.pow(0.0008, lt / seg.dur);
      s += seg.vol * wave * env;
    }
    s = Math.max(-1, Math.min(1, s)); samples[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
  }
  const buf = new ArrayBuffer(44 + samples.length * 2); const dv = new DataView(buf);
  const ws = (off, str) => { for (let i = 0; i < str.length; i++) dv.setUint8(off + i, str.charCodeAt(i)); };
  ws(0, 'RIFF'); dv.setUint32(4, 36 + samples.length * 2, true); ws(8, 'WAVE');
  ws(12, 'fmt '); dv.setUint32(16, 16, true); dv.setUint16(20, 1, true); dv.setUint16(22, 1, true);
  dv.setUint32(24, sr, true); dv.setUint32(28, sr * 2, true); dv.setUint16(32, 2, true); dv.setUint16(34, 16, true);
  ws(36, 'data'); dv.setUint32(40, samples.length * 2, true);
  for (let i = 0; i < samples.length; i++) dv.setInt16(44 + i * 2, samples[i], true);
  const bytes = new Uint8Array(buf); let bin = '';
  for (let i = 0; i < bytes.length; i += 0x2000) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x2000));
  return 'data:audio/wav;base64,' + btoa(bin);
}

const _beepEls = {};
function getBeepEl(type) {
  if (typeof window === 'undefined' || typeof Audio === 'undefined') return null;
  let el = _beepEls[type];
  if (!el) { el = new Audio(buildBeepWav(BEEP_TONES[type])); el.preload = 'auto'; _beepEls[type] = el; }
  return el;
}

/* Sblocco al primo gesto utente — anche un tasto del lettore HID conta (REGOLA 1). */
(function () {
  let unlocked = false;
  const unlock = () => {
    if (unlocked) return; unlocked = true;
    ['ok','warn','error','start','saved'].forEach(type => {
      const el = getBeepEl(type); if (!el) return;
      const prev = el.volume; el.volume = 0;
      const p = el.play();
      if (p) p.then(() => { el.pause(); el.currentTime = 0; el.volume = prev; }).catch(() => { el.volume = prev; });
      else el.volume = prev;
    });
    window.removeEventListener('pointerdown', unlock);
    window.removeEventListener('keydown', unlock);
    window.removeEventListener('touchstart', unlock);
  };
  window.addEventListener('pointerdown', unlock, { passive: true });
  window.addEventListener('keydown', unlock, { passive: true });
  window.addEventListener('touchstart', unlock, { passive: true });
})();

function playBeep(type) {
  const el = getBeepEl(type || 'ok'); if (!el) return;
  try { el.currentTime = 0; const p = el.play(); if (p) p.catch(() => {}); } catch (e) { /* no-op */ }
}

/* ── BLOCCO 2: useHidScanner — keydown su document, nessun input focalizzato (REGOLA 3) ── */
function useHidScanner({ enabled, onScan }) {
  const onScanRef = React.useRef(onScan); onScanRef.current = onScan;
  React.useEffect(() => {
    if (!enabled) return;
    let buf = ''; let timer = null;
    const onKey = (e) => {
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      if (e.key === 'Enter') { if (buf.length >= 3) onScanRef.current(buf); buf = ''; if (timer) clearTimeout(timer); return; }
      if (e.key.length === 1) { buf += e.key; if (timer) clearTimeout(timer); timer = setTimeout(() => { buf = ''; }, 150); }
    };
    document.addEventListener('keydown', onKey);
    return () => { document.removeEventListener('keydown', onKey); if (timer) clearTimeout(timer); };
  }, [enabled]);
}

/* ── BLOCCO 3: useCameraScanner — zxing continua + dedup "una volta per codice" (REGOLA 2, 7, 8) ──
   Adattamento repo: ZXing globale UMD; rilascio stream via reader.reset() + stop tracce (vedi SCANNER_SPEC §Adattamento). */
function useCameraScanner({ enabled, onScan, videoRef }) {
  const [cameraLoading, setCameraLoading] = React.useState(false);
  const [cameraError, setCameraError] = React.useState('');
  const onScanRef = React.useRef(onScan); onScanRef.current = onScan;
  React.useEffect(() => {
    if (!enabled) { setCameraLoading(false); setCameraError(''); return; }
    const Z = window.ZXing;
    if (!Z || !Z.BrowserMultiFormatReader) { setCameraError('Libreria ZXing non caricata (CDN?).'); return; }
    let stopped = false; let lastCode = null; let lastSeen = 0; const LEAVE_GAP = 900; let reader = null;
    setCameraLoading(true); setCameraError('');
    const timer = setTimeout(() => {
      if (stopped) return;
      try {
        const hints = new Map();
        hints.set(Z.DecodeHintType.POSSIBLE_FORMATS, [
          Z.BarcodeFormat.EAN_13, Z.BarcodeFormat.EAN_8, Z.BarcodeFormat.CODE_128,
          Z.BarcodeFormat.CODE_39, Z.BarcodeFormat.CODE_93, Z.BarcodeFormat.UPC_A,
          Z.BarcodeFormat.UPC_E, Z.BarcodeFormat.ITF, Z.BarcodeFormat.CODABAR,
        ]);
        hints.set(Z.DecodeHintType.TRY_HARDER, true); // insiste sui codici ostici (curvatura/riflesso)
        reader = new Z.BrowserMultiFormatReader(hints);
        if (stopped || !videoRef.current) return;
        reader.decodeFromConstraints(
          { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } },
          videoRef.current,
          (result, err) => {
            if (stopped) return;
            const now = Date.now();
            if (result) {
              const code = result.getText(); lastSeen = now;
              if (code === lastCode) return;                 // stesso codice ancora in campo → già contato
              lastCode = code; onScanRef.current(code);
            } else if (err && Z.NotFoundException && err instanceof Z.NotFoundException) {
              if (lastCode !== null && now - lastSeen > LEAVE_GAP) lastCode = null; // uscito dal campo → riconta al rientro
            }
          }
        ).catch((e) => {
          if (stopped) return;
          const msg = (e && e.message) ? e.message : String(e);
          setCameraError(/permission|notallowed|denied/i.test(msg)
            ? 'Accesso alla fotocamera negato. Controlla i permessi Safari.' : 'Fotocamera non disponibile.');
          setCameraLoading(false);
        });
        setCameraLoading(false);
      } catch (e) {
        if (!stopped) { setCameraError('Fotocamera non disponibile.'); setCameraLoading(false); }
      }
    }, 120);
    return () => {
      stopped = true; clearTimeout(timer);
      try { if (reader && reader.reset) reader.reset(); } catch (e) {}
      try {
        const v = videoRef.current;
        if (v && v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
      } catch (e) {}
    };
  }, [enabled, videoRef]);
  return { cameraLoading, cameraError };
}

/* ============================================================================
   PAGINA DI PROVA — contatore + beep + flash (feedback OTTIMISTICO, REGOLA 6)
   ========================================================================== */
function isMobile() {
  return (typeof window !== 'undefined') && (window.matchMedia('(max-width: 767px)').matches || 'ontouchstart' in window);
}

function App() {
  const [mode, setMode] = React.useState(isMobile() ? 'camera' : 'hid'); // mobile→camera, desktop→lettore
  const [count, setCount] = React.useState(0);
  const [rejected, setRejected] = React.useState(0);
  const [last, setLast] = React.useState(null);
  const [recent, setRecent] = React.useState([]);
  const [flash, setFlash] = React.useState(null);
  const flashTimer = React.useRef(null);
  const videoRef = React.useRef(null);
  const manualRef = React.useRef(null);

  const doFlash = (kind) => {
    setFlash(kind);
    if (flashTimer.current) clearTimeout(flashTimer.current);
    flashTimer.current = setTimeout(() => setFlash(null), 650);
  };

  // handleScan: FEEDBACK OTTIMISTICO prima di qualunque cosa (REGOLA 6)
  const handleScan = React.useCallback((raw) => {
    // Codici inchiostro: alfanumerici ammessi (EAN numerico OPPURE sigla tipo "AS 61").
    const code = String(raw).trim();
    if (code.length < 3 || code.length > 48) { playBeep('warn'); doFlash('warn'); setRejected(r => r + 1); return; }
    playBeep('ok'); doFlash('ok');
    setCount(c => c + 1); setLast(code);
    setRecent(list => [{ code: code, t: Date.now() }].concat(list).slice(0, 12));
  }, []);

  // HID attivo solo in modalità lettore; camera solo in modalità camera
  useHidScanner({ enabled: mode === 'hid', onScan: handleScan });
  const { cameraLoading, cameraError } = useCameraScanner({ enabled: mode === 'camera', onScan: handleScan, videoRef });

  const submitManual = () => {
    const v = manualRef.current ? manualRef.current.value : '';
    if (v) { handleScan(v); if (manualRef.current) manualRef.current.value = ''; }
  };

  const fmtTime = (t) => { const d = new Date(t); const p = (x) => (x < 10 ? '0' + x : '' + x); return p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds()); };

  return (
    <div className="wrap">
      <h1>Scanner — pagina di prova <span className="badge">collaudo</span></h1>
      <p className="sub">Lettore HID esterno + fotocamera iPhone. Segue <code>docs/SCANNER_SPEC.md</code>.</p>

      <div className="seg">
        <button className={mode === 'hid' ? 'on' : ''} onClick={() => setMode('hid')}>⌨︎ Lettore esterno</button>
        <button className={mode === 'camera' ? 'on' : ''} onClick={() => setMode('camera')}>📷 Fotocamera</button>
      </div>

      <div className={'card' + (flash ? ' flash-' + flash : '')}>
        {mode === 'camera' ? (
          <div>
            <div className="videobox">
              <video ref={videoRef} playsInline muted autoPlay></video>
              <div className="corner tl"></div><div className="corner tr"></div>
              <div className="corner bl"></div><div className="corner br"></div>
              {!cameraError ? <div className="scanline"></div> : null}
            </div>
            {cameraLoading ? <div className="msg">Avvio fotocamera…</div> : null}
            {cameraError ? <div className="msg err">{cameraError}</div> : <div className="msg">Inquadra un codice a barre. Lo stesso codice conta 1; esci e rientra per ricontarlo.</div>}
          </div>
        ) : (
          <div className="hidhint">
            <b>Pronto per il lettore esterno.</b><br />
            Scansiona un codice: arriva come sequenza di tasti + Invio.<br />
            (Nessun campo è focalizzato, così iOS non apre la tastiera.)
          </div>
        )}
      </div>

      <div className="card">
        <div className="counter">
          <span className="n">{count}</span>
          <span className="lbl">scansioni valide{rejected > 0 ? ' · ' + rejected + ' scartate' : ''}</span>
        </div>
        {last ? <div className="lastcode">Ultimo: <span className="code">{last}</span></div> : <div className="lastcode" style={{ color: '#9a917f' }}>Nessuna scansione ancora.</div>}
        {recent.length > 0 ? (
          <ul className="recent">
            {recent.map((r, i) => <li key={i}><span className="c">{r.code}</span><span>{fmtTime(r.t)}</span></li>)}
          </ul>
        ) : null}
        <div className="row">
          <button onClick={() => { setCount(0); setRejected(0); setLast(null); setRecent([]); }}>Azzera contatore</button>
        </div>
      </div>

      <div className="card">
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>Prova i beep (verifica audio su Safari)</div>
        <div className="row">
          <button onClick={() => playBeep('ok')}>ok</button>
          <button onClick={() => playBeep('warn')}>warn</button>
          <button onClick={() => playBeep('error')}>error</button>
          <button onClick={() => playBeep('start')}>start</button>
          <button onClick={() => playBeep('saved')}>saved</button>
        </div>
        <div className="manual">
          <input ref={manualRef} placeholder="inserimento manuale (codice, min 3)" onKeyDown={(e) => { if (e.key === 'Enter') submitManual(); }} />
          <button onClick={submitManual}>Invia</button>
        </div>
      </div>

      <div className="foot">
        REGOLE ASSOLUTE rispettate: beep HTMLAudio+WAV (1) · dedup una-volta-per-codice fuori-campo 900ms (2) ·
        HID su document, input ignorati (3) · formati EAN/CODE/UPC (8) · feedback ottimistico prima di tutto (6) ·
        rilascio stream su cambio modalità (7).
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
