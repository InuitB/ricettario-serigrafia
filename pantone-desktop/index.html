const FAMILIES = ['tutti', 'blu', 'azzurro', 'verde', 'giallo', 'arancio', 'rosso', 'rosa', 'viola', 'neutro'];
const PROJECTS = ['Risanamento 23', 'Catalogo Primavera', 'Brand Aurora', 'Packaging Olio', 'Manifesto Teatro', 'Rivista N.12'];

// note di lavorazione (campo NOTE) — solo per alcuni Pantone
const NOTES = {
  '699 U':  'Aggiungere la base bianca per ultima e mescolare lentamente. Tende a virare al caldo dopo 48h: tenere il barattolo coperto e al riparo dalla luce.',
  '072 U':  'Inchiostro molto coprente: stendere uno strato sottile. Resa migliore su carta patinata.',
  '116 U':  'Pulire bene la spatola prima di dosare il magenta, altrimenti il giallo si sporca.',
  '185 U':  'Verificare il rosso su prova-colore: la carta riciclata lo spegne di circa il 6%.',
  '7626 U': 'Formula sensibile all’umidità. Richiudere subito i barattoli AS 12 e AS 70.',
  '266 U':  'Cliente Brand Aurora: tolleranza ΔE ≤ 1,5. Confrontare sempre con la guida fisica.',
};

// ─── recipe pool + generatore deterministico ────────────────────────────────
const INK_POOL = [
  { name: 'AS 90',  label: 'Base bianca' },
  { name: 'AS 65',  label: 'Giallo' },
  { name: 'AS 150', label: 'Magenta' },
  { name: 'AS 320', label: 'Cyan' },
  { name: 'AS 47',  label: 'Nero' },
  { name: 'AS 12',  label: 'Rosso' },
  { name: 'AS 88',  label: 'Blu' },
  { name: 'AS 33',  label: 'Verde' },
  { name: 'AS 70',  label: 'Arancio' },
];

function hashStr(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return Math.abs(h);
}

function makeRecipe(p) {
  const note = NOTES[p.code] || null;
  if (p.code === '699 U') {
    return { inks: [
      { name: 'AS 90',  label: 'Base bianca', pct: 75.0 },
      { name: 'AS 65',  label: 'Giallo',      pct: 6.25 },
      { name: 'AS 150', label: 'Magenta',     pct: 18.75 },
    ], project: 'Risanamento 23', note };
  }
  const h = hashStr(p.code);
  const n = Math.max(1, Math.min(p.ink, 4));
  const light = textOnDesk(p.hex) === '#0B0B0B';
  const idxs = [];
  if (light) idxs.push(0);
  let cursor = 1 + (h % 6);
  while (idxs.length < n) {
    const i = cursor % INK_POOL.length;
    if (!idxs.includes(i)) idxs.push(i);
    cursor += 1 + ((h >> idxs.length) % 4);
  }
  let weights = idxs.map((_, k) => {
    const seed = (h >> (k * 3)) % 100;
    if (k === 0) return light ? 55 + (seed % 30) : 40 + (seed % 30);
    return 6 + (seed % 26);
  });
  const sum = weights.reduce((a, b) => a + b, 0);
  let pcts = weights.map(w => Math.round((w / sum) * 10000) / 100);
  const diff = Math.round((100 - pcts.reduce((a, b) => a + b, 0)) * 100) / 100;
  pcts[pcts.length - 1] = Math.round((pcts[pcts.length - 1] + diff) * 100) / 100;
  const inks = idxs.map((i, k) => ({ name: INK_POOL[i].name, label: INK_POOL[i].label, pct: pcts[k] }))
    .sort((a, b) => b.pct - a.pct);
  return { inks, project: PROJECTS[h % PROJECTS.length], note };
}

// altezza stimata della card Wallet APERTA: si adatta al contenuto (no bianco sotto)
function walletOpenHeight(pantone, headerH = 150) {
  const r = makeRecipe(pantone);
  const rows = r.inks.length;
  const body = 20 + 23 + 40 + 20 + 24 + rows * 47 + (r.note ? 76 : 0) + 20 + 48 + 14 + 18 + 26;
  return Math.round(headerH + body);
}

const QUANTITIES = [
  { label: '100 g', grams: 100 }, { label: '300 g', grams: 300 },
  { label: '500 g', grams: 500 }, { label: '1 kg',  grams: 1000 },
];

// ─────────────────────────────────────────────────────────────────────────────
// Color helpers + easings iOS 26
// ─────────────────────────────────────────────────────────────────────────────
function textOnDesk(hex) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16), g = parseInt(h.substring(2, 4), 16), b = parseInt(h.substring(4, 6), 16);
  return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.62 ? '#0B0B0B' : '#fff';
}
function rgba(hex, a) {
  let h = hex.replace('#', '');
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  const r = parseInt(h.substring(0, 2), 16), g = parseInt(h.substring(2, 4), 16), b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r},${g},${b},${a})`;
}
const SPRING      = 'cubic-bezier(.34,1.56,.64,1)';     // bouncy
const SPRING_SOFT = 'cubic-bezier(.22,1.2,.36,1)';      // morbido con piccolo overshoot
const FLUID       = 'cubic-bezier(.4,1.25,.45,1)';      // fluido
const FLUID_SOFT  = 'cubic-bezier(.25,.9,.3,1)';        // fluido senza overshoot
const QUICK       = 'cubic-bezier(.4,0,.2,1)';

// ─────────────────────────────────────────────────────────────────────────────
// Theme tokens
// ─────────────────────────────────────────────────────────────────────────────
// Toni di sfondo neutri (opzionali): il colore Pantone resta un bagliore dietro
// la scheda e NON invade l'interfaccia. bianco = quasi bianco caldo.
const NEUTRAL_TONES = {
  neutro: { bg: '#E9E9E7', bgDeep: '#DFDFDC', panelAlt: '#F3F3F1', label: 'Grigio neutro' },
  caldo:  { bg: '#E8E4DF', bgDeep: '#DDD8D0', panelAlt: '#F3EFEA', label: 'Grigio caldo' },
  beige:  { bg: '#ECE6D9', bgDeep: '#E2DAC8', panelAlt: '#F7F2E7', label: 'Beige' },
  bianco: { bg: '#F6F5F3', bgDeep: '#ECEBE8', panelAlt: '#FCFCFB', label: 'Bianco' },
  puro:   { bg: '#FFFFFF', bgDeep: '#F2F2F2', panelAlt: '#FFFFFF', label: 'Bianco puro' },
};
function deriveTheme(t) {  const grey = t.theme === 'grey';
  return {
    grey,
    bg:      (NEUTRAL_TONES[t.bgTone] || {}).bg      || (grey ? '#E6E4DE' : '#F4EFE2'),
    bgDeep:  (NEUTRAL_TONES[t.bgTone] || {}).bgDeep  || (grey ? '#DBD9D2' : '#EDE7D7'),
    panel:   '#FFFFFF',
    panelAlt: (NEUTRAL_TONES[t.bgTone] || {}).panelAlt || (grey ? '#F3F1EC' : '#FBF7EE'),
    bgTone:  t.bgTone || null,
    colorGlow: !!t.colorGlow,   // colore confinato a bagliore dietro la scheda
    ink:     '#0B0B0B',
    sub:     'rgba(11,11,11,0.52)',
    faint:   'rgba(11,11,11,0.34)',
    line:    'rgba(11,11,11,0.10)',
    line2:   'rgba(11,11,11,0.16)',
    accent:  t.accent,
    onAccent: textOnDesk(t.accent),
    display: t.display,
    displayWeight: t.display === 'Instrument Serif' ? 400 : 700,
    isSerif: t.display === 'Instrument Serif',
    grain:   t.grain,
    borders: t.borders,   // bordi neri attorno ai controlli
    borderWidth: t.borderWidth != null ? t.borderWidth : 2,
    cardSurface: t.cardSurface || 'opaco',   // opaco | frosted | trasparente
    btnStyle: t.btnStyle || 'B',             // B contorno (default) · A accento pieno · C tinta tenue · D inchiostro pieno
    blobShape: t.blobShape || 'morbide',
    blobSpeed: t.blobSpeed != null ? t.blobSpeed : 1,
    blobAnim:  t.blobAnim != null ? t.blobAnim : true,
  };
}
const TweakCtx = React.createContext(null);
function useTheme() { return React.useContext(TweakCtx); }

// glass(): pill bianca con bordo nero quando NON selezionata · piena quando attiva.
// active+accent → fondo accento. Lo spessore del bordo è regolabile (borderWidth).
function glass(theme, { active = false, accent = false, strong = false } = {}) {
  const bw = theme.borderWidth != null ? theme.borderWidth : 2;
  if (active) {
    if (accent) return { background: theme.accent, color: theme.onAccent, border: `${bw}px solid ${theme.accent}`, boxShadow: 'none' };
    return { background: theme.ink, color: '#fff', border: `${bw}px solid ${theme.ink}`, boxShadow: 'none' };
  }
  return {
    background: theme.panel,
    border: theme.borders ? `${bw}px solid ${theme.ink}` : `1px solid ${rgba('#000', 0.14)}`,
    boxShadow: `0 5px 14px ${rgba('#000', 0.05)}`,
  };
}

// actionStyle(): stile dei pulsanti d'AZIONE secondo il tema (btnStyle: A/B/C/D).
// role: 'primary' (Nuova) · 'secondary' (Stampa/Modifica) · 'icon' (pulsante-icona).
// Per 'icon' lo stile include anche `color` = colore del glifo.
function actionStyle(theme, role = 'primary') {
  const { accent, onAccent, ink, panel } = theme;
  const s = theme.btnStyle || 'A';
  const inkT = (a) => rgba('#000', a), tint = (a) => rgba(accent, a);
  const P = {
    A: { background: accent, color: onAccent, border: 'none', boxShadow: `0 6px 18px ${tint(0.32)}` },
    B: { background: accent, color: onAccent, border: `${theme.borderWidth || 2}px solid ${ink}`, boxShadow: 'none' },
    C: { background: tint(0.16), color: accent, border: 'none', boxShadow: 'none' },
    D: { background: ink, color: '#fff', border: 'none', boxShadow: `0 6px 18px ${inkT(0.22)}` },
  };
  const S = {
    A: { background: panel, color: ink, border: `1px solid ${inkT(0.14)}`, boxShadow: `0 5px 14px ${inkT(0.05)}` },
    B: { background: panel, color: ink, border: `${theme.borderWidth || 2}px solid ${ink}`, boxShadow: 'none' },
    C: { background: inkT(0.05), color: ink, border: 'none', boxShadow: 'none' },
    D: { background: panel, color: ink, border: `1.5px solid ${ink}`, boxShadow: 'none' },
  };
  const I = {
    A: { background: panel, border: `1px solid ${inkT(0.14)}`, boxShadow: `0 5px 14px ${inkT(0.05)}`, color: accent },
    B: { background: panel, border: `${theme.borderWidth || 2}px solid ${ink}`, boxShadow: 'none', color: ink },
    C: { background: tint(0.16), border: 'none', boxShadow: 'none', color: accent },
    D: { background: ink, border: 'none', boxShadow: `0 6px 18px ${inkT(0.22)}`, color: '#fff' },
  };
  return ({ primary: P, secondary: S, icon: I }[role] || P)[s];
}

// surface(): fondo configurabile delle schede ricetta (opaco / frosted / trasparente)
function surface(theme) {
  const s = theme.cardSurface;
  if (s === 'frosted') return { background: rgba('#fff', theme.grey ? 0.56 : 0.62), backdropFilter: 'blur(22px) saturate(160%)', WebkitBackdropFilter: 'blur(22px) saturate(160%)' };
  if (s === 'trasparente') return { background: rgba('#fff', theme.grey ? 0.3 : 0.34), backdropFilter: 'blur(10px) saturate(140%)', WebkitBackdropFilter: 'blur(10px) saturate(140%)' };
  return { background: theme.panel };
}

// ─────────────────────────────────────────────────────────────────────────────
// Grana + blob (parametrici: forma · velocità · animazione · grana)
// ─────────────────────────────────────────────────────────────────────────────
const BLOB_SHAPES = {
  morbide: { size: 540, blur: 95,  op: 0.32, label: 'Morbide' },
  tonde:   { size: 380, blur: 46,  op: 0.40, label: 'Tonde' },
  ampie:   { size: 760, blur: 150, op: 0.26, label: 'Ampie' },
  nessuna: { size: 0,   blur: 0,   op: 0,    label: 'Nessuna' },
};
let _grainSeq = 0;
function GrainBlobs({ theme, blobHex }) {
  const id = React.useMemo(() => 'dk-grain-' + (_grainSeq++), []);
  ensureDeskBlobKf();
  const sh = BLOB_SHAPES[theme.blobShape] || BLOB_SHAPES.morbide;
  const showBlobs = theme.blobShape !== 'nessuna' && blobHex && !theme.colorGlow;
  if (!theme.grain && !showBlobs) return null;
  const spd = Math.max(0.25, theme.blobSpeed || 1);
  const d1 = (22 / spd).toFixed(1), d2 = (28 / spd).toFixed(1), d3 = (34 / spd).toFixed(1);
  return (
    <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none', zIndex: 0 }}>
      {showBlobs && (
        <React.Fragment>
          <div style={{ position: 'absolute', top: '-12%', left: '-8%', width: sh.size, height: sh.size, borderRadius: '50%', background: blobHex, filter: `blur(${sh.blur}px)`, opacity: theme.grey ? sh.op * 0.82 : sh.op, transition: 'background .6s, opacity .4s', animation: theme.blobAnim ? `dkblob1 ${d1}s ease-in-out infinite` : 'none' }}/>
          <div style={{ position: 'absolute', bottom: '-16%', right: '-6%', width: sh.size * 1.06, height: sh.size * 1.06, borderRadius: '50%', background: blobHex, filter: `blur(${sh.blur + 10}px)`, opacity: theme.grey ? sh.op * 0.66 : sh.op * 0.86, transition: 'background .6s, opacity .4s', animation: theme.blobAnim ? `dkblob2 ${d2}s ease-in-out infinite` : 'none' }}/>
          <div style={{ position: 'absolute', top: '30%', left: '38%', width: sh.size * 0.86, height: sh.size * 0.86, borderRadius: '50%', background: blobHex, filter: `blur(${sh.blur + 4}px)`, opacity: theme.grey ? sh.op * 0.5 : sh.op * 0.62, transition: 'background .6s, opacity .4s', animation: theme.blobAnim ? `dkblob3 ${d3}s ease-in-out infinite` : 'none' }}/>
        </React.Fragment>
      )}
      {theme.grain && (
        <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', opacity: 0.08, mixBlendMode: 'multiply' }}>
          <filter id={id}><feTurbulence type="fractalNoise" baseFrequency="1.1" numOctaves="2" stitchTiles="stitch"/><feColorMatrix values="0 0 0 0 0.30  0 0 0 0 0.26  0 0 0 0 0.20  0 0 0 0.55 0"/></filter>
          <rect width="100%" height="100%" filter={`url(#${id})`}/>
        </svg>
      )}
    </div>
  );
}
function ensureDeskBlobKf() {
  if (document.getElementById('dk-blob-kf')) return;
  const s = document.createElement('style');
  s.id = 'dk-blob-kf';
  s.textContent = `
    @keyframes dkblob1 { 0%{transform:translate(0,0) scale(1);} 50%{transform:translate(160px,90px) scale(1.18);} 100%{transform:translate(0,0) scale(1);} }
    @keyframes dkblob2 { 0%{transform:translate(0,0) scale(1.05);} 50%{transform:translate(-150px,-70px) scale(1);} 100%{transform:translate(0,0) scale(1.05);} }
    @keyframes dkblob3 { 0%{transform:translate(0,0) scale(.95);} 50%{transform:translate(-120px,110px) scale(1.12);} 100%{transform:translate(0,0) scale(.95);} }
    @keyframes dkpop { 0%{opacity:0; transform:translateY(10px) scale(.96);} 100%{opacity:1; transform:translateY(0) scale(1);} }
  `;
  document.head.appendChild(s);
}

// ─────────────────────────────────────────────────────────────────────────────
// Icone
// ─────────────────────────────────────────────────────────────────────────────
function Ico({ d, size = 24, color = 'currentColor', sw = 1.7, fill = 'none', children }) {
  return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={{ display: 'block' }}>
    {d && <path d={d} stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" fill={fill}/>}
    {children}
  </svg>);
}
// SFIcon: icona SF Symbols (glifo pieno) resa via CSS mask — colore pilotabile.
function SFIcon({ src, size = 22, color = 'currentColor' }) {
  return <span style={{ display: 'inline-block', width: size, height: size, background: color, flexShrink: 0,
    WebkitMaskImage: `url(${src})`, maskImage: `url(${src})`, WebkitMaskSize: 'contain', maskSize: 'contain',
    WebkitMaskRepeat: 'no-repeat', maskRepeat: 'no-repeat', WebkitMaskPosition: 'center', maskPosition: 'center' }}/>;
}
const IcoBeaker  = (p) => <Ico {...p} d="M9 3h6M10 3v6L5.6 18.8A2 2 0 0 0 7.4 21.7h9.2a2 2 0 0 0 1.8-2.9L14 9V3M8 15.5c1.7.5 3-.7 5-.3s2.6 1 4.6.5"/>;
const IcoFolder  = (p) => <Ico {...p} d="M3 7a2 2 0 0 1 2-2h3.6c.5 0 1 .2 1.4.6L11 7h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/>;
const IcoClock   = (p) => <Ico {...p}><circle cx="12" cy="12" r="8.4" stroke={p.color || 'currentColor'} strokeWidth={p.sw || 1.7}/><path d="M12 7.4V12l3.2 1.9" stroke={p.color || 'currentColor'} strokeWidth={p.sw || 1.7} strokeLinecap="round" strokeLinejoin="round"/></Ico>;
const IcoSearch  = (p) => <Ico {...p}><circle cx="11" cy="11" r="7" stroke={p.color || 'currentColor'} strokeWidth={p.sw || 1.7}/><path d="m16.2 16.2 3.8 3.8" stroke={p.color || 'currentColor'} strokeWidth={p.sw || 1.7} strokeLinecap="round"/></Ico>;

          </button>
        );
      })}
    </div>
  );
}

// Switcher a ORB: cerchio col modo corrente; premuto MORPHA in un'unica forma
// lunga (segmented control) che si ritrae di nuovo in cerchio. Stessa posizione
// in tutte le viste: il wrapper lo ancora a destra, la forma cresce verso sinistra.
function ModeOrb({ mode, onChange, theme, size = 54 }) {
  const [openM, setOpenM] = React.useState(false);
  const ref = React.useRef(null);
  const idx = Math.max(0, MODES.findIndex(m => m.key === mode));
  const cur = MODES[idx] || MODES[0];
  const FULL = 372;
  React.useEffect(() => {
    if (!openM) return;
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpenM(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [openM]);
  return (
    <div ref={ref} style={{ position: 'relative', height: size, width: openM ? FULL : size, marginLeft: 'auto',
      borderRadius: 99, overflow: 'hidden', ...glass(theme, { strong: true }),
      transition: `width .54s ${SPRING}` }}>
      {/* forma lunga: segmented control con thumb scorrevole */}
      <div style={{ position: 'absolute', top: 0, right: 0, height: '100%', width: FULL, display: 'flex', padding: 5,
        opacity: openM ? 1 : 0, pointerEvents: openM ? 'auto' : 'none', transition: `opacity .3s ${QUICK}`, transitionDelay: openM ? '.1s' : '0s' }}>
        <div style={{ position: 'absolute', top: 5, bottom: 5, left: 5, width: `calc((100% - 10px) / ${MODES.length})`,
          transform: `translateX(${idx * 100}%)`, background: theme.accent, borderRadius: 99, zIndex: 0,
          boxShadow: `0 4px 12px ${rgba(theme.accent, 0.34)}`, transition: `transform .5s ${SPRING}` }}/>
        {MODES.map((m) => {
          const on = m.key === mode;
          return (
            <button key={m.key} onClick={() => { onChange(m.key); setOpenM(false); }} style={{
              position: 'relative', zIndex: 1, flex: 1, border: 'none', background: 'transparent', cursor: 'pointer',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 7, whiteSpace: 'nowrap',
              fontFamily: 'Nebulica', fontWeight: 700, fontSize: 14, letterSpacing: -0.2, color: on ? theme.onAccent : theme.sub }}>
              <m.Icon size={18} color={on ? theme.onAccent : theme.accent} sw={1.8}/> {m.label}
            </button>
          );
        })}
      </div>
      {/* cerchio collassato: solo l'icona del modo scelto */}
      <button onClick={() => setOpenM(true)} title={cur.label} style={{ position: 'absolute', top: 0, right: 0, width: size, height: size,
        borderRadius: 99, cursor: 'pointer', border: 'none', background: theme.accent,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        opacity: openM ? 0 : 1, pointerEvents: openM ? 'none' : 'auto', transition: `opacity .26s ${QUICK}` }}>
        <cur.Icon size={23} color={theme.onAccent} sw={1.9}/>
      </button>
    </div>
  );
}

// ============================================================
// desktop-master.jsx
// ============================================================
// desktop-master.jsx — MODE "Master Detail"
// Rail+lista+dettaglio. Prop `anim`:
//   'rise'  → il dettaglio entra con slide-up + fade (morbido)
//   'morph' → l'header colore si "apre" (scaleY bouncy) e la formula entra in stagger

// Trattamento visivo della scheda dettaglio:
//  'border'       → originale: bordo nero (o line sottile), radius 34, ombra leggera
//  'shadowDiffuse' → nessun bordo, radius squircle, ombra nera diffusa e morbida
//  'shadowColor'   → nessun bordo, radius squircle, fondo neutro, l'ombra prende il colore della card
// `tilt` inclina leggermente la scheda (usato con shadowColor nella variante "inclinata").
// N.B. il rotate del tilt NON va qui dentro: questo stile finisce su un nodo che
// gira anche la mBreath keyframe-animation (transform: scaleY(...) both) — il
// 100% della keyframe sovrascriverebbe qualsiasi transform inline. Il tilt va
// applicato su un wrapper ESTERNO, separato dal nodo animato.
function cardTreatmentStyle(theme, hex, treatment) {
  const SQ = 44; // radius più "squircle"
  if (treatment === 'shadowDiffuse') {
    return {
      borderRadius: SQ, border: 'none',
      boxShadow: `0 10px 24px ${rgba('#000', 0.06)}, 0 34px 70px ${rgba('#000', 0.14)}, 0 70px 120px ${rgba('#000', 0.10)}`,
    };
  }
  if (treatment === 'shadowColor') {
    return {
      borderRadius: SQ, border: 'none',
      boxShadow: `0 8px 20px ${rgba('#000', 0.05)}, 0 30px 60px ${rgba(hex, 0.38)}, 0 64px 110px ${rgba(hex, 0.30)}`,
    };
  }
  return {
    borderRadius: 34,
    border: theme.borders ? `${theme.borderWidth}px solid ${theme.ink}` : `1px solid ${theme.line}`,
    boxShadow: `0 20px 50px ${rgba('#000', 0.10)}`,
  };
}

// Animazione di comparsa dell'INTERA scheda, direzionale rispetto allo scorrimento
// dell'elenco: se ci si muove VERSO IL BASSO nella lista la scheda entra dal basso,
// se VERSO L'ALTO entra dall'alto. 3 flavour:
//   'slide'  → slittamento pulito + fade
//   'spring' → slittamento con overshoot elastico + micro-scale
//   'deck'   → la scheda viene "posata" (slitta + leggera rotazione che si assesta)
function cardEnterAnim(variant, dir) {
  const D = dir === 'fromTop' ? 'Down' : 'Up';
  if (variant === 'spring') return `cardSpring${D} .66s ${SPRING_SOFT} both`;
  if (variant === 'deck')   return `cardDeck${D} .62s ${FLUID_SOFT} both`;
  // varianti "C" più morbide sull'assestamento finale della scheda
  if (variant === 'deckGlide')  return `cardDeckGlide${D} .66s cubic-bezier(.22,.68,.24,1) both`;   // rotazione BEN visibile (~4°), plana veloce
  if (variant === 'deckSettle') return `cardDeckSettle${D} .9s cubic-bezier(.16,.72,.2,1.01) both`;  // micro-oscillazione lenta che si spegne
  if (variant === 'deckFeather')return `cardDeckFeather${D} 1.15s cubic-bezier(.2,.6,.12,1) both`;   // quasi verticale (~0.6°), atterraggio lentissimo
  if (variant === 'slide')  return `cardSlide${D} .52s ${FLUID_SOFT} both`;
  return `mBreath .6s cubic-bezier(.32,1.12,.4,1) both`;
}

    return true;

  const selected = DESK_PANTONES.find(p => p.code === selCode) || filtered[0] || DESK_PANTONES[0];
  const hiIdx = filtered.findIndex(p => p.code === selected.code);

  // direzione dello scorrimento nell'elenco → verso di ingresso della scheda.
  // Leggo il valore precedente durante il render (ref non ancora aggiornato),

  const prevHiRef = React.useRef(hiIdx);
  let enterDir = 'fromTop';
  if (hiIdx < prevHiRef.current) enterDir = 'fromBottom';   // salito nella lista (es. 115→109) → entra dal basso

function ensureMasterKf() {
  if (document.getElementById('master-kf')) return;
  const s = document.createElement('style');
  s.id = 'master-kf';
  s.textContent = `
    @keyframes mFade { from{opacity:.4;} to{opacity:1;} }
    @keyframes mRise { from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);} }
    @keyframes mMorph { from{opacity:0; transform:translateY(-10px) scaleY(.9);} to{opacity:1; transform:translateY(0) scaleY(1);} }
    @keyframes mPulse { 0%{transform:scale(1);} 45%{transform:scale(1.025);} 100%{transform:scale(1);} }
    @keyframes mBreath { 0%{transform:scaleY(.984);} 60%{transform:scaleY(1.006);} 100%{transform:scaleY(1);} }
    /* ingresso intera scheda — direzionale */
    @keyframes cardSlideUp   { from{opacity:0; transform:translateY(74px);}  to{opacity:1; transform:translateY(0);} }
    @keyframes cardSlideDown { from{opacity:0; transform:translateY(-74px);} to{opacity:1; transform:translateY(0);} }
    @keyframes cardSpringUp   { 0%{opacity:0; transform:translateY(96px) scale(.94);}  60%{opacity:1; transform:translateY(-8px) scale(1.008);} 100%{opacity:1; transform:translateY(0) scale(1);} }
    @keyframes cardSpringDown { 0%{opacity:0; transform:translateY(-96px) scale(.94);} 60%{opacity:1; transform:translateY(8px) scale(1.008);}  100%{opacity:1; transform:translateY(0) scale(1);} }
    @keyframes cardDeckUp   { 0%{opacity:0; transform:translateY(88px) rotate(3deg);}  70%{opacity:1; transform:translateY(0) rotate(-.8deg);} 100%{opacity:1; transform:translateY(0) rotate(0);} }
    @keyframes cardDeckDown { 0%{opacity:0; transform:translateY(-88px) rotate(-3deg);} 70%{opacity:1; transform:translateY(0) rotate(.8deg);}  100%{opacity:1; transform:translateY(0) rotate(0);} }
    /* C morbida — 'glide': rotazione ben visibile (~4°) che si scioglie planando */
    @keyframes cardDeckGlideUp   { 0%{opacity:0; transform:translateY(96px) rotate(4deg);}  55%{opacity:1;} 100%{opacity:1; transform:translateY(0) rotate(0);} }
    @keyframes cardDeckGlideDown { 0%{opacity:0; transform:translateY(-96px) rotate(-4deg);} 55%{opacity:1;} 100%{opacity:1; transform:translateY(0) rotate(0);} }
    /* C morbida — 'settle': micro-oscillazione lenta che si smorza */
    @keyframes cardDeckSettleUp   { 0%{opacity:0; transform:translateY(84px) rotate(2.4deg);} 60%{opacity:1; transform:translateY(0) rotate(-.5deg);} 82%{transform:translateY(0) rotate(.2deg);} 100%{opacity:1; transform:translateY(0) rotate(0);} }
    @keyframes cardDeckSettleDown { 0%{opacity:0; transform:translateY(-84px) rotate(-2.4deg);} 60%{opacity:1; transform:translateY(0) rotate(.5deg);} 82%{transform:translateY(0) rotate(-.2deg);} 100%{opacity:1; transform:translateY(0) rotate(0);} }
    /* C morbida — 'feather': quasi verticale (~0.6°), atterraggio lentissimo */
    @keyframes cardDeckFeatherUp   { 0%{opacity:0; transform:translateY(64px) rotate(.6deg);}  100%{opacity:1; transform:translateY(0) rotate(0);} }
    @keyframes cardDeckFeatherDown { 0%{opacity:0; transform:translateY(-64px) rotate(-.6deg);} 100%{opacity:1; transform:translateY(0) rotate(0);} }
  `;
  document.head.appendChild(s);
}

// ── VARIANTE ROW ────────────────────────────────────────────────────────────
function WalletRow({ theme, mode, setMode, query, setQuery, onSettings, initialOpen = null }) {
  const [family, setFamily] = React.useState('tutti');
  const [ink, setInk] = React.useState(0);
  const list = React.useMemo(() => DESK_PANTONES.filter(p =>
    (family === 'tutti' || p.family === family) && (!ink || p.ink === ink) &&
    (!query || `${p.code} ${p.name} ${p.family}`.toLowerCase().includes(query.toLowerCase()))
  ), [family, ink, query]);
  const [sel, setSel] = React.useState(null);
  const [qty, setQty] = React.useState(100);
  const [scroll, setScroll] = React.useState(() => initialOpen != null ? Math.max(0, initialOpen * 236 + 105 - 500) : 0);
  const [hover, setHover] = React.useState(null);
  const drag = React.useRef({ on: false, x0: 0, s0: 0, moved: false });
  const viewRef = React.useRef(null);

  const CARD_W = 210, CARD_H = 300, GAP = 26, STEP = CARD_W + GAP, VIEW = 1140, SB = 300;
  const GROW_W = 384, GROW_H = 624, PART = (GROW_W - CARD_W) / 2 + 34;
  const open = sel !== null && sel < list.length;
  const selP = open ? list[sel] : null;
  const [measuredH, setMeasuredH] = React.useState(null);
  React.useEffect(() => { setMeasuredH(null); }, [sel]);
  const growH = open ? (measuredH ? Math.max(360, Math.min(760, measuredH)) : Math.max(430, Math.min(720, walletOpenHeight(selP, 150)))) : 624;
  const blobHex = open ? selP.hex : (list[3] || list[0] || DESK_PANTONES[3]).hex;

  // filtro cambia → chiudi eventuale card aperta
  React.useEffect(() => { setSel(null); }, [family, ink, query]);

  const maxScroll = Math.max(0, list.length * STEP - VIEW);
  const clampS = (v) => Math.max(-40, Math.min(maxScroll + 40, v));

  const onWheel = (e) => { if (open) return; setScroll(s => clampS(s + (Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY))); };
  const onDown = (e) => { if (open) return; drag.current = { on: true, x0: e.clientX, s0: scroll, moved: false }; try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {} };
  const onMove = (e) => { if (!drag.current.on) return; const dx = e.clientX - drag.current.x0; if (Math.abs(dx) > 4) drag.current.moved = true; setScroll(clampS(drag.current.s0 - dx)); };
  const onUp = () => { drag.current.on = false; };

  const openCard = (i) => {
    setSel(i); setQty(100);
    // centra la card selezionata nello stage (a destra della sidebar)
    const target = i * STEP + CARD_W / 2 - (VIEW / 2 - 70);
    setScroll(Math.max(0, target));
  };

  // auto-play: mostra una volta l'animazione carta→formula
  React.useEffect(() => {
    if (initialOpen == null) return;
    const id = setTimeout(() => openCard(initialOpen), 950);
    return () => clearTimeout(id);
  }, []);

  return (
    <div style={{ width: '100%', height: '100%', position: 'relative' }}>
      <GrainBlobs theme={theme} blobHex={blobHex}/>
      <WalletTopBar theme={theme} mode={mode} setMode={setMode} onSettings={onSettings} open={open} onBack={() => setSel(null)} query={query} setQuery={setQuery} family={family} setFamily={setFamily} ink={ink} setInk={setInk}/>
      <WalletSideList list={list} query={query} selCode={open ? selP.code : null} onPick={openCard} theme={theme}/>

      {/* STAGE */}
      <div ref={viewRef} onWheel={onWheel} onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}
        style={{ position: 'absolute', top: 88, left: SB, right: 0, bottom: 0, zIndex: 10, overflow: 'hidden',
          cursor: open ? 'default' : (drag.current.on ? 'grabbing' : 'grab'), touchAction: 'none' }}>
        <div style={{ position: 'absolute', left: 70, top: '50%', height: 1, width: 1 }}>
          {list.map((p, i) => {
            const isSel = i === sel;
            let x = i * STEP - scroll;
            let y = -CARD_H / 2;
            let w = CARD_W, h = CARD_H, z = 10, op = 1, lift = 0, scale = 1;
            if (open) {
              if (isSel) { w = GROW_W; h = growH; x = x - (GROW_W - CARD_W) / 2; y = -growH / 2 - 6; z = 100; }
              else { x += i < sel ? -PART : PART; op = 0.32; scale = 0.96; }
            } else if (hover === i) { lift = -30; scale = 1.05; z = 50; }
            return (
              <div key={p.code} data-i={i}
                onMouseEnter={() => !open && setHover(i)} onMouseLeave={() => !open && setHover(null)}
                onClick={() => { if (open) return; if (!drag.current.moved) openCard(i); }}
                style={{ position: 'absolute', left: 0, top: 0, width: w, height: h,
                  transform: `translate(${x}px, ${y + lift}px) scale(${scale})`, transformOrigin: '50% 50%',
                  zIndex: z, opacity: op, cursor: open ? 'default' : 'pointer',
                  transition: `transform .55s ${FLUID_SOFT}, width .55s ${FLUID_SOFT}, height .55s ${FLUID_SOFT}, opacity .4s`,
                  filter: isSel && open ? 'drop-shadow(0 38px 64px rgba(0,0,0,0.28))' : (hover === i ? 'drop-shadow(0 26px 46px rgba(0,0,0,0.22))' : 'drop-shadow(0 16px 32px rgba(0,0,0,0.16))') }}>
                <WalletUnified pantone={p} open={isSel} qty={qty} setQty={setQty} theme={theme} codeSize={42} headerH={150} onMeasure={isSel ? setMeasuredH : undefined}/>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ position: 'absolute', bottom: 34, left: SB, right: 0, textAlign: 'center', zIndex: 30,
        opacity: open ? 0 : 1, transition: 'opacity .3s', pointerEvents: 'none',
        fontFamily: 'Nebulica', fontSize: 11, letterSpacing: 1.5, fontWeight: 700, color: theme.faint }}>
        ROTELLA O TRASCINA PER SCORRERE · CLICCA UNA CARTA — SI SOLLEVA E I VICINI SI SCOSTANO
      </div>

      {/* frecce ◀ ▶ — orizzontali, in basso a sinistra (cerchi iOS meno trasparenti); con la formula aperta passano alla card prec./succ. */}
      <div style={{ position: 'absolute', left: SB + 30, bottom: 30, display: 'flex', flexDirection: 'row', gap: 12, zIndex: 45 }}>
        {[{ left: true, d: 'M14 6l-6 6 6 6', can: open ? sel > 0 : scroll > 2 }, { left: false, d: 'M10 6l6 6-6 6', can: open ? sel < list.length - 1 : scroll < maxScroll - 2 }].map((b, i) => (
          <button key={i} disabled={!b.can}
            onClick={() => { if (open) { const ni = Math.max(0, Math.min(list.length - 1, sel + (b.left ? -1 : 1))); openCard(ni); } else setScroll(s => clampS(s + (b.left ? -STEP * 3 : STEP * 3))); }}
            title={b.left ? (open ? 'Card precedente' : 'Indietro') : (open ? 'Card successiva' : 'Avanti')}
            style={{ width: 54, height: 54, borderRadius: 99, cursor: b.can ? 'pointer' : 'default', display: 'flex', alignItems: 'center', justifyContent: 'center',
              border: theme.borders ? `${theme.borderWidth}px solid ${theme.ink}` : 'none', background: rgba('#fff', theme.grey ? 0.82 : 0.88),
              backdropFilter: 'blur(16px) saturate(160%)', WebkitBackdropFilter: 'blur(16px) saturate(160%)',
              boxShadow: `0 6px 16px ${rgba('#000', 0.08)}`, opacity: b.can ? 1 : 0.4 }}>
            <Ico d={b.d} size={25} color={theme.accent} sw={2}/>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── VARIANTE STACK (Apple Wallet · v38) ───────────────────────────────────────
// Le carte scorrono dal basso verso l'alto e svaniscono all'indietro
// rimpicciolendosi. La carta scelta emerge da dietro la pila e scivola sul lato
// DESTRO dello schermo, aprendosi sulla formula.
function WalletStack({ theme, mode, setMode, query, setQuery, onSettings, initialOpen = null }) {
  const [family, setFamily] = React.useState('tutti');
  const [ink, setInk] = React.useState(0);
  const list = React.useMemo(() => DESK_PANTONES.filter(p =>
    (family === 'tutti' || p.family === family) && (!ink || p.ink === ink) &&
    (!query || `${p.code} ${p.name} ${p.family}`.toLowerCase().includes(query.toLowerCase()))
  ), [family, ink, query]);
  const [sel, setSel] = React.useState(null);
  const [qty, setQty] = React.useState(100);
  const [scroll, setScroll] = React.useState(() => initialOpen != null ? Math.max(0, (initialOpen - 2) * 70) : 0);
  const drag = React.useRef({ on: false, y0: 0, s0: 0, moved: false });
  const stageRef = React.useRef(null);
  const [sw, setSw] = React.useState(1140);
  const [sh, setSh] = React.useState(812);

  React.useLayoutEffect(() => {
    if (!stageRef.current) return;
    const m = () => { const r = stageRef.current.getBoundingClientRect(); setSw(r.width); setSh(r.height); };
    m();
    const ro = new ResizeObserver(m); ro.observe(stageRef.current); return () => ro.disconnect();
  }, []);

  const SB = 300, CARD_W = 372, PEEK = 70, PEEK_H = 252;
  const OPEN_W = 408, OPEN_H = 620;
  const open = sel !== null && sel < list.length;
  const selP = open ? list[sel] : null;
  const [measuredH, setMeasuredH] = React.useState(null);
  React.useEffect(() => { setMeasuredH(null); }, [sel]);
  const openH = open ? (measuredH ? Math.max(360, Math.min(760, measuredH)) : Math.max(430, Math.min(720, walletOpenHeight(selP, 152)))) : OPEN_H;
  const blobHex = open ? selP.hex : (list[5] || list[0] || DESK_PANTONES[5]).hex;
  React.useEffect(() => { setSel(null); }, [family, ink, query]);
  const maxScroll = Math.max(0, (list.length - 3) * PEEK);
  const clampS = (v) => Math.max(0, Math.min(maxScroll, v));
  const onWheel = (e) => { if (open) return; setScroll(s => clampS(s + e.deltaY)); };
  const onDown = (e) => { if (open) return; drag.current = { on: true, y0: e.clientY, s0: scroll, moved: false }; try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {} };
  const onMove = (e) => { if (!drag.current.on) return; const dy = e.clientY - drag.current.y0; if (Math.abs(dy) > 4) drag.current.moved = true; setScroll(clampS(drag.current.s0 - dy)); };
  const onUp = () => { drag.current.on = false; };

  React.useEffect(() => {
    if (initialOpen == null) return;
    const id = setTimeout(() => { setSel(initialOpen); setQty(100); }, 950);
    return () => clearTimeout(id);
  }, []);

  // ancoraggi orizzontali
  const closedX = (sw - CARD_W) / 2;
  const pileOpenX = sw * 0.045;
  const rightX = sw - OPEN_W - sw * 0.07;
  const frontY = sh * 0.30;

  // posizione carta nella pila (chiusa)
  const pilePos = (i) => {
    const r = i - scroll / PEEK;          // 0 = carta a fuoco
    if (r >= 0) {                          // in arrivo, impilate sotto e leggermente più piccole
      const y = frontY + r * PEEK;
      return { y, scale: Math.max(0.82, 1 - r * 0.05), op: r > 6 ? 0 : 1, z: 400 - Math.round(r * 10) };
    }
    const a = -r;                          // passate: recedono verso l'alto rimpicciolendo e svanendo
    const y = frontY - (24 + (a - 1) * 16);
    return { y, scale: Math.max(0.66, 1 - a * 0.085), op: Math.max(0, 1 - a * 0.42), z: 400 - Math.round(a * 12) };
  };

  return (
    <div style={{ width: '100%', height: '100%', position: 'relative' }}>
      <GrainBlobs theme={theme} blobHex={blobHex}/>

// ── squircle iOS 26 (superellisse) reso con clip-path: path() ───────────────
// corner-shape CSS non è supportato qui: disegniamo la silhouette a mano.
// clip-path per il riempimento + un path SVG (sopra, NON ritagliato) per il
// bordo continuo, leggermente rientrato così la linea non si spezza agli angoli.
function squirclePath(w, h, r, n = 5, pad = 0) {
  const x0 = pad, y0 = pad, W = w - pad * 2, H = h - pad * 2;
  r = Math.max(1, Math.min(r - pad, W / 2, H / 2));
  const k = 2 / n, seg = 18, pts = [];
  const corner = (cx, cy, a0, a1) => {
    for (let i = 0; i <= seg; i++) {
      const a = a0 + (a1 - a0) * (i / seg);
      const c = Math.cos(a), s = Math.sin(a);
      pts.push([
        cx + r * Math.sign(c) * Math.pow(Math.abs(c), k),
        cy + r * Math.sign(s) * Math.pow(Math.abs(s), k),
      ]);
    }
  };
  corner(x0 + W - r, y0 + r,     -Math.PI / 2, 0);          // alto-destra
  corner(x0 + W - r, y0 + H - r, 0, Math.PI / 2);           // basso-destra
  corner(x0 + r,     y0 + H - r, Math.PI / 2, Math.PI);     // basso-sinistra
  corner(x0 + r,     y0 + r,     Math.PI, Math.PI * 1.5);   // alto-sinistra
  return 'M' + pts.map(p => p[0].toFixed(2) + ' ' + p[1].toFixed(2)).join(' L') + ' Z';
}

function Squircle({ radius = 28, n = 5, border, borderWidth = 1.5, shadow, anim, outerStyle, style, className, children }) {
  const ref = React.useRef(null);
  const [d, setD] = React.useState('');
  const [size, setSize] = React.useState([0, 0]);
  React.useLayoutEffect(() => {
    const el = ref.current;
    if (!el || typeof ResizeObserver === 'undefined') return;
    const update = () => {
      const w = el.offsetWidth, h = el.offsetHeight;
      if (w && h) { setSize([w, h]); setD(squirclePath(w, h, radius, n)); }
    };
    update();
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => ro.disconnect();
  }, [radius, n]);
  const clip = d ? `path("${d}")` : 'none';
  return (
    <div style={{ position: 'relative', filter: shadow ? `drop-shadow(${shadow})` : 'none', animation: anim || 'none', ...outerStyle }}>
      <div ref={ref} className={className}
        style={{ position: 'relative', borderRadius: radius, clipPath: clip, WebkitClipPath: clip, ...style }}>
        {children}
      </div>
      {/* il bordo è lo STESSO tracciato della maschera (non ritagliato): segue esattamente la curva */}
      {d && border && (
        <svg width={size[0]} height={size[1]} viewBox={`0 0 ${size[0]} ${size[1]}`}
          style={{ position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 5 }}>
          <path d={d} fill="none" stroke={border} strokeWidth={borderWidth} strokeLinejoin="round"/>
        </svg>
      )}
    </div>
  );
}

function nfLookup(code) {

function nfEffHex(state) {

  const known = nfLookup(state.pantoneId);

function FLabel({ children, optional, theme, style }) {
  return (
    <div style={{ fontFamily: 'Nebulica', fontSize: 11, letterSpacing: 1.4, fontWeight: 700, color: theme.sub, marginBottom: 9, ...style }}>
      {children}{optional && <span style={{ color: theme.faint }}> (OPZIONALE)</span>}
    </div>
  );
}
function fieldBox(theme, { tall, radius } = {}) {
  return {
    width: '100%', height: tall ? 'auto' : 54, borderRadius: radius != null ? radius : 18, padding: tall ? '14px 18px' : '0 18px',
    background: theme.panel, color: theme.ink, outline: 'none',
    border: theme.borders ? `${theme.borderWidth}px solid ${theme.ink}` : `1.5px solid ${theme.line2}`,
    fontFamily: 'Nebulica', fontSize: 16, boxShadow: `0 4px 12px ${rgba('#000', 0.04)}`,
  };
}
function FInput({ value, onChange, placeholder, theme, mono, pill }) {
  return (
    <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      style={{ ...fieldBox(theme, { radius: pill ? 99 : undefined }), padding: pill ? '0 22px' : '0 18px', fontFamily: mono ? '"JetBrains Mono", monospace' : 'Nebulica', fontSize: mono ? 15 : 16, letterSpacing: mono ? 0.4 : 0 }}/>
  );
}

function SegTabs({ tab, setTab, theme }) {
  const opts = [{ k: 'ricetta', l: 'Ricetta Pantone' }, { k: 'sperim', l: 'Sperimentazione' }];
  const idx = opts.findIndex(o => o.k === tab);
  return (
    <div style={{ position: 'relative', display: 'flex', padding: 5, borderRadius: 99, width: '100%', ...glass(theme, { strong: true }) }}>
      <div style={{ position: 'absolute', top: 5, bottom: 5, left: 5, width: 'calc((100% - 10px) / 2)',
        transform: `translateX(${idx * 100}%)`, background: theme.accent, borderRadius: 99, zIndex: 0,
        boxShadow: `0 4px 12px ${rgba(theme.accent, 0.32)}`, transition: `transform .5s ${SPRING}` }}/>
      {opts.map(o => {
        const on = o.k === tab;
        return (
          <button key={o.k} onClick={() => setTab(o.k)} style={{ position: 'relative', zIndex: 1, flex: 1, border: 'none', background: 'transparent',
            cursor: 'pointer', padding: '10px 0', fontFamily: 'Nebulica', fontWeight: 700, fontSize: 14.5, letterSpacing: -0.2,
            color: on ? theme.onAccent : theme.sub }}>{o.l}</button>
        );
      })}
    </div>
  );
}

function ChoicePill({ on, onClick, theme, children }) {
  return (
    <button onClick={onClick} style={{ display: 'inline-flex', alignItems: 'center', gap: 9, padding: '11px 18px', borderRadius: 99, cursor: 'pointer',
      fontFamily: 'Nebulica', fontWeight: 700, fontSize: 14.5, letterSpacing: -0.2, color: on ? '#fff' : theme.ink, ...glass(theme, { active: on }) }}>
      {children}
    </button>
  );
}

function TempPicker({ value, onChange, theme }) {
  return (
    <div style={{ display: 'flex', gap: 10 }}>
      {NF_TEMPS.map(t => {
        const on = value === t.k;
        return (
          <ChoicePill key={t.k} on={on} onClick={() => onChange(on ? null : t.k)} theme={theme}>
            <TempDot hex={t.dot}/>
            {t.l}
          </ChoicePill>
        );
      })}
    </div>
  );
}

function CoverDots({ lvl, color }) {
  return (
    <span style={{ display: 'inline-flex', gap: 3 }}>
      {[0, 1, 2].map(i => (
        <span key={i} style={{ width: 7, height: 7, borderRadius: 99,
          background: i < lvl ? color : 'transparent', boxShadow: `inset 0 0 0 1.4px ${color}` }}/>
      ))}
    </span>
  );
}
function CoverPicker({ value, onChange, theme }) {
  return (
    <div style={{ display: 'flex', gap: 10 }}>
      {NF_COVERS.map(c => {
        const on = value === c.k;
        return (
          <ChoicePill key={c.k} on={on} onClick={() => onChange(on ? null : c.k)} theme={theme}>
            <CoverDots lvl={c.lvl} color={on ? '#fff' : theme.ink}/>{c.l}
          </ChoicePill>
        );
      })}
    </div>
  );
}

function CatChips({ value, onChange, theme }) {
  const [open, setOpen] = React.useState(false);
  const VISIBLE = 7;
  let shown = open ? NF_CATS : NF_CATS.slice(0, VISIBLE);
  if (!open && value && !shown.includes(value)) shown = [...shown, value];
  const hidden = NF_CATS.length - VISIBLE;
  return (
    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
      {shown.map(c => {
        const on = value === c;
        return (
          <button key={c} onClick={() => onChange(on ? null : c)} style={{ padding: '9px 16px', borderRadius: 99, cursor: 'pointer',
            fontFamily: 'Nebulica', fontWeight: 700, fontSize: 13.5, letterSpacing: -0.1, color: on ? '#fff' : theme.ink, ...glass(theme, { active: on }) }}>{c}</button>
        );
      })}
      {hidden > 0 && (
        <button onClick={() => setOpen(o => !o)} style={{ padding: '9px 15px', borderRadius: 99, cursor: 'pointer',
          fontFamily: 'Nebulica', fontWeight: 700, fontSize: 13.5, letterSpacing: -0.1, color: theme.sub, background: 'transparent',
          border: `1.5px dashed ${theme.borders ? rgba(theme.ink, 0.4) : theme.line2}`,
          display: 'inline-flex', alignItems: 'center', gap: 6 }}>
          {open ? 'Comprimi' : `+${hidden} altre`}
          <span style={{ display: 'inline-flex', transform: open ? 'rotate(180deg)' : 'none', transition: 'transform .3s' }}><IcoChevron size={14} color={theme.sub}/></span>
        </button>
      )}
    </div>
  );
}

function ProjTags({ tags, setTags, input, setInput, theme }) {
  const add = () => { const v = input.trim(); if (v && !tags.includes(v)) setTags([...tags, v]); setInput(''); };
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', ...fieldBox(theme), height: 'auto', minHeight: 54, padding: tags.length ? '9px 14px' : '0 18px' }}>
        {tags.map(t => (
          <span key={t} style={{ display: 'inline-flex', alignItems: 'center', gap: 7, padding: '6px 8px 6px 14px', borderRadius: 99,
            background: rgba(theme.accent, theme.grey ? 0.16 : 0.13), color: theme.ink, fontFamily: 'Nebulica', fontWeight: 700, fontSize: 13.5 }}>
            {t}
            <button onClick={() => setTags(tags.filter(x => x !== t))} style={{ width: 20, height: 20, borderRadius: 99, border: 'none', cursor: 'pointer',
              background: rgba('#000', 0.08), display: 'inline-flex', alignItems: 'center', justifyContent: 'center', padding: 0 }}>
              <IcoClose size={12} color={theme.ink}/></button>
          </span>
        ))}
        <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); add(); } }}
          placeholder={tags.length ? '' : 'es. Risanamento 25'} style={{ flex: 1, minWidth: 120, border: 'none', outline: 'none', background: 'transparent',
            fontFamily: 'Nebulica', fontSize: 16, color: theme.ink, height: 36 }}/>
      </div>
      <div style={{ fontFamily: 'Nebulica', fontSize: 12.5, fontStyle: 'italic', color: theme.faint, marginTop: 8 }}>scrivi il nome e premi Invio per aggiungere</div>
    </div>
  );
}

// ── editor inchiostri (righe + aggiungi) ────────────────────────────────────
function InkEditor({ state, theme }) {
  const total = nfTotalG(state);
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 11 }}>
        <FLabel theme={theme} style={{ marginBottom: 0 }}>INCHIOSTRI <span style={{ color: theme.faint }}>(BASE {NF_BASE} G)</span></FLabel>
        <span style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 12.5, fontWeight: 600, color: total > 0 ? theme.ink : theme.faint }}>Σ {total.toFixed(2)} g</span>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {state.inks.map((row, i) => {
          const known = INK_POOL.find(k => k.name === row.name);
          const pct = total > 0 ? ((parseFloat(row.g) || 0) / total) * 100 : 0;
          return (
            <div key={row.id} style={{ display: 'flex', alignItems: 'center', gap: 10, ...fieldBox(theme, { radius: 99 }), padding: '0 10px 0 18px', animation: `nfRowIn .34s ${SPRING_SOFT} both` }}>
              {/* select inchiostro */}
              <div style={{ position: 'relative', flex: 1, minWidth: 0, display: 'flex', alignItems: 'center', gap: 10 }}>
                {row.name
                  ? <span style={{ width: 12, height: 12, borderRadius: 99, background: theme.accent, flexShrink: 0 }}/>
                  : <span style={{ width: 12, height: 12, borderRadius: 99, boxShadow: `inset 0 0 0 1.5px ${theme.line2}`, flexShrink: 0 }}/>}
                <select value={row.name} onChange={e => state.setInk(row.id, { name: e.target.value })}
                  style={{ appearance: 'none', WebkitAppearance: 'none', border: 'none', outline: 'none', background: 'transparent', cursor: 'pointer',
                    flex: 1, minWidth: 0, fontFamily: 'Nebulica', fontWeight: 700, fontSize: 15, color: row.name ? theme.ink : theme.faint, paddingRight: 18 }}>
                  <option value="">Scegli inchiostro</option>
                  {INK_POOL.map(k => <option key={k.name} value={k.name}>{k.name} · {k.label}</option>)}
                </select>
                <span style={{ position: 'absolute', right: 0, pointerEvents: 'none' }}><IcoChevron size={16} color={theme.faint}/></span>
              </div>
              {known && <span style={{ fontFamily: 'Nebulica', fontSize: 12, color: theme.faint, flexShrink: 0 }}>{Math.round(pct)}%</span>}
              {/* grammi */}
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 3, flexShrink: 0 }}>
                <input className="nf-num" type="number" min="0" step="0.01" value={row.g} placeholder="0.00"
                  onChange={e => state.setInk(row.id, { g: e.target.value })}
                  style={{ width: 64, border: 'none', outline: 'none', background: 'transparent', textAlign: 'right',
                    fontFamily: 'Nebulica', fontWeight: 700, fontSize: 18, color: theme.ink }}/>
                <span style={{ fontFamily: 'Nebulica', fontSize: 13, color: theme.faint }}>g</span>
              </div>
              <button onClick={() => state.delInk(row.id)} title="Rimuovi" style={{ width: 34, height: 34, borderRadius: 99, flexShrink: 0,
                border: `1.5px solid ${theme.line2}`, background: 'transparent', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
                <IcoClose size={14} color={theme.sub}/></button>
            </div>
          );
        })}
      </div>
      <button onClick={state.addInk} style={{ width: '100%', marginTop: 10, height: 52, borderRadius: 99, cursor: 'pointer',
        border: `2px dashed ${theme.borders ? rgba(theme.ink, 0.4) : theme.line2}`, background: 'transparent', color: theme.ink,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 9, fontFamily: 'Nebulica', fontWeight: 700, fontSize: 15 }}>
        <IcoPlus size={18} color={theme.ink} sw={2}/> aggiungi inchiostro
      </button>
    </div>
  );
}

// ── anteprima colorata (header risultato) ───────────────────────────────────
function PreviewHeader({ state, theme, size = 72, h = 150 }) {
  const eff = nfEffHex(state);
  const known = nfLookup(state.pantoneId);
  const fg = eff ? textOnDesk(eff) : theme.ink;
  const name = known ? known.name : (state.tab === 'sperim' ? 'Sperimentazione' : 'Nuova tinta');
  const cover = NF_COVERS.find(c => c.k === state.cover);
  return (
    <div style={{ position: 'relative', padding: '20px 28px 16px', flexShrink: 0, overflow: 'hidden',
      background: eff || theme.panelAlt,
      backgroundImage: eff ? 'none' : `repeating-linear-gradient(45deg, ${theme.line} 0 10px, transparent 10px 20px)`,
      transition: 'background .4s' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16 }}>
        <span style={{ fontFamily: 'Nebulica', fontSize: 11.5, letterSpacing: 1.6, fontWeight: 700, color: fg, opacity: 0.72 }}>
          {(state.cat || 'CATEGORIA').toUpperCase()} · {state.tab === 'sperim' ? 'SPERIM.' : 'PANTONE'}</span>
        <div style={{ display: 'flex', gap: 8 }}>
          {state.temp && <Tag fg={fg}>{NF_TEMPS.find(t => t.k === state.temp).l}</Tag>}
          {cover && <Tag fg={fg}>{cover.l}</Tag>}
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 20, marginTop: 10 }}>
        {state.pantoneId
          ? <PantoneCode code={state.pantoneId} fg={fg} size={size} theme={theme}/>
          : <span style={{ fontFamily: theme.display, fontWeight: theme.displayWeight, fontSize: size, lineHeight: 0.85, color: fg, opacity: 0.5, fontStyle: theme.isSerif ? 'italic' : 'normal' }}>000&nbsp;U</span>}
        <div style={{ textAlign: 'right', paddingBottom: 4 }}>
          <div style={{ fontFamily: 'Nebulica', fontSize: 18, fontWeight: 500, color: fg, letterSpacing: -0.5 }}>{name}</div>
          <div style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 11, color: fg, opacity: 0.72, marginTop: 4, letterSpacing: 0.4 }}>
            {(eff || '#——————').toUpperCase()}{state.page ? ` · PAG.${state.page}` : ''}</div>
        </div>
      </div>
    </div>
  );
}
function Tag({ fg, children }) {
  return <span style={{ padding: '5px 11px', borderRadius: 99, fontFamily: 'Nebulica', fontWeight: 700, fontSize: 11.5, letterSpacing: 0.2,
    color: fg, background: rgba(fg === '#fff' ? '#fff' : '#000', 0.14), border: `1.2px solid ${rgba(fg === '#fff' ? '#fff' : '#000', 0.28)}` }}>{children}</span>;
}

function liveRecipe(state) {
  const inks = state.inks.filter(r => r.name && (parseFloat(r.g) || 0) > 0).map(r => {
    const k = INK_POOL.find(x => x.name === r.name);
    return { name: r.name, label: k ? k.label : '', g: parseFloat(r.g) || 0 };
  });
  const total = inks.reduce((s, r) => s + r.g, 0);
  return { inks: inks.map(r => ({ name: r.name, label: r.label, pct: total > 0 ? (r.g / total) * 100 : 0 })), total };
}

function SaveBar({ theme, onClose, compact }) {
  return (
    <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
      <button onClick={onClose} style={{ height: 52, padding: '0 22px', borderRadius: 99, cursor: 'pointer',
        fontFamily: 'Nebulica', fontWeight: 700, fontSize: 14.5, color: theme.ink, ...glass(theme, { strong: true }) }}>Annulla</button>
      <button style={{ flex: compact ? 'none' : 1, height: 52, padding: '0 26px', borderRadius: 99, cursor: 'pointer', border: 'none',
        background: theme.accent, color: theme.onAccent, fontFamily: 'Nebulica', fontWeight: 700, fontSize: 15, letterSpacing: -0.2,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 9, boxShadow: `0 8px 22px ${rgba(theme.accent, 0.32)}` }}>
        <IcoCheck size={19} color={theme.onAccent} sw={2.2}/> Salva ricetta
      </button>
    </div>
  );
}

        <div className="nf-scroll" style={{ width: 460, flexShrink: 0, overflowY: 'auto', padding: '6px 26px 36px 28px',

            <div style={{ fontFamily: theme.display, fontWeight: theme.displayWeight, fontSize: 32, letterSpacing: -0.9, color: theme.ink, lineHeight: 1, fontStyle: theme.isSerif ? 'italic' : 'normal' }}>Nuova formula</div>

        <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', padding: '4px 28px 30px 18px', minHeight: 0 }}>

            <span style={{ fontFamily: 'Nebulica', fontSize: 11, letterSpacing: 1.6, fontWeight: 700, color: theme.sub }}>ANTEPRIMA</span>
            <span style={{ flex: 1, height: 1, background: theme.line }}/>
            <span style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 10.5, color: theme.faint }}>come apparirà nel ricettario</span>
          </div>

          <div style={{ width: 600, maxWidth: '100%', borderRadius: 34, overflow: 'hidden', position: 'relative', display: 'flex', flexDirection: 'column', minHeight: 0,
            ...surface(theme), border: theme.borders ? `${theme.borderWidth}px solid ${theme.ink}` : `1px solid ${theme.line}`,
            boxShadow: `0 22px 54px ${rgba('#000', 0.12)}` }}>
            <PreviewHeader state={state} theme={theme} size={80} h={160}/>
            <div className="nf-scroll" style={{ flex: 1, minHeight: 0, overflowY: 'auto', padding: '20px 32px 26px' }}>
              {rec.inks.length > 0 ? (
                <InkFormula pantone={{ hex: eff || theme.accent }} recipe={{ inks: rec.inks }} qty={rec.total} theme={theme} big play/>
              ) : (
                <div style={{ padding: '34px 0', textAlign: 'center', fontFamily: 'Nebulica', fontSize: 14.5, color: theme.faint }}>
                  Scegli gli inchiostri e i grammi<br/>per comporre la formula.
                </div>
              )}
              {state.note && <NotesBlock note={state.note} theme={theme}/>}
              <div style={{ marginTop: 16 }}><PrintButton theme={theme}/></div>
            </div>
          </div>
          <div style={{ flex: 1 }}/>
        </div>
      </div>
    </div>
  );
}

// ── wrapper: stato impostazioni (gear) + stato form, come DesktopApp ─────────
function NuovaComposer({ defaults, layout = 'modal' }) {
  ensureNuovaKf();
  const [settings, setSettings] = React.useState(() => ({ ...defaults }));
  React.useEffect(() => { setSettings(s => ({ ...s, ...defaults })); },
    [defaults.theme, defaults.accent, defaults.display, defaults.grain, defaults.borders, defaults.borderWidth, defaults.cardSurface, defaults.blobShape, defaults.blobSpeed, defaults.blobAnim, defaults.dividers]);
  const setSetting = (k, v) => setSettings(s => ({ ...s, [k]: v }));
  const theme = React.useMemo(() => deriveTheme(settings), [settings.theme, settings.accent, settings.display, settings.grain, settings.borders, settings.borderWidth, settings.cardSurface, settings.blobShape, settings.blobSpeed, settings.blobAnim]);
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const state = useFormulaState();

  return (
    <div style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden', background: theme.bg, fontFamily: 'Nebulica, system-ui, sans-serif' }}>
      {layout === 'modal'
        ? <NuovaModal state={state} theme={theme} dividers={settings.dividers !== false} onSettings={() => setSettingsOpen(true)} onClose={() => {}}/>
        : <NuovaEditor state={state} theme={theme} onSettings={() => setSettingsOpen(true)} onClose={() => {}}/>}
      <SettingsPanel open={settingsOpen} onClose={() => setSettingsOpen(false)} settings={settings} setSetting={setSetting} theme={theme}/>
    </div>
  );
}

Object.assign(window, { NuovaComposer });

// ============================================================
// desktop-shell.jsx
// ============================================================
// desktop-shell.jsx — DesktopApp: contenitore con stato Impostazioni (seed dai
// Tweak globali), switcher di modalità e overlay Impostazioni in-app.
// Ogni MODE component disegna la propria top-bar (per gestire la spinta della
// search in Gallery) usando gli atomi del chrome.

function DesktopApp({ defaults, initialMode = 'master', masterAnim = 'morph', walletVariant = 'row', galleryAnim = 'slide', cardTreatment = 'shadowColor', tilt = false, cardEnter = 'deckGlide' }) {
  const [settings, setSettings] = React.useState(() => ({ ...defaults, walletVariant, masterAnim, cardEnter }));
  // risincronizza quando l'utente cambia i Tweak globali
  React.useEffect(() => { setSettings(s => ({ ...s, ...defaults })); },
    [defaults.theme, defaults.accent, defaults.display, defaults.grain, defaults.borders, defaults.borderWidth, defaults.cardSurface, defaults.btnStyle, defaults.blobShape, defaults.blobSpeed, defaults.blobAnim, defaults.modeTransition]);
  const setSetting = (k, v) => setSettings(s => ({ ...s, [k]: v }));
  const theme = React.useMemo(() => deriveTheme(settings), [settings.theme, settings.accent, settings.display, settings.grain, settings.borders, settings.borderWidth, settings.cardSurface, settings.btnStyle, settings.blobShape, settings.blobSpeed, settings.blobAnim, settings.bgTone, settings.colorGlow]);

  const [mode, setMode] = React.useState(initialMode);
  const [query, setQuery] = React.useState('');
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  ensureModeKf();

  // cambio modalità con direzione (per lo scorrimento)
  const ORDER = ['master', 'wallet', 'gallery'];
  const dirRef = React.useRef(1);
  const changeMode = (m) => { if (m === mode) return; dirRef.current = ORDER.indexOf(m) >= ORDER.indexOf(mode) ? 1 : -1; setMode(m); };

  const chrome = { theme, mode, setMode: changeMode, query, setQuery, onSettings: () => setSettingsOpen(true) };

  let Body = null;
  if (mode === 'master')  Body = <MasterMode  {...chrome} anim={settings.masterAnim || masterAnim} cardTreatment={cardTreatment} tilt={tilt} cardEnter={settings.cardEnter || cardEnter}/>;
  if (mode === 'wallet')  Body = <WalletMode  {...chrome} variant={settings.walletVariant || walletVariant}/>;
  if (mode === 'gallery') Body = <GalleryMode {...chrome} formulaAnim={galleryAnim}/>;

  const trans = settings.modeTransition || 'liquido';
  const animName = trans === 'dissolvenza' ? 'modeFade'
    : trans === 'scorrimento' ? (dirRef.current > 0 ? 'modeSlideR' : 'modeSlideL')
    : 'modeLiquid';

  return (
    <div style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden', background: theme.bg,
      fontFamily: 'Nebulica, system-ui, sans-serif' }}>
      <div key={mode} style={{ width: '100%', height: '100%', animation: `${animName} .52s ${FLUID_SOFT} both` }}>
        {Body}
      </div>
      <SettingsPanel open={settingsOpen} onClose={() => setSettingsOpen(false)} settings={settings} setSetting={setSetting} theme={theme}/>
    </div>
  );
}

function ensureModeKf() {
  if (document.getElementById('mode-kf')) return;
  const s = document.createElement('style');
  s.id = 'mode-kf';
  s.textContent = `
    @keyframes modeFade { from{opacity:0;} to{opacity:1;} }
    @keyframes modeLiquid { from{opacity:0; transform:scale(.985) translateY(10px); filter:blur(7px);} to{opacity:1; transform:none; filter:blur(0);} }
    @keyframes modeSlideR { from{opacity:0; transform:translateX(48px);} to{opacity:1; transform:translateX(0);} }
    @keyframes modeSlideL { from{opacity:0; transform:translateX(-48px);} to{opacity:1; transform:translateX(0);} }
  `;
  document.head.appendChild(s);
}

Object.assign(window, { DesktopApp });
